<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória Educativo</title>
<style>
:root {
  --primary: #6c5ce7;
  --secondary: #a8e6cf;
  --accent: #ff8b94;
  --dark: #2d3436;
  --light: #f9f9f9;
  --success: #00b894;
  --warning: #fdcb6e;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 15px;
  text-align: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  color: var(--dark);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

h1 {
  font-size: 2rem;
  color: white;
  margin-bottom: 20px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  animation: fadeInDown 0.5s ease;
}

.config-panel {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  margin-bottom: 25px;
  animation: slideIn 0.5s ease;
}

.config-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
  color: var(--primary);
}

.config-header h3 {
  font-size: 1.3rem;
}

.config-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  margin-bottom: 15px;
}

.config-item {
  display: flex;
  flex-direction: column;
  text-align: left;
  gap: 5px;
}

.config-item label {
  font-weight: 600;
  color: var(--primary);
  font-size: 0.9rem;
}

input, select, .file-input {
  padding: 10px;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  font-size: 0.95rem;
  transition: all 0.3s ease;
  background: white;
}

input:focus, select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2);
}

.file-input {
  background: #f0f0f0;
  cursor: pointer;
}

.file-input:hover {
  background: #e0e0e0;
}

.btn {
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 0.95rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(108, 92, 231, 0.6);
}

.btn-success {
  background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
  color: white;
}

.btn-success:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4);
}

.btn-warning {
  background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);
  color: white;
}

.btn-danger {
  background: linear-gradient(135deg, #d63031 0%, #e17055 100%);
  color: white;
}

.btn-danger:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(214, 48, 49, 0.4);
}

.activities-container {
  margin-top: 15px;
  padding: 10px;
  background: #f0f0f0;
  border-radius: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.activity-tag {
  background: white;
  padding: 8px 15px;
  border-radius: 25px;
  font-size: 0.9rem;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  display: flex;
  align-items: center;
  gap: 5px;
  animation: fadeIn 0.3s ease;
}

.activity-tag span {
  color: var(--primary);
}

.game-info {
  background: white;
  padding: 15px 20px;
  border-radius: 50px;
  display: inline-flex;
  align-items: center;
  gap: 30px;
  margin-bottom: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  animation: pulse 2s infinite;
  flex-wrap: wrap;
  justify-content: center;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.2rem;
  font-weight: 600;
}

.info-item i {
  color: var(--primary);
  font-size: 1.5rem;
}

.sound-control {
  display: flex;
  gap: 10px;
  align-items: center;
  background: #f0f0f0;
  padding: 8px 15px;
  border-radius: 30px;
}

.sound-control button {
  padding: 8px 15px;
  font-size: 0.9rem;
}

.game-board {
  display: grid;
  gap: 15px;
  justify-content: center;
  margin: 20px auto;
  animation: fadeIn 0.5s ease;
}

.card {
  width: 100px;
  height: 100px;
  background: linear-gradient(135deg, var(--primary), #a8e6cf);
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0));
  border-radius: 15px;
}

.card:hover:not(.matched) {
  transform: scale(1.05) rotate(2deg);
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

.card.som-mode:hover:not(.matched) {
  animation: pulse-sound 1s infinite;
}

@keyframes pulse-sound {
  0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
  70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
  100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
}

.card img {
  max-width: 80%;
  max-height: 80%;
  object-fit: contain;
  border-radius: 10px;
  transition: all 0.3s ease;
  z-index: 1;
}

.card.matched {
  background: linear-gradient(135deg, var(--success), #00cec9);
  transform: scale(0.95);
  cursor: default;
  animation: matched 0.5s ease;
}

.card.matched::after {
  content: '✓';
  position: absolute;
  top: 5px;
  right: 5px;
  color: white;
  font-size: 1.2rem;
  font-weight: bold;
  z-index: 2;
}

.victory-message {
  background: linear-gradient(135deg, var(--success), #00cec9);
  color: white;
  padding: 20px;
  border-radius: 50px;
  font-size: 1.5rem;
  font-weight: bold;
  margin: 20px auto;
  max-width: 500px;
  animation: bounceIn 0.5s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

@keyframes matched {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(0.95); }
}

@keyframes bounceIn {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.05); opacity: 0.9; }
  70% { transform: scale(0.9); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

@media (max-width: 600px) {
  h1 { font-size: 1.5rem; }
  .card { width: 70px; height: 70px; font-size: 2rem; }
  .game-info { flex-direction: column; gap: 10px; border-radius: 20px; }
  .info-item { font-size: 1rem; }
}

@media (min-width: 601px) and (max-width: 900px) {
  .card { width: 90px; height: 90px; }
}
</style>
</head>
<body>

<div class="container">
<h1>🎮 Jogo da Memória Educativo 🎮</h1>

<div class="config-panel">
<div class="config-header">
<h3>👨‍🏫 Painel do Professor</h3>
</div>

<div class="config-grid">
<div class="config-item">
<label>📝 Nome da Atividade</label>
<input type="text" id="activityName" placeholder="Ex: Animais da Fazenda">
</div>

<div class="config-item">
<label>🔢 Número de Pares</label>
<select id="pairCount">
<option value="4">4 pares (8 cartas)</option>
<option value="6" selected>6 pares (12 cartas)</option>
<option value="8">8 pares (16 cartas)</option>
<option value="10">10 pares (20 cartas)</option>
</select>
</div>

<div class="config-item">
<label>🎯 Modo de Jogo</label>
<select id="gameMode">
<option value="normal">Clássico (imagem + som)</option>
<option value="som-imagem">Desafio Auditivo (som → imagem)</option>
<option value="som-som">Desafio Musical (som → som)</option>
</select>
</div>

<div class="config-item">
<label>🖼️ Upload de Imagem</label>
<input type="file" id="imageUpload" accept="image/*" class="file-input">
</div>

<div class="config-item">
<label>🔊 Upload de Som</label>
<input type="file" id="soundUpload" accept="audio/*" class="file-input">
</div>
</div>

<div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 15px;">
<button class="btn btn-primary" onclick="addCustomCard()">
➕ Adicionar Carta Personalizada
</button>
<button class="btn btn-success" onclick="saveActivity()">
💾 Salvar Atividade
</button>
<button class="btn btn-warning" onclick="startGame()">
🎮 Iniciar Jogo
</button>
</div>

<div id="savedActivities" class="activities-container"></div>
</div>

<div class="game-info">
<div class="info-item">
<span>🏆</span>
<span>Pontuação: <span id="score">0</span></span>
</div>
<div class="info-item">
<span>🎯</span>
<span>Pares: <span id="pairsFound">0</span>/<span id="totalPairs">6</span></span>
</div>
<div class="info-item">
<span>⏱️</span>
<span>Tempo: <span id="timer">00:00</span></span>
</div>
<div class="sound-control">
<span>🔊 Som:</span>
<button class="btn btn-danger" onclick="stopAllSounds()" style="padding: 5px 15px;">⏹️ Parar</button>
</div>
</div>

<div id="gameBoard" class="game-board"></div>
<div id="victoryMessage" class="victory-message" style="display: none;"></div>
</div>

<script>
let baseCards = [
  { type: "image", content: "imagens/cachorro.jfif", sound: "audios/cachorro.mp3", name: "Cachorro" },
  { type: "image", content: "imagens/gato.jfif", sound: "audios/gato.mp3", name: "Gato" },
  { type: "image", content: "imagens/violao.jfif", sound: "audios/violao.mp3", name: "Violão" },
  { type: "image", content: "imagens/bateria.jfif", sound: "audios/bateria.mp3", name: "Bateria" },
  { type: "image", content: "imagens/vaca.jfif", sound: "audios/vaca.mp3", name: "Vaca" },
  { type: "image", content: "imagens/cavalo.jfif", sound: "audios/cavalo.mp3", name: "Cavalo" },
  { type: "image", content: "imagens/guitarra.jfif", sound: "audios/guitarra.mp3", name: "Guitarra" },
  { type: "image", content: "imagens/passaro.jfif", sound: "audios/passaro.mp3", name: "Pássaro" },
  { type: "image", content: "imagens/trompete.jfif", sound: "audios/trompete.mp3", name: "Trompete" },
  { type: "image", content: "imagens/flauta.jfif", sound: "audios/flauta.mp3", name: "Flauta" },
  { type: "image", content: "imagens/violino.jfif", sound: "audios/violino.mp3", name: "Violino" },
  { type: "image", content: "imagens/piano.jfif", sound: "audios/piano.mp3", name: "Piano" }
];

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matches = 0;
let totalPairs = 0;
let score = 0;
let timerInterval = null;
let seconds = 0;
let currentAudio = null;
let currentMode = "normal";

// Lista para armazenar múltiplos áudios
let activeAudios = [];
let hoverTimeout = null;

function addCustomCard() {
  let img = document.getElementById("imageUpload").files[0];
  let snd = document.getElementById("soundUpload").files[0];

  if (!img || !snd) {
    showNotification("❌ Selecione uma imagem e um som!", "error");
    return;
  }

  baseCards.push({
    type: "image",
    content: URL.createObjectURL(img),
    sound: URL.createObjectURL(snd),
    name: img.name.split('.')[0]
  });

  showNotification("✅ Carta adicionada com sucesso!", "success");
  
  // Limpar inputs
  document.getElementById("imageUpload").value = "";
  document.getElementById("soundUpload").value = "";
}

function showNotification(message, type) {
  const notification = document.createElement('div');
  notification.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    background: ${type === 'success' ? 'linear-gradient(135deg, #00b894, #00cec9)' : 'linear-gradient(135deg, #d63031, #e17055)'};
    color: white;
    padding: 15px 25px;
    border-radius: 50px;
    font-weight: 600;
    z-index: 1000;
    animation: slideIn 0.5s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  `;
  notification.textContent = message;
  document.body.appendChild(notification);
  
  setTimeout(() => {
    notification.style.animation = 'fadeOut 0.5s ease';
    setTimeout(() => notification.remove(), 500);
  }, 3000);
}

function stopAllSounds() {
  // Parar o áudio atual se existir
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  
  // Parar todos os áudios da lista
  activeAudios.forEach(audio => {
    if (audio) {
      audio.pause();
      audio.currentTime = 0;
    }
  });
  activeAudios = [];
  
  showNotification("🔇 Todos os sons foram parados!", "success");
}

function playHoverSound(soundSrc) {
  // Se estiver no modo som-imagem, tocar som ao passar o mouse
  if (currentMode === "som-imagem") {
    // Limpar timeout anterior se existir
    if (hoverTimeout) {
      clearTimeout(hoverTimeout);
    }
    
    // Pequeno delay para evitar muitos toques rápidos
    hoverTimeout = setTimeout(() => {
      playSound(soundSrc);
    }, 50);
  }
}

function startGame() {
  // Resetar jogo
  clearInterval(timerInterval);
  seconds = 0;
  updateTimer();
  
  // Parar todos os sons ao iniciar novo jogo
  stopAllSounds();
  
  score = 0;
  matches = 0;
  document.getElementById("score").innerText = "0";
  document.getElementById("victoryMessage").style.display = "none";
  
  let pairCount = parseInt(document.getElementById("pairCount").value);
  currentMode = document.getElementById("gameMode").value;
  totalPairs = pairCount;
  
  document.getElementById("totalPairs").innerText = totalPairs;
  document.getElementById("pairsFound").innerText = "0";

  let selected = shuffle([...baseCards]).slice(0, pairCount);
  let cards = shuffle([...selected, ...selected]);

  let board = document.getElementById("gameBoard");
  board.innerHTML = "";
  board.style.gridTemplateColumns = `repeat(${Math.ceil(Math.sqrt(cards.length))}, 1fr)`;

  if (currentMode === "som-imagem") {
    setTimeout(() => playSound(selected[0].sound), 500);
  }

  cards.forEach(item => {
    let card = document.createElement("div");
    card.classList.add("card");
    
    // Adicionar classe especial para modo som-imagem
    if (currentMode === "som-imagem") {
      card.classList.add("som-mode");
    }
    
    card.dataset.content = item.content;
    card.dataset.sound = item.sound;
    card.dataset.name = item.name;

    if (currentMode !== "som-imagem") {
      card.innerHTML = `<img src="${item.content}" alt="${item.name}">`;
    } else {
      card.innerHTML = `<span style="font-size: 2rem;">🔊</span>`;
    }

    card.onclick = () => flipCard(card, currentMode);
    
    // Adicionar evento de mouseenter para tocar som no hover
    card.addEventListener('mouseenter', () => playHoverSound(card.dataset.sound));
    
    board.appendChild(card);
  });

  // Iniciar timer
  timerInterval = setInterval(updateTimer, 1000);
}

function flipCard(card, mode) {
  if (lockBoard || card.classList.contains("matched") || card === firstCard) return;

  playSound(card.dataset.sound);

  if (mode === "som-imagem") {
    card.innerHTML = `<img src="${card.dataset.content}" alt="${card.dataset.name}">`;
  }

  if (!firstCard) {
    firstCard = card;
    return;
  }

  secondCard = card;

  let match = false;
  
  if (mode === "som-som") {
    match = firstCard.dataset.sound === secondCard.dataset.sound;
  } else {
    match = firstCard.dataset.content === secondCard.dataset.content;
  }

  if (match) {
    firstCard.classList.add("matched");
    secondCard.classList.add("matched");
    matches++;
    score += 10;
    
    document.getElementById("score").innerText = score;
    document.getElementById("pairsFound").innerText = matches;

    playSound('https://www.soundjay.com/misc/sounds/bell-ringing-1.mp3');

    if (matches === totalPairs) {
      clearInterval(timerInterval);
      document.getElementById("victoryMessage").innerHTML = `
        🎉 Parabéns! Você venceu! 🎉<br>
        Pontuação final: ${score}<br>
        Tempo: ${formatTime(seconds)}
      `;
      document.getElementById("victoryMessage").style.display = "block";
      
      // Tocar som de vitória
      playSound('https://www.soundjay.com/misc/sounds/bell-ringing-5.mp3');
    }

    reset();
  } else {
    score = Math.max(0, score - 2);
    document.getElementById("score").innerText = score;
    
    lockBoard = true;
    setTimeout(() => {
      if (mode === "som-imagem" && !firstCard.classList.contains("matched")) {
        firstCard.innerHTML = `<span style="font-size: 2rem;">🔊</span>`;
      }
      if (mode === "som-imagem" && !secondCard.classList.contains("matched")) {
        secondCard.innerHTML = `<span style="font-size: 2rem;">🔊</span>`;
      }
      reset();
      lockBoard = false;
    }, 800);
  }
}

function reset() {
  firstCard = null;
  secondCard = null;
}

function shuffle(arr) {
  return arr.sort(() => 0.5 - Math.random());
}

function playSound(src) {
  // Parar o áudio atual se existir
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  
  // Criar e tocar novo áudio
  currentAudio = new Audio(src);
  currentAudio.volume = 0.5;
  
  // Adicionar à lista de áudios ativos
  activeAudios.push(currentAudio);
  
  // Remover da lista quando terminar
  currentAudio.onended = () => {
    const index = activeAudios.indexOf(currentAudio);
    if (index > -1) {
      activeAudios.splice(index, 1);
    }
  };
  
  currentAudio.play().catch(e => console.log("Erro ao tocar áudio:", e));
}

function updateTimer() {
  seconds++;
  document.getElementById("timer").innerText = formatTime(seconds);
}

function formatTime(totalSeconds) {
  let minutes = Math.floor(totalSeconds / 60);
  let seconds = totalSeconds % 60;
  return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}

function saveActivity() {
  let name = document.getElementById("activityName").value;
  if (!name) {
    showNotification("❌ Digite um nome para a atividade!", "error");
    return;
  }
  
  let activities = JSON.parse(localStorage.getItem("activities") || "[]");
  
  // Salvar configurações atuais
  let activity = {
    name: name,
    pairCount: document.getElementById("pairCount").value,
    gameMode: document.getElementById("gameMode").value,
    date: new Date().toLocaleDateString()
  };
  
  activities.push(activity);
  localStorage.setItem("activities", JSON.stringify(activities));
  
  loadActivities();
  showNotification("✅ Atividade salva com sucesso!", "success");
  document.getElementById("activityName").value = "";
}

function loadActivities() {
  let container = document.getElementById("savedActivities");
  container.innerHTML = "";
  let activities = JSON.parse(localStorage.getItem("activities") || "[]");
  
  // Mostrar atividades mais recentes primeiro
  activities.reverse().forEach((a, index) => {
    let div = document.createElement("div");
    div.className = "activity-tag";
    div.innerHTML = `
      <span>📚</span>
      <span>${a.name}</span>
      <small style="color: #666;">(${a.pairCount} pares - ${a.date})</small>
      <button onclick="loadActivity(${index})" style="background: none; border: none; cursor: pointer; margin-left: 5px;" title="Carregar atividade">▶️</button>
      <button onclick="deleteActivity(${index})" style="background: none; border: none; cursor: pointer; color: #d63031;" title="Remover atividade">✖️</button>
    `;
    container.appendChild(div);
  });
}

function loadActivity(index) {
  let activities = JSON.parse(localStorage.getItem("activities") || "[]");
  // Reverter para obter o índice correto (já que usamos reverse() na exibição)
  let activitiesReversed = [...activities].reverse();
  let activity = activitiesReversed[index];
  
  document.getElementById("pairCount").value = activity.pairCount;
  document.getElementById("gameMode").value = activity.gameMode;
  
  startGame();
  showNotification(`✅ Atividade "${activity.name}" carregada!`, "success");
}

function deleteActivity(index) {
  let activities = JSON.parse(localStorage.getItem("activities") || "[]");
  activities.splice(index, 1);
  localStorage.setItem("activities", JSON.stringify(activities));
  loadActivities();
  showNotification("✅ Atividade removida!", "success");
}

// Carregar atividades ao iniciar
loadActivities();

// Adicionar animações CSS extras
const style = document.createElement('style');
style.textContent = `
  @keyframes fadeOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(100%); }
  }
`;
document.head.appendChild(style);

// Adicionar listener para parar sons quando a página for fechada/recarregada
window.addEventListener('beforeunload', function() {
  stopAllSounds();
});
