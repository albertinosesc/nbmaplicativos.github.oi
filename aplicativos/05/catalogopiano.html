<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Estudos de Piano</title>
<style>
body{font-family:Arial, sans-serif; background:#f4f4f4; padding:20px}
.container{max-width:1000px; margin:auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1)}
h1{text-align:center}
input, select{width:100%; padding:8px; margin:5px 0 10px}
button{padding:10px; margin-top:5px; background:#4CAF50; color:white; border:none; cursor:pointer}
button:hover{background:#45a049}
.delete-btn{background:#e74c3c}
.edit-btn{background:#3498db}
table{width:100%; border-collapse:collapse; margin-top:20px}
th, td{border:1px solid #ddd; padding:8px; text-align:center}
th{background:#333; color:white}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<h1>Catálogo de Piano</h1>

<label>Música</label>
<input type="text" id="musica">

<label>Livro</label>
<input type="text" id="livro">

<label>Execução</label>
<select id="execucao" onchange="toggleCampos()">
<option value="MD">MD</option>
<option value="ME">ME</option>
<option value="MA">MA</option>
<option value="MJ">MJ</option>
<option value="MS">MS</option>
</select>

<div id="camposMaos" class="hidden">
<label>Notas MD</label>
<input type="text" id="mdNotas" placeholder="Ex: C D E">

<label>Notas ME</label>
<input type="text" id="meNotas" placeholder="Ex: A B C">
</div>

<label>Quantidade de Notas (QN)</label>
<input type="number" id="qn">

<label>Ritmo (R)</label>
<input type="text" id="ritmo" placeholder="Ex: 1,2 ou 1 2 3">

<label>Intervalo (I)</label>
<input type="text" id="intervalo">

<button onclick="adicionar()">Adicionar</button>

<table>
<thead>
<tr>
<th>Música</th>
<th>Livro</th>
<th>Execução</th>
<th>MD</th>
<th>ME</th>
<th>QN</th>
<th>R</th>
<th>I</th>
<th>Dificuldade</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

<script>
let linhaEditando = null;

function toggleCampos(){
let exec = document.getElementById('execucao').value;
let campos = document.getElementById('camposMaos');
campos.classList.toggle('hidden', !(exec==='MA'||exec==='MJ'||exec==='MS'));
}

function normalizarRitmo(r){
return r.replace(/\s|,/g,'')
        .split('')
        .sort()
        .join('');
}

const ordemRitmo = [
"1","2","4","3",
"12","24","13",
"124","123","1234"
];

function calcularDificuldade(qn, ritmo, md, me){
let score = 0;
score += Number(qn) || 0;
let totalNotas = (md + ' ' + me).trim().split(/\s+/).filter(n=>n).length;
score += totalNotas;
let rNorm = normalizarRitmo(ritmo);
let pos = ordemRitmo.indexOf(rNorm);
if(pos !== -1){ score += pos * 2; }
else{ score += 10; }
return score;
}

function adicionar(){
let musica=musicaInput.value;
let livro=livroInput.value;
let execucao=execucaoInput.value;
let mdNotas=mdInput.value;
let meNotas=meInput.value;
let qn=qnInput.value;
let ritmo=ritmoInput.value;
let intervalo=intervaloInput.value;

let dificuldade = calcularDificuldade(qn, ritmo, mdNotas, meNotas);

if(linhaEditando){
linhaEditando.innerHTML = gerarLinha(musica,livro,execucao,mdNotas,meNotas,qn,ritmo,intervalo,dificuldade);
linhaEditando=null;
}else{
let linha=document.createElement('tr');
linha.innerHTML = gerarLinha(musica,livro,execucao,mdNotas,meNotas,qn,ritmo,intervalo,dificuldade);
tabela.appendChild(linha);
}

ordenar();
salvar();
limparCampos();
}

function gerarLinha(musica,livro,execucao,md,me,qn,ritmo,intervalo,dif){
return `
<td>${musica}</td>
<td>${livro}</td>
<td>${execucao}</td>
<td>${md||'-'}</td>
<td>${me||'-'}</td>
<td>${qn}</td>
<td>${ritmo}</td>
<td>${intervalo}</td>
<td>${dif}</td>
<td>
<button class="edit-btn" onclick="editarLinha(this)">Editar</button>
<button class="delete-btn" onclick="removerLinha(this)">Excluir</button>
</td>`;
}

function editarLinha(btn){
let t=btn.parentNode.parentNode.children;
linhaEditando=btn.parentNode.parentNode;

musicaInput.value=t[0].innerText;
livroInput.value=t[1].innerText;
execucaoInput.value=t[2].innerText;
mdInput.value=t[3].innerText!=='-'?t[3].innerText:'';
meInput.value=t[4].innerText!=='-'?t[4].innerText:'';
qnInput.value=t[5].innerText;
ritmoInput.value=t[6].innerText;
intervaloInput.value=t[7].innerText;

toggleCampos();
}

function removerLinha(btn){
btn.parentNode.parentNode.remove();
salvar();
}

function ordenar(){
let linhas=Array.from(tabela.rows);
linhas.sort((a,b)=>Number(a.cells[8].innerText)-Number(b.cells[8].innerText));
linhas.forEach(l=>tabela.appendChild(l));
}

function salvar(){
let dados=[];
Array.from(tabela.rows).forEach(l=>{
let c=l.cells;
dados.push({
musica:c[0].innerText,
livro:c[1].innerText,
execucao:c[2].innerText,
md:c[3].innerText,
me:c[4].innerText,
qn:c[5].innerText,
ritmo:c[6].innerText,
intervalo:c[7].innerText
});
});
localStorage.setItem('pianoCatalogo', JSON.stringify(dados));
}

function carregar(){
let dados=JSON.parse(localStorage.getItem('pianoCatalogo')||'[]');
dados.forEach(d=>{
let dif=calcularDificuldade(d.qn,d.ritmo,d.md,d.me);
let linha=document.createElement('tr');
linha.innerHTML=gerarLinha(d.musica,d.livro,d.execucao,d.md,d.me,d.qn,d.ritmo,d.intervalo,dif);
tabela.appendChild(linha);
});
ordenar();
}

function limparCampos(){
musicaInput.value='';
livroInput.value='';
mdInput.value='';
meInput.value='';
qnInput.value='';
ritmoInput.value='';
intervaloInput.value='';
}

// atalhos
const musicaInput = document.getElementById('musica');
const livroInput = document.getElementById('livro');
const execucaoInput = document.getElementById('execucao');
const mdInput = document.getElementById('mdNotas');
const meInput = document.getElementById('meNotas');
const qnInput = document.getElementById('qn');
const ritmoInput = document.getElementById('ritmo');
const intervaloInput = document.getElementById('intervalo');
const tabela = document.getElementById('tabela');

carregar();
</script>
</body>
</html>
