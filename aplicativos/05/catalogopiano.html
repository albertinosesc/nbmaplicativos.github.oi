<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Catálogo de Piano</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:10px}
input,select,textarea{width:100%;margin:5px 0;padding:8px}
button{padding:10px;margin-top:5px;cursor:pointer}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#333;color:white}
</style>
</head>
<body>

<div class="container">
<h2>Catálogo de Piano</h2>

<input id="musica" placeholder="Música">
<input id="livro" placeholder="Livro">

<select id="execucao">
<option>MD</option><option>ME</option>
<option>MA</option><option>MJ</option><option>MS</option>
</select>

<input id="md" placeholder="Notas MD">
<input id="me" placeholder="Notas ME">
<input id="qn" type="number" placeholder="Quantidade de Notas">
<input id="ritmo" placeholder="Ritmo (1,2 ou 1 2)">
<input id="intervalo" placeholder="Intervalo">

<button onclick="add()">Adicionar</button>
<button onclick="copiarCSV()">Copiar CSV</button>

<h3>Importar CSV</h3>
<textarea id="csv"></textarea>
<button onclick="importar()">Importar</button>

<table>
<thead>
<tr>
<th>Música</th><th>Livro</th><th>Exec</th>
<th>MD</th><th>ME</th><th>QN</th>
<th>R</th><th>I</th><th>Ação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>
let editLinha=null;

function normalizarRitmo(r){
return r.replace(/\\s|,/g,'').split('').sort().join('');
}

const ordemRitmo=["1","2","4","3","12","14","24","13","124","123","1234"];

function getDist(md,me){
let a=md.trim()?md.trim().split(/\\s+/).length:0;
let b=me.trim()?me.trim().split(/\\s+/).length:0;
return a+b;
}

function ordenar(){
let linhas=[...tabela.rows];

linhas.sort((a,b)=>{

let qnA=Number(a.cells[5].innerText);
let qnB=Number(b.cells[5].innerText);
if(qnA!==qnB) return qnA-qnB;

let distA=getDist(a.cells[3].innerText,a.cells[4].innerText);
let distB=getDist(b.cells[3].innerText,b.cells[4].innerText);
if(distA!==distB) return distA-distB;

let rA=ordemRitmo.indexOf(normalizarRitmo(a.cells[6].innerText));
let rB=ordemRitmo.indexOf(normalizarRitmo(b.cells[6].innerText));

return rA-rB;
});

linhas.forEach(l=>tabela.appendChild(l));
}

function add(){
let linha=editLinha||document.createElement('tr');

linha.innerHTML=`
<td>${musica.value}</td>
<td>${livro.value}</td>
<td>${execucao.value}</td>
<td>${md.value||'-'}</td>
<td>${me.value||'-'}</td>
<td>${qn.value}</td>
<td>${ritmo.value}</td>
<td>${intervalo.value}</td>
<td>
<button onclick="editar(this)">Editar</button>
<button onclick="remover(this)">Excluir</button>
</td>`;

if(!editLinha) tabela.appendChild(linha);
editLinha=null;

ordenar();
salvar();
limpar();
}

function editar(btn){
let t=btn.parentNode.parentNode.children;
editLinha=btn.parentNode.parentNode;

musica.value=t[0].innerText;
livro.value=t[1].innerText;
execucao.value=t[2].innerText;
md.value=t[3].innerText!='-'?t[3].innerText:'';
me.value=t[4].innerText!='-'?t[4].innerText:'';
qn.value=t[5].innerText;
ritmo.value=t[6].innerText;
intervalo.value=t[7].innerText;
}

function remover(btn){
btn.parentNode.parentNode.remove();
salvar();
}

function salvar(){
let dados=[...tabela.rows].map(l=>[...l.cells].slice(0,8).map(c=>c.innerText));
localStorage.setItem('piano',JSON.stringify(dados));
}

function carregar(){
(JSON.parse(localStorage.getItem('piano'))||[]).forEach(d=>{
let linha=document.createElement('tr');
linha.innerHTML=`
<td>${d[0]}</td><td>${d[1]}</td><td>${d[2]}</td>
<td>${d[3]}</td><td>${d[4]}</td><td>${d[5]}</td>
<td>${d[6]}</td><td>${d[7]}</td>
<td>
<button onclick="editar(this)">Editar</button>
<button onclick="remover(this)">Excluir</button>
</td>`;
tabela.appendChild(linha);
});
ordenar();
}

function copiarCSV(){
let csv="Música,Livro,Execução,MD,ME,QN,R,I\n";
[...tabela.rows].forEach(l=>{
let c=l.cells;
csv+=`${c[0].innerText},${c[1].innerText},${c[2].innerText},${c[3].innerText},${c[4].innerText},${c[5].innerText},${c[6].innerText},${c[7].innerText}\n`;
});
navigator.clipboard.writeText(csv);
alert("Copiado!");
}

function importar(){
let linhas=csv.value.trim().split("\\n");
linhas.slice(1).forEach(l=>{
let c=l.split(",");
if(c.length>=8){
let linha=document.createElement('tr');
linha.innerHTML=`
<td>${c[0]}</td><td>${c[1]}</td><td>${c[2]}</td>
<td>${c[3]}</td><td>${c[4]}</td><td>${c[5]}</td>
<td>${c[6]}</td><td>${c[7]}</td>
<td>
<button onclick="editar(this)">Editar</button>
<button onclick="remover(this)">Excluir</button>
</td>`;
tabela.appendChild(linha);
}
});
ordenar();
salvar();
}

function limpar(){
musica.value='';livro.value='';
md.value='';me.value='';
qn.value='';ritmo.value='';
intervalo.value='';
}

carregar();
</script>

</body>
</html>
