<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Estudos de Piano</title>
<style>
body{font-family:Arial, sans-serif; background:#f4f4f4; padding:20px}
.container{max-width:1000px; margin:auto; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1)}
h1{text-align:center}
input, select{width:100%; padding:8px; margin:5px 0 10px}
button{padding:10px; margin-top:5px; background:#4CAF50; color:white; border:none; cursor:pointer}
button:hover{background:#45a049}
.delete-btn{background:#e74c3c}
.edit-btn{background:#3498db}
.csv-btn{background:#f39c12}
table{width:100%; border-collapse:collapse; margin-top:20px}
th, td{border:1px solid #ddd; padding:8px; text-align:center}
th{background:#333; color:white}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<h1>Catálogo de Piano</h1>

<label>Música</label>
<input type="text" id="musica">

<label>Livro</label>
<input type="text" id="livro">

<label>Execução</label>
<select id="execucao" onchange="toggleCampos()">
<option value="MD">MD</option>
<option value="ME">ME</option>
<option value="MA">MA</option>
<option value="MJ">MJ</option>
<option value="MS">MS</option>
</select>

<div id="camposMaos" class="hidden">
<label>Notas MD</label>
<input type="text" id="mdNotas">

<label>Notas ME</label>
<input type="text" id="meNotas">
</div>

<label>Quantidade de Notas (QN)</label>
<input type="number" id="qn">

<label>Ritmo (R)</label>
<input type="text" id="ritmo">

<label>Intervalo (I)</label>
<input type="text" id="intervalo">

<button onclick="adicionar()">Adicionar</button>
<button class="csv-btn" onclick="copiarCSV()">Copiar CSV</button>

<table>
<thead>
<tr>
<th>Música</th>
<th>Livro</th>
<th>Execução</th>
<th>MD</th>
<th>ME</th>
<th>QN</th>
<th>R</th>
<th>I</th>
<th>Dificuldade</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

<script>
let linhaEditando = null;

function toggleCampos(){
let exec = execucao.value;
camposMaos.classList.toggle('hidden', !(exec==='MA'||exec==='MJ'||exec==='MS'));
}

function normalizarRitmo(r){
return r.replace(/\s|,/g,'').split('').sort().join('');
}

const ordemRitmo = ["1","2","4","3","12","24","13","124","123","1234"];

function calcularDificuldade(qn, ritmo, md, me){
let score = Number(qn)||0;
score += (md+' '+me).trim().split(/\s+/).filter(n=>n).length;

let rNorm = normalizarRitmo(ritmo);
let pos = ordemRitmo.indexOf(rNorm);

score += (pos!==-1)? pos*2 : 10;
return score;
}

function adicionar(){
let dificuldade = calcularDificuldade(qn.value, ritmo.value, mdNotas.value, meNotas.value);

if(linhaEditando){
linhaEditando.innerHTML = gerarLinha(dificuldade);
linhaEditando=null;
}else{
let linha=document.createElement('tr');
linha.innerHTML = gerarLinha(dificuldade);
tabela.appendChild(linha);
}

ordenar();
salvar();
limpar();
}

function gerarLinha(dif){
return `
<td>${musica.value}</td>
<td>${livro.value}</td>
<td>${execucao.value}</td>
<td>${mdNotas.value||'-'}</td>
<td>${meNotas.value||'-'}</td>
<td>${qn.value}</td>
<td>${ritmo.value}</td>
<td>${intervalo.value}</td>
<td>${dif}</td>
<td>
<button onclick="editar(this)">Editar</button>
<button onclick="remover(this)">Excluir</button>
</td>`;
}

function editar(btn){
let t=btn.parentNode.parentNode.children;
linhaEditando=btn.parentNode.parentNode;

musica.value=t[0].innerText;
livro.value=t[1].innerText;
execucao.value=t[2].innerText;
mdNotas.value=t[3].innerText!=='-'?t[3].innerText:'';
meNotas.value=t[4].innerText!=='-'?t[4].innerText:'';
qn.value=t[5].innerText;
ritmo.value=t[6].innerText;
intervalo.value=t[7].innerText;

toggleCampos();
}

function remover(btn){
btn.parentNode.parentNode.remove();
salvar();
}

function ordenar(){
let linhas=[...tabela.rows];
linhas.sort((a,b)=>a.cells[8].innerText - b.cells[8].innerText);
linhas.forEach(l=>tabela.appendChild(l));
}

function salvar(){
let dados=[...tabela.rows].map(l=>{
let c=l.cells;
return [c[0].innerText,c[1].innerText,c[2].innerText,c[3].innerText,c[4].innerText,c[5].innerText,c[6].innerText,c[7].innerText];
});
localStorage.setItem('piano', JSON.stringify(dados));
}

function carregar(){
(JSON.parse(localStorage.getItem('piano'))||[]).forEach(d=>{
let dif=calcularDificuldade(d[5],d[6],d[3],d[4]);
let linha=document.createElement('tr');
linha.innerHTML=`
<td>${d[0]}</td><td>${d[1]}</td><td>${d[2]}</td>
<td>${d[3]}</td><td>${d[4]}</td><td>${d[5]}</td>
<td>${d[6]}</td><td>${d[7]}</td><td>${dif}</td>
<td><button onclick="editar(this)">Editar</button>
<button onclick="remover(this)">Excluir</button></td>`;
tabela.appendChild(linha);
});
ordenar();
}

function copiarCSV(){
let csv="Música,Livro,Execução,MD,ME,QN,R,I,Dificuldade\n";
[...tabela.rows].forEach(l=>{
let c=l.cells;
csv+=`${c[0].innerText},${c[1].innerText},${c[2].innerText},${c[3].innerText},${c[4].innerText},${c[5].innerText},${c[6].innerText},${c[7].innerText},${c[8].innerText}\n`;
});
navigator.clipboard.writeText(csv);
alert("CSV copiado!");
}

function limpar(){
musica.value='';
livro.value='';
mdNotas.value='';
meNotas.value='';
qn.value='';
ritmo.value='';
intervalo.value='';
}

carregar();
</script>
</body>
</html>
