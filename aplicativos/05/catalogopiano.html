<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculador Piano - Ajuste Final 7 e 10</title>
<style>
    body{font-family: sans-serif; background:#f0f2f5; padding:20px;}
    .container{max-width:1100px; margin:auto; background:white; padding:25px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1)}
    .inputs {display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px;}
    input, select, textarea {padding:10px; border:1px solid #ddd; border-radius:6px;}
    button {padding:12px; cursor:pointer; border:none; border-radius:6px; font-weight:bold;}
    .btn-add {background:#27ae60; color:white; width: 100%;}
    .btn-copy {background:#8e44ad; color:white; width: 100%; margin-top: 10px;}
    table {width:100%; border-collapse:collapse; margin-top:20px;}
    th, td {border:1px solid #eee; padding:10px; text-align:center;}
    th {background:#2c3e50; color:white;}
    .grau-val {font-weight:bold; color:#d35400; background:#fff3e0; padding:2px 6px; border-radius:4px;}
</style>
</head>
<body>

<div class="container">
    <h2>🎹 Calculador de Grau: 7 e 10 no Final</h2>
    <div class="inputs">
        <input id="musica" placeholder="Música">
        <select id="execucao">
            <option value="MD">MD</option><option value="ME">ME</option>
            <option value="MS">MS</option><option value="MJ">MJ</option>
        </select>
        <input id="md" placeholder="Notas MD">
        <input id="me" placeholder="Notas ME">
        <input id="qn" type="number" placeholder="QN">
        <input id="ritmo" placeholder="Ritmo">
    </div>

    <button class="btn-add" onclick="add()">Calcular Grau</button>
    <textarea id="csvInput" style="width:100%; height:60px; margin-top:15px;" placeholder="Cole o CSV aqui..."></textarea>
    <button onclick="importar()" style="width:100%; background:#3498db; color:white; margin-top:5px;">Processar Lote</button>
    <button class="btn-copy" onclick="copiar()">📋 Copiar para Chat</button>

    <table>
        <thead>
            <tr>
                <th>Música</th><th>Exec</th><th>MD</th><th>ME</th><th>QN</th><th>R</th><th>Grau ↓</th><th>Ação</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>
</div>

<script>
const escalaRitmo = ["1", "2", "4", "3", "1;2", "1;4", "2;4", "1;3", "1;2;4", "1;2;3;4"];
const escalaNotas = ["C", "D", "B,", "E", "A,", "F", "G,", "G", "F,", "A", "E,", "B", "D,", "c", "C,."];

function calcularGrau(qn, md, me, ritmo, exec) {
    let pontos = 0;

    // 1. BASE DE MÃO (Diferenças mínimas)
    const pesosMao = { "MD": 10, "ME": 10.5, "MS": 11, "MJ": 20 };
    pontos += pesosMao[exec] || 0;

    // 2. PESO DO RITMO (Peso reduzido para 1.0 para não dominar o ranking)
    let rIdx = escalaRitmo.indexOf(ritmo.replace(/,/g, ';').trim());
    if (rIdx !== -1) pontos += (rIdx * 1.0); 

    // 3. COMPLEXIDADE DE NOTAS (Peso 0.2 por posição)
    const extrair = (t) => (t && t !== "-") ? t.split(/[ .;,/]+/).filter(Boolean) : [];
    let nD = extrair(md);
    let nE = extrair(me);
    
    [...nD, ...nE].forEach(n => {
        let idx = escalaNotas.indexOf(n);
        if (idx !== -1) pontos += (idx * 0.2);
    });

    // 4. BÔNUS DE NOTAS DUPLAS (Peso 3.0)
    if (nD.length > 1 || nE.length > 1) { 
        pontos += 3.0; 
    }

    // 5. QUANTIDADE DE NOTAS (QN) - O GRANDE DIFERENCIAL
    // Aumentamos para 5.0 pontos por QN para empurrar a 7 e 10 para o fim
    pontos += (Number(qn) * 5.0);

    return pontos.toFixed(2);
}

function inserir(m, ex, d, e, q, r, g) {
    let tr = document.getElementById('tabela').insertRow();
    tr.innerHTML = `<td>${m}</td><td>${ex}</td><td>${d}</td><td>${e}</td><td>${q}</td><td>${r}</td><td><span class="grau-val">${g}</span></td><td><button onclick="this.closest('tr').remove(); ordenar();">X</button></td>`;
}

function ordenar() {
    let rows = Array.from(document.getElementById('tabela').rows);
    rows.sort((a, b) => parseFloat(a.cells[6].innerText) - parseFloat(b.cells[6].innerText));
    rows.forEach(r => document.getElementById('tabela').appendChild(r));
}

function add() {
    let m = document.getElementById('musica').value;
    if(!m) return;
    let nv = calcularGrau(document.getElementById('qn').value, document.getElementById('md').value, document.getElementById('me').value, document.getElementById('ritmo').value, document.getElementById('execucao').value);
    inserir(m, document.getElementById('execucao').value, document.getElementById('md').value||'-', document.getElementById('me').value||'-', document.getElementById('qn').value, document.getElementById('ritmo').value, nv);
    ordenar();
}

function importar() {
    document.getElementById('csvInput').value.trim().split('\n').forEach(l => {
        if(l.toLowerCase().includes("música") || !l.trim()) return;
        let c = l.split(';').map(v => v.replace(/^"|"$/g, '').trim());
        let nv = calcularGrau(c[5], c[3], c[4], c[6], c[2]);
        inserir(c[0], c[2], c[3], c[4], c[5], c[6], nv);
    });
    ordenar();
}

function copiar() {
    let t = "Música | Exec | MD | ME | QN | R | Grau\n";
    Array.from(document.getElementById('tabela').rows).forEach(r => {
        t += Array.from(r.cells).slice(0, 7).map(c => c.innerText).join(" | ") + "\n";
    });
    navigator.clipboard.writeText(t).then(() => alert("Tabela copiada!"));
}
</script>
</body>
</html>
