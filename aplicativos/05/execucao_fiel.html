<!DOCTYPE html>
<html>
<head>
    <title>Teste Google Sheets</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>📚 Gestor de Métodos</h1>
    
    <div>
        <input type="text" id="url" style="width: 400px;" placeholder="Cole a URL do Google Apps Script">
        <button onclick="salvarUrl()">Salvar</button>
        <button onclick="testar()">Testar</button>
        <button onclick="buscar()">Buscar Dados</button>
        <button onclick="salvar()">Salvar Teste</button>
    </div>
    
    <div id="status" style="margin-top: 10px; padding: 10px; background: #f0f0f0;"></div>
    <div id="resultado" style="margin-top: 10px;"></div>
    
    <script>
        let urlAPI = localStorage.getItem('urlAPI') || '';
        
        if (urlAPI) {
            document.getElementById('url').value = urlAPI;
        }
        
        function salvarUrl() {
            urlAPI = document.getElementById('url').value.trim();
            localStorage.setItem('urlAPI', urlAPI);
            document.getElementById('status').innerHTML = '✅ URL salva: ' + urlAPI;
        }
        
        async function testar() {
            if (!urlAPI) {
                alert('Salve a URL primeiro');
                return;
            }
            
            document.getElementById('status').innerHTML = '🔄 Testando conexão...';
            
            try {
                const url = `${urlAPI}?acao=teste&t=${Date.now()}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('status').innerHTML = '✅ Conexão OK! ' + data.message;
                } else {
                    document.getElementById('status').innerHTML = '❌ Erro: ' + data.error;
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Erro: ' + error.message;
            }
        }
        
        async function buscar() {
            if (!urlAPI) {
                alert('Salve a URL primeiro');
                return;
            }
            
            document.getElementById('status').innerHTML = '🔄 Buscando dados...';
            document.getElementById('resultado').innerHTML = '';
            
            try {
                const url = `${urlAPI}?acao=buscar&aba=Metodo_1&t=${Date.now()}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success && data.dados) {
                    document.getElementById('status').innerHTML = `✅ Encontrados ${data.dados.length - 1} registros!`;
                    
                    // Mostrar tabela
                    let html = '<table border="1" cellpadding="5">';
                    data.dados.forEach((row, idx) => {
                        html += '<tr>';
                        row.forEach(cell => {
                            if (idx === 0) {
                                html += `<th>${cell || ''}</th>`;
                            } else {
                                html += `<td>${cell || ''}</td>`;
                            }
                        });
                        html += '</tr>';
                    });
                    html += '</table>';
                    document.getElementById('resultado').innerHTML = html;
                } else {
                    document.getElementById('status').innerHTML = '❌ Nenhum dado encontrado';
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Erro: ' + error.message;
            }
        }
        
        async function salvar() {
            if (!urlAPI) {
                alert('Salve a URL primeiro');
                return;
            }
            
            const dados = ['Lição Teste', '120'];
            
            document.getElementById('status').innerHTML = '🔄 Salvando...';
            
            try {
                const url = `${urlAPI}?acao=salvar&aba=Metodo_1&dados=${encodeURIComponent(JSON.stringify(dados))}&t=${Date.now()}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('status').innerHTML = '✅ Salvo com sucesso!';
                    buscar(); // Recarregar dados
                } else {
                    document.getElementById('status').innerHTML = '❌ Erro: ' + data.error;
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Erro: ' + error.message;
            }
        }
    </script>
</body>
</html>
