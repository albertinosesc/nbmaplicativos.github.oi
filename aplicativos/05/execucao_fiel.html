<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Gestor de Métodos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header {
            background: #34495e;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .config-bar {
            background: #f39c12;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .config-bar input {
            flex: 1;
            padding: 8px;
            min-width: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .config-bar button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
        }
        .status-bar {
            background: #27ae60;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
        }
        .content {
            padding: 20px;
        }
        .form-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        .form-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-enviar { background: #27ae60; color: white; }
        .btn-buscar { background: #3498db; color: white; }
        .table-scroll {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #34495e;
            color: white;
        }
        td:first-child {
            background: #f8f9fa;
            font-weight: bold;
        }
        td input {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .action-btn {
            padding: 5px 10px;
            margin: 2px;
            font-size: 12px;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 5px;
            color: white;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .success { background: #27ae60; }
        .error { background: #e74c3c; }
        .info { background: #3498db; }
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 4000;
            text-align: center;
            color: white;
            padding-top: 200px;
            font-size: 18px;
        }
        .loading.active { display: block; }
        .aba-selector {
            background: #1a252f;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .aba-selector select {
            padding: 8px;
            border-radius: 5px;
            flex: 1;
        }
        .aba-selector button {
            background: #e67e22;
            color: white;
            padding: 8px 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📚 Gestor de Métodos e Andamentos</h1>
        <p>Sincronize seus dados com o Google Sheets</p>
    </div>
    
    <div class="config-bar">
        <input type="text" id="urlGoogleSheets" placeholder="https://script.google.com/macros/s/SEU_ID/exec">
        <button onclick="salvarUrl()">💾 Salvar URL</button>
        <button onclick="testarConexao()">🔌 Testar</button>
    </div>
    
    <div class="status-bar">
        <span>Status: <span id="status">Desconectado</span></span>
        <span id="info">Clique em Testar para verificar</span>
    </div>
    
    <div class="aba-selector">
        <select id="selecionarAba"></select>
        <button onclick="criarNovaAba()">➕ Nova Aba</button>
        <button onclick="carregarDados()">📥 Carregar Dados</button>
        <button onclick="sincronizarTudo()">📤 Sincronizar Tudo</button>
    </div>
    
    <div class="content" id="conteudo">
        <div style="text-align: center; padding: 40px; color: #7f8c8d;">
            Configure a URL do Google Sheets e clique em "Carregar Dados"
        </div>
    </div>
</div>

<div id="loading" class="loading">
    <p>⏳ Processando...</p>
</div>

<script>
    let dadosAtuais = [];
    let cabecalhosAtuais = [];
    let abaAtual = 'Metodo_1';
    let urlAPI = localStorage.getItem('googleSheetsUrl') || '';

    // Carregar URL salva
    if (urlAPI) {
        document.getElementById('urlGoogleSheets').value = urlAPI;
        carregarAbas();
    }

    function salvarUrl() {
        urlAPI = document.getElementById('urlGoogleSheets').value.trim();
        localStorage.setItem('googleSheetsUrl', urlAPI);
        mostrarMensagem('URL salva com sucesso!', 'success');
        if (urlAPI) {
            carregarAbas();
        }
    }

    async function testarConexao() {
        if (!urlAPI) {
            mostrarMensagem('Configure a URL primeiro!', 'error');
            return;
        }
        
        mostrarLoading(true);
        try {
            const url = `${urlAPI}?acao=teste&t=${Date.now()}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.success) {
                mostrarMensagem('✅ Conexão OK!', 'success');
                document.getElementById('status').innerHTML = '✅ Conectado';
                document.getElementById('status').style.color = '#27ae60';
                await carregarAbas();
            } else {
                mostrarMensagem('❌ Erro na conexão: ' + (data.error || 'Desconhecido'), 'error');
                document.getElementById('status').innerHTML = '❌ Erro';
            }
        } catch (error) {
            mostrarMensagem('❌ Erro: ' + error.message, 'error');
            document.getElementById('status').innerHTML = '❌ Erro';
        }
        mostrarLoading(false);
    }

    async function carregarAbas() {
        if (!urlAPI) return;
        
        try {
            const response = await fetch(`${urlAPI}?acao=listarAbas&t=${Date.now()}`);
            const data = await response.json();
            
            if (data.success && data.abas) {
                const select = document.getElementById('selecionarAba');
                select.innerHTML = '';
                data.abas.forEach(aba => {
                    const option = document.createElement('option');
                    option.value = aba;
                    option.textContent = aba;
                    select.appendChild(option);
                });
                
                if (data.abas.length > 0) {
                    abaAtual = data.abas[0];
                    select.value = abaAtual;
                    await carregarDados();
                }
            }
        } catch (error) {
            console.error('Erro ao carregar abas:', error);
        }
    }

    async function carregarDados() {
        if (!urlAPI) {
            mostrarMensagem('Configure a URL primeiro!', 'error');
            return;
        }
        
        mostrarLoading(true);
        abaAtual = document.getElementById('selecionarAba').value;
        
        try {
            const url = `${urlAPI}?acao=buscar&aba=${encodeURIComponent(abaAtual)}&t=${Date.now()}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.success) {
                if (data.dados && data.dados.length > 0) {
                    dadosAtuais = data.dados;
                    cabecalhosAtuais = data.dados[0];
                    renderizarTabela();
                    mostrarMensagem(`✅ ${data.dados.length - 1} registros carregados!`, 'success');
                    document.getElementById('info').innerHTML = `📊 ${data.dados.length - 1} itens na aba "${abaAtual}"`;
                } else {
                    dadosAtuais = [];
                    cabecalhosAtuais = ['📚 Música/Lição', '⏱️ Andamento (M.M.)'];
                    renderizarTabela();
                    mostrarMensagem('Nenhum dado encontrado. Crie seu primeiro registro!', 'info');
                }
            } else {
                mostrarMensagem('Erro ao carregar: ' + (data.error || 'Desconhecido'), 'error');
            }
        } catch (error) {
            mostrarMensagem('Erro: ' + error.message, 'error');
        }
        mostrarLoading(false);
    }

    function renderizarTabela() {
        if (!cabecalhosAtuais || cabecalhosAtuais.length === 0) {
            cabecalhosAtuais = ['📚 Música/Lição', '⏱️ Andamento (M.M.)'];
        }
        
        let html = `
            <div class="form-card">
                <h3>➕ Adicionar/Editar Item</h3>
                <div class="form-grid">
                    ${cabecalhosAtuais.map((cab, idx) => `
                        <div class="form-group">
                            <label>${cab}:</label>
                            <input type="text" id="campo_${idx}" placeholder="Digite o valor">
                        </div>
                    `).join('')}
                </div>
                <div class="button-group">
                    <button class="btn-enviar" onclick="salvarItem()">💾 Salvar Item</button>
                </div>
            </div>
            
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            ${cabecalhosAtuais.map(cab => `<th>${cab}</th>`).join('')}
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${dadosAtuais.slice(1).map((row, idx) => `
                            <tr>
                                ${row.map((cell, cellIdx) => `
                                    <td>
                                        <input type="text" value="${cell || ''}" 
                                               onchange="atualizarCelula(${idx}, ${cellIdx}, this.value)">
                                    </td>
                                `).join('')}
                                <td>
                                    <button class="action-btn" style="background:#3498db;color:white" 
                                            onclick="editarItem(${idx})">✏️</button>
                                    <button class="action-btn" style="background:#e74c3c;color:white" 
                                            onclick="excluirItem(${idx})">🗑️</button>
                                </td>
                            </tr>
                        `).join('')}
                        ${dadosAtuais.length === 1 ? `
                            <tr>
                                <td colspan="${cabecalhosAtuais.length + 1}" style="text-align:center;">
                                    Nenhum item cadastrado. Use o formulário acima para adicionar.
                                </td>
                            </tr>
                        ` : ''}
                    </tbody>
                </table>
            </div>
        `;
        
        document.getElementById('conteudo').innerHTML = html;
    }

    async function salvarItem() {
        const novoItem = [];
        for (let i = 0; i < cabecalhosAtuais.length; i++) {
            const valor = document.getElementById(`campo_${i}`)?.value || '';
            novoItem.push(valor);
        }
        
        if (!novoItem[0]) {
            mostrarMensagem('O primeiro campo é obrigatório!', 'error');
            return;
        }
        
        mostrarLoading(true);
        
        try {
            const url = `${urlAPI}?acao=salvar&aba=${encodeURIComponent(abaAtual)}&dados=${encodeURIComponent(JSON.stringify(novoItem))}&t=${Date.now()}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.success) {
                mostrarMensagem('Item salvo com sucesso!', 'success');
                await carregarDados();
                
                // Limpar formulário
                for (let i = 0; i < cabecalhosAtuais.length; i++) {
                    const campo = document.getElementById(`campo_${i}`);
                    if (campo) campo.value = '';
                }
            } else {
                mostrarMensagem('Erro ao salvar: ' + (data.error || 'Desconhecido'), 'error');
            }
        } catch (error) {
            mostrarMensagem('Erro: ' + error.message, 'error');
        }
        mostrarLoading(false);
    }

    async function atualizarCelula(rowIndex, colIndex, novoValor) {
        if (rowIndex + 1 >= dadosAtuais.length) return;
        
        dadosAtuais[rowIndex + 1][colIndex] = novoValor;
        
        // Salvar automaticamente
        const itemCompleto = dadosAtuais[rowIndex + 1];
        
        try {
            const url = `${urlAPI}?acao=salvar&aba=${encodeURIComponent(abaAtual)}&dados=${encodeURIComponent(JSON.stringify(itemCompleto))}&t=${Date.now()}`;
            await fetch(url);
            mostrarMensagem('✓ Atualizado', 'success', 1000);
        } catch (error) {
            mostrarMensagem('Erro ao atualizar', 'error');
        }
    }

    function editarItem(rowIndex) {
        const item = dadosAtuais[rowIndex + 1];
        for (let i = 0; i < cabecalhosAtuais.length; i++) {
            const campo = document.getElementById(`campo_${i}`);
            if (campo) campo.value = item[i] || '';
        }
        mostrarMensagem('Dados copiados para edição!', 'info');
    }

    async function excluirItem(rowIndex) {
        if (!confirm('Tem certeza que deseja excluir este item?')) return;
        
        // Recriar dados sem o item excluído
        const novosDados = [dadosAtuais[0]];
        for (let i = 1; i < dadosAtuais.length; i++) {
            if (i !== rowIndex + 1) {
                novosDados.push(dadosAtuais[i]);
            }
        }
        
        mostrarLoading(true);
        
        try {
            // Limpar a aba
            const sheet = await fetch(`${urlAPI}?acao=buscar&aba=${encodeURIComponent(abaAtual)}`);
            
            // Recriar todos os dados
            for (let i = 0; i < novosDados.length; i++) {
                const url = `${urlAPI}?acao=salvar&aba=${encodeURIComponent(abaAtual)}&dados=${encodeURIComponent(JSON.stringify(novosDados[i]))}&t=${Date.now()}`;
                await fetch(url);
            }
            
            mostrarMensagem('Item excluído!', 'success');
            await carregarDados();
        } catch (error) {
            mostrarMensagem('Erro ao excluir', 'error');
        }
        mostrarLoading(false);
    }

    async function sincronizarTudo() {
        if (!dadosAtuais || dadosAtuais.length === 0) {
            mostrarMensagem('Não há dados para sincronizar', 'error');
            return;
        }
        
        mostrarLoading(true);
        let sucessos = 0;
        
        for (let i = 0; i < dadosAtuais.length; i++) {
            try {
                const url = `${urlAPI}?acao=salvar&aba=${encodeURIComponent(abaAtual)}&dados=${encodeURIComponent(JSON.stringify(dadosAtuais[i]))}&t=${Date.now()}`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.success) sucessos++;
            } catch (error) {
                console.error('Erro ao sincronizar item', i, error);
            }
        }
        
        mostrarMensagem(`✅ ${sucessos} de ${dadosAtuais.length} itens sincronizados!`, 'success');
        mostrarLoading(false);
    }

    async function criarNovaAba() {
        const nome = prompt('Digite o nome da nova aba:', 'Nova_Aba');
        if (!nome) return;
        
        mostrarLoading(true);
        
        try {
            // Criar aba com dados iniciais
            const dadosIniciais = ['📚 Música/Lição', '⏱️ Andamento (M.M.)'];
            const url = `${urlAPI}?acao=salvar&aba=${encodeURIComponent(nome)}&dados=${encodeURIComponent(JSON.stringify(dadosIniciais))}&t=${Date.now()}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.success) {
                mostrarMensagem(`Aba "${nome}" criada!`, 'success');
                await carregarAbas();
                document.getElementById('selecionarAba').value = nome;
                await carregarDados();
            } else {
                mostrarMensagem('Erro ao criar aba', 'error');
            }
        } catch (error) {
            mostrarMensagem('Erro: ' + error.message, 'error');
        }
        mostrarLoading(false);
    }

    function mostrarLoading(show) {
        const loadingDiv = document.getElementById('loading');
        loadingDiv.classList.toggle('active', show);
    }

    function mostrarMensagem(msg, tipo, tempo = 3000) {
        const div = document.createElement('div');
        div.className = `message ${tipo}`;
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), tempo);
    }
</script>
</body>
</html>
