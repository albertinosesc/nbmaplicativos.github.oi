<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciador de Repertório Musical</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
    h2 { color: #2c3e50; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 15px; display: flex; gap: 10px; }
    input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    button { padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background-color: #2980b9; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background-color: #2c3e50; color: white; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    .status { margin-top: 10px; font-weight: bold; color: #e67e22; }
  </style>
</head>
<body>

<div class="container">
  <h2>Meu Repertório Musical</h2>
  
  <div class="form-group">
    <input type="text" id="novaMusica" placeholder="Ex: 01 - Asa Branca ou Música Sem Número">
    <button onclick="adicionarMusica()">Adicionar / Atualizar</button>
  </div>
  
  <div id="statusEnvio" class="status"></div>
  
  <table id="tabelaMusicas">
    <!-- Gerado dinamicamente via JS -->
  </table>
</div>

<script>
  // ATENÇÃO: Substitua pela URL gerada ao publicar o seu Web App no Google Apps Script
  const URL_API = "SUA_URL_DO_WEB_APP_AQUI"; 
  const ABA_PLANILHA = "Repertorio"; // Nome da aba dentro do Sheets
  
  let dadosLocais = [];

  // Busca dados na inicialização
  async function carregarTabela() {
    mostrarStatus("Carregando dados da planilha...");
    try {
      const resposta = await fetch(`${URL_API}?acao=carregar&aba=${encodeURIComponent(ABA_PLANILHA)}`);
      dadosLocais = await resposta.json();
      renderizarTabela();
      mostrarStatus("");
    } catch (erro) {
      mostrarStatus("Erro ao conectar com o servidor.");
      console.error(erro);
    }
  }

  // Desenha a tabela com cabeçalhos dinâmicos e checkboxes
  function renderizarTabela() {
    const tabela = document.getElementById("tabelaMusicas");
    tabela.innerHTML = "";
    
    if (dadosLocais.length === 0) {
      // Se estiver vazia, cria cabeçalhos padrão de exemplo
      dadosLocais = [["Música", "Tom C", "Tom G", "Tom D"]];
    }
    
    const cabecalho = dadosLocais[0];
    
    // Monta o Header
    let trHead = document.createElement("tr");
    cabecalho.forEach(col => {
      let th = document.createElement("th");
      th.textContent = col;
      trHead.appendChild(th);
    });
    tabela.appendChild(trHead);
    
    // Monta as linhas das Músicas
    for (let i = 1; i < dadosLocais.length; i++) {
      let tr = document.createElement("tr");
      let linhaDados = dadosLocais[i];
      
      // Primeira coluna: Nome da Música
      let tdNome = document.createElement("td");
      tdNome.textContent = linhaDados[0] || "";
      tr.appendChild(tdNome);
      
      // Colunas seguintes: Checkboxes dinâmicos
      for (let j = 1; j < cabecalho.length; j++) {
        let tdCheck = document.createElement("td");
        let checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = (linhaDados[j] === true || linhaDados[j] === "TRUE");
        
        // Dispara o salvamento automático no Sheets ao clicar
        checkbox.onchange = () => alternarMarcacao(i, j, checkbox.checked);
        
        tdCheck.appendChild(checkbox);
        tr.appendChild(tdCheck);
      }
      tabela.appendChild(tr);
    }
  }

  // Trata a alteração do checkbox e envia imediatamente a linha correta
  async function alternarMarcacao(indexLinha, indexColuna, estaMarcado) {
    mostrarStatus("Atualizando marcação...");
    
    // Sincroniza localmente primeiro
    dadosLocais[indexLinha][indexColuna] = estaMarcado;
    
    const linhaParaEnviar = dadosLocais[indexLinha];
    await enviarParaPlanilha(linhaParaEnviar);
  }

  // Adiciona uma nova música através do campo de texto
  async function adicionarMusica() {
    const input = document.getElementById("novaMusica");
    const nome = input.value.trim();
    
    if (!nome) {
      alert("Por favor, digite o nome da música.");
      return;
    }
    
    mostrarStatus("Processando nova música...");
    const colunasTotais = dadosLocais[0].length;
    
    // Estrutura a nova linha: [Nome da Música, false, false, ...]
    const novaLinha = [nome];
    for(let i = 1; i < colunasTotais; i++) {
      novaLinha.push(false);
    }
    
    const sucesso = await enviarParaPlanilha(novaLinha);
    if (sucesso) {
      input.value = "";
      // Recarrega para obter a lista limpa e reordenada pelo Apps Script
      await carregarTabela(); 
    }
  }

  // Faz a requisição POST/GET segura para persistir os dados no Sheets
  async function enviarParaPlanilha(linhaDados) {
    try {
      const dadosTratados = JSON.stringify(linhaDados);
      const resposta = await fetch(`${URL_API}?acao=salvar&aba=${encodeURIComponent(ABA_PLANILHA)}&dados=${encodeURIComponent(dadosTratados)}`);
      const resultado = await resposta.json();
      
      if (resultado.erro) {
        mostrarStatus(`Erro: ${resultado.erro}`);
        return false;
      }
      
      mostrarStatus("Planilha atualizada com sucesso!", true);
      return true;
    } catch (erro) {
      mostrarStatus("Falha na comunicação ao salvar.");
      console.error(erro);
      return false;
    }
  }

  function mostrarStatus(mensagem, limparRapido = false) {
    const div = document.getElementById("statusEnvio");
    div.textContent = mensagem;
    if (limparRapido) {
      setTimeout(() => { if(div.textContent === mensagem) div.textContent = ""; }, 3000);
    }
  }

  // Inicia carregando os dados do backend
  carregarTabela();
</script>

</body>
</html>
