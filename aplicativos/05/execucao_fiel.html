<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎵 Meu Registro Musical</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1e3c72;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .config-bar {
            background: #f39c12;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .config-bar span {
            font-size: 14px;
        }
        .config-bar input {
            flex: 1;
            padding: 8px;
            min-width: 250px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .config-bar button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
        }
        .status-bar {
            background: #27ae60;
            color: white;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .tabs-wrapper {
            background: #34495e;
            display: flex;
            padding: 10px;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .tabs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            flex: 1;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
        }
        .tab-btn.active {
            background: white;
            color: #2c3e50;
            border-radius: 5px;
            font-weight: bold;
        }
        .add-tab-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 5px;
        }
        .content {
            padding: 20px;
        }
        .form-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-enviar { background: #27ae60; color: white; }
        .btn-buscar { background: #3498db; color: white; }
        .btn-atualizar-tudo { background: #9b59b6; color: white; font-weight: bold; }
        
        .table-scroll {
            overflow-x: auto;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #34495e;
            color: white;
        }
        td:first-child {
            background: #f8f9fa;
            font-weight: bold;
            text-align: left;
        }
        .checkbox-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .checkbox-item input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .action-btn {
            padding: 5px 10px;
            font-size: 14px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 5px;
            color: white;
            z-index: 3000;
        }
        .success { background: #27ae60; }
        .error { background: #e74c3c; }
        .info { background: #3498db; }
        .loading {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 4000;
            text-align: center;
            color: white;
            padding-top: 200px;
        }
        .loading.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎵 Meu Diário de Execuções Musical</h1>
        <p>Marque as tonalidades - sincroniza automaticamente</p>
    </div>
    
    <div class="config-bar">
        <span>🔗 Google Sheets URL:</span>
        <input type="text" id="webAppUrl" placeholder="https://script.google.com/macros/s/.../exec">
        <button onclick="testarConexao()">🔌 Testar</button>
        <button onclick="salvarUrl()">💾 Salvar URL</button>
    </div>
    
    <div class="status-bar">
        <span>Status: <span id="statusModo">Local</span></span>
        <span id="lastUpdate">📁 Dados salvos localmente</span>
    </div>
    
    <div class="tabs-wrapper">
        <div class="tabs" id="tabsContainer"></div>
        <button class="add-tab-btn" onclick="abrirModalNovaAba()">➕ Nova Aba</button>
    </div>
    
    <div class="content" id="mainContent"></div>
</div>

<div id="loading" class="loading">
    <p id="loadingText">Sincronizando...</p>
</div>

<script>
    let customTabs = [];
    let sheetData = {};
    let currentTabId = null;
    let webAppUrl = localStorage.getItem('webAppUrl') || '';
    let sincronizando = false;

    function extrairNumero(texto) {
        if (!texto) return null;
        const match = texto.toString().match(/^(\d+)/);
        if (match) return parseInt(match[1], 10);
        return null;
    }

    function ordenarMusicas(tabId) {
        if (!sheetData[tabId] || sheetData[tabId].length <= 1) return;
        
        const headers = sheetData[tabId][0];
        const rows = sheetData[tabId].slice(1);
        
        rows.sort((a, b) => {
            const nomeA = a && a[0] ? a[0].toString() : '';
            const nomeB = b && b[0] ? b[0].toString() : '';
            
            const numA = extrairNumero(nomeA);
            const numB = extrairNumero(nomeB);
            
            if (numA !== null && numB !== null) {
                if (numA !== numB) return numA - numB;
                return nomeA.localeCompare(nomeB, 'pt-br');
            }
            if (numA !== null) return -1;
            if (numB !== null) return 1;
            return nomeA.localeCompare(nomeB, 'pt-br');
        });
        
        sheetData[tabId] = [headers, ...rows];
        saveAllToLocal();
    }

    async function enviarMusicaParaGoogle(linhaCompleta) {
        if (!webAppUrl || sincronizando) return false;
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const url = `${webAppUrl}?acao=salvar&aba=${encodeURIComponent(tab.nome)}&dados=${encodeURIComponent(JSON.stringify(linhaCompleta))}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.success) {
                document.getElementById('lastUpdate').innerHTML = "☁️ Salvo: " + new Date().toLocaleTimeString();
                return true;
            }
        } catch(e) { console.log(e); }
        return false;
    }

    async function enviarTabelaCompletaParaGoogle() {
        if (!webAppUrl) { mostrarMensagem("Configure a URL primeiro", "error"); return; }
        const tab = customTabs.find(t => t.id === currentTabId);
        const todasAsLinhas = sheetData[currentTabId];
        
        if (!todasAsLinhas || todasAsLinhas.length === 0) {
            mostrarMensagem("Não há dados para enviar", "error");
            return;
        }

        mostrarLoading(true, "Enviando todos os dados para o Google Sheets...");
        let erros = 0;

        try {
            await enviarMusicaParaGoogle(todasAsLinhas[0]);

            for (let i = 1; i < todasAsLinhas.length; i++) {
                const sucesso = await enviarMusicaParaGoogle(todasAsLinhas[i]);
                if (!sucesso) erros++;
            }

            if (erros === 0) {
                mostrarMensagem("📋 Planilha totalmente atualizada!", "success");
            } else {
                mostrarMensagem(`Sincronizado com ${erros} falhas. Tente novamente.`, "error");
            }
        } catch (e) {
            mostrarMensagem("Erro crítico ao enviar dados.", "error");
            console.error(e);
        }
        mostrarLoading(false);
    }

    // CORREÇÃO AQUI: Garante que o retorno estruturado do Sheets atualize perfeitamente o HTML
    async function buscarDoGoogle() {
        if (!webAppUrl) return false;
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const url = `${webAppUrl}?acao=buscar&aba=${encodeURIComponent(tab.nome)}&t=${Date.now()}`;
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.success && result.dados && result.dados.length > 0) {
                sheetData[currentTabId] = result.dados;
                
                // Sincroniza dinamicamente as novas tonalidades encontradas no Sheets de volta ao array de abas locais
                if(result.dados[0] && result.dados[0].length > 1) {
                    tab.checklists = result.dados[0].slice(1);
                }
                
                ordenarMusicas(currentTabId);
                saveAllToLocal();
                renderizarInterface();
                return true;
            }
        } catch(e) { console.log(e); }
        return false;
    }

    function initDefaultTabs() {
        return [
            { id: "piano", nome: "🎹 Piano", checklists: ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"] },
            { id: "flauta", nome: "🎼 Flauta Doce", checklists: ["C4", "C#4", "D4", "D#4", "E4", "F4", "F#4", "G4", "G#4", "A4", "A#4", "B4", "C5", "C#5", "D5", "D#5", "E5", "F5", "F#5", "G5", "G#5", "A5", "A#5", "B5"] }
        ];
    }

    function loadFromLocalStorage() {
        const stored = localStorage.getItem("musical_customTabs");
        if (stored) {
            try { customTabs = JSON.parse(stored); } catch(e) { customTabs = initDefaultTabs(); }
        } else { customTabs = initDefaultTabs(); }
        
        const storedData = localStorage.getItem("musical_sheetData");
        if (storedData) {
            try { sheetData = JSON.parse(storedData); } catch(e) { sheetData = {}; }
        } else sheetData = {};
        
        customTabs.forEach(tab => {
            if (!sheetData[tab.id] || !sheetData[tab.id].length) {
                sheetData[tab.id] = [["🎵 Música", ...tab.checklists]];
            } else {
                ordenarMusicas(tab.id);
            }
        });
        saveAllToLocal();
    }

    function saveAllToLocal() {
        localStorage.setItem("musical_customTabs", JSON.stringify(customTabs));
        localStorage.setItem("musical_sheetData", JSON.stringify(sheetData));
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        if (!container) return;
        container.innerHTML = customTabs.map(tab => `
            <button class="tab-btn ${currentTabId === tab.id ? 'active' : ''}" onclick="mudarAba('${tab.id}')">
                ${tab.nome}
            </button>
        `).join('');
        if (customTabs.length > 0 && !currentTabId) currentTabId = customTabs[0].id;
    }

    function mudarAba(tabId) {
        currentTabId = tabId;
        renderTabs();
        renderizarInterface();
    }

    function renderizarInterface() {
        const tab = customTabs.find(t => t.id === currentTabId);
        if (!tab) return;
        
        const headers = sheetData[tab.id] && sheetData[tab.id][0] ? sheetData[tab.id][0] : ["🎵 Música", ...tab.checklists];
        const rows = sheetData[tab.id] ? sheetData[tab.id].slice(1) : [];
        
        let html = `
            <div class="form-card">
                <h3>➕ Adicionar Música</h3>
                <div class="form-group" style="margin-top:10px;">
                    <label>Número ou Nome da Música:</label>
                    <input type="text" id="novaMusicaNome" placeholder="Ex: 01 - Asa Branca, 25, Imagine, 100">
                    <div class="small-note" style="font-size:12px; color:#7f8c8d; margin-top:4px;">💡 Dica: Use números no início para ordenar (ex: 01, 02, 10, 100)</div>
                </div>
                <div class="button-group">
                    <button class="btn-enviar" onclick="adicionarMusica()">✅ Salvar Música</button>
                    <button class="btn-buscar" onclick="sincronizarDoGoogle()">📥 Puxar Dados (Google → App)</button>
                    <button class="btn-atualizar-tudo" onclick="enviarTabelaCompletaParaGoogle()">📤 Atualizar Planilha (Enviar Tudo)</button>
                </div>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0; flex-wrap:wrap; gap:10px;">
                <h3 style="flex:1;">📋 ${tab.nome} - Repertório</h3>
                <div>
                    <button onclick="abrirModalRenomearColunas()" style="background:#e67e22; color:white; padding:5px 10px;">✏️ Renomear Tonalidades</button>
                    <button onclick="adicionarTonalidade()" style="background:#27ae60; color:white; padding:5px 10px;">➕ Adicionar Tonalidade</button>
                </div>
            </div>
            
            <div class="table-scroll">
                <table border="1">
                    <thead>
                        <tr>
                            ${headers.map(h => `<th>${h}</th>`).join('')}
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.length === 0 ? `
                            <tr><td colspan="${headers.length + 1}" style="text-align:center;">Nenhuma música cadastrada</td></tr>
                        ` : rows.map((row, rowIdx) => {
                            if (!row || row.length === 0) return '';
                            return `
                            <tr>
                                <td style="text-align:left;">${row[0] || ''}</td>
                                ${headers.slice(1).map((ch, colIdx) => {
                                    const isChecked = row[colIdx+1] === '✓';
                                    return `
                                        <td>
                                            <div class="checkbox-item" onclick="alternarCheckbox(${rowIdx}, ${colIdx}, event)">
                                                <input type="checkbox" id="chk_${rowIdx}_${colIdx}" ${isChecked ? 'checked' : ''} onclick="event.stopPropagation(); alternarCheckbox(${rowIdx}, ${colIdx}, event)">
                                                <span>${ch}</span>
                                            </div>
                                        </td>
                                    `;
                                }).join('')}
                                <td>
                                    <button class="action-btn" style="background:#3498db; color:white;" onclick="editarMusica(${rowIdx})">✏️</button>
                                    <button class="action-btn" style="background:#e74c3c; color:white;" onclick="excluirMusica(${rowIdx})">🗑️</button>
                                </td>
                            </tr>
                            `}).join('')}
                    </tbody>
                </table>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    window.alternarCheckbox = async function(rowIdx, colIdx, e) {
        const input = document.getElementById(`chk_${rowIdx}_${colIdx}`);
        if(!input) return;
        
        if (e && e.target.tagName !== 'INPUT') {
            input.checked = !input.checked;
        }

        const newValue = input.checked ? "✓" : "";
        if (sheetData[currentTabId] && sheetData[currentTabId][rowIdx + 1]) {
            sheetData[currentTabId][rowIdx + 1][colIdx + 1] = newValue;
            saveAllToLocal();
            mostrarMensagem(newValue ? '✓ Marcado' : '✗ Desmarcado', "info");
            await enviarMusicaParaGoogle(sheetData[currentTabId][rowIdx + 1]);
        }
    };

    window.adicionarMusica = async function() {
        const nome = document.getElementById('novaMusicaNome')?.value.trim();
        if (!nome) { mostrarMensagem("Digite o número ou nome da música", "error"); return; }
        
        const rows = sheetData[currentTabId].slice(1);
        if (rows.some(r => r && r[0] && r[0].toString().toLowerCase() === nome.toLowerCase())) {
            mostrarMensagem(`"${nome}" já existe na lista!`, "error"); return;
        }
        
        const novaRow = [nome];
        const totalColunas = sheetData[currentTabId][0].length;
        for (let i = 1; i < totalColunas; i++) novaRow.push("");
        
        sheetData[currentTabId].push(novaRow);
        ordenarMusicas(currentTabId);
        renderizarInterface();
        document.getElementById('novaMusicaNome').value = "";
        mostrarMensagem(`"${nome}" adicionado!`, "success");
        await enviarMusicaParaGoogle(novaRow);
    };

    window.editarMusica = async function(rowIdx) {
        const nomeAtual = sheetData[currentTabId][rowIdx + 1][0];
        const novoNome = prompt("Editar número ou nome da música:", nomeAtual);
        if (novoNome && novoNome.trim() && novoNome !== nomeAtual) {
            sheetData[currentTabId][rowIdx + 1][0] = novoNome.trim();
            ordenarMusicas(currentTabId);
            renderizarInterface();
            mostrarMensagem("Atualizado!", "success");
            await enviarMusicaParaGoogle(sheetData[currentTabId][rowIdx + 1]);
        }
    };

    window.excluirMusica = async function(rowIdx) {
        if (confirm("Remover esta música?")) {
            sheetData[currentTabId].splice(rowIdx + 1, 1);
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem("Música removida", "info");
            if (webAppUrl) await enviarTabelaCompletaParaGoogle();
        }
    };

    window.adicionarTonalidade = async function() {
        const nova = prompt("Nova tonalidade/nota:", "Ex: F#");
        if (nova && nova.trim()) {
            const tom = nova.trim();
            sheetData[currentTabId][0].push(tom);
            sheetData[currentTabId].slice(1).forEach(r => r.push(""));
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem(`Tonalidade "${tom}" adicionada`, "success");
            if (webAppUrl) await enviarTabelaCompletaParaGoogle();
        }
    };

    window.abrirModalRenomearColunas = function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        const listaAtual = sheetData[currentTabId][0].slice(1).join(", ");
        const novaLista = prompt("Edite as tonalidades (separadas por vírgula):", listaAtual);
        
        if (novaLista && novaLista.trim()) {
            const novas = novaLista.split(",").map(s => s.trim()).filter(s => s);
            if (novas.length > 0) {
                tab.checklists = novas;
                const newHeaders = ["🎵 Música", ...novas];
                const oldRows = sheetData[currentTabId].slice(1);
                const newRows = oldRows.map(row => {
                    const newRow = [row[0]];
                    for (let i = 0; i < novas.length; i++) newRow.push(row[i+1] || "");
                    return newRow;
                });
                sheetData[currentTabId] = [newHeaders, ...newRows];
                saveAllToLocal();
                renderizarInterface();
                mostrarMensagem("Tonalidades renomeadas!", "success");
            }
        }
    };

    window.sincronizarDoGoogle = async function() {
        if (!webAppUrl) { mostrarMensagem("Configure a URL primeiro", "error"); return; }
        mostrarLoading(true, "Buscando dados do Google Sheets...");
        const sucesso = await buscarDoGoogle();
        mostrarLoading(false);
        if (sucesso) {
            mostrarMensagem("Sincronizado com sucesso!", "success");
            document.getElementById('lastUpdate').innerHTML = "🔄 Sincronizado: " + new Date().toLocaleTimeString();
        } else {
            mostrarMensagem("Erro ao sincronizar do Google", "error");
        }
    };

    window.testarConexao = async function() {
        if (!webAppUrl) { mostrarMensagem("Configure a URL primeiro", "error"); return; }
        mostrarLoading(true, "Testando conexão...");
        try {
            const response = await fetch(`${webAppUrl}?acao=teste&t=${Date.now()}`);
            const result = await response.json();
            if (result.success) {
                mostrarMensagem("✅ Conexão OK! Planilha conectada.", "success");
                document.getElementById('statusModo').textContent = 'Online ✓';
            }
        } catch(e) {
            mostrarMensagem("❌ Falha na conexão", "error");
            document.getElementById('statusModo').textContent = 'Offline';
        }
        mostrarLoading(false);
    };

    window.salvarUrl = function() {
        webAppUrl = document.getElementById('webAppUrl').value.trim();
        localStorage.setItem('webAppUrl', webAppUrl);
        document.getElementById('statusModo').textContent = webAppUrl ? 'Online' : 'Local';
        mostrarMensagem("URL salva!", "success");
        if (webAppUrl) testarConexao();
    };

    function mostrarLoading(show, texto = "Sincronizando...") { 
        const loadingDiv = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        if (loadingText) loadingText.textContent = texto;
        loadingDiv.classList.toggle('active', show); 
    }
    
    function mostrarMensagem(msg, tipo) {
        const div = document.createElement('div');
        div.className = `message ${tipo}`;
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
    }

    window.abrirModalNovaAba = function() {
        const nome = prompt("Nome da nova aba (Ex: 🎻 Violão):");
        if(nome && nome.trim()){
            const newId = "tab_" + Date.now();
            customTabs.push({ id: newId, nome: nome.trim(), checklists: ["C","D","E"] });
            sheetData[newId] = [["🎵 Música", "C", "D", "E"]];
            saveAllToLocal();
            currentTabId = newId;
            renderTabs();
            renderizarInterface();
            mostrarMensagem(`Aba "${nome}" criada!`, "success");
        }
    };

    loadFromLocalStorage();
    renderTabs();
    renderizarInterface();
    if (webAppUrl) document.getElementById('webAppUrl').value = webAppUrl;
</script>

</body>
</html>
