<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📚 Gestor de Métodos e Andamentos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header {
            background: #34495e;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .status-bar {
            background: #27ae60;
            color: white;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            align-items: center;
        }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f39c12;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .sync-indicator.synced {
            background: #27ae60;
            animation: none;
        }
        .tabs-wrapper {
            background: #1a252f;
            display: flex;
            padding: 10px;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .tabs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            flex: 1;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #bdc3c7;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .tab-btn:hover {
            color: white;
        }
        .tab-btn.active {
            background: white;
            color: #2c3e50;
            border-radius: 5px;
            font-weight: bold;
        }
        .tab-actions {
            display: flex;
            gap: 5px;
        }
        .add-tab-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 5px;
        }
        .edit-tab-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 5px;
        }
        .del-tab-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 5px;
        }
        .content {
            padding: 20px;
        }
        .form-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        .form-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .small-note {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-enviar { background: #27ae60; color: white; }
        .btn-buscar { background: #3498db; color: white; }
        .btn-atualizar-tudo { background: #9b59b6; color: white; font-weight: bold; }
                
        .table-scroll {
            overflow-x: auto;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #34495e;
            color: white;
        }
        td input.input-celula {
            width: 100%;
            padding: 5px;
            border: 1px solid transparent;
            background: transparent;
            text-align: center;
            font-size: 14px;
        }
        td input.input-celula:focus {
            background: white;
            border-color: #3498db;
            outline: none;
        }
        td:first-child {
            background: #f8f9fa;
            font-weight: bold;
            text-align: left;
        }
        .action-btn {
            padding: 5px 10px;
            font-size: 14px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 5px;
            color: white;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .success { background: #27ae60; }
        .error { background: #e74c3c; }
        .info { background: #3498db; }
        .loading {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 4000;
            text-align: center;
            color: white;
            padding-top: 200px;
            font-size: 18px;
        }
        .loading.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📚 Gestor de Métodos e Metrônomos (M.M.)</h1>
        <p>Cadastre lições, velocidades e gerencie colunas dinamicamente</p>
    </div>
        
    <div class="status-bar">
        <span>Status: <span id="statusModo">Conectado ✓</span></span>
        <div class="sync-status">
            <div class="sync-indicator" id="syncIndicator"></div>
            <span id="syncText">Pronto</span>
        </div>
    </div>
        
    <div class="tabs-wrapper">
        <div class="tabs" id="tabsContainer"></div>
        <div class="tab-actions">
            <button class="add-tab-btn" onclick="abrirModalNovaAba()">➕ Novo Livro</button>
            <button class="edit-tab-btn" onclick="renomearLivroAtual()">✏️ Renomear Atual</button>
            <button class="del-tab-btn" onclick="excluirLivroAtual()">🗑️ Deletar Atual</button>
        </div>
    </div>
        
    <div class="content" id="mainContent"></div>
</div>

<div id="loading" class="loading">
    <p id="loadingText">Sincronizando...</p>
</div>

<script>
    // URL FIXA DO GOOGLE APPS SCRIPT
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbzebjpdDz2dhkZIDG2No-tx9RUOmG6oKD6_TrQFgwu2SAlvHeGBg0U5pKLgUXQ1s7svRQ/exec';
    
    let customTabs = [];
    let sheetData = {};
    let currentTabId = null;
    let atualizandoBackground = false;

    function extrairNumero(texto) {
        if (!texto) return null;
        const match = texto.toString().match(/^(\d+)/);
        if (match) return parseInt(match[1], 10);
        return null;
    }

    function ordenarMusicas(tabId) {
        if (!sheetData[tabId] || sheetData[tabId].length <= 1) return;
                
        const headers = sheetData[tabId][0];
        const rows = sheetData[tabId].slice(1);
                
        rows.sort((a, b) => {
            const nomeA = a && a[0] ? a[0].toString() : '';
            const nomeB = b && b[0] ? b[0].toString() : '';
                        
            const numA = extrairNumero(nomeA);
            const numB = extrairNumero(nomeB);
                        
            if (numA !== null && numB !== null) {
                if (numA !== numB) return numA - numB;
                return nomeA.localeCompare(nomeB, 'pt-br');
            }
            if (numA !== null) return -1;
            if (numB !== null) return 1;
            return nomeA.localeCompare(nomeB, 'pt-br');
        });
                
        sheetData[tabId] = [headers, ...rows];
        saveAllToLocal();
    }

    async function enviarMusicaParaGoogle(linhaCompleta, nomeAbaAlternativo = null) {
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const nomeAba = nomeAbaAlternativo || tab.nome;
            const url = `${webAppUrl}?acao=salvar&aba=${encodeURIComponent(nomeAba)}&dados=${encodeURIComponent(JSON.stringify(linhaCompleta))}&t=${Date.now()}`;
            
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.success) {
                return true;
            }
            return false;
        } catch(e) { 
            console.error("Erro ao enviar:", e);
            return false; 
        }
    }

    async function enviarTabelaCompletaParaGoogle() {
        const tab = customTabs.find(t => t.id === currentTabId);
        const todasAsLinhas = sheetData[currentTabId];
                
        if (!todasAsLinhas || todasAsLinhas.length === 0) {
            mostrarMensagem("Não há dados para enviar", "error");
            return;
        }

        mostrarLoading(true, "Enviando dados ao Google Sheets...");
        let sucessos = 0;
        
        try {
            for (let i = 0; i < todasAsLinhas.length; i++) {
                const enviou = await enviarMusicaParaGoogle(todasAsLinhas[i]);
                if (enviou) sucessos++;
            }
            mostrarMensagem(`✅ ${sucessos} de ${todasAsLinhas.length} itens sincronizados!`, "success");
            atualizarStatusSync("sincronizado");
        } catch (e) {
            mostrarMensagem("Erro na sincronização: " + e.message, "error");
        }
        mostrarLoading(false);
    }

    async function buscarDoGoogleBackground() {
        if (atualizandoBackground) return;
        atualizandoBackground = true;
        
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            if (!tab) return;
            
            atualizarStatusSync("atualizando");
            
            const url = `${webAppUrl}?acao=buscar&aba=${encodeURIComponent(tab.nome)}&t=${Date.now()}`;
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.success && result.dados && result.dados.length > 0) {
                const dadosAtuaisStr = JSON.stringify(sheetData[currentTabId]);
                const novosDadosStr = JSON.stringify(result.dados);
                
                if (dadosAtuaisStr !== novosDadosStr) {
                    sheetData[currentTabId] = result.dados;
                    tab.colunas = [...result.dados[0]];
                    ordenarMusicas(currentTabId);
                    saveAllToLocal();
                    renderizarInterface();
                    mostrarMensagem("🔄 Dados atualizados do Google!", "info", 2000);
                }
            }
        } catch (error) {
            console.error("Erro na busca em background:", error);
        } finally {
            atualizandoBackground = false;
            atualizarStatusSync("pronto");
        }
    }

    async function carregarAbasDoGoogle() {
        try {
            const response = await fetch(`${webAppUrl}?acao=listarAbas&t=${Date.now()}`);
            const data = await response.json();
            
            if (data.success && data.abas) {
                for (const abaName of data.abas) {
                    const abaExistente = customTabs.find(t => t.nome === abaName);
                    if (!abaExistente) {
                        const newId = "tab_" + Date.now() + "_" + abaName;
                        customTabs.push({ 
                            id: newId, 
                            nome: abaName, 
                            colunas: ["📚 Música/Lição", "⏱️ Andamento (M.M.)"] 
                        });
                        sheetData[newId] = [["📚 Música/Lição", "⏱️ Andamento (M.M.)"]];
                    }
                }
                saveAllToLocal();
                renderTabs();
            }
        } catch (error) {
            console.error("Erro ao carregar abas:", error);
        }
    }

    function initDefaultTabs() {
        return [
            { id: "metodo_1", nome: "Beyer", colunas: ["📚 Música/Lição", "⏱️ Andamento (M.M.)"] },
            { id: "metodo_2", nome: "Czerny", colunas: ["📚 Música/Lição", "⏱️ Andamento (M.M.)"] }
        ];
    }

    function loadFromLocalStorage() {
        const stored = localStorage.getItem("metodos_customTabs");
        if (stored) {
            try { customTabs = JSON.parse(stored); } catch(e) { customTabs = initDefaultTabs(); }
        } else { customTabs = initDefaultTabs(); }
                
        const storedData = localStorage.getItem("metodos_sheetData");
        if (storedData) {
            try { sheetData = JSON.parse(storedData); } catch(e) { sheetData = {}; }
        } else sheetData = {};
                
        customTabs.forEach(tab => {
            if (!sheetData[tab.id] || !sheetData[tab.id].length) {
                sheetData[tab.id] = [[...tab.colunas]];
            } else {
                ordenarMusicas(tab.id);
            }
        });
        if (customTabs.length > 0) currentTabId = customTabs[0].id;
        saveAllToLocal();
    }

    function saveAllToLocal() {
        localStorage.setItem("metodos_customTabs", JSON.stringify(customTabs));
        localStorage.setItem("metodos_sheetData", JSON.stringify(sheetData));
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        if (!container) return;
        container.innerHTML = customTabs.map(tab => `
            <button class="tab-btn ${currentTabId === tab.id ? 'active' : ''}" onclick="mudarAba('${tab.id}')">
                📘 ${tab.nome}
            </button>
        `).join('');
    }

    function mudarAba(tabId) {
        if (currentTabId === tabId) return;
        currentTabId = tabId;
        renderTabs();
        renderizarInterface();
        setTimeout(() => buscarDoGoogleBackground(), 100);
    }

    function renderizarInterface() {
        const tab = customTabs.find(t => t.id === currentTabId);
        if (!tab) {
            document.getElementById('mainContent').innerHTML = '<p style="text-align:center; color:#7f8c8d; padding:40px;">Nenhum livro selecionado. Crie ou selecione um acima.</p>';
            return;
        }
        
        // Garantir que headers existe
        let headers = [];
        if (sheetData[tab.id] && sheetData[tab.id][0]) {
            headers = sheetData[tab.id][0];
        } else {
            headers = [...tab.colunas];
        }
        
        const rows = sheetData[tab.id] ? sheetData[tab.id].slice(1) : [];
        
        // Formulário de cadastro
        let camposCadastroHtml = '';
        for (let idx = 0; idx < headers.length; idx++) {
            const colNome = headers[idx] || '';
            camposCadastroHtml += `
                <div class="form-group">
                    <label>${colNome}:</label>
                    <input type="text" id="campo_cad_${idx}" placeholder="${idx === 0 ? 'Ex: Lição 01' : 'Digite o valor'}">
                    ${idx === 0 ? '<div class="small-note">💡 Dica: Comece com números para auto-ordenação.</div>' : ''}
                </div>
            `;
        }

        // Construir tabela
        let tabelaHtml = '';
        if (rows.length === 0) {
            tabelaHtml = `<tr><td colspan="${headers.length + 1}" style="text-align:center;">Nenhuma lição ou música cadastrada</td></tr>`;
        } else {
            for (let rowIdx = 0; rowIdx < rows.length; rowIdx++) {
                const row = rows[rowIdx];
                if (!row || row.length === 0) continue;
                
                const primeiroValor = (row[0] !== undefined && row[0] !== null) ? row[0].toString() : '';
                
                tabelaHtml += '<tr>';
                tabelaHtml += `<td style="text-align:left;">${primeiroValor}</td>`;
                
                // Colunas de dados (exceto a primeira)
                for (let colIdx = 1; colIdx < headers.length; colIdx++) {
                    let val = row[colIdx];
                    if (val === undefined || val === null) val = '';
                    const valString = val.toString();
                    tabelaHtml += `
                        <td>
                            <input type="text" class="input-celula" value="${valString.replace(/"/g, '&quot;')}"
                                 onchange="atualizarValorInput(${rowIdx}, ${colIdx}, this.value)"
                                 placeholder="-">
                        </td>
                    `;
                }
                
                // Coluna de ações
                tabelaHtml += `
                    <td>
                        <button class="action-btn" style="background:#3498db; color:white;" onclick="preencherFormParaEditar(${rowIdx})">✏️</button>
                        <button class="action-btn" style="background:#e74c3c; color:white;" onclick="excluirRegistro(${rowIdx})">🗑️</button>
                    </td>
                `;
                tabelaHtml += '</tr>';
            }
        }

        // Cabeçalho da tabela
        let cabecalhoHtml = '<tr>';
        for (let h = 0; h < headers.length; h++) {
            cabecalhoHtml += `<th>${headers[h] || ''}</th>`;
        }
        cabecalhoHtml += '<th>Ações</th>';
        cabecalhoHtml += '</tr>';

        // HTML completo
        const html = `
            <div class="form-card">
                <h3>➕ Cadastrar / Atualizar Item</h3>
                <div class="form-grid">
                    ${camposCadastroHtml}
                </div>
                <div class="button-group">
                    <button class="btn-enviar" onclick="adicionarRegistro()">💾 Salvar Item</button>
                    <button class="btn-buscar" onclick="forcarAtualizacao()">📥 Forçar Atualização</button>
                    <button class="btn-atualizar-tudo" onclick="enviarTabelaCompletaParaGoogle()">📤 Enviar Tudo para Google</button>
                </div>
            </div>
                        
            <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0; flex-wrap:wrap; gap:10px;">
                <h3 style="flex:1;">📋 Conteúdo do Livro: ${tab.nome}</h3>
                <div>
                    <button onclick="adicionarNovaColuna()" style="background:#27ae60; color:white; padding:5px 10px; font-size:12px;">➕ Add Coluna</button>
                    <button onclick="editarCabecalhos()" style="background:#3498db; color:white; padding:5px 10px; font-size:12px;">✏️ Editar Cabeçalhos</button>
                    <button onclick="deletarUltimaColuna()" style="background:#e74c3c; color:white; padding:5px 10px; font-size:12px;">🗑️ Remover Última</button>
                </div>
            </div>
                        
            <div class="table-scroll">
                <table border="1">
                    <thead>
                        ${cabecalhoHtml}
                    </thead>
                    <tbody>
                        ${tabelaHtml}
                    </tbody>
                </table>
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = html;
    }

    window.atualizarValorInput = async function(rowIdx, colRealIdx, novoValor) {
        if (sheetData[currentTabId] && sheetData[currentTabId][rowIdx + 1]) {
            sheetData[currentTabId][rowIdx + 1][colRealIdx] = novoValor;
            saveAllToLocal();
            mostrarMensagem('Alteração salva localmente', "info");
            await enviarMusicaParaGoogle(sheetData[currentTabId][rowIdx + 1]);
        }
    };

    window.adicionarRegistro = async function() {
        const headers = sheetData[currentTabId][0];
        const primeiroCampo = document.getElementById('campo_cad_0')?.value?.trim();
                
        if (!primeiroCampo) { 
             mostrarMensagem(`O campo "${headers[0]}" é obrigatório!`, "error"); 
             return; 
         }
                
        const novaRow = [];
        for(let i=0; i<headers.length; i++) {
            const val = document.getElementById(`campo_cad_${i}`)?.value?.trim() || "";
            novaRow.push(val);
        }
                
        const rows = sheetData[currentTabId].slice(1);
        const indexExistente = rows.findIndex(r => r && r[0] && r[0].toString().toLowerCase() === primeiroCampo.toLowerCase());
                
        if (indexExistente !== -1) {
            sheetData[currentTabId][indexExistente + 1] = novaRow;
            mostrarMensagem("Item atualizado!", "success");
        } else {
            sheetData[currentTabId].push(novaRow);
            mostrarMensagem("Item adicionado!", "success");
        }
                
        ordenarMusicas(currentTabId);
        renderizarInterface();
                
        for(let i=0; i<headers.length; i++) {
            const el = document.getElementById(`campo_cad_${i}`);
            if(el) el.value = "";
        }
                
        await enviarMusicaParaGoogle(novaRow);
    };

    window.preencherFormParaEditar = function(rowIdx) {
        const rowData = sheetData[currentTabId][rowIdx + 1];
        for (let i = 0; i < rowData.length; i++) {
            const el = document.getElementById(`campo_cad_${i}`);
            if (el) {
                const val = rowData[i];
                el.value = (val !== undefined && val !== null) ? val : '';
            }
        }
        document.getElementById('campo_cad_0').focus();
        mostrarMensagem("Dados copiados para edição!", "info");
    };

    window.excluirRegistro = async function(rowIdx) {
        if (confirm("Remover este registro permanentemente?")) {
            sheetData[currentTabId].splice(rowIdx + 1, 1);
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem("Item removido", "info");
            await enviarTabelaCompletaParaGoogle();
        }
    };

    window.renomearLivroAtual = async function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        if (!tab) { mostrarMensagem("Nenhum livro selecionado!", "error"); return; }
        
        const novoNome = prompt(`Digite o novo nome para o livro "${tab.nome}":`, tab.nome);
        if (novoNome && novoNome.trim() && novoNome.trim() !== tab.nome) {
            tab.nome = novoNome.trim();
            
            await fetch(`${webAppUrl}?acao=criarAba&nomeAba=${encodeURIComponent(tab.nome)}&t=${Date.now()}`);
            for (const row of sheetData[currentTabId]) {
                await enviarMusicaParaGoogle(row, tab.nome);
            }
            
            saveAllToLocal();
            renderTabs();
            renderizarInterface();
            mostrarMensagem("Livro renomeado e sincronizado!", "success");
        }
    };

    window.excluirLivroAtual = async function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        if (!tab) { mostrarMensagem("Nenhum livro selecionado!", "error"); return; }
        
        if (confirm(`⚠️ ATENÇÃO: Deseja realmente excluir permanentemente o livro "${tab.nome}" e TODOS os seus dados salvos?`)) {
            await fetch(`${webAppUrl}?acao=deletarAba&nomeAba=${encodeURIComponent(tab.nome)}&t=${Date.now()}`);
            
            customTabs = customTabs.filter(t => t.id !== currentTabId);
            delete sheetData[currentTabId];
            
            saveAllToLocal();
            
            if (customTabs.length > 0) {
                currentTabId = customTabs[0].id;
            } else {
                currentTabId = null;
            }
            
            renderTabs();
            renderizarInterface();
            mostrarMensagem("Livro removido do aplicativo e do Google!", "success");
        }
    };

    window.adicionarNovaColuna = async function() {
        const nomeColuna = prompt("Digite o nome da nova coluna (Ex: Observação, Página):");
        if (nomeColuna && nomeColuna.trim()) {
            const tab = customTabs.find(t => t.id === currentTabId);
            sheetData[currentTabId][0].push(nomeColuna.trim());
            tab.colunas.push(nomeColuna.trim());
            for (let i = 1; i < sheetData[currentTabId].length; i++) {
                sheetData[currentTabId][i].push("");
            }
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem(`Coluna "${nomeColuna}" criada!`, "info");
            await enviarMusicaParaGoogle(sheetData[currentTabId][0]);
        }
    };

    window.editarCabecalhos = async function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        const headers = sheetData[currentTabId][0];
        
        let msg = "Escolha qual coluna deseja renomear:\n\n";
        for (let idx = 0; idx < headers.length; idx++) {
            if (idx > 0) msg += `${idx} - ${headers[idx]}\n`;
        }
        
        const escolha = prompt(msg + "\nDigite o número da coluna:");
        const idxEscolhido = parseInt(escolha, 10);
        
        if (!isNaN(idxEscolhido) && idxEscolhido > 0 && idxEscolhido < headers.length) {
            const novoNome = prompt(`Digite o novo nome para a coluna "${headers[idxEscolhido]}":`);
            if (novoNome && novoNome.trim()) {
                headers[idxEscolhido] = novoNome.trim();
                tab.colunas[idxEscolhido] = novoNome.trim();
                saveAllToLocal();
                renderizarInterface();
                mostrarMensagem("Cabeçalho alterado!", "info");
                await enviarMusicaParaGoogle(sheetData[currentTabId][0]);
            }
        }
    };

    window.deletarUltimaColuna = async function() {
        const headers = sheetData[currentTabId][0];
        const tab = customTabs.find(t => t.id === currentTabId);
        if (headers.length <= 2) {
            mostrarMensagem("Você não pode deletar as colunas base.", "error");
            return;
        }
        if (confirm(`Aviso: Remover a coluna "${headers[headers.length - 1]}" apagará os dados dela. Continuar?`)) {
            for (let i = 0; i < sheetData[currentTabId].length; i++) {
                sheetData[currentTabId][i].pop();
            }
            tab.colunas.pop();
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem("Coluna removida!", "info");
            await enviarMusicaParaGoogle(sheetData[currentTabId][0]);
        }
    };

    window.forcarAtualizacao = async function() {
        mostrarLoading(true, "Forçando atualização...");
        await buscarDoGoogleBackground();
        await carregarAbasDoGoogle();
        mostrarLoading(false);
        mostrarMensagem("✅ Atualização concluída!", "success");
    };

    function atualizarStatusSync(estado) {
        const indicator = document.getElementById('syncIndicator');
        const text = document.getElementById('syncText');
        
        if (estado === 'atualizando') {
            indicator.className = 'sync-indicator';
            text.innerHTML = '🔄 Sincronizando...';
        } else if (estado === 'sincronizado') {
            indicator.className = 'sync-indicator synced';
            text.innerHTML = '✓ Sincronizado';
            setTimeout(() => {
                if (text.innerHTML === '✓ Sincronizado') {
                    text.innerHTML = 'Pronto';
                }
            }, 3000);
        } else {
            indicator.className = 'sync-indicator synced';
            text.innerHTML = '✓ Pronto';
        }
    }

    function mostrarLoading(show, texto = "Sincronizando...") { 
        const loadingDiv = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        if (loadingText) loadingText.textContent = texto;
        loadingDiv.classList.toggle('active', show); 
    }
    
    function mostrarMensagem(msg, tipo, tempo = 3000) {
        const div = document.createElement('div');
        div.className = `message ${tipo}`;
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), tempo);
    }

    window.abrirModalNovaAba = async function() {
        const nome = prompt("Nome do novo Livro / Método:");
        if(nome && nome.trim()){
            const newId = "tab_" + Date.now();
            customTabs.push({ id: newId, nome: nome.trim(), colunas: ["📚 Música/Lição", "⏱️ Andamento (M.M.)"] });
            sheetData[newId] = [["📚 Música/Lição", "⏱️ Andamento (M.M.)"]];
            saveAllToLocal();
            currentTabId = newId;
            renderTabs();
            renderizarInterface();
            mostrarMensagem(`Livro "${nome}" criado!`, "success");
            
            await fetch(`${webAppUrl}?acao=criarAba&nomeAba=${encodeURIComponent(nome)}&t=${Date.now()}`);
            await enviarMusicaParaGoogle(sheetData[currentTabId][0]);
        }
    };

    // INICIALIZAÇÃO
    loadFromLocalStorage();
    renderTabs();
    renderizarInterface();
    
    setTimeout(() => {
        carregarAbasDoGoogle();
        buscarDoGoogleBackground();
    }, 100);
    
</script>
</body>
</html>
