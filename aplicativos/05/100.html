<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player ABC Simples</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-midi-min.js"></script>
<style>
    body { font-family: Arial; padding: 20px; }
    .btn { background: #e94560; color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-size: 18px; }
    .btn:hover { background: #c7354f; }
    .btn.tocando { background: #2ecc71; }
</style>
</head>
<body>

<h2>🎵 Música em ABC</h2>

<div id="partitura"></div>

<br>
<button class="btn" id="playBtn" onclick="tocar()">▶️ Tocar</button>

<script>
// ============================================
// NOTAÇÃO ABC (música de exemplo)
// ============================================
const abc = `X:1
T:Parabéns pra Você
M:4/4
L:1/4
Q:120
K:C
GG AG cB | GG AG dc | GG AG ec | cB AG dc |]`;

// ============================================
// RENDERIZAR PARTITURA
// ============================================
ABCJS.renderAbc('partitura', abc, { add_classes: true });

// ============================================
// TOCAR
// ============================================
let player = null;
let tocando = false;

function tocar() {
    const btn = document.getElementById('playBtn');
    
    if (tocando) {
        player.pause();
        btn.textContent = '▶️ Continuar';
        btn.classList.remove('tocando');
        tocando = false;
        return;
    }
    
    if (player && player.paused) {
        player.play();
        btn.textContent = '⏹️ Parar';
        btn.classList.add('tocando');
        tocando = true;
        return;
    }
    
    const midi = ABCJS.midi.transpose(abc, 0);
    if (!midi) { alert('Erro'); return; }
    
    player = new ABCJS.midi.MidiPlayer(midi);
    player.play();
    btn.textContent = '⏹️ Parar';
    btn.classList.add('tocando');
    tocando = true;
    
    player.on('finished', function() {
        btn.textContent = '▶️ Tocar';
        btn.classList.remove('tocando');
        tocando = false;
        player = null;
    });
}
</script>

</body>
</html>
