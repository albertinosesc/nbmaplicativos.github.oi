<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎵 Gestor de Progressão Harmônica</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #2c3e50;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header {
            background: #34495e;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .status-bar {
            background: #27ae60;
            color: white;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            align-items: center;
        }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f39c12;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .sync-indicator.synced {
            background: #27ae60;
            animation: none;
        }
        .tabs-wrapper {
            background: #1a252f;
            display: flex;
            padding: 10px;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .tabs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            flex: 1;
            align-items: center;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #bdc3c7;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .tab-btn:hover {
            color: white;
        }
        .tab-btn.active {
            background: white;
            color: #2c3e50;
            border-radius: 5px;
            font-weight: bold;
        }
        .tab-actions {
            display: flex;
            gap: 5px;
        }
        .add-tab-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 5px;
        }
        .edit-tab-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 5px;
        }
        .del-tab-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 5px;
        }
        .sort-tab-btn {
            background: #16a085;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 5px;
        }
        .content {
            padding: 20px;
        }
        .form-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        .form-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .small-note {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-enviar { background: #27ae60; color: white; }
        .btn-buscar { background: #3498db; color: white; }
        .btn-atualizar-tudo { background: #9b59b6; color: white; font-weight: bold; }
        .btn-exportar { background: #f39c12; color: white; font-weight: bold; }
        .btn-importar { background: #1abc9c; color: white; font-weight: bold; }
        .btn-exportar-individual { background: #e67e22; color: white; }
        .btn-importar-individual { background: #16a085; color: white; }
                
        .table-scroll {
            overflow-x: auto;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #34495e;
            color: white;
        }
        td input.input-celula {
            width: 100%;
            padding: 5px;
            border: 1px solid transparent;
            background: transparent;
            text-align: center;
            font-size: 14px;
        }
        td input.input-celula:focus {
            background: white;
            border-color: #3498db;
            outline: none;
        }
        td:first-child {
            background: #f8f9fa;
            font-weight: bold;
            text-align: left;
        }
        .action-btn {
            padding: 5px 10px;
            font-size: 14px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 5px;
            color: white;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .success { background: #27ae60; }
        .error { background: #e74c3c; }
        .info { background: #3498db; }
        .loading {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 4000;
            text-align: center;
            color: white;
            padding-top: 200px;
            font-size: 18px;
        }
        .loading.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎵 Gestor de Progressão Harmônica</h1>
    </div>
        
    <div class="status-bar">
        <span>Status: <span id="statusModo">Conectado ✓</span></span>
        <div class="sync-status">
            <div class="sync-indicator" id="syncIndicator"></div>
            <span id="syncText">Pronto</span>
        </div>
    </div>
        
    <div class="tabs-wrapper">
        <div class="tabs" id="tabsContainer"></div>
    </div>
    <br>
    <div class="tab-actions">
        <button class="add-tab-btn" onclick="abrirModalNovaAba()">➕ Novo Método</button>
        <button class="edit-tab-btn" onclick="renomearLivroAtual()">✏️ Renomear Atual</button>
        <button class="del-tab-btn" onclick="excluirLivroAtual()">🗑️ Deletar Atual</button>
        <button class="sort-tab-btn" onclick="ordenarTodosOsLivros()">🔄 Ordenar Métodos</button>
    </div>
    
    <div class="content" id="mainContent"></div>
</div>

<div id="loading" class="loading">
    <p id="loadingText">Sincronizando...</p>
</div>

<script>
    // URL FIXA DO GOOGLE APPS SCRIPT
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbyNcMgo9W74ksso3GX3aOuM8T-WmoeyKhuErkIemNB84D8Jj1YYR4uovTll_ry8ggdn/exec';
    
    let customTabs = [];
    let sheetData = {};
    let currentTabId = null;
    let atualizandoBackground = false;

    // Função para extrair número do início do texto
    function extrairNumero(texto) {
        if (!texto) return null;
        const match = texto.toString().match(/^(\d+)/);
        if (match) return parseInt(match[1], 10);
        return null;
    }

    // Função para ordenar livros (alfabética e numericamente)
    function ordenarLivros(books) {
        return books.sort((a, b) => {
            const nomeA = a.nome || '';
            const nomeB = b.nome || '';
            
            const numA = extrairNumero(nomeA);
            const numB = extrairNumero(nomeB);
            
            if (numA !== null && numB !== null) {
                if (numA !== numB) return numA - numB;
                return nomeA.localeCompare(nomeB, 'pt-br');
            }
            if (numA !== null) return -1;
            if (numB !== null) return 1;
            return nomeA.localeCompare(nomeB, 'pt-br');
        });
    }

    // Ordenar músicas dentro da aba
    function ordenarMusicas(tabId) {
        if (!sheetData[tabId] || sheetData[tabId].length <= 1) return;
                
        const headers = sheetData[tabId][0];
        const rows = sheetData[tabId].slice(1);
                
        rows.sort((a, b) => {
            const nomeA = a && a[0] ? a[0].toString() : '';
            const nomeB = b && b[0] ? b[0].toString() : '';
                        
            const numA = extrairNumero(nomeA);
            const numB = extrairNumero(nomeB);
                        
            if (numA !== null && numB !== null) {
                if (numA !== numB) return numA - numB;
                return nomeA.localeCompare(nomeB, 'pt-br');
            }
            if (numA !== null) return -1;
            if (numB !== null) return 1;
            return nomeA.localeCompare(nomeB, 'pt-br');
        });
                
        sheetData[tabId] = [headers, ...rows];
        saveAllToLocal();
    }

    // Ordenar todos os livros
    window.ordenarTodosOsLivros = function() {
        if (customTabs.length === 0) {
            mostrarMensagem("Nenhum método para ordenar!", "info");
            return;
        }
        
        const tabIdAtual = currentTabId;
        customTabs = ordenarLivros(customTabs);
        
        if (tabIdAtual) {
            const tabAindaExiste = customTabs.find(t => t.id === tabIdAtual);
            if (tabAindaExiste) {
                currentTabId = tabIdAtual;
            } else {
                currentTabId = customTabs[0]?.id || null;
            }
        }
        
        saveAllToLocal();
        renderTabs();
        renderizarInterface();
        mostrarMensagem("✅ Métodos ordenados com sucesso!", "success");
    };

    function ordenarLivrosAutomaticamente() {
        const tabIdAtual = currentTabId;
        customTabs = ordenarLivros(customTabs);
        
        if (tabIdAtual) {
            const tabAindaExiste = customTabs.find(t => t.id === tabIdAtual);
            if (tabAindaExiste) {
                currentTabId = tabIdAtual;
            }
        }
        
        saveAllToLocal();
        renderTabs();
    }

    // ========== FUNÇÕES DE EXPORTAR E IMPORTAR ==========
    
    window.exportarTudoJSON = function() {
        try {
            const dadosCompletos = {
                abas: customTabs,
                dados: sheetData,
                dataExportacao: new Date().toISOString(),
                versaoApp: "1.0",
                tipo: "todos_livros"
            };
            
            const jsonString = JSON.stringify(dadosCompletos, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `backup_todos_metodos_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            mostrarMensagem("✅ Todos os métodos exportados com sucesso para JSON!", "success");
        } catch (error) {
            mostrarMensagem("❌ Erro ao exportar: " + error.message, "error");
        }
    };
    
    window.exportarLivroAtualJSON = function() {
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            if (!tab) {
                mostrarMensagem("Nenhum método selecionado!", "error");
                return;
            }
            
            const dadosLivro = {
                nome: tab.nome,
                colunas: tab.colunas,
                dados: sheetData[currentTabId],
                dataExportacao: new Date().toISOString(),
                versaoApp: "1.0",
                tipo: "livro_individual"
            };
            
            const jsonString = JSON.stringify(dadosLivro, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `metodo_${tab.nome.replace(/[^a-z0-9]/gi, '_')}_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            mostrarMensagem(`✅ Método "${tab.nome}" exportado com sucesso!`, "success");
        } catch (error) {
            mostrarMensagem("❌ Erro ao exportar: " + error.message, "error");
        }
    };
    
    window.exportarLivroAtualTXT = function() {
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            if (!tab) {
                mostrarMensagem("Nenhum método selecionado!", "error");
                return;
            }
            
            let txtConteudo = `=== ${tab.nome} ===\n`;
            txtConteudo += `Data de exportação: ${new Date().toLocaleString('pt-BR')}\n`;
            txtConteudo += "=".repeat(50) + "\n\n";
            
            const dados = sheetData[currentTabId];
            if (dados && dados.length > 0) {
                const headers = dados[0];
                txtConteudo += headers.join(" | ") + "\n";
                txtConteudo += "-".repeat(50) + "\n";
                
                for (let i = 1; i < dados.length; i++) {
                    const linha = dados[i];
                    if (linha && linha.length > 0) {
                        txtConteudo += linha.join(" | ") + "\n";
                    }
                }
            } else {
                txtConteudo += "(Nenhum dado cadastrado)\n";
            }
            
            const blob = new Blob(["\uFEFF" + txtConteudo], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `metodo_${tab.nome.replace(/[^a-z0-9]/gi, '_')}_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            mostrarMensagem(`✅ Método "${tab.nome}" exportado para TXT!`, "success");
        } catch (error) {
            mostrarMensagem("❌ Erro ao exportar TXT: " + error.message, "error");
        }
    };
    
    window.importarArquivo = function() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json,.txt";
        input.onchange = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let conteudo = e.target.result;
                    const extensao = file.name.split('.').pop().toLowerCase();
                    
                    if (conteudo.charCodeAt(0) === 0xFEFF) {
                        conteudo = conteudo.slice(1);
                    }
                    
                    if (extensao === 'json') {
                        importarJSONInteligente(conteudo);
                    } else if (extensao === 'txt') {
                        importarTXT(conteudo);
                    } else {
                        mostrarMensagem("Formato não suportado. Use JSON ou TXT.", "error");
                    }
                } catch (error) {
                    mostrarMensagem("Erro ao ler arquivo: " + error.message, "error");
                }
            };
            reader.readAsText(file, "UTF-8");
        };
        input.click();
    };
    
    function importarJSONInteligente(conteudo) {
        try {
            const dadosImportados = JSON.parse(conteudo);
            
            if (dadosImportados.tipo === "todos_livros" || (dadosImportados.abas && dadosImportados.dados)) {
                if (confirm(`ATENÇÃO: Isso substituirá TODOS os dados atuais (${customTabs.length} método(s)) pelos dados do arquivo. Deseja continuar?`)) {
                    customTabs = dadosImportados.abas;
                    sheetData = dadosImportados.dados;
                    
                    customTabs.forEach(tab => {
                        if (!sheetData[tab.id]) {
                            sheetData[tab.id] = [tab.colunas || ["📚 Música/Lição"]];
                        }
                        ordenarMusicas(tab.id);
                    });
                    
                    customTabs = ordenarLivros(customTabs);
                    
                    if (customTabs.length > 0) {
                        currentTabId = customTabs[0].id;
                    }
                    
                    saveAllToLocal();
                    renderTabs();
                    renderizarInterface();
                    mostrarMensagem(`✅ Importação completa! ${customTabs.length} método(s) carregado(s) e ordenado(s).`, "success");
                }
            } 
            else if (dadosImportados.tipo === "livro_individual" && dadosImportados.nome && dadosImportados.dados) {
                const nomeLivro = dadosImportados.nome;
                const colunas = dadosImportados.colunas || ["📚 Música/Lição"];
                const dados = dadosImportados.dados;
                
                if (confirm(`Deseja importar o método "${nomeLivro}" como um NOVO método?`)) {
                    const newId = "tab_" + Date.now() + "_" + nomeLivro.replace(/[^a-z0-9]/gi, '_');
                    customTabs.push({
                        id: newId,
                        nome: nomeLivro,
                        colunas: colunas
                    });
                    sheetData[newId] = dados;
                    ordenarMusicas(newId);
                    
                    customTabs = ordenarLivros(customTabs);
                    currentTabId = newId;
                    
                    saveAllToLocal();
                    renderTabs();
                    renderizarInterface();
                    mostrarMensagem(`✅ Método "${nomeLivro}" importado e ordenado com sucesso!`, "success");
                }
            }
            else {
                throw new Error("Formato JSON não reconhecido");
            }
        } catch (error) {
            mostrarMensagem("❌ Erro ao importar JSON: " + error.message, "error");
        }
    }
    
    function importarTXT(conteudo) {
        if (confirm("ATENÇÃO: A importação de TXT criará um NOVO método baseado no texto. Deseja continuar?")) {
            try {
                const linhas = conteudo.split('\n');
                let headers = [];
                let dadosLinhas = [];
                let lendoDados = false;
                let nomeLivro = "Metodo_Importado_" + new Date().toISOString().slice(0,19);
                
                for (let i = 0; i < linhas.length; i++) {
                    let linha = linhas[i].trim();
                    
                    if (linha.includes('===') && !headers.length) {
                        const match = linha.match(/=== (.+?) ===/);
                        if (match) nomeLivro = match[1];
                        continue;
                    }
                    
                    if (linha.includes('|') && !linha.includes('===') && !linha.includes('---')) {
                        const partes = linha.split('|').map(p => p.trim());
                        if (!lendoDados && headers.length === 0) {
                            headers = partes;
                            lendoDados = true;
                        } else if (lendoDados && partes.length === headers.length) {
                            dadosLinhas.push(partes);
                        }
                    }
                }
                
                if (headers.length > 0) {
                    const dadosCompletos = [headers, ...dadosLinhas];
                    const newId = "tab_" + Date.now();
                    customTabs.push({
                        id: newId,
                        nome: nomeLivro,
                        colunas: headers
                    });
                    sheetData[newId] = dadosCompletos;
                    
                    customTabs = ordenarLivros(customTabs);
                    currentTabId = newId;
                    
                    saveAllToLocal();
                    renderTabs();
                    renderizarInterface();
                    mostrarMensagem(`✅ Método "${nomeLivro}" importado do TXT com sucesso!`, "success");
                } else {
                    mostrarMensagem("Nenhum dado válido encontrado no arquivo TXT.", "error");
                }
            } catch (error) {
                mostrarMensagem("Erro ao importar TXT: " + error.message, "error");
            }
        }
    }

    async function enviarMusicaParaGoogle(linhaCompleta, nomeAbaAlternativo = null) {
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const nomeAba = nomeAbaAlternativo || tab.nome;
            const url = `${webAppUrl}?acao=salvar&aba=${encodeURIComponent(nomeAba)}&dados=${encodeURIComponent(JSON.stringify(linhaCompleta))}&t=${Date.now()}`;
            
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.success) {
                return true;
            }
            return false;
        } catch(e) { 
            console.error("Erro ao enviar:", e);
            return false; 
        }
    }

    async function enviarTabelaCompletaParaGoogle() {
        const tab = customTabs.find(t => t.id === currentTabId);
        const todasAsLinhas = sheetData[currentTabId];
                
        if (!todasAsLinhas || todasAsLinhas.length === 0) {
            mostrarMensagem("Não há dados para enviar", "error");
            return;
        }

        mostrarLoading(true, "Enviando dados ao Google Sheets...");
        let sucessos = 0;
        
        try {
            for (let i = 0; i < todasAsLinhas.length; i++) {
                const enviou = await enviarMusicaParaGoogle(todasAsLinhas[i]);
                if (enviou) sucessos++;
            }
            mostrarMensagem(`✅ ${sucessos} de ${todasAsLinhas.length} itens sincronizados!`, "success");
            atualizarStatusSync("sincronizado");
        } catch (e) {
            mostrarMensagem("Erro na sincronização: " + e.message, "error");
        }
        mostrarLoading(false);
    }

    async function buscarDoGoogleBackground() {
        if (atualizandoBackground) return;
        atualizandoBackground = true;
        
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            if (!tab) return;
            
            atualizarStatusSync("atualizando");
            
            const url = `${webAppUrl}?acao=buscar&aba=${encodeURIComponent(tab.nome)}&t=${Date.now()}`;
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.success && result.dados && result.dados.length > 0) {
                const dadosAtuaisStr = JSON.stringify(sheetData[currentTabId]);
                const novosDadosStr = JSON.stringify(result.dados);
                
                if (dadosAtuaisStr !== novosDadosStr) {
                    sheetData[currentTabId] = result.dados;
                    tab.colunas = [...result.dados[0]];
                    ordenarMusicas(currentTabId);
                    saveAllToLocal();
                    renderizarInterface();
                    mostrarMensagem("🔄 Dados atualizados do Google!", "info", 2000);
                }
            }
        } catch (error) {
            console.error("Erro na busca em background:", error);
        } finally {
            atualizandoBackground = false;
            atualizarStatusSync("pronto");
        }
    }

    async function carregarAbasDoGoogle() {
        try {
            const response = await fetch(`${webAppUrl}?acao=listarAbas&t=${Date.now()}`);
            const data = await response.json();
            
            if (data.success && data.abas) {
                for (const abaName of data.abas) {
                    const abaExistente = customTabs.find(t => t.nome === abaName);
                    if (!abaExistente) {
                        const newId = "tab_" + Date.now() + "_" + abaName;
                        customTabs.push({ 
                            id: newId, 
                            nome: abaName, 
                            colunas: ["📚 Música/Lição"] 
                        });
                        sheetData[newId] = [["📚 Música/Lição"]];
                    }
                }
                customTabs = ordenarLivros(customTabs);
                saveAllToLocal();
                renderTabs();
            }
        } catch (error) {
            console.error("Erro ao carregar abas:", error);
        }
    }

    function initDefaultTabs() {
        const tabs = [
            { id: "metodo_1", nome: "Beyer", colunas: ["📚 Música/Lição"] },
            { id: "metodo_2", nome: "Czerny", colunas: ["📚 Música/Lição"] }
        ];
        return ordenarLivros(tabs);
    }

    function loadFromLocalStorage() {
        const stored = localStorage.getItem("metodos_customTabs");
        if (stored) {
            try { 
                customTabs = JSON.parse(stored);
                customTabs = ordenarLivros(customTabs);
            } catch(e) { 
                customTabs = initDefaultTabs(); 
            }
        } else { 
            customTabs = initDefaultTabs(); 
        }
                
        const storedData = localStorage.getItem("metodos_sheetData");
        if (storedData) {
            try { sheetData = JSON.parse(storedData); } catch(e) { sheetData = {}; }
        } else sheetData = {};
                
        customTabs.forEach(tab => {
            if (!sheetData[tab.id] || !sheetData[tab.id].length) {
                sheetData[tab.id] = [[...tab.colunas]];
            } else {
                ordenarMusicas(tab.id);
            }
        });
        if (customTabs.length > 0) currentTabId = customTabs[0].id;
        saveAllToLocal();
    }

    function saveAllToLocal() {
        localStorage.setItem("metodos_customTabs", JSON.stringify(customTabs));
        localStorage.setItem("metodos_sheetData", JSON.stringify(sheetData));
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        if (!container) return;
        container.innerHTML = customTabs.map(tab => `
            <button class="tab-btn ${currentTabId === tab.id ? 'active' : ''}" onclick="mudarAba('${tab.id}')">
                🎵 ${tab.nome}
            </button>
        `).join('');
        
        const contador = document.createElement('span');
        contador.style.cssText = 'color: #bdc3c7; font-size: 12px; margin-left: 10px;';
        contador.textContent = `(${customTabs.length} método${customTabs.length !== 1 ? 's' : ''})`;
        container.appendChild(contador);
    }

    function mudarAba(tabId) {
        if (currentTabId === tabId) return;
        currentTabId = tabId;
        renderTabs();
        renderizarInterface();
        setTimeout(() => buscarDoGoogleBackground(), 100);
    }

    function renderizarInterface() {
        const tab = customTabs.find(t => t.id === currentTabId);
        if (!tab) {
            document.getElementById('mainContent').innerHTML = '<p style="text-align:center; color:#7f8c8d; padding:40px;">Nenhum método selecionado. Crie ou selecione um acima.</p>';
            return;
        }
        
        let headers = [];
        if (sheetData[tab.id] && sheetData[tab.id][0]) {
            headers = sheetData[tab.id][0];
        } else {
            headers = [...tab.colunas];
        }
        
        const rows = sheetData[tab.id] ? sheetData[tab.id].slice(1) : [];
        
        let camposCadastroHtml = '';
        for (let idx = 0; idx < headers.length; idx++) {
            const colNome = headers[idx] || '';
            camposCadastroHtml += `
                <div class="form-group">
                    <label>${colNome}:</label>
                    <input type="text" id="campo_cad_${idx}" placeholder="${idx === 0 ? 'Ex: Lição 01' : 'Digite o valor'}">
                    ${idx === 0 ? '<div class="small-note">💡 Dica: Comece com números para auto-ordenação.</div>' : ''}
                </div>
            `;
        }

        let tabelaHtml = '';
        if (rows.length === 0) {
            tabelaHtml = `<tr><td colspan="${headers.length + 1}" style="text-align:center;">Nenhuma lição ou música cadastrada</td></tr>`;
        } else {
            for (let rowIdx = 0; rowIdx < rows.length; rowIdx++) {
                const row = rows[rowIdx];
                if (!row || row.length === 0) continue;
                
                const primeiroValor = (row[0] !== undefined && row[0] !== null) ? row[0].toString() : '';
                
                tabelaHtml += '<tr>';
                tabelaHtml += `<td style="text-align:left;">${primeiroValor}</td>`;
                
                for (let colIdx = 1; colIdx < headers.length; colIdx++) {
                    let val = row[colIdx];
                    if (val === undefined || val === null) val = '';
                    const valString = val.toString();
                    tabelaHtml += `
                        <td>
                            <input type="text" class="input-celula" value="${valString.replace(/"/g, '&quot;')}"
                                 onchange="atualizarValorInput(${rowIdx}, ${colIdx}, this.value)"
                                 placeholder="-">
                        </td>
                    `;
                }
                
                tabelaHtml += `
                    <td>
                        <button class="action-btn" style="background:#3498db; color:white;" onclick="preencherFormParaEditar(${rowIdx})">✏️</button>
                        <button class="action-btn" style="background:#e74c3c; color:white;" onclick="excluirRegistro(${rowIdx})">🗑️</button>
                    </td>
                `;
                tabelaHtml += '<tr>';
            }
        }

        let cabecalhoHtml = '<tr>';
        for (let h = 0; h < headers.length; h++) {
            cabecalhoHtml += `<th>${headers[h] || ''}</th>`;
        }
        cabecalhoHtml += '<th>Ações</th>';
        cabecalhoHtml += '</tr>';

        const html = `
            <div class="form-card">
                <h3>➕ Cadastrar / Atualizar Item</h3>
                <div class="form-grid">
                    ${camposCadastroHtml}
                </div>
                <div class="button-group">
                    <button class="btn-enviar" onclick="adicionarRegistro()">💾 Salvar Item</button>
                    <button class="btn-buscar" onclick="forcarAtualizacao()">📥 Forçar Atualização</button>
                    <button class="btn-atualizar-tudo" onclick="enviarTabelaCompletaParaGoogle()">📤 Enviar Tudo para Google</button>
                </div>
                <div class="button-group" style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 15px;">
                    <span style="font-weight: bold; margin-right: 10px;">📁 Importar/Exportar:</span>
                    <button class="btn-exportar-individual" onclick="exportarLivroAtualJSON()">📄 Exportar Este Método (JSON)</button>
                    <button class="btn-exportar-individual" onclick="exportarLivroAtualTXT()">📝 Exportar Este Método (TXT)</button>
                    <button class="btn-exportar" onclick="exportarTudoJSON()">🗂️ Exportar Todos os Métodos (JSON)</button>
                    <button class="btn-importar-individual" onclick="importarArquivo()">📂 Importar Arquivo</button>
                </div>
            </div>
                        
            <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0; flex-wrap:wrap; gap:10px;">
                <h3 style="flex:1;">📋 Conteúdo do Método: ${tab.nome}</h3>
                <div>
                    <button onclick="adicionarNovaColuna()" style="background:#27ae60; color:white; padding:5px 10px; font-size:12px;">➕ Add Coluna</button>
                    <button onclick="editarCabecalhos()" style="background:#3498db; color:white; padding:5px 10px; font-size:12px;">✏️ Editar Cabeçalhos</button>
                    <button onclick="deletarUltimaColuna()" style="background:#e74c3c; color:white; padding:5px 10px; font-size:12px;">🗑️ Remover Última</button>
                </div>
            </div>
                        
            <div class="table-scroll">
                <table border="1">
                    <thead>
                        ${cabecalhoHtml}
                    </thead>
                    <tbody>
                        ${tabelaHtml}
                    </tbody>
                </table>
            </div>
        `;
        
        document.getElementById('mainContent').innerHTML = html;
    }

    window.atualizarValorInput = async function(rowIdx, colRealIdx, novoValor) {
        if (sheetData[currentTabId] && sheetData[currentTabId][rowIdx + 1]) {
            sheetData[currentTabId][rowIdx + 1][colRealIdx] = novoValor;
            saveAllToLocal();
            mostrarMensagem('Alteração salva localmente', "info");
            await enviarMusicaParaGoogle(sheetData[currentTabId][rowIdx + 1]);
        }
    };

    window.adicionarRegistro = async function() {
        const headers = sheetData[currentTabId][0];
        const primeiroCampo = document.getElementById('campo_cad_0')?.value?.trim();
                
        if (!primeiroCampo) { 
             mostrarMensagem(`O campo "${headers[0]}" é obrigatório!`, "error"); 
             return; 
         }
                
        const novaRow = [];
        for(let i=0; i<headers.length; i++) {
            const val = document.getElementById(`campo_cad_${i}`)?.value?.trim() || "";
            novaRow.push(val);
        }
                
        const rows = sheetData[currentTabId].slice(1);
        const indexExistente = rows.findIndex(r => r && r[0] && r[0].toString().toLowerCase() === primeiroCampo.toLowerCase());
                
        if (indexExistente !== -1) {
            sheetData[currentTabId][indexExistente + 1] = novaRow;
            mostrarMensagem("Item atualizado!", "success");
        } else {
            sheetData[currentTabId].push(novaRow);
            mostrarMensagem("Item adicionado!", "success");
        }
                
        ordenarMusicas(currentTabId);
        renderizarInterface();
                
        for(let i=0; i<headers.length; i++) {
            const el = document.getElementById(`campo_cad_${i}`);
            if(el) el.value = "";
        }
                
        await enviarMusicaParaGoogle(novaRow);
    };

    window.preencherFormParaEditar = function(rowIdx) {
        const rowData = sheetData[currentTabId][rowIdx + 1];
        for (let i = 0; i < rowData.length; i++) {
            const el = document.getElementById(`campo_cad_${i}`);
            if (el) {
                const val = rowData[i];
                el.value = (val !== undefined && val !== null) ? val : '';
            }
        }
        document.getElementById('campo_cad_0').focus();
        mostrarMensagem("Dados copiados para edição!", "info");
    };

    window.excluirRegistro = async function(rowIdx) {
        if (confirm("Remover este registro permanentemente?")) {
            sheetData[currentTabId].splice(rowIdx + 1, 1);
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem("Item removido", "info");
            await enviarTabelaCompletaParaGoogle();
        }
    };

    window.renomearLivroAtual = async function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        if (!tab) { mostrarMensagem("Nenhum método selecionado!", "error"); return; }
        
        const novoNome = prompt(`Digite o novo nome para o método "${tab.nome}":`, tab.nome);
        if (novoNome && novoNome.trim() && novoNome.trim() !== tab.nome) {
            tab.nome = novoNome.trim();
            
            await fetch(`${webAppUrl}?acao=criarAba&nomeAba=${encodeURIComponent(tab.nome)}&t=${Date.now()}`);
            for (const row of sheetData[currentTabId]) {
                await enviarMusicaParaGoogle(row, tab.nome);
            }
            
            ordenarLivrosAutomaticamente();
            
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem("Método renomeado e ordenado!", "success");
        }
    };

    window.excluirLivroAtual = async function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        if (!tab) { mostrarMensagem("Nenhum método selecionado!", "error"); return; }
        
        if (confirm(`⚠️ ATENÇÃO: Deseja realmente excluir permanentemente o método "${tab.nome}" e TODOS os seus dados salvos?`)) {
            await fetch(`${webAppUrl}?acao=deletarAba&nomeAba=${encodeURIComponent(tab.nome)}&t=${Date.now()}`);
            
            customTabs = customTabs.filter(t => t.id !== currentTabId);
            delete sheetData[currentTabId];
            
            customTabs = ordenarLivros(customTabs);
            
            saveAllToLocal();
            
            if (customTabs.length > 0) {
                currentTabId = customTabs[0].id;
            } else {
                currentTabId = null;
            }
            
            renderTabs();
            renderizarInterface();
            mostrarMensagem("Método removido e lista reordenada!", "success");
        }
    };

    window.adicionarNovaColuna = async function() {
        const nomeColuna = prompt("Digite o nome da nova coluna (Ex: Observação, Página, Acordes):");
        if (nomeColuna && nomeColuna.trim()) {
            const tab = customTabs.find(t => t.id === currentTabId);
            sheetData[currentTabId][0].push(nomeColuna.trim());
            tab.colunas.push(nomeColuna.trim());
            for (let i = 1; i < sheetData[currentTabId].length; i++) {
                sheetData[currentTabId][i].push("");
            }
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem(`Coluna "${nomeColuna}" criada!`, "info");
            await enviarMusicaParaGoogle(sheetData[currentTabId][0]);
        }
    };

    window.editarCabecalhos = async function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        const headers = sheetData[currentTabId][0];
        
        let msg = "Escolha qual coluna deseja renomear:\n\n";
        for (let idx = 0; idx < headers.length; idx++) {
            if (idx > 0) msg += `${idx} - ${headers[idx]}\n`;
        }
        
        const escolha = prompt(msg + "\nDigite o número da coluna:");
        const idxEscolhido = parseInt(escolha, 10);
        
        if (!isNaN(idxEscolhido) && idxEscolhido > 0 && idxEscolhido < headers.length) {
            const novoNome = prompt(`Digite o novo nome para a coluna "${headers[idxEscolhido]}":`);
            if (novoNome && novoNome.trim()) {
                headers[idxEscolhido] = novoNome.trim();
                tab.colunas[idxEscolhido] = novoNome.trim();
                saveAllToLocal();
                renderizarInterface();
                mostrarMensagem("Cabeçalho alterado!", "info");
                await enviarMusicaParaGoogle(sheetData[currentTabId][0]);
            }
        }
    };

    window.deletarUltimaColuna = async function() {
        const headers = sheetData[currentTabId][0];
        const tab = customTabs.find(t => t.id === currentTabId);
        if (headers.length <= 1) {
            mostrarMensagem("Você não pode deletar a coluna principal.", "error");
            return;
        }
        if (confirm(`Aviso: Remover a coluna "${headers[headers.length - 1]}" apagará os dados dela. Continuar?`)) {
            for (let i = 0; i < sheetData[currentTabId].length; i++) {
                sheetData[currentTabId][i].pop();
            }
            tab.colunas.pop();
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem("Coluna removida!", "info");
            await enviarMusicaParaGoogle(sheetData[currentTabId][0]);
        }
    };

    window.forcarAtualizacao = async function() {
        mostrarLoading(true, "Forçando atualização...");
        await buscarDoGoogleBackground();
        await carregarAbasDoGoogle();
        mostrarLoading(false);
        mostrarMensagem("✅ Atualização concluída!", "success");
    };

    function atualizarStatusSync(estado) {
        const indicator = document.getElementById('syncIndicator');
        const text = document.getElementById('syncText');
        
        if (estado === 'atualizando') {
            indicator.className = 'sync-indicator';
            text.innerHTML = '🔄 Sincronizando...';
        } else if (estado === 'sincronizado') {
            indicator.className = 'sync-indicator synced';
            text.innerHTML = '✓ Sincronizado';
            setTimeout(() => {
                if (text.innerHTML === '✓ Sincronizado') {
                    text.innerHTML = 'Pronto';
                }
            }, 3000);
        } else {
            indicator.className = 'sync-indicator synced';
            text.innerHTML = '✓ Pronto';
        }
    }

    function mostrarLoading(show, texto = "Sincronizando...") { 
        const loadingDiv = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        if (loadingText) loadingText.textContent = texto;
        loadingDiv.classList.toggle('active', show); 
    }
    
    function mostrarMensagem(msg, tipo, tempo = 3000) {
        const div = document.createElement('div');
        div.className = `message ${tipo}`;
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), tempo);
    }

    window.abrirModalNovaAba = async function() {
        const nome = prompt("Nome do novo Método / Livro:");
        if(nome && nome.trim()){
            const newId = "tab_" + Date.now();
            customTabs.push({ id: newId, nome: nome.trim(), colunas: ["📚 Música/Lição"] });
            sheetData[newId] = [["📚 Música/Lição"]];
            
            customTabs = ordenarLivros(customTabs);
            currentTabId = newId;
            
            saveAllToLocal();
            renderTabs();
            renderizarInterface();
            mostrarMensagem(`Método "${nome}" criado e ordenado!`, "success");
            
            await fetch(`${webAppUrl}?acao=criarAba&nomeAba=${encodeURIComponent(nome)}&t=${Date.now()}`);
            await enviarMusicaParaGoogle(sheetData[currentTabId][0]);
        }
    };

    // INICIALIZAÇÃO
    loadFromLocalStorage();
    renderTabs();
    renderizarInterface();
    
    setTimeout(() => {
        carregarAbasDoGoogle();
        buscarDoGoogleBackground();
    }, 100);
    
</script>
</body>
</html>
