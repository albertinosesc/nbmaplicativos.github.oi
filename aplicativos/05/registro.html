<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estudo Musical - Google Sheets</title>
    <style>
        /* (Mantenha os mesmos estilos do código anterior) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .config-bar {
            background: #f39c12; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .config-bar input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .config-bar button { background: #2c3e50; padding: 8px 15px; color: white; border: none; cursor: pointer; }
        .status-bar { background: #27ae60; color: white; padding: 8px 20px; display: flex; justify-content: space-between; }
        .tabs { display: flex; background: #34495e; padding: 0 10px; gap: 5px; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; color: white; padding: 12px 20px; cursor: pointer; }
        .tab-btn.active { background: white; color: #2c3e50; border-radius: 8px 8px 0 0; }
        .content { padding: 30px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #34495e; color: white; }
        .message { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 8px; z-index: 1000; }
        .message.success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .message.error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .loading { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; justify-content: center; align-items: center; }
        .loading.active { display: flex; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; background: white; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .delete-btn, .edit-btn { padding: 5px 10px; font-size: 12px; margin: 2px; }
        .delete-btn { background: #e74c3c; }
        .edit-btn { background: #3498db; }
        .checklist-checkbox { width: 20px; height: 20px; cursor: pointer; }
        .info-box { background: #ecf0f1; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Sistema de Estudo Musical</h1>
            <p>Organize seus estudos de música integrado com Google Sheets</p>
        </div>
        <div class="config-bar">
            <span>🔗 URL do Web App:</span>
            <input type="text" id="webAppUrl" placeholder="Cole a URL do Google Apps Script aqui">
            <button onclick="salvarUrl()">💾 Salvar URL</button>
            <button onclick="carregarDados()" style="background: #27ae60;">🔄 Buscar Dados</button>
        </div>
        <div class="status-bar" id="statusBar">
            <span>Modo: <span id="statusModo">Local</span></span>
            <span>✅ Ordenação automática</span>
        </div>
        <div class="tabs" id="tabs"></div>
        <div class="content"><div id="tab-contents"></div></div>
    </div>
    <div id="loading" class="loading"><div class="spinner"></div></div>
    <div id="modal" class="modal"><div class="modal-content"><div class="modal-header"><h2>Editar</h2><span onclick="fecharModal()" style="cursor:pointer">&times;</span></div><div id="modalBody"></div></div></div>

    <script>
        const SHEETS_CONFIG = {
            'musica': { nome: '🎵 Música', headers: ['Nº', 'Música', 'Tonalidades', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number',required:true},{name:'musica',label:'Música',type:'text',required:true},{name:'tonalidades',label:'Tonalidades',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'harmonia': { nome: '🎹 Harmonia', headers: ['Nº', 'Acorde/Forma', 'Grau', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number'},{name:'acorde_forma',label:'Acorde/Forma',type:'text'},{name:'grau',label:'Grau',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'ritmo': { nome: '🥁 Ritmo', headers: ['Nº', 'Ritmo', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number'},{name:'ritmo',label:'Ritmo',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'acorde_violao': { nome: '🎸 Acorde Violão', headers: ['Nº', 'Forma', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number'},{name:'forma',label:'Forma',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'acorde_piano': { nome: '🎹 Acorde Piano', headers: ['Nº', 'Forma', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number'},{name:'forma',label:'Forma',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'teoria': { nome: '📚 Teoria', headers: ['Nº', 'Teoria', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number'},{name:'teoria',label:'Teoria',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] }
        };

        let currentSheet = 'musica', sheetData = {}, editIndex = null;
        let webAppUrl = localStorage.getItem('webAppUrl') || '';

        if (webAppUrl) {
            document.getElementById('webAppUrl').value = webAppUrl;
            document.getElementById('statusModo').textContent = 'Online';
        }

        window.salvarUrl = function() {
            webAppUrl = document.getElementById('webAppUrl').value;
            localStorage.setItem('webAppUrl', webAppUrl);
            document.getElementById('statusModo').textContent = webAppUrl ? 'Online' : 'Local';
            if(webAppUrl) carregarDados();
        };

        function ordenarPorNumero(dados) {
            if (!dados || dados.length <= 1) return dados;
            const headers = dados[0], rows = dados.slice(1);
            rows.sort((a,b) => (parseInt(a[0])||0) - (parseInt(b[0])||0));
            return [headers, ...rows];
        }

        async function carregarDados() {
            if (!webAppUrl) { mostrarMensagem('Configure a URL!', 'error'); return; }
            mostrarLoading(true);
            try {
                const url = `${webAppUrl}?aba=${currentSheet}&t=${Date.now()}`;
                const response = await fetch(url);
                const resultado = await response.json();
                if (resultado.success && resultado.dados) {
                    sheetData[currentSheet] = ordenarPorNumero(resultado.dados);
                    renderizarTabela();
                    mostrarMensagem(`✅ ${resultado.dados.length-1} registros carregados!`, 'success');
                } else throw new Error('Erro ao buscar');
            } catch (error) {
                mostrarMensagem('Erro CORS! Use um servidor local ou a extensão Live Server.', 'error');
                if (!sheetData[currentSheet]) sheetData[currentSheet] = [SHEETS_CONFIG[currentSheet].headers];
                renderizarTabela();
            } finally { mostrarLoading(false); }
        }

        async function adicionarDados(dados) {
            if (!webAppUrl) { mostrarMensagem('Configure a URL primeiro!', 'error'); return; }
            mostrarLoading(true);
            try {
                const dadosProcessados = dados.map(v => v === true ? '✓' : (v === false ? '✗' : v || ''));
                const response = await fetch(webAppUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ aba: currentSheet, dados: dadosProcessados })
                });
                const resultado = await response.json();
                if (resultado.success) {
                    await carregarDados();
                    mostrarMensagem('✅ Salvo e ordenado!', 'success');
                } else throw new Error();
            } catch (error) {
                mostrarMensagem('Erro ao salvar', 'error');
            } finally { mostrarLoading(false); }
        }

        function renderizarTabela() {
            const config = SHEETS_CONFIG[currentSheet];
            const dados = sheetData[currentSheet] || [config.headers];
            const headers = dados[0], rows = dados.slice(1);
            const html = `<div class="tab-content active">
                <h2>📝 Adicionar ${config.nome}</h2>
                <form id="formDados">${config.fields.map(f => `<div class="form-group">${f.type==='checkbox'?`<div class="checkbox-group"><input type="checkbox" id="${f.name}" name="${f.name}"><label>${f.label}</label></div>`:`<label>${f.label}:</label><input type="${f.type}" id="${f.name}" name="${f.name}" ${f.required?'required':''}>`}</div>`).join('')}<button type="submit">💾 Salvar</button></form>
                <div style="margin-top:40px"><h3>📋 Lista (Ordenada)</h3><div style="overflow-x:auto"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}<th>Ações</th></tr></thead><tbody>${rows.length?rows.map((row,idx)=>`<tr>${row.map((c,ci)=>headers[ci]==='Checklist'?`<td class="checklist-cell"><input type="checkbox" class="checklist-checkbox" ${c==='✓'?'checked':''} onchange="atualizarChecklist(${idx},this.checked)"></td>`:`<td>${c||'-'}</td>`).join('')}<td><button class="edit-btn" onclick="editarRegistro(${idx})">✏️</button><button class="delete-btn" onclick="deletarLinha(${idx})">🗑️</button></td></tr>`).join(''):`<tr><td colspan="${headers.length+1}">Nenhum dado</td></tr>`}</tbody></table></div></div>
                <div class="info-box">📌 Os dados são automaticamente ordenados pelo número (Nº) na planilha!</div>
            </div>`;
            document.getElementById('tab-contents').innerHTML = html;
            document.getElementById('formDados')?.addEventListener('submit', async e => {
                e.preventDefault();
                const valores = config.fields.map(f => f.type==='checkbox' ? document.getElementById(f.name).checked : document.getElementById(f.name).value);
                await adicionarDados(valores);
                e.target.reset();
            });
        }

        window.editarRegistro = function(idx) { /* Implementar edição */ mostrarMensagem('Edição em breve', 'success'); };
        window.deletarLinha = async function(idx) { if(confirm('Deletar?')) { /* Implementar delete */ await carregarDados(); } };
        window.atualizarChecklist = async function(idx,checked) { /* Implementar update */ };
        window.mudarAba = async function(sheet) { currentSheet=sheet; renderizarAbas(); if(webAppUrl) await carregarDados(); else renderizarTabela(); };
        function renderizarAbas() { document.getElementById('tabs').innerHTML = Object.keys(SHEETS_CONFIG).map(k=>`<button class="tab-btn ${k===currentSheet?'active':''}" onclick="mudarAba('${k}')">${SHEETS_CONFIG[k].nome}</button>`).join(''); }
        function mostrarLoading(show) { document.getElementById('loading').classList.toggle('active', show); }
        function mostrarMensagem(msg,type) { const d=document.createElement('div'); d.className=`message ${type}`; d.innerHTML=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),3000); }
        function fecharModal() { document.getElementById('modal').classList.remove('active'); }
        
        renderizarAbas();
        if(!sheetData[currentSheet]) sheetData[currentSheet]=[SHEETS_CONFIG[currentSheet].headers];
        renderizarTabela();
        if(webAppUrl) setTimeout(carregarDados,500);
    </script>
</body>
</html>
