<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estudo Musical - Google Sheets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .config-bar {
            background: #f39c12; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .config-bar input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; min-width: 250px; }
        .config-bar button { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .status-bar { background: #27ae60; color: white; padding: 8px 20px; display: flex; justify-content: space-between; font-size: 14px; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #2ecc71; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .tabs { display: flex; background: #34495e; padding: 0 10px; gap: 5px; overflow-x: auto; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; color: white; padding: 12px 20px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .tab-btn:hover { background: rgba(255,255,255,0.1); }
        .tab-btn.active { background: white; color: #2c3e50; border-radius: 8px 8px 0 0; }
        .content { padding: 30px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        input, textarea, select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input { width: 20px; height: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #34495e; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:hover { background: #f0f0f0; }
        .message { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s; max-width: 350px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .message.success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .message.error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .loading { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; justify-content: center; align-items: center; }
        .loading.active { display: flex; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; background: white; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .delete-btn, .edit-btn { padding: 5px 10px; font-size: 12px; margin: 0; }
        .delete-btn { background: #e74c3c; }
        .delete-btn:hover { background: #c0392b; }
        .edit-btn { background: #3498db; }
        .edit-btn:hover { background: #2980b9; }
        .checklist-cell { text-align: center; }
        .checklist-checkbox { width: 20px; height: 20px; cursor: pointer; }
        .info-box { background: #ecf0f1; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 14px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-modal { cursor: pointer; font-size: 24px; color: #7f8c8d; }
        .close-modal:hover { color: #2c3e50; }
        @media (max-width: 768px) { .content { padding: 15px; } table { font-size: 12px; } th, td { padding: 8px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Sistema de Estudo Musical</h1>
            <p>Organize seus estudos de música integrado com Google Sheets</p>
        </div>
        <div class="config-bar">
            <span style="font-weight: bold;">🔗 URL do Web App:</span>
            <input type="text" id="webAppUrl" placeholder="Cole a URL do Google Apps Script aqui">
            <button onclick="salvarUrl()">💾 Salvar URL</button>
            <button onclick="carregarDados()" style="background: #27ae60;">🔄 Buscar Dados</button>
        </div>
        <div class="status-bar">
            <span><span class="status-dot"></span> Modo: <span id="statusModo">Local</span></span>
            <span>✅ Ordenação automática por Nº</span>
        </div>
        <div class="tabs" id="tabs"></div>
        <div class="content"><div id="tab-contents"></div></div>
    </div>
    <div id="loading" class="loading"><div class="spinner"></div></div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Editar Registro</h2>
                <span class="close-modal" onclick="fecharModal()">&times;</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const SHEETS_CONFIG = {
            'musica': { nome: '🎵 Música', headers: ['Nº', 'Música', 'Tonalidades', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number',required:true},{name:'musica',label:'Música',type:'text',required:true},{name:'tonalidades',label:'Tonalidades',type:'text',required:false},{name:'checklist',label:'Checklist',type:'checkbox',required:false}] },
            'harmonia': { nome: '🎹 Harmonia', headers: ['Nº', 'Acorde/Forma', 'Grau', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number',required:true},{name:'acorde_forma',label:'Acorde/Forma',type:'text',required:true},{name:'grau',label:'Grau',type:'text',required:false},{name:'checklist',label:'Checklist',type:'checkbox',required:false}] },
            'ritmo': { nome: '🥁 Ritmo', headers: ['Nº', 'Ritmo', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number',required:true},{name:'ritmo',label:'Ritmo',type:'text',required:true},{name:'checklist',label:'Checklist',type:'checkbox',required:false}] },
            'acorde_violao': { nome: '🎸 Acorde Violão', headers: ['Nº', 'Forma', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number',required:true},{name:'forma',label:'Forma',type:'text',required:true},{name:'checklist',label:'Checklist',type:'checkbox',required:false}] },
            'acorde_piano': { nome: '🎹 Acorde Piano', headers: ['Nº', 'Forma', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number',required:true},{name:'forma',label:'Forma',type:'text',required:true},{name:'checklist',label:'Checklist',type:'checkbox',required:false}] },
            'teoria': { nome: '📚 Teoria', headers: ['Nº', 'Teoria', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number',required:true},{name:'teoria',label:'Teoria',type:'text',required:true},{name:'checklist',label:'Checklist',type:'checkbox',required:false}] }
        };

        let currentSheet = 'musica';
        let sheetData = {};
        let editIndex = null;
        let webAppUrl = localStorage.getItem('webAppUrl') || '';

        if (webAppUrl) {
            document.getElementById('webAppUrl').value = webAppUrl;
            document.getElementById('statusModo').textContent = 'Online (Google Sheets)';
        }

        window.salvarUrl = function() {
            webAppUrl = document.getElementById('webAppUrl').value;
            localStorage.setItem('webAppUrl', webAppUrl);
            if (webAppUrl) {
                document.getElementById('statusModo').textContent = 'Online (Google Sheets)';
                mostrarMensagem('URL salva! Clique em "Buscar Dados" para carregar.', 'success');
            } else {
                document.getElementById('statusModo').textContent = 'Local';
                mostrarMensagem('Modo local ativado', 'success');
            }
        };

        function ordenarPorNumero(dados) {
            if (!dados || dados.length <= 1) return dados;
            const headers = dados[0];
            const rows = dados.slice(1);
            rows.sort((a, b) => {
                const numA = parseInt(a[0]) || 0;
                const numB = parseInt(b[0]) || 0;
                return numA - numB;
            });
            return [headers, ...rows];
        }

        async function adicionarDados(dados) {
            mostrarLoading(true);
            
            try {
                const dadosProcessados = dados.map(valor => {
                    if (valor === true) return '✓';
                    if (valor === false) return '✗';
                    return valor || '';
                });
                
                if (!sheetData[currentSheet]) {
                    sheetData[currentSheet] = [SHEETS_CONFIG[currentSheet].headers];
                }
                
                sheetData[currentSheet].push(dadosProcessados);
                sheetData[currentSheet] = ordenarPorNumero(sheetData[currentSheet]);
                renderizarTabela();
                
                if (webAppUrl) {
                    const salvou = await enviarRequisicaoSalvar(dadosProcessados);
                    if (salvou) {
                        mostrarMensagem('✅ Dados salvos na planilha em ordem crescente!', 'success');
                    } else {
                        mostrarMensagem('⚠️ Erro ao salvar na planilha, mas dados salvos localmente.', 'error');
                    }
                } else {
                    mostrarMensagem('💾 Dados salvos localmente', 'success');
                }
                
                return true;
            } catch (error) {
                mostrarMensagem('Erro ao salvar dados', 'error');
                return false;
            } finally {
                mostrarLoading(false);
            }
        }

        async function enviarRequisicaoSalvar(dados) {
            if (!webAppUrl) return false;
            
            try {
                const dadosJson = JSON.stringify(dados);
                const url = `${webAppUrl}?acao=salvar&aba=${currentSheet}&dados=${encodeURIComponent(dadosJson)}&t=${Date.now()}`;
                const response = await fetch(url);
                const resultado = await response.json();
                return resultado.success;
            } catch (error) {
                console.error('Erro na requisição:', error);
                return false;
            }
        }

        async function carregarDados() {
            if (!webAppUrl) {
                mostrarMensagem('Configure a URL do Web App primeiro!', 'error');
                return;
            }
            
            mostrarLoading(true);
            
            try {
                const url = `${webAppUrl}?acao=buscar&aba=${currentSheet}&t=${Date.now()}`;
                const response = await fetch(url);
                const resultado = await response.json();
                
                if (resultado.success && resultado.dados) {
                    if (resultado.dados.length === 0) {
                        sheetData[currentSheet] = [SHEETS_CONFIG[currentSheet].headers];
                    } else {
                        sheetData[currentSheet] = ordenarPorNumero(resultado.dados);
                    }
                    renderizarTabela();
                    const qtd = resultado.dados.length - 1;
                    mostrarMensagem(`✅ ${qtd} registros carregados da planilha!`, 'success');
                } else {
                    throw new Error(resultado.error || 'Erro ao buscar dados');
                }
            } catch (error) {
                console.error('Erro:', error);
                mostrarMensagem('⚠️ Erro ao buscar dados. Verifique a URL.', 'error');
                
                if (!sheetData[currentSheet]) {
                    sheetData[currentSheet] = [SHEETS_CONFIG[currentSheet].headers];
                    renderizarTabela();
                }
            } finally {
                mostrarLoading(false);
            }
        }

        window.editarRegistro = function(index) {
            editIndex = index;
            const registro = sheetData[currentSheet][index + 1];
            const config = SHEETS_CONFIG[currentSheet];
            
            const modalHtml = `
                <form id="editForm">
                    ${config.fields.map((field, fieldIndex) => `
                        <div class="form-group">
                            ${field.type === 'checkbox' ? `
                                <div class="checkbox-group">
                                    <input type="checkbox" id="edit_${field.name}" name="${field.name}" ${registro[fieldIndex] === '✓' ? 'checked' : ''}>
                                    <label for="edit_${field.name}">${field.label}</label>
                                </div>
                            ` : `
                                <label for="edit_${field.name}">${field.label}:</label>
                                <input type="${field.type}" 
                                       id="edit_${field.name}" 
                                       name="${field.name}" 
                                       value="${registro[fieldIndex] || ''}"
                                       ${field.required ? 'required' : ''}>
                            `}
                        </div>
                    `).join('')}
                    <button type="submit">💾 Salvar Alterações</button>
                </form>
            `;
            
            document.getElementById('modalBody').innerHTML = modalHtml;
            document.getElementById('modal').classList.add('active');
            
            const editForm = document.getElementById('editForm');
            if (editForm) {
                editForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const valores = config.fields.map((field, fieldIndex) => {
                        if (field.type === 'checkbox') {
                            return document.getElementById(`edit_${field.name}`).checked;
                        }
                        return document.getElementById(`edit_${field.name}`).value;
                    });
                    
                    const dadosProcessados = valores.map(valor => {
                        if (valor === true) return '✓';
                        if (valor === false) return '✗';
                        return valor || '';
                    });
                    
                    sheetData[currentSheet][index + 1] = dadosProcessados;
                    sheetData[currentSheet] = ordenarPorNumero(sheetData[currentSheet]);
                    renderizarTabela();
                    fecharModal();
                    mostrarMensagem('✅ Registro editado com sucesso!', 'success');
                    
                    if (webAppUrl) {
                        await sincronizarPlanilhaCompleta();
                    }
                });
            }
        };

        async function sincronizarPlanilhaCompleta() {
            if (!webAppUrl) return;
            
            const dadosAtuais = sheetData[currentSheet];
            for (let i = 1; i < dadosAtuais.length; i++) {
                await enviarRequisicaoSalvar(dadosAtuais[i]);
            }
        }

        window.deletarLinha = async function(index) {
            if (confirm('Tem certeza que deseja remover este item?')) {
                if (sheetData[currentSheet] && sheetData[currentSheet].length > index + 1) {
                    sheetData[currentSheet].splice(index + 1, 1);
                    sheetData[currentSheet] = ordenarPorNumero(sheetData[currentSheet]);
                    renderizarTabela();
                    mostrarMensagem('Item removido com sucesso!', 'success');
                    
                    if (webAppUrl) {
                        await sincronizarPlanilhaCompleta();
                    }
                }
            }
        };

        window.atualizarChecklist = async function(rowIndex, checked) {
            const checkboxValue = checked ? '✓' : '✗';
            
            if (sheetData[currentSheet] && sheetData[currentSheet][rowIndex + 1]) {
                const lastIndex = sheetData[currentSheet][rowIndex + 1].length - 1;
                sheetData[currentSheet][rowIndex + 1][lastIndex] = checkboxValue;
                renderizarTabela();
                mostrarMensagem('Checklist atualizado!', 'success');
                
                if (webAppUrl) {
                    await enviarRequisicaoSalvar(sheetData[currentSheet][rowIndex + 1]);
                }
            }
        };

        window.fecharModal = function() {
            document.getElementById('modal').classList.remove('active');
            editIndex = null;
        };

        function renderizarTabela() {
            const config = SHEETS_CONFIG[currentSheet];
            const dados = sheetData[currentSheet] || [config.headers];
            const headers = dados[0] || config.headers;
            const rows = dados.slice(1);
            
            const html = `
                <div class="tab-content active">
                    <h2>📝 Adicionar ${config.nome}</h2>
                    
                    <form id="formDados">
                        ${config.fields.map(field => `
                            <div class="form-group">
                                ${field.type === 'checkbox' ? `
                                    <div class="checkbox-group">
                                        <input type="checkbox" id="${field.name}" name="${field.name}">
                                        <label for="${field.name}">${field.label}</label>
                                    </div>
                                ` : `
                                    <label for="${field.name}">${field.label}:</label>
                                    <input type="${field.type}" 
                                           id="${field.name}" 
                                           name="${field.name}" 
                                           ${field.required ? 'required' : ''}
                                           placeholder="${field.label}">
                                `}
                            </div>
                        `).join('')}
                        <button type="submit">💾 Salvar (ordem crescente automática)</button>
                    </form>
                    
                    <div style="margin-top: 40px;">
                        <h3>📋 Lista de ${config.nome} (Ordenado por Nº)</h3>
                        <div style="overflow-x: auto; max-height: 500px; overflow-y: auto;">
                            <table>
                                <thead>
                                    <tr>
                                        ${headers.map(header => `<th>${header}</th>`).join('')}
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rows.length > 0 ? rows.map((row, index) => `
                                        <tr>
                                            ${row.map((cell, cellIndex) => {
                                                if (headers[cellIndex] === 'Checklist') {
                                                    return `
                                                        <td class="checklist-cell">
                                                            <input type="checkbox" 
                                                                   class="checklist-checkbox"
                                                                   ${cell === '✓' ? 'checked' : ''}
                                                                   onchange="atualizarChecklist(${index}, this.checked)">
                                                        </td>
                                                    `;
                                                }
                                                return `<td>${cell || '-'}</td>`;
                                            }).join('')}
                                            <td>
                                                <div class="action-buttons">
                                                    <button class="edit-btn" onclick="editarRegistro(${index})">
                                                        ✏️ Editar
                                                    </button>
                                                    <button class="delete-btn" onclick="deletarLinha(${index})">
                                                        🗑️ Excluir
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('') : `
                                        <tr>
                                            <td colspan="${headers.length + 1}" style="text-align: center;">
                                                Nenhum dado encontrado. Adicione seu primeiro registro!
                                            </td>
                                        </tr>
                                    `}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="info-box">
                        📌 <strong>Ordem Automática:</strong> Os dados são sempre ordenados pelo número (Nº) em ordem crescente.
                        ${webAppUrl ? '<br>✅ <strong>Conectado à planilha:</strong> Os dados são sincronizados.' : '<br>⚠️ <strong>Modo offline:</strong> Configure a URL para sincronizar.'}
                    </div>
                </div>
            `;
            
            document.getElementById('tab-contents').innerHTML = html;
            
            const form = document.getElementById('formDados');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const valores = config.fields.map(field => {
                        if (field.type === 'checkbox') {
                            return document.getElementById(field.name).checked;
                        }
                        return document.getElementById(field.name).value;
                    });
                    
                    await adicionarDados(valores);
                    form.reset();
                    document.getElementById('numero')?.focus();
                });
            }
        }

        function renderizarAbas() {
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.innerHTML = Object.keys(SHEETS_CONFIG).map(sheetKey => `
                <button class="tab-btn ${sheetKey === currentSheet ? 'active' : ''}" 
                        onclick="mudarAba('${sheetKey}')">
                    ${SHEETS_CONFIG[sheetKey].nome}
                </button>
            `).join('');
        }

        window.mudarAba = async function(sheetKey) {
            currentSheet = sheetKey;
            renderizarAbas();
            
            if (!sheetData[currentSheet]) {
                sheetData[currentSheet] = [SHEETS_CONFIG[currentSheet].headers];
            }
            
            if (webAppUrl) {
                await carregarDados();
            } else {
                renderizarTabela();
            }
        };

        function mostrarLoading(mostrar) {
            const loadingDiv = document.getElementById('loading');
            if (mostrar) {
                loadingDiv.classList.add('active');
            } else {
                loadingDiv.classList.remove('active');
            }
        }

        function mostrarMensagem(mensagem, tipo) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${tipo}`;
            messageDiv.innerHTML = `<strong>${tipo === 'success' ? '✓' : '⚠️'}</strong> ${mensagem}`;
            document.body.appendChild(messageDiv);
            setTimeout(() => messageDiv.remove(), 3000);
        }

        function init() {
            renderizarAbas();
            
            Object.keys(SHEETS_CONFIG).forEach(sheet => {
                if (!sheetData[sheet]) {
                    sheetData[sheet] = [SHEETS_CONFIG[sheet].headers];
                }
            });
            
            renderizarTabela();
            
            if (webAppUrl) {
                setTimeout(() => {
                    carregarDados();
                }, 500);
            }
        }

        init();
        
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                fecharModal();
            }
        };
    </script>
</body>
</html>
