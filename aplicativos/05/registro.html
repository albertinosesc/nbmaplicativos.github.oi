<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Rápido - Estudo Musical</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .config-bar {
            background: #f39c12; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .config-bar input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; min-width: 250px; }
        .config-bar button { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .status-bar { background: #27ae60; color: white; padding: 8px 20px; display: flex; justify-content: space-between; font-size: 14px; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #2ecc71; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .tabs { display: flex; background: #34495e; padding: 0 10px; gap: 5px; overflow-x: auto; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; color: white; padding: 12px 20px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .tab-btn:hover { background: rgba(255,255,255,0.1); }
        .tab-btn.active { background: white; color: #2c3e50; border-radius: 8px 8px 0 0; }
        .content { padding: 30px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        input, textarea, select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .button-group { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .btn-enviar { background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); }
        .btn-buscar { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
        .btn-sincronizar { background: linear-gradient(135deg, #e67e22 0%, #f39c12 100%); }
        .btn-limpar { background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%); }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input { width: 20px; height: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #34495e; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:hover { background: #f0f0f0; }
        .message { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; z-index: 1000; animation: slideIn 0.3s; max-width: 350px; font-size: 14px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .message.success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .message.error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .message.info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
        .loading { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; justify-content: center; align-items: center; }
        .loading.active { display: flex; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; background: white; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .delete-btn, .edit-btn { padding: 5px 10px; font-size: 12px; margin: 0; }
        .delete-btn { background: #e74c3c; }
        .delete-btn:hover { background: #c0392b; }
        .edit-btn { background: #3498db; }
        .edit-btn:hover { background: #2980b9; }
        .checklist-cell { text-align: center; }
        .checklist-checkbox { width: 20px; height: 20px; cursor: pointer; }
        .info-box { background: #ecf0f1; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 13px; line-height: 1.5; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-modal { cursor: pointer; font-size: 24px; color: #7f8c8d; }
        .close-modal:hover { color: #2c3e50; }
        @media (max-width: 768px) { .content { padding: 15px; } table { font-size: 12px; } th, td { padding: 8px; } .button-group button { flex: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Sistema Rápido de Estudo Musical</h1>
            <p>Sincronização instantânea com Google Sheets</p>
        </div>
        <div class="config-bar">
            <span style="font-weight: bold;">🔗 URL do Web App:</span>
            <input type="text" id="webAppUrl" placeholder="Cole a URL do Google Apps Script aqui">
            <button onclick="salvarUrl()">💾 Salvar URL</button>
        </div>
        <div class="status-bar">
            <span><span class="status-dot"></span> Modo: <span id="statusModo">Local</span></span>
            <span>⚡ Sincronização rápida</span>
        </div>
        <div class="tabs" id="tabs"></div>
        <div class="content"><div id="tab-contents"></div></div>
    </div>
    <div id="loading" class="loading"><div class="spinner"></div></div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Editar Registro</h2>
                <span class="close-modal" onclick="fecharModal()">&times;</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const SHEETS_CONFIG = {
            'musica': { nome: '🎵 Música', headers: ['Nº', 'Música', 'Tonalidades', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number',required:true},{name:'musica',label:'Música',type:'text',required:true},{name:'tonalidades',label:'Tonalidades',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'harmonia': { nome: '🎹 Harmonia', headers: ['Nº', 'Acorde/Forma', 'Grau', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number'},{name:'acorde_forma',label:'Acorde/Forma',type:'text'},{name:'grau',label:'Grau',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'ritmo': { nome: '🥁 Ritmo', headers: ['Nº', 'Ritmo', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number'},{name:'ritmo',label:'Ritmo',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'acorde_violao': { nome: '🎸 Acorde Violão', headers: ['Nº', 'Forma', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number'},{name:'forma',label:'Forma',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'acorde_piano': { nome: '🎹 Acorde Piano', headers: ['Nº', 'Forma', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number'},{name:'forma',label:'Forma',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'teoria': { nome: '📚 Teoria', headers: ['Nº', 'Teoria', 'Checklist'],
                fields: [{name:'numero',label:'Número',type:'number'},{name:'teoria',label:'Teoria',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] }
        };

        let currentSheet = 'musica';
        let sheetData = {};
        let editIndex = null;
        let webAppUrl = localStorage.getItem('webAppUrl') || '';

        if (webAppUrl) {
            document.getElementById('webAppUrl').value = webAppUrl;
            document.getElementById('statusModo').textContent = 'Online';
        }

        window.salvarUrl = function() {
            webAppUrl = document.getElementById('webAppUrl').value;
            localStorage.setItem('webAppUrl', webAppUrl);
            document.getElementById('statusModo').textContent = webAppUrl ? 'Online' : 'Local';
            if(webAppUrl) mostrarMensagem('URL salva!', 'success');
        };

        function ordenarPorNumero(dados) {
            if (!dados || dados.length <= 1) return dados;
            const headers = dados[0], rows = dados.slice(1);
            rows.sort((a, b) => (parseInt(a[0])||0) - (parseInt(b[0])||0));
            return [headers, ...rows];
        }

        // SALVAR DADO NA PLANILHA (sem alerta de número repetido)
        async function salvarNaPlanilha(dados) {
            if (!webAppUrl) return false;
            try {
                const dadosJson = JSON.stringify(dados);
                const url = `${webAppUrl}?acao=salvar&aba=${currentSheet}&dados=${encodeURIComponent(dadosJson)}&t=${Date.now()}`;
                const response = await fetch(url);
                const resultado = await response.json();
                return resultado.success;
            } catch (error) {
                return false;
            }
        }

        // BUSCAR DADOS DA PLANILHA
        async function buscarDaPlanilha() {
            if (!webAppUrl) {
                mostrarMensagem('Configure a URL primeiro', 'error');
                return;
            }
            
            mostrarLoading(true);
            try {
                const url = `${webAppUrl}?acao=buscar&aba=${currentSheet}&t=${Date.now()}`;
                const response = await fetch(url);
                const resultado = await response.json();
                
                if (resultado.success && resultado.dados) {
                    sheetData[currentSheet] = ordenarPorNumero(resultado.dados);
                    renderizarTabela();
                    mostrarMensagem(`✅ ${resultado.dados.length-1} registros carregados`, 'success');
                }
            } catch (error) {
                mostrarMensagem('Erro ao buscar', 'error');
            } finally {
                mostrarLoading(false);
            }
        }

        // ENVIAR NOVO DADO
        window.enviarDado = async function() {
            const form = document.getElementById('formDados');
            if (!form) return;
            
            const config = SHEETS_CONFIG[currentSheet];
            const valores = config.fields.map(field => {
                if (field.type === 'checkbox') return document.getElementById(field.name).checked;
                return document.getElementById(field.name).value;
            });
            
            const numero = parseInt(valores[0]);
            if (isNaN(numero) || numero <= 0) {
                mostrarMensagem('Digite um número válido', 'error');
                return;
            }
            
            mostrarLoading(true);
            
            const dadosProcessados = valores.map(v => v === true ? '✓' : (v === false ? '✗' : v || ''));
            
            if (!sheetData[currentSheet]) sheetData[currentSheet] = [config.headers];
            sheetData[currentSheet].push(dadosProcessados);
            sheetData[currentSheet] = ordenarPorNumero(sheetData[currentSheet]);
            renderizarTabela();
            
            if (webAppUrl) await salvarNaPlanilha(dadosProcessados);
            mostrarMensagem('✅ Dado adicionado!', 'success');
            form.reset();
            document.getElementById('numero')?.focus();
            mostrarLoading(false);
        };

        // SINCRONIZAR TUDO (envia toda a tabela atual para planilha)
        window.sincronizarTudo = async function() {
            if (!webAppUrl) {
                mostrarMensagem('Configure a URL primeiro', 'error');
                return;
            }
            
            mostrarLoading(true);
            
            const dadosAtuais = sheetData[currentSheet];
            let sucessos = 0;
            
            for (let i = 1; i < dadosAtuais.length; i++) {
                const salvou = await salvarNaPlanilha(dadosAtuais[i]);
                if (salvou) sucessos++;
            }
            
            mostrarMensagem(`✅ Sincronizado: ${sucessos}/${dadosAtuais.length-1} registros`, 'success');
            mostrarLoading(false);
        };

        // LIMPAR FORMULÁRIO
        window.limparFormulario = function() {
            const form = document.getElementById('formDados');
            if (form) form.reset();
            document.getElementById('numero')?.focus();
            mostrarMensagem('Formulário limpo', 'info');
        };

        // EDITAR REGISTRO (já salva automaticamente na planilha)
        window.editarRegistro = function(index) {
            editIndex = index;
            const registro = sheetData[currentSheet][index + 1];
            const config = SHEETS_CONFIG[currentSheet];
            
            const modalHtml = `
                <form id="editForm">
                    ${config.fields.map((field, fieldIndex) => `
                        <div class="form-group">
                            ${field.type === 'checkbox' ? `
                                <div class="checkbox-group">
                                    <input type="checkbox" id="edit_${field.name}" ${registro[fieldIndex] === '✓' ? 'checked' : ''}>
                                    <label>${field.label}</label>
                                </div>
                            ` : `
                                <label>${field.label}:</label>
                                <input type="${field.type}" id="edit_${field.name}" value="${registro[fieldIndex] || ''}" required>
                            `}
                        </div>
                    `).join('')}
                    <div class="button-group"><button type="submit">💾 Salvar</button></div>
                </form>
            `;
            
            document.getElementById('modalBody').innerHTML = modalHtml;
            document.getElementById('modal').classList.add('active');
            
            document.getElementById('editForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const valores = config.fields.map((field, fieldIndex) => {
                    if (field.type === 'checkbox') return document.getElementById(`edit_${field.name}`).checked;
                    return document.getElementById(`edit_${field.name}`).value;
                });
                
                const dadosProcessados = valores.map(v => v === true ? '✓' : (v === false ? '✗' : v || ''));
                
                sheetData[currentSheet][index + 1] = dadosProcessados;
                sheetData[currentSheet] = ordenarPorNumero(sheetData[currentSheet]);
                renderizarTabela();
                fecharModal();
                
                if (webAppUrl) await salvarNaPlanilha(dadosProcessados);
                mostrarMensagem('✅ Editado e salvo na planilha!', 'success');
            });
        };

        // DELETAR REGISTRO
        window.deletarLinha = async function(index) {
            if (confirm('Remover este item?')) {
                sheetData[currentSheet].splice(index + 1, 1);
                sheetData[currentSheet] = ordenarPorNumero(sheetData[currentSheet]);
                renderizarTabela();
                
                if (webAppUrl) {
                    mostrarLoading(true);
                    for (let i = 1; i < sheetData[currentSheet].length; i++) {
                        await salvarNaPlanilha(sheetData[currentSheet][i]);
                    }
                    mostrarLoading(false);
                }
                mostrarMensagem('Item removido', 'success');
            }
        };

        // ATUALIZAR CHECKLIST
        window.atualizarChecklist = async function(rowIndex, checked) {
            const checkboxValue = checked ? '✓' : '✗';
            const lastIndex = sheetData[currentSheet][rowIndex + 1].length - 1;
            sheetData[currentSheet][rowIndex + 1][lastIndex] = checkboxValue;
            
            if (webAppUrl) await salvarNaPlanilha(sheetData[currentSheet][rowIndex + 1]);
            mostrarMensagem('Checklist atualizado', 'info');
        };

        window.fecharModal = () => document.getElementById('modal').classList.remove('active');

        function renderizarTabela() {
            const config = SHEETS_CONFIG[currentSheet];
            const dados = sheetData[currentSheet] || [config.headers];
            const headers = dados[0], rows = dados.slice(1);
            
            const html = `
                <div class="tab-content active">
                    <h2>📝 Adicionar ${config.nome}</h2>
                    <form id="formDados">
                        ${config.fields.map(field => `
                            <div class="form-group">
                                ${field.type === 'checkbox' ? `
                                    <div class="checkbox-group">
                                        <input type="checkbox" id="${field.name}">
                                        <label>${field.label}</label>
                                    </div>
                                ` : `
                                    <label>${field.label}:</label>
                                    <input type="${field.type}" id="${field.name}" ${field.required ? 'required' : ''} placeholder="${field.label}">
                                `}
                            </div>
                        `).join('')}
                    </form>
                    
                    <div class="button-group">
                        <button class="btn-enviar" onclick="enviarDado()">➕ Adicionar</button>
                        <button class="btn-buscar" onclick="buscarDaPlanilha()">📥 Buscar da Planilha</button>
                        <button class="btn-sincronizar" onclick="sincronizarTudo()">🔄 Sincronizar Tabela</button>
                        <button class="btn-limpar" onclick="limparFormulario()">🗑️ Limpar</button>
                    </div>
                    
                    <div style="margin-top: 30px;">
                        <h3>📋 Lista de ${config.nome}</h3>
                        <div style="overflow-x: auto; max-height: 500px; overflow-y: auto;">
                            <table>
                                <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}<th>Ações</th></tr></thead>
                                <tbody>
                                    ${rows.length ? rows.map((row, idx) => `
                                        <tr>
                                            ${row.map((cell, ci) => headers[ci] === 'Checklist' ? 
                                                `<td class="checklist-cell"><input type="checkbox" class="checklist-checkbox" ${cell === '✓' ? 'checked' : ''} onchange="atualizarChecklist(${idx}, this.checked)"></td>` :
                                                `<td>${cell || '-'}</td>`
                                            ).join('')}
                                            <td><div class="action-buttons"><button class="edit-btn" onclick="editarRegistro(${idx})">✏️</button><button class="delete-btn" onclick="deletarLinha(${idx})">🗑️</button></div></td>
                                        </tr>
                                    `).join('') : '<tr><td colspan="100%" style="text-align:center">Nenhum dado</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="info-box">
                        ⚡ <strong>GUIA RÁPIDO:</strong><br>
                        • <strong>Adicionar</strong> - Adiciona item na tabela e na planilha<br>
                        • <strong>Buscar da Planilha</strong> - Carrega dados da planilha<br>
                        • <strong>Sincronizar Tabela</strong> - Envia TODOS os dados da tabela para planilha<br>
                        • <strong>Editar/Excluir</strong> - Atualiza automaticamente na planilha<br>
                        • <strong>Checklist</strong> - Salva automaticamente ao clicar
                    </div>
                </div>
            `;
            document.getElementById('tab-contents').innerHTML = html;
        }

        function renderizarAbas() {
            document.getElementById('tabs').innerHTML = Object.keys(SHEETS_CONFIG).map(k => 
                `<button class="tab-btn ${k === currentSheet ? 'active' : ''}" onclick="mudarAba('${k}')">${SHEETS_CONFIG[k].nome}</button>`
            ).join('');
        }

        window.mudarAba = function(sheetKey) {
            currentSheet = sheetKey;
            renderizarAbas();
            if (!sheetData[currentSheet]) sheetData[currentSheet] = [SHEETS_CONFIG[currentSheet].headers];
            renderizarTabela();
        };

        function mostrarLoading(show) { document.getElementById('loading').classList.toggle('active', show); }
        function mostrarMensagem(msg, tipo) {
            const div = document.createElement('div');
            div.className = `message ${tipo}`;
            div.innerHTML = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }

        function init() {
            renderizarAbas();
            Object.keys(SHEETS_CONFIG).forEach(s => { if (!sheetData[s]) sheetData[s] = [SHEETS_CONFIG[s].headers]; });
            renderizarTabela();
        }
        init();
        window.onclick = (e) => { if (e.target === document.getElementById('modal')) fecharModal(); };
    </script>
</body>
</html>
