<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Rápido - Estudo Musical</title>
    <style>
        /* CSS original mantido com melhorias de scroll */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .config-bar {
            background: #f39c12; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .config-bar input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; min-width: 250px; }
        .config-bar button { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .status-bar { background: #27ae60; color: white; padding: 8px 20px; display: flex; justify-content: space-between; font-size: 14px; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #2ecc71; margin-right: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .tabs { display: flex; background: #34495e; padding: 0 10px; gap: 5px; overflow-x: auto; white-space: nowrap; }
        .tab-btn { background: transparent; border: none; color: white; padding: 15px 20px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .tab-btn:hover { background: rgba(255,255,255,0.1); }
        .tab-btn.active { background: white; color: #2c3e50; border-radius: 8px 8px 0 0; font-weight: bold; }
        .content { padding: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #2c3e50; }
        input, textarea, select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        .button-group { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-enviar { background: #27ae60; color: white; padding: 12px 25px; }
        .btn-buscar { background: #3498db; color: white; padding: 12px 20px; }
        .btn-sincronizar { background: #e67e22; color: white; padding: 12px 20px; }
        .btn-limpar { background: #95a5a6; color: white; padding: 12px 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #34495e; color: white; position: sticky; top: 0; }
        .checklist-cell { text-align: center; width: 80px; }
        .checklist-checkbox { width: 22px; height: 22px; cursor: pointer; }
        .message { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; z-index: 2000; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .success { background: #27ae60; } .error { background: #e74c3c; } .info { background: #3498db; }
        .loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; color: white; }
        .loading.active { display: flex; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1001; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; }
        .action-buttons { display: flex; gap: 5px; }
        .edit-btn { background: #3498db; color: white; padding: 5px 8px; }
        .delete-btn { background: #e74c3c; color: white; padding: 5px 8px; }
    </style>
</head>


<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Sistema de Estudo Musical</h1>
            <p>Sincronização Direta com Google Sheets</p>
        </div>
        
        <!-- Barra de Configuração da URL -->
        <div class="config-bar">
            <span>🔗 <strong>URL do Web App:</strong></span>
            <input type="text" id="webAppUrl" placeholder="https://script.google.com/macros/s/.../exec">
            <button type="button" onclick="salvarUrl()">💾 Salvar URL</button>
        </div>

        <!-- Barra de Status -->
        <div class="status-bar">
            <span><span class="status-dot"></span> Status: <span id="statusModo">Local</span></span>
            <span id="lastUpdate">Aguardando conexão...</span>
        </div>

        <!-- Abas de Navegação -->
        <div class="tabs" id="tabs"></div>

        <!-- Conteúdo Principal -->
        <div class="content" id="mainContent">
            <!-- O JavaScript vai preencher este espaço através da função renderizarInterface() -->
        </div>
    </div>

    <!-- Overlay de Carregamento (usado apenas em buscas pesadas) -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p id="loadingText">Sincronizando com a Planilha...</p>
    </div>

    <!-- Modal de Edição -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 id="modalTitle">✏️ Editar Registro</h2>
                <span style="cursor:pointer; font-size:28px; color:#7f8c8d;" onclick="fecharModal()">&times;</span>
            </div>
            <div id="modalBody">
                <!-- Formulário de edição gerado via JS -->
            </div>
        </div>
    </div>

    <script>
        const SHEETS_CONFIG = {
            'musica': { nome: '🎵 Música', headers: ['Nº', 'Música', 'Tonalidades', 'Checklist'], fields: [{name:'numero',label:'Número',type:'number'},{name:'musica',label:'Música',type:'text'},{name:'tonalidades',label:'Tonalidades',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'harmonia': { nome: '🎹 Harmonia', headers: ['Nº', 'Acorde/Forma', 'Grau', 'Checklist'], fields: [{name:'numero',label:'Número',type:'number'},{name:'acorde_forma',label:'Acorde/Forma',type:'text'},{name:'grau',label:'Grau',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'ritmo': { nome: '🥁 Ritmo', headers: ['Nº', 'Ritmo', 'Checklist'], fields: [{name:'numero',label:'Número',type:'number'},{name:'ritmo',label:'Ritmo',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'acorde_violao': { nome: '🎸 Violão', headers: ['Nº', 'Forma', 'Checklist'], fields: [{name:'numero',label:'Número',type:'number'},{name:'forma',label:'Forma',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'acorde_piano': { nome: '🎹 Piano', headers: ['Nº', 'Forma', 'Checklist'], fields: [{name:'numero',label:'Número',type:'number'},{name:'forma',label:'Forma',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] },
            'teoria': { nome: '📚 Teoria', headers: ['Nº', 'Teoria', 'Checklist'], fields: [{name:'numero',label:'Número',type:'number'},{name:'teoria',label:'Teoria',type:'text'},{name:'checklist',label:'Checklist',type:'checkbox'}] }
        };

        let currentSheet = 'musica';
        let sheetData = {};
        let webAppUrl = localStorage.getItem('webAppUrl') || '';

        function init() {
            if (webAppUrl) {
                document.getElementById('webAppUrl').value = webAppUrl;
                document.getElementById('statusModo').textContent = 'Online';
                buscarDaPlanilha();
            }
            renderizarAbas();
            renderizarInterface();
        }

        function renderizarAbas() {
            document.getElementById('tabs').innerHTML = Object.keys(SHEETS_CONFIG).map(k => 
                `<button class="tab-btn ${k === currentSheet ? 'active' : ''}" onclick="mudarAba('${k}')">${SHEETS_CONFIG[k].nome}</button>`
            ).join('');
        }

        function mudarAba(key) {
            currentSheet = key;
            renderizarAbas();
            renderizarInterface();
        }

        function renderizarInterface() {
            const config = SHEETS_CONFIG[currentSheet];
            if (!sheetData[currentSheet]) sheetData[currentSheet] = [config.headers];
            const rows = sheetData[currentSheet].slice(1);

            let html = `
                <h2>📝 Gerenciar ${config.nome}</h2>
                <!-- O onsubmit="return false;" evita o erro de cancelamento de envio -->
                <form id="formDados" onsubmit="return false;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;">
                        ${config.fields.map(f => `
                            <div class="form-group">
                                <label>${f.label}</label>
                                ${f.type === 'checkbox' ? 
                                    `<input type="checkbox" id="${f.name}" class="checklist-checkbox">` : 
                                    `<input type="${f.type}" id="${f.name}" placeholder="Digite o ${f.label.toLowerCase()}">`
                                }
                            </div>
                        `).join('')}
                    </div>
                    <div class="button-group">
                        <button type="button" class="btn-enviar" onclick="enviarDado()">➕ Salvar Item</button>
                        <button type="button" class="btn-buscar" onclick="buscarDaPlanilha()">📥 Atualizar Lista</button>
                        <button type="button" class="btn-limpar" onclick="document.getElementById('formDados').reset()">🗑️ Limpar</button>
                    </div>
                </form>

                <div style="overflow-x: auto; margin-top: 25px; border-radius: 10px; border: 1px solid #eee; max-height: 600px;">
                    <table>
                        <thead>
                            <tr>${config.headers.map(h => `<th>${h}</th>`).join('')} <th>Ações</th></tr>
                        </thead>
                        <tbody>
                            ${rows.length > 0 ? rows.map((row, idx) => `
                                <tr>
                                    ${row.map((cell, ci) => ci === row.length - 1 ? 
                                        `<td class="checklist-cell"><input type="checkbox" class="checklist-checkbox" ${cell === '✓' ? 'checked' : ''} onchange="atualizarChecklist(${idx}, this.checked)"></td>` :
                                        `<td>${cell || '-'}</td>`
                                    ).join('')}
                                    <td>
                                        <div class="action-buttons">
                                            <button type="button" class="edit-btn" onclick="editarRegistro(${idx})">✏️</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('') : '<tr><td colspan="100%" style="text-align:center; padding: 20px;">Nenhum dado encontrado</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
        }

        // --- LÓGICA DE ENVIO E ATUALIZAÇÃO ---
        window.enviarDado = function() {
            const config = SHEETS_CONFIG[currentSheet];
            const valores = config.fields.map(f => {
                if (f.type === 'checkbox') return document.getElementById(f.name).checked ? '✓' : '✗';
                return document.getElementById(f.name).value;
            });

            if (!valores[0]) {
                mostrarMensagem("O Número é obrigatório!", "error");
                return;
            }

            // ATUALIZAÇÃO LOCAL INSTANTÂNEA
            if (!sheetData[currentSheet]) sheetData[currentSheet] = [config.headers];
            const indexExistente = sheetData[currentSheet].findIndex((r, i) => i > 0 && parseInt(r[0]) === parseInt(valores[0]));
            
            if (indexExistente !== -1) {
                sheetData[currentSheet][indexExistente] = valores;
            } else {
                sheetData[currentSheet].push(valores);
            }
            
            sheetData[currentSheet] = ordenarDados(sheetData[currentSheet]);
            renderizarInterface();
            
            // Limpa formulário e foca no primeiro campo
            document.getElementById('formDados').reset();
            document.getElementById(config.fields[0].name).focus();
            
            mostrarMensagem("Item adicionado à lista!", "info");

            // ENVIO PARA O GOOGLE EM BACKGROUND
            salvarNaPlanilha(valores).then(ok => {
                if (ok) document.getElementById('lastUpdate').textContent = "Nuvem atualizada: " + new Date().toLocaleTimeString();
            });
        };

        window.atualizarChecklist = function(rowIndex, checked) {
            const checkboxValue = checked ? '✓' : '✗';
            const rowData = sheetData[currentSheet][rowIndex + 1];
            rowData[rowData.length - 1] = checkboxValue;
            
            salvarNaPlanilha(rowData);
            mostrarMensagem("Checklist atualizado", "info");
        };

        window.editarRegistro = function(idx) {
            const registro = sheetData[currentSheet][idx + 1];
            const config = SHEETS_CONFIG[currentSheet];
            
            let html = `<form id="editForm" onsubmit="return false;">`;
            config.fields.forEach((f, i) => {
                html += `<div class="form-group">
                    <label>${f.label}</label>
                    ${f.type === 'checkbox' ? 
                        `<input type="checkbox" id="edit_${f.name}" ${registro[i] === '✓' ? 'checked' : ''} style="width:25px; height:25px;">` :
                        `<input type="${f.type}" id="edit_${f.name}" value="${registro[i]}" ${i===0 ? 'readonly style="background:#f5f5f5; color:#888;"' : ''}>`
                    }
                </div>`;
            });
            html += `<button type="button" onclick="confirmarEdicao(${idx})" class="btn-enviar" style="width:100%; margin-top:10px;">💾 Salvar Alterações</button></form>`;
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').classList.add('active');
        };

        window.confirmarEdicao = async function(idx) {
            const config = SHEETS_CONFIG[currentSheet];
            const novosValores = config.fields.map(f => {
                if (f.type === 'checkbox') return document.getElementById(`edit_${f.name}`).checked ? '✓' : '✗';
                return document.getElementById(`edit_${f.name}`).value;
            });

            fecharModal();
            sheetData[currentSheet][idx + 1] = novosValores;
            renderizarInterface();
            
            const ok = await salvarNaPlanilha(novosValores);
            if (ok) mostrarMensagem("Alteração salva na nuvem!", "success");
        };

        // --- FUNÇÕES AUXILIARES ---
        async function salvarNaPlanilha(dadosLinha) {
            if (!webAppUrl) return false;
            try {
                const url = `${webAppUrl}?acao=salvar&aba=${currentSheet}&dados=${encodeURIComponent(JSON.stringify(dadosLinha))}`;
                const response = await fetch(url);
                const result = await response.json();
                return result.success;
            } catch (e) { return false; }
        }

        async function buscarDaPlanilha() {
            if (!webAppUrl) { mostrarMensagem("Configure a URL primeiro!", "error"); return; }
            mostrarLoading(true);
            try {
                const response = await fetch(`${webAppUrl}?acao=buscar&aba=${currentSheet}&t=${Date.now()}`);
                const result = await response.json();
                if (result.success) {
                    sheetData[currentSheet] = ordenarDados(result.dados);
                    renderizarInterface();
                    mostrarMensagem("Sincronizado com a planilha!", "success");
                    document.getElementById('lastUpdate').textContent = "Última atualização: " + new Date().toLocaleTimeString();
                }
            } catch (e) { mostrarMensagem("Erro na conexão.", "error"); }
            finally { mostrarLoading(false); }
        }

        function ordenarDados(dados) {
            if (!dados || dados.length <= 1) return dados;
            const headers = dados[0];
            const rows = dados.slice(1).sort((a, b) => (parseInt(a[0]) || 0) - (parseInt(b[0]) || 0));
            return [headers, ...rows];
        }

        function salvarUrl() {
            webAppUrl = document.getElementById('webAppUrl').value.trim();
            localStorage.setItem('webAppUrl', webAppUrl);
            document.getElementById('statusModo').textContent = webAppUrl ? 'Online' : 'Local';
            if (webAppUrl) buscarDaPlanilha();
        }

        function mostrarLoading(show) { document.getElementById('loading').classList.toggle('active', show); }
        
        function mostrarMensagem(msg, tipo) {
            const div = document.createElement('div');
            div.className = `message ${tipo}`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function fecharModal() { document.getElementById('modal').classList.remove('active'); }

        window.onclick = (e) => { if (e.target.className === 'modal active') fecharModal(); };

        // Inicia o sistema
        init();
    </script>
</body>



</html>
