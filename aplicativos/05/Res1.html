<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>🎵 Meu Registro Musical</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1e3c72;
            padding: 10px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .config-bar {
            background: #f39c12;
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .config-bar input {
            flex: 1;
            padding: 12px;
            min-width: 250px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .config-bar button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            font-weight: bold;
        }
        .status-bar {
            background: #27ae60;
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .tabs-wrapper {
            background: #34495e;
            display: flex;
            padding: 10px;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
        }
        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        .tab-btn.active {
            background: white;
            color: #2c3e50;
            font-weight: bold;
        }
        .add-tab-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        .content {
            padding: 15px;
        }
        .form-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 16px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .button-group button {
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            flex: 1;
            min-width: 150px;
        }
        .btn-enviar { background: #27ae60; color: white; }
        .btn-buscar { background: #3498db; color: white; }
        
        .table-scroll {
            overflow-x: auto;
            margin-top: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 15px 10px;
            text-align: center;
            min-width: 85px;
        }
        th {
            background: #34495e;
            color: white;
            font-size: 15px;
        }
        td:first-child {
            background: #f8f9fa;
            font-weight: bold;
            text-align: left;
            min-width: 180px;
            position: sticky;
            left: 0;
            z-index: 10;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .checkbox-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            min-height: 45px;
        }
        .checkbox-item input {
            width: 26px;
            height: 26px;
            cursor: pointer;
        }
        .checkbox-item span {
            font-size: 11px;
            color: #555;
            font-weight: bold;
        }
        .action-btn {
            padding: 8px 12px;
            font-size: 16px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 5px;
            color: white;
            z-index: 3000;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .success { background: #27ae60; }
        .error { background: #e74c3c; }
        .info { background: #3498db; }
        .loading {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 4000;
            text-align: center;
            color: white;
            padding-top: 200px;
            font-size: 20px;
        }
        .loading.active { display: block; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 5000;
        }
        .modal.active { display: block; }
        .modal-content {
            background: white;
            margin: 40px auto;
            padding: 20px;
            width: 95%;
            max-width: 500px;
            border-radius: 10px;
        }
        .small-note {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎵 Meu Diário de Execuções Musicais</h1>
        <p>Versão Tablet - Toque para marcar as tonalidades</p>
    </div>
    
    <div class="config-bar">
        <input type="text" id="webAppUrl" placeholder="Cole a URL do Apps Script aqui">
        <button onclick="salvarUrl()">💾 Salvar URL</button>
        <button onclick="testarConexao()" style="background:#7f8c8d;">🔌 Testar</button>
    </div>
    
    <div class="status-bar">
        <span>Status: <span id="statusModo">Local</span></span>
        <span id="lastUpdate">📁 Dados locais ativos</span>
    </div>
    
    <div class="tabs-wrapper">
        <div class="tabs" id="tabsContainer"></div>
        <button class="add-tab-btn" onclick="abrirModalNovaAba()">➕ Nova Aba</button>
    </div>
    
    <div class="content" id="mainContent"></div>
</div>

<div id="loading" class="loading">
    <p>Sincronizando com o Google Sheets...</p>
</div>

<div id="modal" class="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
    let customTabs = [];
    let sheetData = {};
    let currentTabId = null;
    let webAppUrl = localStorage.getItem('webAppUrl') || '';
    let sincronizando = false;

    function extrairNumero(texto) {
        if (!texto) return null;
        const match = texto.toString().match(/^(\d+)/);
        if (match) return parseInt(match[1], 10);
        return null;
    }

    function ordenarMusicas(tabId) {
        if (!sheetData[tabId] || sheetData[tabId].length <= 1) return;
        
        const headers = sheetData[tabId][0];
        const rows = sheetData[tabId].slice(1);
        
        rows.sort((a, b) => {
            const nomeA = a && a[0] ? a[0].toString() : '';
            const nomeB = b && b[0] ? b[0].toString() : '';
            
            const numA = extrairNumero(nomeA);
            const numB = extrairNumero(nomeB);
            
            if (numA !== null && numB !== null) {
                if (numA !== numB) return numA - numB;
                return nomeA.localeCompare(nomeB, 'pt-br');
            }
            if (numA !== null) return -1;
            if (numB !== null) return 1;
            return nomeA.localeCompare(nomeB, 'pt-br');
        });
        
        sheetData[tabId] = [headers, ...rows];
        saveAllToLocal();
    }

    async function enviarMusicaParaGoogle(linhaCompleta) {
        if (!webAppUrl || sincronizando) return false;
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const url = `${webAppUrl}?acao=salvar&aba=${encodeURIComponent(tab.nome)}&dados=${encodeURIComponent(JSON.stringify(linhaCompleta))}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.success) {
                document.getElementById('lastUpdate').innerHTML = "☁️ Sincronizado: " + new Date().toLocaleTimeString();
                return true;
            }
        } catch(e) { console.log(e); }
        return false;
    }

    async function buscarDoGoogle() {
        if (!webAppUrl) return false;
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const url = `${webAppUrl}?acao=buscar&aba=${encodeURIComponent(tab.nome)}&t=${Date.now()}`;
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.success && result.dados && result.dados.length > 0) {
                sheetData[currentTabId] = result.dados;
                ordenarMusicas(currentTabId);
                saveAllToLocal();
                renderizarInterface();
                return true;
            }
        } catch(e) { console.log(e); }
        return false;
    }

    function initDefaultTabs() {
        return [
            { id: "piano", nome: "🎹 Piano", checklists: ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"] },
            { id: "flauta", nome: "🎼 Flauta Doce", checklists: ["C4", "C#4", "D4", "D#4", "E4", "F4", "F#4", "G4", "G#4", "A4", "A#4", "B4", "C5"] }
        ];
    }

    function loadFromLocalStorage() {
        const stored = localStorage.getItem("musical_customTabs");
        if (stored) {
            try { customTabs = JSON.parse(stored); } catch(e) { customTabs = initDefaultTabs(); }
        } else { customTabs = initDefaultTabs(); }
        
        const storedData = localStorage.getItem("musical_sheetData");
        if (storedData) {
            try { sheetData = JSON.parse(storedData); } catch(e) { sheetData = {}; }
        } else sheetData = {};
        
        customTabs.forEach(tab => {
            if (!sheetData[tab.id] || !sheetData[tab.id].length) {
                sheetData[tab.id] = [["🎵 Música", ...tab.checklists]];
            } else {
                ordenarMusicas(tab.id);
            }
        });
        saveAllToLocal();
    }

    function saveAllToLocal() {
        localStorage.setItem("musical_customTabs", JSON.stringify(customTabs));
        localStorage.setItem("musical_sheetData", JSON.stringify(sheetData));
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        if (!container) return;
        container.innerHTML = customTabs.map(tab => `
            <button class="tab-btn ${currentTabId === tab.id ? 'active' : ''}" onclick="mudarAba('${tab.id}')">
                ${tab.nome}
            </button>
        `).join('');
        if (customTabs.length > 0 && !currentTabId) currentTabId = customTabs[0].id;
    }

    function mudarAba(tabId) {
        currentTabId = tabId;
        renderTabs();
        renderizarInterface();
    }

    function renderizarInterface() {
        const tab = customTabs.find(t => t.id === currentTabId);
        if (!tab) return;
        
        const headers = sheetData[tab.id] && sheetData[tab.id][0] ? sheetData[tab.id][0] : ["🎵 Música", ...tab.checklists];
        const rows = sheetData[tab.id] ? sheetData[tab.id].slice(1) : [];
        
        let html = `
            <div class="form-card">
                <h3>➕ Adicionar Música</h3>
                <div class="form-group" style="margin-top:10px;">
                    <input type="text" id="novaMusicaNome" placeholder="Ex: 01 - Nome da Música">
                </div>
                <div class="button-group">
                    <button class="btn-enviar" onclick="adicionarMusica()">✅ Salvar Música</button>
                    <button class="btn-buscar" onclick="sincronizarDoGoogle()">📥 Trazer do Google</button>
                </div>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0; flex-wrap:wrap; gap:10px;">
                <h3 style="flex:1;">📋 Lista de Execuções</h3>
                <button onclick="adicionarTonalidade()" style="background:#27ae60; color:white; padding:10px; border-radius:5px; border:none;">➕ Add Nota</button>
            </div>
            
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            ${headers.map(h => `<th>${h}</th>`).join('')}
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.length === 0 ? `
                            <tr><td colspan="${headers.length + 1}">Nenhuma música listada localmente. Pronta para receber novos dados.</td></tr>
                        ` : rows.map((row, rowIdx) => {
                            if (!row || row.length === 0) return '';
                            return `
                            <tr>
                                <td>${row[0] || ''}</td>
                                ${headers.slice(1).map((ch, colIdx) => {
                                    const isChecked = row[colIdx+1] === '✓';
                                    return `
                                        <td>
                                            <div class="checkbox-item" onclick="alternarCheckbox(${rowIdx}, ${colIdx}, event)">
                                                <input type="checkbox" id="chk_${rowIdx}_${colIdx}" ${isChecked ? 'checked' : ''} onclick="event.stopPropagation(); alternarCheckbox(${rowIdx}, ${colIdx}, event)">
                                                <span>${ch}</span>
                                            </div>
                                        </td>
                                    `;
                                }).join('')}
                                <td>
                                    <button class="action-btn" style="background:#3498db; color:white;" onclick="editarMusica(${rowIdx})">✏️</button>
                                    <button class="action-btn" style="background:#e74c3c; color:white;" onclick="excluirMusica(${rowIdx})">🗑️</button>
                                </td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
    }

    window.alternarCheckbox = async function(rowIdx, colIdx, e) {
        const input = document.getElementById(`chk_${rowIdx}_${colIdx}`);
        if(!input) return;
        
        if (e && e.target.tagName !== 'INPUT') {
            input.checked = !input.checked;
        }

        const newValue = input.checked ? "✓" : "";
        if (sheetData[currentTabId] && sheetData[currentTabId][rowIdx + 1]) {
            sheetData[currentTabId][rowIdx + 1][colIdx + 1] = newValue;
            saveAllToLocal();
            mostrarMensagem(newValue ? '✓ Marcado' : '✗ Desmarcado', "info");
            await enviarMusicaParaGoogle(sheetData[currentTabId][rowIdx + 1]);
        }
    };

    window.adicionarMusica = async function() {
        const nome = document.getElementById('novaMusicaNome')?.value.trim();
        if (!nome) { mostrarMensagem("Insira o nome da música!", "error"); return; }
        
        const rows = sheetData[currentTabId].slice(1);
        if (rows.some(r => r && r[0] && r[0].toString().toLowerCase() === nome.toLowerCase())) {
            mostrarMensagem("Essa música já está na lista!", "error"); return;
        }
        
        const novaRow = [nome];
        const totalColunas = sheetData[currentTabId][0].length;
        for (let i = 1; i < totalColunas; i++) novaRow.push("");
        
        sheetData[currentTabId].push(novaRow);
        ordenarMusicas(currentTabId);
        renderizarInterface();
        document.getElementById('novaMusicaNome').value = "";
        mostrarMensagem("Adicionado!", "success");
        await enviarMusicaParaGoogle(novaRow);
    };

    window.editarMusica = async function(rowIdx) {
        const nomeAtual = sheetData[currentTabId][rowIdx + 1][0];
        const novoNome = prompt("Alterar nome da música:", nomeAtual);
        if (novoNome && novoNome.trim() && novoNome !== nomeAtual) {
            sheetData[currentTabId][rowIdx + 1][0] = novoNome.trim();
            ordenarMusicas(currentTabId);
            renderizarInterface();
            await enviarMusicaParaGoogle(sheetData[currentTabId][rowIdx + 1]);
        }
    };

    window.excluirMusica = async function(rowIdx) {
        if (confirm("Deseja apagar essa música?")) {
            sheetData[currentTabId].splice(rowIdx + 1, 1);
            saveAllToLocal();
            renderizarInterface();
            if (webAppUrl) await buscarDoGoogle();
        }
    };

    window.adicionarTonalidade = async function() {
        const nova = prompt("Nova nota/tom (Ex: F#):");
        if (nova && nova.trim()) {
            const tom = nova.trim();
            sheetData[currentTabId][0].push(tom);
            sheetData[currentTabId].slice(1).forEach(r => r.push(""));
            saveAllToLocal();
            renderizarInterface();
            if (webAppUrl) await sincronizarDoGoogle();
        }
    };

    window.sincronizarDoGoogle = async function() {
        if (!webAppUrl) { mostrarMensagem("Configure a URL primeiro", "error"); return; }
        mostrarLoading(true);
        const sucesso = await buscarDoGoogle();
        mostrarLoading(false);
        if (sucesso) mostrarMensagem("Dados sincronizados!", "success");
        else mostrarMensagem("Erro ao baixar dados. Verifique o nome da aba.", "error");
    };

    window.testarConexao = async function() {
        if (!webAppUrl) { mostrarMensagem("Falta a URL!", "error"); return; }
        mostrarLoading(true);
        try {
            const response = await fetch(`${webAppUrl}?acao=teste&t=${Date.now()}`);
            const result = await response.json();
            if (result.success) {
                mostrarMensagem("✅ Conexão OK!", "success");
                document.getElementById('statusModo').textContent = 'Online ✓';
            }
        } catch(e) {
            mostrarMensagem("❌ Erro de Conexão", "error");
        }
        mostrarLoading(false);
    };

    window.salvarUrl = function() {
        webAppUrl = document.getElementById('webAppUrl').value.trim();
        localStorage.setItem('webAppUrl', webAppUrl);
        mostrarMensagem("URL Salva!", "success");
        if (webAppUrl) testarConexao();
    };

    function mostrarLoading(show) { document.getElementById('loading').classList.toggle('active', show); }
    
    function mostrarMensagem(msg, tipo) {
        const div = document.createElement('div');
        div.className = `message ${tipo}`;
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
    }

    window.abrirModalNovaAba = function() {
        const nome = prompt("Nome da nova aba (Ex: Violão):");
        if(nome && nome.trim()){
            const newId = "tab_" + Date.now();
            customTabs.push({ id: newId, nome: nome.trim(), checklists: ["C","D","E"] });
            sheetData[newId] = [["🎵 Música", "C", "D", "E"]];
            saveAllToLocal();
            currentTabId = newId;
            renderTabs();
            renderizarInterface();
        }
    };

    loadFromLocalStorage();
    renderTabs();
    renderizarInterface();
    if (webAppUrl) document.getElementById('webAppUrl').value = webAppUrl;
</script>

</body>
</html>
