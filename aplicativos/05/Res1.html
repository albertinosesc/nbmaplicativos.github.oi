<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎵 Meu Registro Musical</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1e3c72;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .config-bar {
            background: #f39c12;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .config-bar input {
            flex: 1;
            padding: 8px;
            min-width: 250px;
        }
        .config-bar button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
        }
        .status-bar {
            background: #27ae60;
            color: white;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
        }
        .tabs-wrapper {
            background: #34495e;
            display: flex;
            padding: 10px;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .tabs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            flex: 1;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: white;
            color: #2c3e50;
            border-radius: 5px;
        }
        .add-tab-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
        }
        .content {
            padding: 20px;
        }
        .form-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-enviar { background: #27ae60; color: white; }
        .btn-buscar { background: #3498db; color: white; }
        .btn-enviar-nuvem { background: #e67e22; color: white; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #34495e;
            color: white;
        }
        td:first-child {
            background: #f8f9fa;
            font-weight: bold;
            text-align: left;
        }
        .checkbox-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .checkbox-item input {
            width: 20px;
            height: 20px;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 5px;
            color: white;
            z-index: 3000;
        }
        .success { background: #27ae60; }
        .error { background: #e74c3c; }
        .info { background: #3498db; }
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 4000;
            text-align: center;
            color: white;
            padding-top: 200px;
        }
        .loading.active { display: block; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 5000;
        }
        .modal.active { display: block; }
        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎵 Meu Diário de Execuções Musicais</h1>
        <p>Marque as tonalidades que você já tocou em cada música</p>
    </div>
    
    <div class="config-bar">
        <span>🔗 Google Sheets URL:</span>
        <input type="text" id="webAppUrl" placeholder="https://script.google.com/macros/s/.../exec">
        <button onclick="salvarUrl()">💾 Conectar</button>
    </div>
    
    <div class="status-bar">
        <span>Status: <span id="statusModo">Local</span></span>
        <span id="lastUpdate">📁 Dados salvos localmente</span>
    </div>
    
    <div class="tabs-wrapper">
        <div class="tabs" id="tabsContainer"></div>
        <button class="add-tab-btn" onclick="abrirModalNovaAba()">➕ Nova Aba</button>
    </div>
    
    <div class="content" id="mainContent"></div>
</div>

<div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Sincronizando...</p>
</div>

<div id="modal" class="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
    // CONFIGURAÇÃO
    let customTabs = [];
    let sheetData = {};
    let currentTabId = null;
    let webAppUrl = localStorage.getItem('webAppUrl') || '';
    let enviando = false; // Evita envio duplicado

    // ABAS PADRÃO
    function initDefaultTabs() {
        return [
            { 
                id: "piano", 
                nome: "🎹 Piano", 
                checklists: ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"]
            },
            { 
                id: "flauta", 
                nome: "🎼 Flauta Doce", 
                checklists: ["C4", "C#4", "D4", "D#4", "E4", "F4", "F#4", "G4", "G#4", "A4", "A#4", "B4", "C5", "C#5", "D5", "D#5", "E5", "F5", "F#5", "G5", "G#5", "A5", "A#5", "B5"]
            }
        ];
    }

    // FUNÇÃO DE ORDENAÇÃO ALFABÉTICA (AUTOMÁTICA)
    function ordenarMusicasAlfabeticamente(tabId) {
        if (!sheetData[tabId] || sheetData[tabId].length <= 1) return;
        
        const headers = sheetData[tabId][0];
        const rows = sheetData[tabId].slice(1);
        
        // Ordenar pelo nome da música (primeira coluna)
        rows.sort((a, b) => {
            const nomeA = (a[0] || '').toLowerCase();
            const nomeB = (b[0] || '').toLowerCase();
            return nomeA.localeCompare(nomeB, 'pt-br');
        });
        
        sheetData[tabId] = [headers, ...rows];
        saveAllToLocal();
    }

    function loadFromLocalStorage() {
        const stored = localStorage.getItem("musical_customTabs");
        if (stored) {
            try {
                customTabs = JSON.parse(stored);
                if (!customTabs.length) throw new Error();
            } catch(e) { customTabs = initDefaultTabs(); }
        } else {
            customTabs = initDefaultTabs();
        }
        
        const storedData = localStorage.getItem("musical_sheetData");
        if (storedData) sheetData = JSON.parse(storedData);
        else sheetData = {};
        
        customTabs.forEach(tab => {
            if (!sheetData[tab.id]) {
                const headers = ["🎵 Música", ...tab.checklists];
                sheetData[tab.id] = [headers];
            } else {
                // Ordenar automaticamente ao carregar
                ordenarMusicasAlfabeticamente(tab.id);
            }
        });
        saveAllToLocal();
    }

    function saveAllToLocal() {
        localStorage.setItem("musical_customTabs", JSON.stringify(customTabs));
        localStorage.setItem("musical_sheetData", JSON.stringify(sheetData));
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        if (!container) return;
        container.innerHTML = customTabs.map(tab => `
            <button class="tab-btn ${currentTabId === tab.id ? 'active' : ''}" onclick="mudarAba('${tab.id}')">
                ${tab.nome}
            </button>
        `).join('');
        if (customTabs.length > 0 && !currentTabId) currentTabId = customTabs[0].id;
    }

    function mudarAba(tabId) {
        currentTabId = tabId;
        renderTabs();
        renderizarInterface();
    }

    function renderizarInterface() {
        const tab = customTabs.find(t => t.id === currentTabId);
        if (!tab) return;
        
        // Garantir ordenação antes de exibir
        ordenarMusicasAlfabeticamente(currentTabId);
        
        const headers = sheetData[tab.id] ? sheetData[tab.id][0] : ["🎵 Música", ...tab.checklists];
        const rows = sheetData[tab.id] ? sheetData[tab.id].slice(1) : [];
        
        let html = `
            <div class="form-card">
                <h3>➕ Adicionar Música</h3>
                <div class="form-group">
                    <label>Nome da Música:</label>
                    <input type="text" id="novaMusicaNome" placeholder="Ex: Asa Branca, Imagine...">
                </div>
                <div class="button-group">
                    <button class="btn-enviar" onclick="adicionarMusica()">✅ Salvar Música</button>
                    <button class="btn-buscar" onclick="sincronizarDoGoogle()">📥 Sincronizar (Google → App)</button>
                    <button class="btn-enviar-nuvem" onclick="enviarTudoParaGoogle()">☁️ Enviar para Nuvem (App → Google)</button>
                </div>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0; flex-wrap:wrap; gap:10px;">
                <h3>📋 ${tab.nome} - Repertório</h3>
                <div>
                    <button onclick="abrirModalRenomearColunas()" style="background:#e67e22; color:white; padding:5px 10px;">✏️ Renomear Tonalidades</button>
                    <button onclick="adicionarTonalidade()" style="background:#27ae60; color:white; padding:5px 10px;">➕ Adicionar Tonalidade</button>
                </div>
            </div>
            
            <div style="overflow-x: auto;">
                <table border="1">
                    <thead>
                        <tr>
                            ${headers.map(h => `<th>${h}</th>`).join('')}
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.length === 0 ? `
                            <tr><td colspan="${headers.length + 1}" style="text-align:center;">Nenhuma música cadastrada</td></tr>
                        ` : rows.map((row, rowIdx) => `
                            <tr>
                                <td style="text-align:left;">${row[0] || '?'}</td>
                                ${tab.checklists.map((ch, colIdx) => {
                                    const isChecked = row[colIdx+1] === '✓';
                                    return `
                                        <td>
                                            <div class="checkbox-item">
                                                <input type="checkbox" class="check-musical" data-row="${rowIdx}" data-col="${colIdx}" ${isChecked ? 'checked' : ''}>
                                                <span>${ch}</span>
                                            </div>
                                        </td>
                                    `;
                                }).join('')}
                                <td>
                                    <button onclick="editarMusica(${rowIdx})" style="background:#3498db; color:white; border:none; padding:5px 10px;">✏️</button>
                                    <button onclick="excluirMusica(${rowIdx})" style="background:#e74c3c; color:white; border:none; padding:5px 10px;">🗑️</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        attachCheckboxEvents();
    }

    function attachCheckboxEvents() {
        document.querySelectorAll('.check-musical').forEach(cb => {
            cb.onchange = function() {
                const rowIdx = parseInt(this.dataset.row);
                const colIdx = parseInt(this.dataset.col);
                const newValue = this.checked ? "✓" : "";
                if (sheetData[currentTabId] && sheetData[currentTabId][rowIdx + 1]) {
                    sheetData[currentTabId][rowIdx + 1][colIdx + 1] = newValue;
                    saveAllToLocal();
                    
                    // Enviar atualização para nuvem se tiver conexão
                    if (webAppUrl && !enviando) {
                        enviarMusicaAtualizada(rowIdx);
                    }
                }
            };
        });
    }

    // Enviar música específica sem duplicar
    async function enviarMusicaAtualizada(rowIdx) {
        if (!webAppUrl || enviando) return;
        
        enviando = true;
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const nomeAba = tab.nome;
            const linhaCompleta = sheetData[currentTabId][rowIdx + 1];
            
            const url = `${webAppUrl}?acao=salvar&aba=${encodeURIComponent(nomeAba)}&dados=${encodeURIComponent(JSON.stringify(linhaCompleta))}`;
            await fetch(url);
        } catch(e) {
            console.log("Erro ao enviar:", e);
        } finally {
            enviando = false;
        }
    }

    window.adicionarMusica = async function() {
        const nome = document.getElementById('novaMusicaNome')?.value.trim();
        if (!nome) { mostrarMensagem("Digite o nome da música", "error"); return; }
        
        // Verificar se música já existe
        const rows = sheetData[currentTabId].slice(1);
        const existe = rows.some(row => row[0].toLowerCase() === nome.toLowerCase());
        
        if (existe) {
            mostrarMensagem(`"${nome}" já existe na lista!`, "error");
            return;
        }
        
        const tab = customTabs.find(t => t.id === currentTabId);
        const novaRow = [nome];
        for (let i = 0; i < tab.checklists.length; i++) novaRow.push("");
        
        sheetData[currentTabId].push(novaRow);
        
        // ORDENAR AUTOMATICAMENTE
        ordenarMusicasAlfabeticamente(currentTabId);
        
        saveAllToLocal();
        renderizarInterface();
        document.getElementById('novaMusicaNome').value = "";
        mostrarMensagem(`"${nome}" adicionado e ordenado!`, "success");
        
        // Enviar para nuvem se tiver URL
        if (webAppUrl && !enviando) {
            enviando = true;
            try {
                const tabNome = customTabs.find(t => t.id === currentTabId).nome;
                const url = `${webAppUrl}?acao=salvar&aba=${encodeURIComponent(tabNome)}&dados=${encodeURIComponent(JSON.stringify(novaRow))}`;
                await fetch(url);
                mostrarMensagem("Salvo na nuvem!", "success");
            } catch(e) {}
            finally { enviando = false; }
        }
    };

    window.editarMusica = function(rowIdx) {
        const nomeAtual = sheetData[currentTabId][rowIdx + 1][0];
        const novoNome = prompt("Editar nome da música:", nomeAtual);
        if (novoNome && novoNome.trim() && novoNome !== nomeAtual) {
            sheetData[currentTabId][rowIdx + 1][0] = novoNome.trim();
            
            // REORDENAR AUTOMATICAMENTE
            ordenarMusicasAlfabeticamente(currentTabId);
            
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem("Nome atualizado e reordenado!", "success");
            
            // Enviar para nuvem
            if (webAppUrl) {
                enviarTudoParaGoogle();
            }
        }
    };

    window.excluirMusica = function(rowIdx) {
        if (confirm("Remover esta música?")) {
            sheetData[currentTabId].splice(rowIdx + 1, 1);
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem("Música removida", "info");
            
            // Enviar atualização para nuvem
            if (webAppUrl) {
                enviarTudoParaGoogle();
            }
        }
    };

    window.adicionarTonalidade = function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        const nova = prompt("Nova tonalidade/nota:", "Ex: F#");
        if (nova && nova.trim()) {
            tab.checklists.push(nova.trim());
            const newHeaders = ["🎵 Música", ...tab.checklists];
            const oldRows = sheetData[currentTabId].slice(1);
            const newRows = oldRows.map(row => [row[0], ...tab.checklists.map(() => "")]);
            sheetData[currentTabId] = [newHeaders, ...newRows];
            
            // Manter ordenação
            ordenarMusicasAlfabeticamente(currentTabId);
            
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem(`Tonalidade "${nova}" adicionada`, "success");
        }
    };

    window.abrirModalRenomearColunas = function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        const listaAtual = tab.checklists.join(", ");
        const novaLista = prompt("Edite as tonalidades (separadas por vírgula):", listaAtual);
        
        if (novaLista && novaLista.trim()) {
            const novas = novaLista.split(",").map(s => s.trim()).filter(s => s);
            if (novas.length > 0) {
                tab.checklists = novas;
                const newHeaders = ["🎵 Música", ...novas];
                const oldRows = sheetData[currentTabId].slice(1);
                const newRows = oldRows.map(row => {
                    const newRow = [row[0]];
                    for (let i = 0; i < novas.length; i++) newRow.push("");
                    return newRow;
                });
                sheetData[currentTabId] = [newHeaders, ...newRows];
                
                ordenarMusicasAlfabeticamente(currentTabId);
                
                saveAllToLocal();
                renderizarInterface();
                mostrarMensagem("Tonalidades renomeadas!", "success");
            }
        }
    };

    window.enviarTudoParaGoogle = async function() {
        if (!webAppUrl) { mostrarMensagem("Configure a URL primeiro", "error"); return; }
        if (enviando) { mostrarMensagem("Já está enviando... aguarde", "info"); return; }
        
        mostrarLoading(true);
        enviando = true;
        
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const nomeAba = tab.nome;
            
            // Garantir ordenação antes de enviar
            ordenarMusicasAlfabeticamente(currentTabId);
            
            const allRows = sheetData[currentTabId].slice(1);
            let sucessos = 0;
            
            for (const row of allRows) {
                const url = `${webAppUrl}?acao=salvar&aba=${encodeURIComponent(nomeAba)}&dados=${encodeURIComponent(JSON.stringify(row))}`;
                const response = await fetch(url);
                const result = await response.json();
                if (result.success) sucessos++;
                await new Promise(r => setTimeout(r, 100));
            }
            mostrarMensagem(`✅ Enviados ${sucessos}/${allRows.length} itens (ordenado)`, "success");
            document.getElementById('lastUpdate').innerHTML = "☁️ Enviado: " + new Date().toLocaleTimeString();
        } catch(e) {
            mostrarMensagem("Erro ao enviar", "error");
        } finally {
            enviando = false;
            mostrarLoading(false);
        }
    };

    window.sincronizarDoGoogle = async function() {
        if (!webAppUrl) { mostrarMensagem("Configure a URL primeiro", "error"); return; }
        mostrarLoading(true);
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const nomeAba = tab.nome;
            const url = `${webAppUrl}?acao=buscar&aba=${encodeURIComponent(nomeAba)}&t=${Date.now()}`;
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.success && result.dados) {
                sheetData[currentTabId] = result.dados;
                // ORDENAR AUTOMATICAMENTE após sincronizar
                ordenarMusicasAlfabeticamente(currentTabId);
                saveAllToLocal();
                renderizarInterface();
                mostrarMensagem(`📥 Sincronizado e ordenado! ${result.dados.length - 1} músicas`, "success");
                document.getElementById('lastUpdate').innerHTML = "🔄 Sincronizado: " + new Date().toLocaleTimeString();
            } else {
                mostrarMensagem("Erro ao buscar dados", "error");
            }
        } catch(e) {
            mostrarMensagem("Erro: " + e.message, "error");
        } finally {
            mostrarLoading(false);
        }
    };

    window.abrirModalNovaAba = function() {
        const modalDiv = document.getElementById('modalContent');
        modalDiv.innerHTML = `
            <h2>🎸 Nova Aba</h2>
            <div class="form-group">
                <label>Nome da Aba:</label>
                <input type="text" id="novaAbaNome" placeholder="Ex: 🎸 Violão">
            </div>
            <div class="form-group">
                <label>Tonalidades (separadas por vírgula):</label>
                <textarea id="novaAbaChecklists" rows="4" placeholder="C, C#, D, D#, E, F, F#, G, G#, A, A#, B"></textarea>
            </div>
            <div class="button-group">
                <button class="btn-enviar" onclick="criarNovaAba()">✅ Criar</button>
                <button onclick="fecharModal()">Cancelar</button>
            </div>
        `;
        document.getElementById('modal').classList.add('active');
    };

    window.criarNovaAba = function() {
        const nome = document.getElementById('novaAbaNome')?.value.trim();
        let checkStr = document.getElementById('novaAbaChecklists')?.value.trim();
        
        if (!nome) { mostrarMensagem("Nome obrigatório", "error"); return; }
        
        let checklists = checkStr ? checkStr.split(',').map(s => s.trim()).filter(s => s) : ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        
        const newId = "tab_" + Date.now();
        customTabs.push({ id: newId, nome: nome, checklists: checklists });
        sheetData[newId] = [["🎵 Música", ...checklists]];
        saveAllToLocal();
        currentTabId = newId;
        renderTabs();
        renderizarInterface();
        fecharModal();
        mostrarMensagem(`Aba "${nome}" criada!`, "success");
    };

    window.salvarUrl = function() {
        const input = document.getElementById('webAppUrl');
        if (input) webAppUrl = input.value.trim();
        localStorage.setItem('webAppUrl', webAppUrl);
        document.getElementById('statusModo').textContent = webAppUrl ? 'Online' : 'Local';
        mostrarMensagem("URL salva!", "success");
    };

    function mostrarLoading(show) {
        const el = document.getElementById('loading');
        if (el) el.classList.toggle('active', show);
    }

    function mostrarMensagem(msg, tipo) {
        const div = document.createElement('div');
        div.className = `message ${tipo}`;
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    window.fecharModal = function() {
        document.getElementById('modal').classList.remove('active');
    };

    // INICIALIZAÇÃO
    loadFromLocalStorage();
    if (customTabs.length) currentTabId = customTabs[0].id;
    renderTabs();
    renderizarInterface();
    if (webAppUrl) document.getElementById('webAppUrl').value = webAppUrl;
</script>

</body>
</html>
