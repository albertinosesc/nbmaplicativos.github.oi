<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editor Markdown Simples</title>

<!-- Biblioteca Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* Editor */
#editor {
    width: 50%;
    padding: 15px;
    border: none;
    outline: none;
    resize: none;
    font-size: 16px;
    line-height: 1.4;
}

/* Preview */
#preview {
    width: 50%;
    padding: 15px;
    overflow-y: auto;
    background: #f5f5f5;
}

/* =========================
   CONTROLE DE ESPAÇAMENTO
   ========================= */

/* Títulos */
#preview h1,
#preview h2,
#preview h3 {
    margin-top: -10px;     /* ajuste aqui */
    margin-bottom: 4px;  /* ajuste aqui */
    line-height: 1.2;
}

/* Parágrafos */
#preview p {
    margin: 4px 0;       /* ajuste aqui */
    line-height: 1.3;
}

/* Listas */
#preview ul {
    margin: 4px 0;
    padding-left: 20px;
}

#preview li {
    margin: 2px 0;
}

/* Caso especial: títulos seguidos */
#preview h1 + h1,
#preview h2 + h2,
#preview h3 + h3 {
    margin-top: 10;
}

</style>
</head>

<body>

<textarea id="editor">
# Título 1
# Título 2
# Título 1
# Título 2
## Título 1
## Título 2

Texto normal aqui.

- Item 1
- Item 2
- Item 1
- Item 2
</textarea>

<div id="preview"></div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

function renderizar() {
    preview.innerHTML = marked.parse(editor.value);
}

editor.addEventListener('input', renderizar);

// primeira renderização
renderizar();
</script>

</body>
</html>
