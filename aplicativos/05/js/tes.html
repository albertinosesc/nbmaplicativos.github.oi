<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Teste de Cores - ABC Infantil</title>
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.2.3/dist/abcjs-basic-min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        #paper { background: white; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .abcjs-chord { transition: fill 0.3s; }
        .abcjs-lyric { transition: fill 0.3s; }
        .legenda { margin-top: 20px; padding: 10px; background: #e7f3ff; border-radius: 5px; }
        .cor-item { display: inline-block; margin-right: 15px; }
        .cor-quadrado { display: inline-block; width: 20px; height: 20px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }
    </style>
</head>
<body>
    <h2>🎨 Teste de Cores - ABC Infantil</h2>
    <div id="paper"></div>
    
    <div class="legenda">
        <strong>📌 Códigos de cores:</strong><br>
        <span class="cor-item"><span class="cor-quadrado" style="background:#FF0000;"></span> [r] = Vermelho (Dó)</span>
        <span class="cor-item"><span class="cor-quadrado" style="background:#FF6600;"></span> [o] = Laranja (Ré)</span>
        <span class="cor-item"><span class="cor-quadrado" style="background:#FFDD00;"></span> [y] = Amarelo (Mi)</span>
        <span class="cor-item"><span class="cor-quadrado" style="background:#00CC00;"></span> [g] = Verde (Fá)</span>
        <span class="cor-item"><span class="cor-quadrado" style="background:#0066FF;"></span> [b] = Azul (Sol)</span>
        <span class="cor-item"><span class="cor-quadrado" style="background:#4B0082;"></span> [i] = Índigo (Lá)</span>
        <span class="cor-item"><span class="cor-quadrado" style="background:#8B00FF;"></span> [v] = Violeta (Si)</span>
    </div>

    <script>
        // Aguardar o carregamento da biblioteca
        window.addEventListener('load', function() {
            if (typeof ABCJS === 'undefined') {
                document.getElementById("paper").innerHTML = "<p style='color:red'>❌ Biblioteca ABCJS não carregou. Verifique sua conexão com a internet.</p>";
                return;
            }

            const codigoABC = `X:1
M:4/4
L:1/4
K:C
"[b]G"C [o]D [y]E [g]F [b]G [i]A [v]B [r]c|
w: [b]Dó [o]Ré [y]Mi [g]Fá [b]Sol [i]Lá [v]Si [r]Dó`;

            function getCorPorTag(texto) {
                if (!texto) return "#000000";
                if (texto.includes("[r]")) return "#FF0000";
                if (texto.includes("[o]")) return "#FF6600";
                if (texto.includes("[y]")) return "#FFDD00";
                if (texto.includes("[g]")) return "#00CC00";
                if (texto.includes("[b]")) return "#0066FF";
                if (texto.includes("[i]")) return "#4B0082";
                if (texto.includes("[v]")) return "#8B00FF";
                return "#000000";
            }

            function aplicarCores() {
                // Cores nos acordes
                document.querySelectorAll(".abcjs-chord").forEach(el => {
                    let texto = el.textContent || "";
                    let cor = getCorPorTag(texto);
                    if (cor !== "#000000") {
                        el.style.fill = cor;
                    }
                    el.textContent = texto.replace(/\[(.*?)\]/g, "");
                });
                
                // Cores nas letras
                document.querySelectorAll(".abcjs-lyric").forEach(el => {
                    let texto = el.textContent || "";
                    let cor = getCorPorTag(texto);
                    if (cor !== "#000000") {
                        el.style.fill = cor;
                    }
                    el.textContent = texto.replace(/\[(.*?)\]/g, "");
                });
            }

            try {
                ABCJS.renderAbc("paper", codigoABC, {
                    add_classes: true,
                    staffwidth: 600,
                    responsive: 'resize'
                });
                
                setTimeout(aplicarCores, 200);
            } catch(e) {
                document.getElementById("paper").innerHTML = "<p style='color:red'>❌ Erro: " + e.message + "</p>";
            }
        });
        
    </script>
</body>
</html>
