<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Biblioteca</title>
<style>
/* ===== Estilo Global ===== */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  display: flex;
  align-items: center;
  padding: 10px 15px;
  background-color: #0056b3;
  color: white;
  font-size: 20px;
  font-weight: bold;
}

header #toggleMenu {
  font-size: 18px;
  cursor: pointer;
  background: white;
  color: #0056b3;
  border: none;
  padding: 5px 10px;
  border-radius: 4px;
  margin-right: 15px;
}

.main-content {
  flex-grow: 1;
  display: flex;
  overflow: hidden;
}

/* ===== Sidebar ===== */
#sidebar {
  width: 320px;
  padding: 10px;
  border-right: 1px solid #ccc;
  background-color: #f8f8f8;
  overflow-y: auto;
  transition: width 0.3s;
}

#sidebar.hidden {
  width: 0;
  overflow: hidden;
  padding: 0;
}

#sidebar input {
  width: 100%;
  padding: 5px;
  margin-bottom: 10px;
  box-sizing: border-box;
}

/* ===== Menu ===== */
#menu {
  list-style: none;
  padding-left: 0;
  margin: 0;
}

/* Remove padding/margem de todos os UL e LI dentro do menu */
#menu ul,
#menu li {
  margin: 0;
  padding: 0;
  list-style: none;
}

.collapsible {
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 4px 0;      /* pequeno espaçamento vertical */
  margin-bottom: 0;
}

/* ===== SUBMENU - ajuste para aproximar ===== */
.submenu {
  display: none;
  padding-left: 20px;   /* ← valor pequeno: 0 para colado, 5px para leve recuo */
  margin: 0;
}

/* Itens do menu (inclui os do submenu) */
#menu li {
  padding: 0px 18px;      /* espaçamento vertical, horizontal zero */
  cursor: pointer;
  border-bottom: 1px dashed #eee;
  display: flex;
  align-items: center;
  transition: background 0.2s;
}

#menu li:hover,
#menu li.active {
  background-color: #e0e0ff;
}

/* ===== Ícones ===== */
.icon-cat::before {
  content: "📂";
  margin-right: 6px;
}
.icon-sub::before {
  content: "📂";
  margin-right: 6px;
}
.icon-file::before {
  content: "▶";
  margin-right: 2%;
}

/* ===== Iframe ===== */
#iframeConteudo {
  flex-grow: 1;
  border: none;
}

/* ===== Âncoras ===== */
.anchor-highlight {
  animation: highlightFade 1.5s ease-out;
  border-left: 4px solid #4CAF50 !important;
  padding-left: 10px !important;
}

@keyframes highlightFade {
  0%, 70% {
    background-color: #ffffcc;
  }
  100% {
    background-color: transparent;
  }
}

.anchor-status {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: #4CAF50;
  color: white;
  padding: 5px 10px;
  border-radius: 4px;
  font-size: 12px;
  z-index: 1000;
  opacity: 0.8;
}
</style>
</head>
<body>

<header>
  <button id="toggleMenu" aria-label="Abrir menu">☰ Menu</button>
  <div>
    <h1 style="margin: 0; font-size: 1.5rem;">Biblioteca NBM</h1>
    <h3 style="margin: 0; font-style: italic; font-weight: normal; font-size: 1rem;">
      Professor: Albertino Moura
    </h3>
  </div>
</header>

<div class="main-content">
  <nav id="sidebar">
    <input type="text" id="searchInput" placeholder="Buscar por nome ou tag...">
    <div id="menu"></div>
  </nav>

  <iframe id="iframeConteudo"></iframe>
</div>

<script>
let allFiles = [];
let activeListItem = null;
const iframe = document.getElementById('iframeConteudo');
const sidebar = document.getElementById('sidebar');
const toggleButton = document.getElementById('toggleMenu');
const searchInput = document.getElementById('searchInput');

// ==================== LISTA DOS ARQUIVOS JSON ====================
const ARQUIVOS_JSON = [
  'data/Duracao.json',
  'data/Melodia.json',
  'data/Generalidades.json',
  
  'data/Compositor.json'
];

// ==================== CARREGAR TODOS OS JSONs ====================
async function carregarTodosMenus() {
  try {
    const promises = ARQUIVOS_JSON.map(async (url) => {
      try {
        const res = await fetch(url);
        if (!res.ok) {
          console.warn(`⚠️ Arquivo não encontrado: ${url} (status ${res.status})`);
          return null;
        }
        const data = await res.json();
        console.log(`✅ Carregado: ${url}`, data);
        return data;
      } catch (err) {
        console.warn(`❌ Erro ao processar ${url}:`, err);
        return null;
      }
    });
    const resultados = await Promise.all(promises);
    const dadosValidos = resultados.filter(d => d !== null);
    if (dadosValidos.length === 0) {
      console.error('❌ Nenhum arquivo JSON carregado.');
      return {};
    }

    // Mescla os objetos
    const menuCompleto = {};
    dadosValidos.forEach(obj => {
      for (const [categoria, subcategorias] of Object.entries(obj)) {
        if (menuCompleto[categoria]) {
          console.warn(`Categoria duplicada: "${categoria}". Sobrescrevendo.`);
        }
        menuCompleto[categoria] = subcategorias;
      }
    });
    console.log('📋 Menu completo:', menuCompleto);
    return menuCompleto;
  } catch (err) {
    console.error('Erro fatal:', err);
    return {};
  }
}

// ==================== GERAR MENU ====================
function gerarMenu(data) {
  const menu = document.getElementById('menu');
  menu.innerHTML = '';
  allFiles = [];

  for (const cat in data) {
    const catLi = document.createElement('div');
    catLi.textContent = cat;
    catLi.className = 'collapsible icon-cat';
    menu.appendChild(catLi);

    const subMenu = document.createElement('div');
    subMenu.className = 'submenu';

    const subcats = data[cat];
    for (const sub in subcats) {
      const subLi = document.createElement('div');
      subLi.textContent = sub;
      subLi.className = 'collapsible icon-sub';
      subMenu.appendChild(subLi);

      const subSubMenu = document.createElement('ul');
      subcats[sub].forEach(fileObj => {
        const li = document.createElement('li');
        const nome = fileObj.arquivo.split('/').pop().replace('.html', '').replace(/-/g, ' ');
        li.textContent = nome;
        li.dataset.file = fileObj.arquivo;
        li.classList.add('icon-file');
        li.onclick = () => carregarArquivo(fileObj.arquivo, li);
        subSubMenu.appendChild(li);
        allFiles.push(li);
      });
      subMenu.appendChild(subSubMenu);

      subLi.onclick = () => {
        subSubMenu.style.display = subSubMenu.style.display === 'block' ? 'none' : 'block';
        subLi.classList.toggle('expanded');
      };
    }
    menu.appendChild(subMenu);

    catLi.onclick = () => {
      subMenu.style.display = subMenu.style.display === 'block' ? 'none' : 'block';
      catLi.classList.toggle('expanded');
    };
  }
}

// ==================== INICIALIZAR MENU ====================
async function inicializarMenu() {
  const dados = await carregarTodosMenus();
  gerarMenu(dados);
}

// ==================== CARREGAR ARQUIVO NO IFRAME ====================
function carregarArquivo(url, li) {
  if (activeListItem) activeListItem.classList.remove('active');
  li.classList.add('active');
  activeListItem = li;

  fetch(url)
    .then(res => res.text())
    .then(html => {
      iframe.srcdoc = html;
      setTimeout(() => injetarScriptDeAncoras(), 500);
    })
    .catch(err => console.error('Erro ao carregar arquivo:', err));
}

// ==================== BUSCA (apenas por nome) ====================
searchInput.addEventListener('input', e => {
  const termo = e.target.value.toLowerCase().trim();
  const menu = document.getElementById('menu');

  if (termo === '') {
    inicializarMenu();
    return;
  }

  allFiles.forEach(li => {
    const texto = li.textContent.toLowerCase();
    const match = texto.includes(termo);
    li.style.display = match ? 'flex' : 'none';

    if (match) {
      let parent = li.parentElement;
      while (parent && parent !== menu) {
        if (parent.classList.contains('submenu')) {
          parent.style.display = 'block';
          const prev = parent.previousElementSibling;
          if (prev && prev.classList.contains('collapsible')) {
            prev.classList.add('expanded');
          }
        }
        parent = parent.parentElement;
      }
    }
  });

  document.querySelectorAll('.submenu').forEach(sub => {
    const hasVisible = Array.from(sub.querySelectorAll('li')).some(li => li.style.display !== 'none');
    if (!hasVisible) {
      sub.style.display = 'none';
      const prev = sub.previousElementSibling;
      if (prev && prev.classList.contains('collapsible')) {
        prev.classList.remove('expanded');
      }
    }
  });
});

// ==================== Toggle menu lateral ====================
toggleButton.addEventListener('click', () => {
  sidebar.classList.toggle('hidden');
});

// ==================== Âncoras ====================
function injetarScriptDeAncoras() {
  if (!iframe.contentDocument) return;
  iframe.contentDocument.querySelectorAll('script[data-anchor]').forEach(s => s.remove());

  const script = document.createElement('script');
  script.dataset.anchor = "true";
  script.textContent = `
    (function() {
      if (window.__anchorFixApplied) return;
      window.__anchorFixApplied = true;
      let lastTarget = null;
      document.addEventListener('click', e => {
        let target = e.target;
        while(target && target.tagName !== 'A' && target !== document.body) target = target.parentElement;
        if(target && target.tagName === 'A' && target.hash && target.hash !== '#') {
          const id = target.hash.substring(1);
          const el = document.getElementById(id);
          if(el) {
            e.preventDefault();
            if(lastTarget) lastTarget.classList.remove('anchor-highlight');
            el.classList.add('anchor-highlight');
            lastTarget = el;
            el.scrollIntoView({behavior:'smooth', block:'start'});
            setTimeout(()=>el.classList.remove('anchor-highlight'),1500);
          }
        }
      });
    })();
  `;
  iframe.contentDocument.head.appendChild(script);
}

// ==================== INICIALIZAÇÃO ====================
inicializarMenu();
</script>

</body>
</html>
