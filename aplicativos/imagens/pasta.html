<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pasta</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<a href="index.html" style="color:#fff">⬅ Voltar</a>
</div>

<div class="main">
<h2 id="titulo"></h2>

<button onclick="exportar()">Exportar HTML</button>

<div id="galeria"></div>
</div>

<script src="dados.js"></script>

<script>
function getCategoria(){
  const url = new URLSearchParams(window.location.search);
  return url.get("cat");
}

function render(){
  const cat = getCategoria();
  document.getElementById("titulo").innerText = cat;

  const g = document.getElementById("galeria");
  g.innerHTML = "";

  lista
  .filter(i => i.categoria === cat)
  .forEach(i=>{
    g.innerHTML += `
      <div class="card">
        <img src="${i.link}">
        <p>${i.nome}</p>
        <button onclick="navigator.clipboard.writeText('${i.link}')">Copiar</button>
      </div>
    `;
  });
}

function exportar(){
  const html = document.documentElement.outerHTML;

  const blob = new Blob([html], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "pasta_exportada.html";
  a.click();
}

render();
</script>

</body>
</html>
