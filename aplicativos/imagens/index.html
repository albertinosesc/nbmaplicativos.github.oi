<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Galeria Avançado</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #007BFF;
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
}

.galeria {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

img {
  max-width: 100%;
  border-radius: 6px;
}

.nome {
  font-size: 13px;
  margin: 5px 0;
  font-weight: bold;
}

.link-box {
  display: flex;
  gap: 5px;
}

.link-box input {
  font-size: 11px;
}
</style>
</head>

<body>

<h2>Gerador de Galeria Completo</h2>

<label>Link da imagem:</label>
<input type="text" id="link">

<label>Nome da imagem:</label>
<input type="text" id="nome">

<button onclick="adicionar()">Adicionar</button>
<button onclick="exportar()">Exportar HTML</button>

<div class="galeria" id="galeria"></div>

<script>
let lista = [];

function adicionar() {
  const link = document.getElementById("link").value.trim();
  const nome = document.getElementById("nome").value.trim();

  if (!link) return alert("Adicione um link!");

  lista.push({ link, nome });
  renderizar();

  document.getElementById("link").value = "";
  document.getElementById("nome").value = "";
}

function renderizar() {
  const galeria = document.getElementById("galeria");
  galeria.innerHTML = "";

  lista.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${item.link}" loading="lazy">
      <div class="nome">${item.nome || ""}</div>
      <div class="link-box">
        <input value="${item.link}" readonly>
        <button onclick="navigator.clipboard.writeText('${item.link}')">Copiar</button>
      </div>
    `;

    galeria.appendChild(div);
  });
}

function exportar() {
  let conteudo = `
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Galeria</title>
<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
input { width:100%; padding:8px; margin-top:5px; }
button { margin-top:10px; padding:10px; background:#007BFF; color:#fff; border:none; }
.galeria {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
  gap:15px;
  margin-top:20px;
}
.card {
  background:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
}
img { max-width:100%; }
.nome { font-size:13px; font-weight:bold; margin:5px 0; }
.link-box { display:flex; gap:5px; }
.link-box input { font-size:11px; }
</style>
</head>
<body>

<h2>Galeria de Imagens</h2>

<label>Link:</label>
<input id="link">

<label>Nome:</label>
<input id="nome">

<button onclick="add()">Adicionar</button>

<div class="galeria" id="galeria">
`;

  lista.forEach(item => {
    conteudo += `
<div class="card">
  <img src="${item.link}" loading="lazy">
  <div class="nome">${item.nome || ""}</div>
  <div class="link-box">
    <input value="${item.link}" readonly>
    <button onclick="navigator.clipboard.writeText('${item.link}')">Copiar</button>
  </div>
</div>
`;
  });

  conteudo += `
</div>

<script>
function add() {
  const link = document.getElementById("link").value;
  const nome = document.getElementById("nome").value;

  const galeria = document.getElementById("galeria");

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = \`
    <img src="\${link}" loading="lazy">
    <div class="nome">\${nome}</div>
    <div class="link-box">
      <input value="\${link}" readonly>
      <button onclick="navigator.clipboard.writeText('\${link}')">Copiar</button>
    </div>
  \`;

  galeria.appendChild(div);

  document.getElementById("link").value = "";
  document.getElementById("nome").value = "";
}
<\/script>

</body>
</html>
`;

  const blob = new Blob([conteudo], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "galeria.html";
  a.click();
}
</script>

</body>
</html>
