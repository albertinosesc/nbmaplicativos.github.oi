<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Galeria</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar" id="menu"></div>

<div class="main">
<h2>Todas as imagens</h2>

<input id="busca" placeholder="Buscar..." oninput="render()">
<button onclick="exportar()">Exportar HTML</button>

<div id="galeria"></div>
</div>

<script src="dados.js"></script>

<script>
let pastaAtual = "Todas";

function getPastas(){
  return [...new Set(lista.map(i=>i.categoria))];
}

function renderMenu(){
  const m = document.getElementById("menu");
  m.innerHTML = "<h3>Pastas</h3>";

  getPastas().forEach(p=>{
    m.innerHTML += `<div><a href="pasta.html?cat=${p}" style="color:#fff">${p}</a></div>`;
  });
}

function render(){
  renderMenu();

  const busca = document.getElementById("busca").value.toLowerCase();
  const g = document.getElementById("galeria");
  g.innerHTML = "";

  lista
  .filter(i => i.nome.toLowerCase().includes(busca))
  .forEach(i=>{
    g.innerHTML += `
      <div class="card">
        <img src="${i.link}">
        <p>${i.nome}</p>
        <button onclick="navigator.clipboard.writeText('${i.link}')">Copiar link</button>
      </div>
    `;
  });
}

function exportar(){
  const html = document.documentElement.outerHTML;

  const blob = new Blob([html], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "galeria_exportada.html";
  a.click();
}

render();
</script>

</body>
</html>
