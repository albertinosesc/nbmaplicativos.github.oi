<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Play</title>
    
    <link rel="stylesheet" href="estilo.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-audio.css">
    
    <script src="acordes.js"></script>
    <script src="ritmos.js"></script>s
    <script src="app1.js" defer></script>
</head>
<body>
    <div class="container">
        <h2>N-Play Música</h2>
        <a href="tutorial.html" target="_blank" style="display:inline-block; margin-top:10px; background:#3b82f6; color:white; padding:8px 16px; border-radius:8px; text-decoration:none;">
    📖 Ver Tutorial
</a>
<br><br>

        <!-- Linha 1: Título, Compositor, Arranjador -->
        <div class="row" style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 15px;">
            <div style="flex: 1; min-width: 150px;">
                <label>Título da música</label>
                <input id="titulo" value="Música" style="width: 100%;">
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label>Compositor</label>
                <input id="compositor" value="N-Play" style="width: 100%;">
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label>Arranjador</label>
                <input id="arranjador" value="Albertino Moura" style="width: 100%;">
            </div>
        </div>

       <!-- Linha 2: RH, LH com hierarquia Categoria → Subcategoria → Style → Variação -->
<!-- Linha 2: RH e LH com hierarquia Categoria → Subcategoria → Style → Variação -->
<div class="row" style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 15px;">
    <!-- RH -->
    <div style="flex: 1; min-width: 400px; display: flex; flex-direction: column; gap: 4px;">
        <label style="font-weight: bold;">🎸 RH (Mão Direita)</label>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 120px;">
                <label style="font-size: 0.7rem;">Categoria</label>
                <select id="ritmoCategoriaRH" style="width: 100%;"></select>
            </div>
            <div style="flex: 1; min-width: 120px;">
                <label style="font-size: 0.7rem;">Subcategoria</label>
                <select id="ritmoSubcategoriaRH" style="width: 100%;"></select>
            </div>
            <div style="flex: 0.8; min-width: 120px;">
                <label style="font-size: 0.7rem;">Style</label>
                <select id="ritmoStyleRH" style="width: 100%;"></select>
            </div>
            <div style="flex: 1; min-width: 120px;">
                <label style="font-size: 0.7rem;">Variação</label>
                <select id="ritmoVariacaoRH" style="width: 100%;"></select>
            </div>
        </div>
    </div>

    <!-- LH -->
    <div style="flex: 1; min-width: 400px; display: flex; flex-direction: column; gap: 4px;">
        <label style="font-weight: bold;">🎸 LH (Mão Esquerda)</label>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 120px;">
                <label style="font-size: 0.7rem;">Categoria</label>
                <select id="ritmoCategoriaLH" style="width: 100%;"></select>
            </div>
            <div style="flex: 1; min-width: 120px;">
                <label style="font-size: 0.7rem;">Subcategoria</label>
                <select id="ritmoSubcategoriaLH" style="width: 100%;"></select>
            </div>
            <div style="flex: 0.8; min-width: 120px;">
                <label style="font-size: 0.7rem;">Style</label>
                <select id="ritmoStyleLH" style="width: 100%;"></select>
            </div>
            <div style="flex: 1; min-width: 120px;">
                <label style="font-size: 0.7rem;">Variação</label>
                <select id="ritmoVariacaoLH" style="width: 100%;"></select>
            </div>
        </div>
    </div>
</div>

        <!-- LINHA ÚNICA: Clave de Fá, BPM, Tom e Loop -->
        <div class="row" style="display: flex; gap: 20px; flex-wrap: wrap; align-items: center; background: #f3f4f6; padding: 10px 15px; border-radius: 6px; margin-bottom: 15px;">
            <!-- Clave de Fá (7 Modos) -->
            <div style="display: flex; align-items: center; gap: 8px;">
                <label style="font-weight: bold; white-space: nowrap;">🎸 Clave de Fá (7 Modos)</label>
                <select id="padraoBaixo" style="padding: 4px; width: 160px;">
                    <option value="tonica">1. Tônica Pura</option>
                    <option value="quinta">2. Quinta Justa</option>
                    <option value="oitava">3. Oitava</option>
                    <option value="triade_aberta">4. Tônica-5ª-8ª</option>
                    <option value="triade_fechada">5. Tríade Fechada</option>
                    <option value="tetrade">6. Tétrade</option>
                    <option value="baixo_acorde">7. Tríade Aberta</option>
                </select>
            </div>

            <!-- BPM -->
            <div style="display: flex; align-items: center; gap: 6px;">
                <label style="font-weight: bold;">⏱️ BPM</label>
                <input id="bpm" type="number" value="120" min="40" max="250" style="width: 70px; padding: 4px;">
            </div>

            <!-- Tom -->
            <div style="display: flex; align-items: center; gap: 6px;">
                <label style="font-weight: bold;">🔑 Tom</label>
                <input id="clave" value="C" placeholder="Ex: C, Am" style="width: 80px; padding: 4px;">
            </div>

            <!-- Loop -->
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <div style="display: flex; align-items: center; gap: 5px;">
                    <input id="loopCheck" type="checkbox">
                    <label for="loopCheck">🔄 Ativar Repetições</label>
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <label>Quantidade:</label>
                    <input id="loopVezes" type="number" value="4" min="1" max="100" style="width: 60px; padding: 4px;">
                </div>
            </div>
        </div>

        <!-- Harmonia -->
<!-- Harmonia - Cifras com múltiplas linhas e transposição à direita -->
<div style="display: flex; align-items: flex-start; gap: 15px; margin-top: 1rem; flex-wrap: wrap;">
    <div style="flex: 1; min-width: 300px;">
        <label for="cifras">🎸 Harmonia - Cifras (uma linha por compasso)</label>
        <textarea id="cifras" rows="4" style="width: 100%; font-family: monospace; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">C | Am | Dm | G |</textarea>
    </div>
    <div style="display: flex; flex-direction: column; gap: 8px; padding-top: 22px;">
        <button class="btn-transpor" onclick="alterarTom(-1)" style="width: 100%;">b Transpor -1</button>
        <button class="btn-transpor" onclick="alterarTom(1)" style="width: 100%;"># Transpor +1</button>
    </div>
</div>

        <div class="painel" style="margin-top: 1.5rem;">
    <label>🔊 Player</label>
    <div id="audio-player"></div>
    <hr style="border:0; height:1px; background:#ddd; margin:15px 0;">
    <div id="partitura"></div>
</div>

<!-- Editor ABC -->
<div style="margin-top: 1.5rem;">
    <label>📝 Código ABC (edite e clique em "Atualizar")</label>
    <textarea id="abcEditor" rows="8" style="width: 100%; font-family: monospace; font-size: 0.9rem; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
    <button id="btnAtualizarAbc" style="margin-top: 0.5rem; background: #3b82f6; color: white; border: none; padding: 6px 18px; border-radius: 6px; cursor: pointer;">🔄 Atualizar</button>
</div>
    </div>

    
</body>
</html>>
