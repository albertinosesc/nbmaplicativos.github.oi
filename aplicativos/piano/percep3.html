<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino Musical - Acordes com Arpejo</title>
<style>
    :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --left-hand: #3b82f6; --right-hand: #ef4444; }
    body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 1050px; width: 100%; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
    .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e5e7eb; margin-bottom: 20px; }
    .hand-selector { display: flex; gap: 8px; margin-bottom: 15px; background: #eef2ff; padding: 12px; border-radius: 12px; flex-wrap: wrap; }
    .hand-btn { flex: 1; min-width: 140px; padding: 10px; border: 2px solid #cbd5e1; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 13px; }
    .hand-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .hand-btn.left.active { background: var(--left-hand); border-color: var(--left-hand); }
    .hand-btn.both.active { background: #8b5cf6; border-color: #8b5cf6; }
    .hand-btn.full.active { background: #06b6d4; border-color: #06b6d4; }
    .display-mode-selector { display: flex; gap: 10px; margin: 10px 0; justify-content: center; }
    .display-mode-btn { padding: 8px 16px; border: 2px solid #cbd5e1; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .display-mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .note-picker-container { display: flex; flex-direction: column; gap: 8px; text-align: left; width: 100%; }
    .picker-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .picker-row span { font-weight: bold; font-size: 13px; min-width: 35px; }
    .note-picker { display: flex; gap: 6px; flex-wrap: wrap; }
    .note-picker label { cursor: pointer; background: white; padding: 4px 8px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 4px; transition: 0.2s; white-space: nowrap; }
    button { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .btn-toggle { background: #d1d5db; color: #374151; flex: 1; font-size: 11px; }
    .btn-toggle.active { background: var(--primary); color: white; }
    .main-btn { background: var(--primary); color: white; width: 100%; font-size: 1.1em; margin-bottom: 15px; }
    #staffCanvas { background: white; border: 1px solid #eee; border-radius: 10px; margin: 15px 0; max-width: 100%; }
    #displayText { font-size: 100px; font-weight: 900; height: 180px; line-height: 180px; display: none; }
    #fingeringDisplay { font-size: 80px; font-weight: bold; margin: 10px 0; padding: 20px 40px; border-radius: 15px; display: none; width: fit-content; margin-left: auto; margin-right: auto; }
    .both-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; padding: 30px; margin: 15px 0; display: flex; justify-content: center; align-items: center; min-height: 200px; }
    .fraction { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
    .fraction .numerator { font-size: 80px; font-weight: bold; color: var(--right-hand); background: rgba(255,255,255,0.95); padding: 20px 60px; border-radius: 20px; min-width: 180px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .fraction .denominator { font-size: 80px; font-weight: bold; color: var(--left-hand); background: rgba(255,255,255,0.95); padding: 20px 60px; border-radius: 20px; min-width: 180px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .fraction .fraction-line { font-size: 40px; font-weight: bold; color: white; margin: -10px 0; }
    .piano-wrapper { display: flex; justify-content: center; margin: 20px 0; overflow-x: auto; width: 100%; }
    #keyboard { position: relative; width: 968px; height: 180px; background: #ddd; border-radius: 5px; padding: 5px; box-sizing: content-box; }
    .white { position: absolute; width: 42px; height: 175px; background: white; border: 1px solid #999; border-radius: 0 0 5px 5px; z-index: 1; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .white:active { transform: translateY(2px); }
    .black { position: absolute; width: 24px; height: 100px; background: #222; border-radius: 0 0 3px 3px; z-index: 2; pointer-events: none; }
    .wrong { background: #555 !important; }
    .correct { background: #4ade80 !important; }
    select { padding: 6px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; font-size: 12px; }
    b { font-size: 13px; display: block; margin-bottom: 5px; }
    .both-config { background: #f1f5f9; padding: 15px; border-radius: 12px; margin: 15px 0; }
    .range-selectors { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; background: #f8fafc; padding: 12px; border-radius: 12px; margin: 10px 0; border: 1px solid #e5e7eb; }
    .range-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: white; padding: 6px 12px; border-radius: 8px; border: 1px solid #d1d5db; }
    .range-group label { font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .range-group select { min-width: 70px; }
    .range-group .hand-label { display: inline-block; width: 20px; height: 20px; border-radius: 50%; margin-right: 4px; }
    .hand-label.right { background: var(--right-hand); }
    .hand-label.left { background: var(--left-hand); }
    .finger-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .finger-btn { padding: 4px 12px; border: 2px solid #cbd5e1; background: white; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
    .finger-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .finger-btn.right.active { background: var(--right-hand); border-color: var(--right-hand); }
    .finger-btn.left.active { background: var(--left-hand); border-color: var(--left-hand); }
    .finger-group { margin-bottom: 8px; }
    .validation-status { display: flex; gap: 20px; justify-content: center; margin: 5px 0; font-weight: bold; }
    .status-right { color: var(--right-hand); }
    .status-left { color: var(--left-hand); }
    .chord-size-selectors { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 10px 0; }
    .chord-size-group { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 6px 12px; border-radius: 8px; border: 1px solid #cbd5e1; }
    .chord-size-group label { font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .chord-size-group select { min-width: 50px; }
    .speed-controls { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin: 10px 0; background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e5e7eb; }
    .speed-control { display: flex; align-items: center; gap: 10px; }
    .speed-control label { font-weight: bold; font-size: 13px; }
    .speed-control input[type="range"] { width: 150px; }
    .speed-control span { font-weight: bold; min-width: 40px; }
</style>
</head>
<body>
<div class="container">
    <h2>🎹 Treino Musical - Acordes com Arpejo</h2>

    <div class="hand-selector">
        <button class="hand-btn right active" onclick="selectMode('right')" id="modeRightBtn">✋ Apenas Direita</button>
        <button class="hand-btn left" onclick="selectMode('left')" id="modeLeftBtn">🖐️ Apenas Esquerda</button>
        <button class="hand-btn both" onclick="selectMode('both')" id="modeBothBtn">🎵 Ambas (Simultâneo)</button>
        <button class="hand-btn full" onclick="selectMode('full')" id="modeFullBtn">🎼 Ambas (Pauta Completa)</button>
    </div>

    <div class="chord-size-selectors">
        <div class="chord-size-group">
            <span class="hand-label right"></span>
            <label>Direita: 
                <select id="chordSizeRight" onchange="updateChordSizes()">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </label>
        </div>
        <div class="chord-size-group">
            <span class="hand-label left"></span>
            <label>Esquerda: 
                <select id="chordSizeLeft" onchange="updateChordSizes()">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </label>
        </div>
    </div>

    <div class="range-selectors">
        <div class="range-group">
            <span class="hand-label right"></span>
            <label>Direita: de 
                <select id="rightStart" onchange="updateRanges()"></select>
                até 
                <select id="rightEnd" onchange="updateRanges()"></select>
            </label>
        </div>
        <div class="range-group">
            <span class="hand-label left"></span>
            <label>Esquerda: de 
                <select id="leftStart" onchange="updateRanges()"></select>
                até 
                <select id="leftEnd" onchange="updateRanges()"></select>
            </label>
        </div>
    </div>

    <div id="bothConfig" class="both-config" style="display: block;">
        <div class="fingers-selector">
            <div class="finger-group">
                <b style="color: var(--right-hand);">✋ Mão Direita</b>
                <div class="finger-buttons" id="rightFingers">
                    <button class="finger-btn right active" data-finger="1">1</button>
                    <button class="finger-btn right active" data-finger="2">2</button>
                    <button class="finger-btn right active" data-finger="3">3</button>
                    <button class="finger-btn right active" data-finger="4">4</button>
                    <button class="finger-btn right active" data-finger="5">5</button>
                </div>
            </div>
            <div class="finger-group">
                <b style="color: var(--left-hand);">🖐️ Mão Esquerda</b>
                <div class="finger-buttons" id="leftFingers">
                    <button class="finger-btn left active" data-finger="5">5</button>
                    <button class="finger-btn left active" data-finger="4">4</button>
                    <button class="finger-btn left active" data-finger="3">3</button>
                    <button class="finger-btn left active" data-finger="2">2</button>
                    <button class="finger-btn left active" data-finger="1">1</button>
                </div>
            </div>
        </div>
        <small>💡 Selecione quais dedos estarão ativos.</small>
    </div>

    <div class="controls-grid">
        <div>
            <b>Exibição:</b>
            <select id="mode" onchange="updateView()">
                <option value="staff">🎼 Pentagrama</option>
                <option value="note">📝 Nome</option>
                <option value="degree">🔢 Graus</option>
            </select>
        </div>
        <div>
            <b>Esquema:</b>
            <select id="colorMode" onchange="updateView()">
                <option value="chroma">🌈 Colorido</option>
                <option value="normal">⚫ Normal</option>
            </select>
        </div>
        <div>
            <b>Teclado:</b>
            <button id="btnKeysColor" class="btn-toggle" onclick="toggleKeysColor()" style="width:100%;">🎹 Colorido: OFF</button>
        </div>
        <div>
            <b>Sons:</b>
            <div style="display:flex; gap:3px;">
                <button id="btnNoteSound" class="btn-toggle active" onclick="toggleSound('note')">🔈 Sorteio</button>
                <button id="btnPianoSound" class="btn-toggle active" onclick="toggleSound('piano')">🎹 Piano</button>
                <button id="btnErrorSound" class="btn-toggle active" onclick="toggleSound('error')">🔈 Erro</button>
            </div>
        </div>
    </div>

    <b>Notas Ativas:</b>
    <div class="note-picker-container" id="pickerContainer"></div>

    <div class="display-mode-selector">
        <button class="display-mode-btn active" onclick="toggleFingerDisplay()" id="toggleFingerBtn">🖐️ Mostrar Dedos: ON</button>
    </div>

    <!-- Controles de velocidade -->
    <div class="speed-controls">
        <div class="speed-control">
            <label>⏱️ Intervalo entre acordes:</label>
            <input type="range" id="speed" min="500" max="4000" value="2000" oninput="changeSpeed()">
            <span id="speedTxt">2.0s</span>
        </div>
        <div class="speed-control">
            <label>🎵 Velocidade do Arpejo (ms entre notas):</label>
            <input type="range" id="arpeggioSpeed" min="0" max="500" value="80" oninput="updateArpeggioSpeed()">
            <span id="arpeggioSpeedLabel">80</span>
        </div>
    </div>

    <button class="main-btn" id="startBtn" onclick="toggleAuto()">▶ INICIAR AUTOMÁTICO</button>

    <div id="validationStatus" class="validation-status" style="display: none;">
        <span class="status-right">Direita: <span id="statusRight">⬜</span></span>
        <span class="status-left">Esquerda: <span id="statusLeft">⬜</span></span>
        <span>Progresso: <span id="progressNotes">0/0</span></span>
    </div>

    <canvas id="staffCanvas" width="600" height="290"></canvas>
    <div id="displayText"></div>
    <div id="fingeringDisplay"></div>
    <div id="bothDisplay"></div>

    <div class="piano-wrapper">
        <div id="keyboard"></div>
    </div>
</div>
<script>
// ------------------------------------------------------------
// 1. MAPEAMENTO DE POSIÇÕES E FREQUÊNCIAS
// ------------------------------------------------------------
function getStepsFromC3(note) {
    const map = { 'C':0, 'D':1, 'E':2, 'F':3, 'G':4, 'A':5, 'B':6 };
    const match = note.match(/([A-G])(\d+)/);
    if (!match) return 0;
    const letter = match[1];
    const octave = parseInt(match[2]);
    const step = map[letter] || 0;
    return (octave - 3) * 7 + step;
}

function getYForNote(note, hand) {
    const steps = getStepsFromC3(note);
    if (hand === 'right') return 140 - steps * 7.5;
    else return 170 - steps * 7.5;
}

function noteToSemitones(note) {
    const map = { 'C':0, 'D':2, 'E':4, 'F':5, 'G':7, 'A':9, 'B':11 };
    const match = note.match(/([A-G])(\d+)/);
    if (!match) return 0;
    const letter = match[1];
    const octave = parseInt(match[2]);
    const semitone = map[letter] || 0;
    return semitone + (octave - 3) * 12;
}

function getFrequency(note) {
    const semitones = noteToSemitones(note);
    return 261.63 * Math.pow(2, semitones / 12);
}

const colorMap = { "C": "#FF0000", "D": "#FF7F00", "E": "#FFD700", "F": "#00FF00", "G": "#0000FF", "A": "#4B0082", "B": "#9400D3" };
function getColor(note) {
    const base = note.charAt(0);
    return colorMap[base] || "#888";
}

const allNotes = ["C2","D2","E2","F2","G2","A2","B2","C3","D3","E3","F3","G3","A3","B3","C4","D4","E4","F4","G4","A4","B4","C5"];

// ------------------------------------------------------------
// 2. ESTADO GLOBAL
// ------------------------------------------------------------
let rightData = [], leftData = [];
let currentMode = 'right';
let currentRightNotes = [];
let currentLeftNotes = [];
let validatedNotes = {};
let totalNotes = 0;
let autoTimer = null;
let sounds = { note: true, piano: true, error: true };
let keysColorida = false;
let audioCtx = null;
let showFingers = true;
let activeRightFingers = ['1','2','3','4','5'];
let activeLeftFingers = ['5','4','3','2','1'];
let pool = [];
let chordSizeRight = 2;
let chordSizeLeft = 2;
let arpeggioDelay = 80; // ms entre notas do acorde

// ------------------------------------------------------------
// 3. GERAÇÃO DE DADOS POR INTERVALO
// ------------------------------------------------------------
function generateNotesForHand(hand, startNote, endNote) {
    const startIdx = allNotes.indexOf(startNote);
    const endIdx = allNotes.indexOf(endNote);
    if (startIdx === -1 || endIdx === -1 || startIdx > endIdx) return [];
    const notes = allNotes.slice(startIdx, endIdx + 1);
    const maxNotes = 5;
    const selected = notes.slice(0, maxNotes);
    const fingers = (hand === 'right') ? ['1','2','3','4','5'] : ['5','4','3','2','1'];
    const result = [];
    selected.forEach((note, i) => {
        result.push({
            n: note,
            label: note,
            d: fingers[i],
            y: getYForNote(note, hand),
            f: getFrequency(note),
            color: getColor(note),
            hand: hand
        });
    });
    return result;
}

function populateRangeSelects() {
    const selects = ['rightStart','rightEnd','leftStart','leftEnd'];
    selects.forEach(id => {
        const sel = document.getElementById(id);
        sel.innerHTML = '';
        allNotes.forEach(n => {
            const opt = document.createElement('option');
            opt.value = n;
            opt.textContent = n;
            sel.appendChild(opt);
        });
    });
    document.getElementById('rightStart').value = 'C3';
    document.getElementById('rightEnd').value = 'G3';
    document.getElementById('leftStart').value = 'F2';
    document.getElementById('leftEnd').value = 'C3';
}

function updateRanges() {
    const rStart = document.getElementById('rightStart').value;
    const rEnd = document.getElementById('rightEnd').value;
    const lStart = document.getElementById('leftStart').value;
    const lEnd = document.getElementById('leftEnd').value;
    rightData = generateNotesForHand('right', rStart, rEnd);
    leftData = generateNotesForHand('left', lStart, lEnd);
    renderPicker();
    updatePool();
    renderPiano();
    generateChord();
    updateView();
    updateKeysVisual();
}

// ------------------------------------------------------------
// 4. CONTROLE DE TAMANHO DO ACORDE
// ------------------------------------------------------------
function updateChordSizes() {
    chordSizeRight = parseInt(document.getElementById('chordSizeRight').value);
    chordSizeLeft = parseInt(document.getElementById('chordSizeLeft').value);
    if (!autoTimer) {
        generateChord();
        updateView();
    }
}

// ------------------------------------------------------------
// 5. SELEÇÃO DE MODO
// ------------------------------------------------------------
function selectMode(mode) {
    currentMode = mode;
    document.getElementById('modeRightBtn').classList.toggle('active', mode === 'right');
    document.getElementById('modeLeftBtn').classList.toggle('active', mode === 'left');
    document.getElementById('modeBothBtn').classList.toggle('active', mode === 'both');
    document.getElementById('modeFullBtn').classList.toggle('active', mode === 'full');
    document.getElementById('bothConfig').style.display = (mode === 'both') ? 'block' : 'none';
    document.getElementById('validationStatus').style.display = (mode === 'both' || mode === 'full') ? 'flex' : 'none';

    renderPicker();
    updatePool();
    renderPiano();
    if (!autoTimer) {
        generateChord();
        updateView();
    }
    updateKeysVisual();
}

// ------------------------------------------------------------
// 6. PICKER E POOL
// ------------------------------------------------------------
function renderPicker() {
    const container = document.getElementById("pickerContainer");
    container.innerHTML = "";
    let showRight = (currentMode === 'right' || currentMode === 'full' || currentMode === 'both') && rightData.length > 0;
    let showLeft = (currentMode === 'left' || currentMode === 'full' || currentMode === 'both') && leftData.length > 0;
    if (showRight) {
        const rowMD = document.createElement("div");
        rowMD.className = "picker-row";
        rowMD.innerHTML = "<span>MD:</span>";
        const pickerMD = document.createElement("div");
        pickerMD.className = "note-picker";
        rightData.forEach((item) => {
            const lb = document.createElement("label");
            lb.style.color = item.color;
            lb.style.borderColor = item.color;
            lb.innerHTML = `<input type="checkbox" checked data-hand="right" data-label="${item.label}" onchange="updatePoolAndChord()"> ${item.n}`;
            pickerMD.appendChild(lb);
        });
        rowMD.appendChild(pickerMD);
        container.appendChild(rowMD);
    }
    if (showLeft) {
        const rowME = document.createElement("div");
        rowME.className = "picker-row";
        rowME.innerHTML = "<span>ME:</span>";
        const pickerME = document.createElement("div");
        pickerME.className = "note-picker";
        leftData.forEach((item) => {
            const lb = document.createElement("label");
            lb.style.color = item.color;
            lb.style.borderColor = item.color;
            lb.innerHTML = `<input type="checkbox" checked data-hand="left" data-label="${item.label}" onchange="updatePoolAndChord()"> ${item.n}`;
            pickerME.appendChild(lb);
        });
        rowME.appendChild(pickerME);
        container.appendChild(rowME);
    }
}

function updatePoolAndChord() {
    updatePool();
    if (!autoTimer) {
        generateChord();
        updateView();
    }
    updateKeysVisual();
}

function updatePool() {
    const checks = document.querySelectorAll("#pickerContainer input[type='checkbox']");
    let newPool = [];
    checks.forEach(chk => {
        if (chk.checked) {
            const hand = chk.getAttribute("data-hand");
            const label = chk.getAttribute("data-label");
            const sourceList = (hand === "right") ? rightData : leftData;
            const match = sourceList.find(n => n.label === label);
            if (match) newPool.push(match);
        }
    });
    pool = newPool;
    if (pool.length === 0 && checks.length > 0) {
        checks[0].checked = true;
        updatePool();
        return;
    }
    updateKeysVisual();
}

// ------------------------------------------------------------
// 7. GERAÇÃO DE ACORDES (1 a 4 notas) COM ARPEJO
// ------------------------------------------------------------
function getAvailableNotesForHand(hand) {
    const handData = (hand === 'right') ? rightData : leftData;
    const activeFingers = (hand === 'right') ? activeRightFingers : activeLeftFingers;
    const checks = document.querySelectorAll(`#pickerContainer input[data-hand="${hand}"]:checked`);
    const labels = Array.from(checks).map(c => c.getAttribute('data-label'));
    return handData.filter(n => labels.includes(n.label) && activeFingers.includes(n.d));
}

function getRandomNotes(hand, count) {
    const available = getAvailableNotesForHand(hand);
    if (available.length === 0) return [];
    if (count > available.length) count = available.length;
    const shuffled = [...available].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, count);
}

function generateChord() {
    if (currentMode === 'right') {
        currentRightNotes = getRandomNotes('right', chordSizeRight);
        currentLeftNotes = [];
    } else if (currentMode === 'left') {
        currentRightNotes = [];
        currentLeftNotes = getRandomNotes('left', chordSizeLeft);
    } else {
        currentRightNotes = getRandomNotes('right', chordSizeRight);
        currentLeftNotes = getRandomNotes('left', chordSizeLeft);
    }
    validatedNotes = {};
    const all = [...currentRightNotes, ...currentLeftNotes];
    all.forEach(n => { validatedNotes[n.label] = false; });
    totalNotes = all.length;
    // Tocar as notas com arpejo (delay controlado pelo slider)
    if (sounds.note && all.length > 0) {
        all.forEach((n, i) => {
            setTimeout(() => play(n.f), i * arpeggioDelay);
        });
    }
    updateValidationStatus();
    updateView();
}

// ------------------------------------------------------------
// 8. VALIDAÇÃO
// ------------------------------------------------------------
function validateClick(noteLabel) {
    const allNotesObj = [...currentRightNotes, ...currentLeftNotes];
    if (allNotesObj.some(n => n.label === noteLabel && !validatedNotes[noteLabel])) {
        validatedNotes[noteLabel] = true;
        const note = allNotesObj.find(n => n.label === noteLabel);
        if (note && sounds.piano) play(note.f);
        updateView();
        updateValidationStatus();
        const allValid = allNotesObj.every(n => validatedNotes[n.label] === true);
        if (allValid && !autoTimer) {
            setTimeout(() => { if (!autoTimer) { generateChord(); } }, 300);
        }
        return true;
    } else {
        if (sounds.error) playErrorSound();
        return false;
    }
}

function updateValidationStatus() {
    const all = [...currentRightNotes, ...currentLeftNotes];
    const validCount = all.filter(n => validatedNotes[n.label]).length;
    document.getElementById('statusRight').textContent = currentRightNotes.every(n => validatedNotes[n.label]) ? '✅' : '⬜';
    document.getElementById('statusLeft').textContent = currentLeftNotes.every(n => validatedNotes[n.label]) ? '✅' : '⬜';
    document.getElementById('progressNotes').textContent = `${validCount}/${totalNotes}`;
}

// ------------------------------------------------------------
// 9. DESENHO (PENTAGRAMA) - MÚLTIPLAS NOTAS
// ------------------------------------------------------------
function drawChord(rightNotes, leftNotes) {
    const cv = document.getElementById("staffCanvas");
    const ctx = cv.getContext("2d");
    const isColor = document.getElementById("colorMode").value === "chroma";
    ctx.clearRect(0,0,600,290);
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(45, 65);
    ctx.lineTo(45, 245);
    ctx.stroke();
    ctx.strokeStyle = "#b0b7c1";

    for(let i=0; i<5; i++) {
        let y = 125 - (i*15);
        ctx.beginPath(); ctx.moveTo(45, y); ctx.lineTo(550, y); ctx.stroke();
    }
    ctx.font = "65px Arial"; ctx.fillStyle = "#222"; ctx.fillText("𝄞", 52, 122);

    for(let i=0; i<5; i++) {
        let y = 245 - (i*15);
        ctx.beginPath(); ctx.moveTo(45, y); ctx.lineTo(550, y); ctx.stroke();
    }
    ctx.font = "64px Arial"; ctx.fillStyle = "#222"; ctx.fillText("𝄢", 55, 241);

    rightNotes.forEach(note => {
        const color = isColor ? note.color : "#000";
        const validatedColor = validatedNotes[note.label] ? "#4ade80" : color;
        ctx.beginPath();
        ctx.fillStyle = validatedColor;
        ctx.ellipse(300, note.y, 10, 7, -0.25, 0, Math.PI*2);
        ctx.fill();
        if (note.n === "C3") {
            ctx.strokeStyle = "#222";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(278, 140); ctx.lineTo(322, 140); ctx.stroke();
        }
    });

    leftNotes.forEach(note => {
        const color = isColor ? note.color : "#000";
        const validatedColor = validatedNotes[note.label] ? "#4ade80" : color;
        ctx.beginPath();
        ctx.fillStyle = validatedColor;
        ctx.ellipse(300, note.y, 10, 7, -0.25, 0, Math.PI*2);
        ctx.fill();
        if (note.n === "C3") {
            ctx.strokeStyle = "#222";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(278, 170); ctx.lineTo(322, 170); ctx.stroke();
        }
    });
}

// ------------------------------------------------------------
// 10. UPDATE VIEW
// ------------------------------------------------------------
function updateView() {
    const m = document.getElementById("mode").value;
    const cMode = document.getElementById("colorMode").value;
    const cv = document.getElementById("staffCanvas");
    const tx = document.getElementById("displayText");
    const fingeringDiv = document.getElementById("fingeringDisplay");
    const bothDisplay = document.getElementById("bothDisplay");

    cv.style.display = "block";
    tx.style.display = "none";
    bothDisplay.style.display = "none";

    if (currentMode === 'right') {
        drawChord(currentRightNotes, []);
    } else if (currentMode === 'left') {
        drawChord([], currentLeftNotes);
    } else {
        drawChord(currentRightNotes, currentLeftNotes);
    }

    if (showFingers) {
        const allNotes = [...currentRightNotes, ...currentLeftNotes];
        if (allNotes.length > 0) {
            const fingersHtml = allNotes.map(n => 
                `<span style="color: ${n.hand === 'right' ? 'var(--right-hand)' : 'var(--left-hand)'}; font-size: 40px; margin: 0 5px;">${n.d}</span>`
            ).join(' ');
            fingeringDiv.innerHTML = fingersHtml;
            fingeringDiv.style.display = "block";
            fingeringDiv.style.background = '#ffffff';
            fingeringDiv.style.border = '4px solid #888';
            fingeringDiv.style.boxShadow = '0 4px 10px rgba(0,0,0,0.05)';
        } else {
            fingeringDiv.style.display = "none";
        }
    } else {
        fingeringDiv.style.display = "none";
    }

    updateValidationStatus();
}

// ------------------------------------------------------------
// 11. PIANO E TECLADO
// ------------------------------------------------------------
const pianoFullRange = [];
(function buildPianoRange() {
    const startIdx = allNotes.indexOf("C2");
    const endIdx = allNotes.indexOf("C5");
    for (let i = startIdx; i <= endIdx; i++) {
        const note = allNotes[i];
        pianoFullRange.push({
            n: note,
            label: note,
            y: getYForNote(note, 'right'),
            f: getFrequency(note),
            color: getColor(note)
        });
    }
})();

function renderPiano() {
    const kb = document.getElementById("keyboard");
    kb.innerHTML = "";
    const keyWidth = 44;
    pianoFullRange.forEach((item, i) => {
        const key = document.createElement("div");
        key.className = "white";
        key.id = `key-${item.label}`;
        key.style.left = (i * keyWidth) + "px";
        key.onclick = () => {
            initAudio();
            const allNotesObj = [...currentRightNotes, ...currentLeftNotes];
            const noteInChord = allNotesObj.find(n => n.label === item.label);
            if (noteInChord && !validatedNotes[item.label]) {
                validateClick(item.label);
                key.classList.add("correct");
                setTimeout(() => key.classList.remove("correct"), 200);
            } else if (noteInChord && validatedNotes[item.label]) {
                if (sounds.piano) play(item.f);
                key.classList.add("correct");
                setTimeout(() => key.classList.remove("correct"), 200);
            } else {
                if (sounds.error) playErrorSound();
                key.classList.add("wrong");
                setTimeout(() => key.classList.remove("wrong"), 200);
            }
        };
        kb.appendChild(key);
    });
    const blackNotes = ["C#2","D#2","F#2","G#2","A#2","C#3","D#3","F#3","G#3","A#3","C#4","D#4","F#4","G#4","A#4"];
    blackNotes.forEach(bn => {
        const idx = pianoFullRange.findIndex(p => p.label === bn.replace('#',''));
        if (idx !== -1) {
            const b = document.createElement("div");
            b.className = "black";
            b.style.left = ((idx) * keyWidth + 28) + "px";
            kb.appendChild(b);
        }
    });
    updateKeysVisual();
}

function toggleKeysColor() {
    keysColorida = !keysColorida;
    const btn = document.getElementById("btnKeysColor");
    btn.innerText = `🎹 Teclado Colorido: ${keysColorida ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', keysColorida);
    updateKeysVisual();
}

function updateKeysVisual() {
    pianoFullRange.forEach(item => {
        const el = document.getElementById(`key-${item.label}`);
        if (el) {
            if (keysColorida && pool.some(p => p.label === item.label)) {
                const activeMatch = pool.find(p => p.label === item.label);
                el.style.backgroundColor = activeMatch ? activeMatch.color : item.color;
            } else {
                el.style.backgroundColor = "white";
            }
        }
    });
}

// ------------------------------------------------------------
// 12. ÁUDIO E CONTROLES
// ------------------------------------------------------------
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function play(freq) {
    initAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.8);
}

function playErrorSound() {
    initAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(110, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.2);
}

function toggleSound(t) {
    sounds[t] = !sounds[t];
    const btnMap = { note: 'btnNoteSound', piano: 'btnPianoSound', error: 'btnErrorSound' };
    document.getElementById(btnMap[t]).classList.toggle('active');
}

function toggleFingerDisplay() {
    showFingers = !showFingers;
    const btn = document.getElementById('toggleFingerBtn');
    btn.innerText = `🖐️ Mostrar Dedos: ${showFingers ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', showFingers);
    updateView();
}

function toggleAuto() {
    initAudio();
    const btn = document.getElementById("startBtn");
    if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
        btn.innerText = "▶ INICIAR AUTOMÁTICO";
        btn.style.background = "var(--primary)";
    } else {
        generateChord();
        autoTimer = setInterval(() => {
            generateChord();
        }, document.getElementById("speed").value);
        btn.innerText = "⏹ PARAR";
        btn.style.background = "var(--danger)";
    }
}

function changeSpeed() {
    const v = document.getElementById("speed").value;
    document.getElementById("speedTxt").innerText = (v/1000).toFixed(1) + 's';
    if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = setInterval(() => {
            generateChord();
        }, v);
    }
}

function updateArpeggioSpeed() {
    arpeggioDelay = parseInt(document.getElementById('arpeggioSpeed').value);
    document.getElementById('arpeggioSpeedLabel').innerText = arpeggioDelay;
}

// ------------------------------------------------------------
// 13. INICIALIZAÇÃO
// ------------------------------------------------------------
function initBothSelectors() {
    const rightBtns = document.querySelectorAll('#rightFingers .finger-btn');
    rightBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const finger = btn.getAttribute('data-finger');
            if (activeRightFingers.includes(finger)) {
                activeRightFingers = activeRightFingers.filter(f => f !== finger);
                btn.classList.remove('active');
            } else {
                activeRightFingers.push(finger);
                btn.classList.add('active');
            }
            if (activeRightFingers.length === 0) {
                activeRightFingers = [finger];
                btn.classList.add('active');
            }
            if (!autoTimer) { generateChord(); updateView(); }
        });
    });
    const leftBtns = document.querySelectorAll('#leftFingers .finger-btn');
    leftBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const finger = btn.getAttribute('data-finger');
            if (activeLeftFingers.includes(finger)) {
                activeLeftFingers = activeLeftFingers.filter(f => f !== finger);
                btn.classList.remove('active');
            } else {
                activeLeftFingers.push(finger);
                btn.classList.add('active');
            }
            if (activeLeftFingers.length === 0) {
                activeLeftFingers = [finger];
                btn.classList.add('active');
            }
            if (!autoTimer) { generateChord(); updateView(); }
        });
    });
}

window.onload = () => {
    populateRangeSelects();
    updateRanges();
    document.getElementById('chordSizeRight').value = chordSizeRight;
    document.getElementById('chordSizeLeft').value = chordSizeLeft;
    document.getElementById('arpeggioSpeed').value = arpeggioDelay;
    document.getElementById('arpeggioSpeedLabel').innerText = arpeggioDelay;
    selectMode('both');
    initBothSelectors();
    renderPiano();
    generateChord();
    updateView();
};
