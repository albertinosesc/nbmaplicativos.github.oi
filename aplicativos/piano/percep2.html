<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino Musical - Dedos e Graus + Duas Mãos</title>
<style>
    :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --left-hand: #3b82f6; --right-hand: #ef4444; }
    body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    
    .container { max-width: 950px; width: 100%; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
    
    .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e5e7eb; margin-bottom: 20px; }

    .hand-selector { display: flex; gap: 10px; margin-bottom: 15px; background: #eef2ff; padding: 12px; border-radius: 12px; }
    .hand-btn { flex: 1; padding: 10px; border: 2px solid #cbd5e1; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .hand-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .hand-btn.left.active { background: var(--left-hand); border-color: var(--left-hand); }
    .hand-btn.both.active { background: #8b5cf6; border-color: #8b5cf6; }

    .display-mode-selector { display: flex; gap: 10px; margin: 10px 0; justify-content: center; }
    .display-mode-btn { padding: 8px 16px; border: 2px solid #cbd5e1; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .display-mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .note-picker { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 5px; }
    .note-picker label { cursor: pointer; background: white; padding: 5px 10px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 4px; transition: 0.2s; }

    button { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .btn-toggle { background: #d1d5db; color: #374151; flex: 1; font-size: 11px; }
    .btn-toggle.active { background: var(--primary); color: white; }
    .main-btn { background: var(--primary); color: white; width: 100%; font-size: 1.1em; margin-bottom: 15px; }

    #staffCanvas { background: white; border: 1px solid #eee; border-radius: 10px; margin: 15px 0; max-width: 100%; }
    #displayText { font-size: 100px; font-weight: 900; height: 180px; line-height: 180px; display: none; }
    #fingeringDisplay { 
        font-size: 80px; 
        font-weight: bold; 
        margin: 10px 0; 
        padding: 30px; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 15px;
        color: white;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        display: none;
    }
    
    /* Display para ambas as mãos */
    .both-display {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        padding: 30px;
        margin: 15px 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 200px;
    }
    
    .fraction {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
    }
    
    .fraction .numerator {
        font-size: 80px;
        font-weight: bold;
        color: var(--right-hand);
        background: rgba(255,255,255,0.95);
        padding: 20px 60px;
        border-radius: 20px;
        min-width: 180px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .fraction .denominator {
        font-size: 80px;
        font-weight: bold;
        color: var(--left-hand);
        background: rgba(255,255,255,0.95);
        padding: 20px 60px;
        border-radius: 20px;
        min-width: 180px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .fraction .fraction-line {
        font-size: 40px;
        font-weight: bold;
        color: white;
        margin: -10px 0;
    }

    /* Piano */
    .piano-wrapper {
        display: flex;
        justify-content: center;
        margin: 20px 0;
    }
    #keyboard { 
        position: relative; 
        width: 420px; 
        height: 180px; 
        background: #ddd; 
        border-radius: 5px; 
        padding: 5px; 
        box-sizing: content-box;
    }
    .white { position: absolute; width: 58px; height: 175px; background: white; border: 1px solid #999; border-radius: 0 0 5px 5px; z-index: 1; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .white:active { transform: translateY(2px); }
    .black { position: absolute; width: 32px; height: 100px; background: #222; border-radius: 0 0 3px 3px; z-index: 2; pointer-events: none; }
    
    .wrong { background: #555 !important; }
    .correct { background: #4ade80 !important; }

    select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; width: 100%; cursor: pointer; font-size: 13px; }
    b { font-size: 13px; display: block; margin-bottom: 5px; }
    
    /* Configuração ambas mãos */
    .both-config {
        background: #f1f5f9;
        padding: 15px;
        border-radius: 12px;
        margin: 15px 0;
    }
    .fingers-selector {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
    }
    .finger-group {
        flex: 1;
        min-width: 200px;
    }
    .finger-group b {
        margin-bottom: 10px;
    }
    .finger-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
    }
    .finger-btn {
        width: 50px;
        height: 50px;
        border-radius: 10px;
        border: 2px solid #cbd5e1;
        background: white;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }
    .finger-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
    }
    .finger-btn.right.active { background: var(--right-hand); border-color: var(--right-hand); }
    .finger-btn.left.active { background: var(--left-hand); border-color: var(--left-hand); }
</style>
</head>
<body>

<div class="container">
    <h2>🎹 Treino Musical - Dedos e Graus</h2>

    <!-- Seletor de Modo -->
    <div class="hand-selector">
        <button class="hand-btn right active" onclick="selectMode('right')" id="modeRightBtn">✋ Apenas Direita</button>
        <button class="hand-btn left" onclick="selectMode('left')" id="modeLeftBtn">🖐️ Apenas Esquerda</button>
        <button class="hand-btn both" onclick="selectMode('both')" id="modeBothBtn">🎯 Ambas Mãos</button>
    </div>

    <!-- Configuração para Ambas Mãos -->
    <div id="bothConfig" class="both-config" style="display: none;">
        <div class="fingers-selector">
            <div class="finger-group">
                <b style="color: var(--right-hand);">✋ Mão Direita (Vermelho)</b>
                <div class="finger-buttons" id="rightFingers">
                    <button class="finger-btn right active" data-finger="1">1</button>
                    <button class="finger-btn right active" data-finger="2">2</button>
                    <button class="finger-btn right active" data-finger="3">3</button>
                    <button class="finger-btn right active" data-finger="4">4</button>
                    <button class="finger-btn right active" data-finger="5">5</button>
                </div>
            </div>
            <div class="finger-group">
                <b style="color: var(--left-hand);">🖐️ Mão Esquerda (Azul)</b>
                <div class="finger-buttons" id="leftFingers">
                    <button class="finger-btn left active" data-finger="5">5</button>
                    <button class="finger-btn left active" data-finger="4">4</button>
                    <button class="finger-btn left active" data-finger="3">3</button>
                    <button class="finger-btn left active" data-finger="2">2</button>
                    <button class="finger-btn left active" data-finger="1">1</button>
                </div>
            </div>
        </div>
        <small style="color: #666; display: block; margin-top: 10px;">💡 Selecione quais dedos estarão ativos para cada mão</small>
    </div>

    <div class="controls-grid">
        <div>
            <b>Exibição Musical:</b>
            <select id="mode" onchange="updateView()">
                <option value="staff">🎼 Pentagrama</option>
                <option value="note">📝 Nome (C, D...)</option>
                <option value="degree">🔢 Graus (1, 2...)</option>
            </select>
        </div>

        <div>
            <b>Esquema das Notas:</b>
            <select id="colorMode" onchange="updateView()">
                <option value="chroma">🌈 Colorido</option>
                <option value="normal">⚫ Normal</option>
            </select>
        </div>

        <div>
            <b>Estilo Piano:</b>
            <button id="btnKeysColor" class="btn-toggle" onclick="toggleKeysColor()" style="width: 100%;">🎹 Teclado Colorido: OFF</button>
        </div>

        <div>
            <b>Sons:</b>
            <div style="display: flex; gap: 3px;">
                <button id="btnNoteSound" class="btn-toggle active" onclick="toggleSound('note')">🔈 Sorteio</button>
                <button id="btnPianoSound" class="btn-toggle active" onclick="toggleSound('piano')">🎹 Piano</button>
                <button id="btnErrorSound" class="btn-toggle active" onclick="toggleSound('error')">🔈 Erro</button>
            </div>
        </div>

        <div>
            <b>Notas Ativas:</b>
            <div id="picker" class="note-picker"></div>
        </div>
    </div>

    <!-- Seletor de Exibição dos Dedos -->
    <div class="display-mode-selector">
        <button class="display-mode-btn active" onclick="toggleFingerDisplay()" id="toggleFingerBtn">🖐️ Mostrar Dedos: ON</button>
    </div>

    <div style="margin-bottom: 15px;">
        <span>Velocidade: <b id="speedTxt" style="display:inline">2.0</b>s</span>
        <input type="range" id="speed" min="500" max="4000" value="2000" oninput="changeSpeed()" style="width: 200px; vertical-align: middle; margin-left: 10px;">
    </div>

    <button class="main-btn" id="startBtn" onclick="toggleAuto()">▶ INICIAR AUTOMÁTICO</button>

    <canvas id="staffCanvas" width="600" height="220"></canvas>
    <div id="displayText"></div>
    <div id="fingeringDisplay"></div>
    <div id="bothDisplay"></div>
    
    <div class="piano-wrapper">
        <div id="keyboard"></div>
    </div>
</div>

<script>
const data = [
    {n: "C", d: "1", y: 180, f: 261.63, color: "#FF0000"}, 
    {n: "D", d: "2", y: 170, f: 293.66, color: "#FF7F00"}, 
    {n: "E", d: "3", y: 160, f: 329.63, color: "#FFD700"}, 
    {n: "F", d: "4", y: 150, f: 349.23, color: "#00FF00"}, 
    {n: "G", d: "5", y: 140, f: 392.00, color: "#0000FF"}, 
    {n: "A", d: "6", y: 130, f: 440.00, color: "#4B0082"}, 
    {n: "B", d: "7", y: 120, f: 493.88, color: "#9400D3"}  
];

let currentMode = 'right';
let current = null;
let currentBoth = { right: null, left: null };
let autoTimer = null;
let sounds = { note: true, piano: true, error: true };
let keysColorida = false;
let pool = [...data];
let audioCtx = null;
let showFingers = true; // Mostrar ou não os dedos

// Configuração dedos ativos para ambas mãos
let activeRightFingers = ['1', '2', '3', '4', '5'];
let activeLeftFingers = ['5', '4', '3', '2', '1'];

const leftHandMapping = {
    5: 'C', 4: 'D', 3: 'E', 2: 'F', 1: 'G'
};

const rightHandMapping = {
    '1': 'C', '2': 'D', '3': 'E', '4': 'F', '5': 'G'
};

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function toggleFingerDisplay() {
    showFingers = !showFingers;
    const btn = document.getElementById('toggleFingerBtn');
    btn.innerText = `🖐️ Mostrar Dedos: ${showFingers ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', showFingers);
    updateView();
}

function selectMode(mode) {
    currentMode = mode;
    
    document.getElementById('modeRightBtn').classList.toggle('active', mode === 'right');
    document.getElementById('modeLeftBtn').classList.toggle('active', mode === 'left');
    document.getElementById('modeBothBtn').classList.toggle('active', mode === 'both');
    
    const bothConfig = document.getElementById('bothConfig');
    bothConfig.style.display = mode === 'both' ? 'block' : 'none';
    
    if (mode === 'both') {
        generateRandomBoth();
    } else {
        newNote();
    }
    updateView();
}

function initBothSelectors() {
    // Mão direita
    const rightBtns = document.querySelectorAll('#rightFingers .finger-btn');
    rightBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const finger = btn.getAttribute('data-finger');
            if (activeRightFingers.includes(finger)) {
                activeRightFingers = activeRightFingers.filter(f => f !== finger);
                btn.classList.remove('active');
            } else {
                activeRightFingers.push(finger);
                btn.classList.add('active');
            }
            if (activeRightFingers.length === 0) {
                activeRightFingers = [finger];
                btn.classList.add('active');
            }
            if (currentMode === 'both') generateRandomBoth();
        });
    });
    
    // Mão esquerda
    const leftBtns = document.querySelectorAll('#leftFingers .finger-btn');
    leftBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const finger = btn.getAttribute('data-finger');
            if (activeLeftFingers.includes(finger)) {
                activeLeftFingers = activeLeftFingers.filter(f => f !== finger);
                btn.classList.remove('active');
            } else {
                activeLeftFingers.push(finger);
                btn.classList.add('active');
            }
            if (activeLeftFingers.length === 0) {
                activeLeftFingers = [finger];
                btn.classList.add('active');
            }
            if (currentMode === 'both') generateRandomBoth();
        });
    });
}

function generateRandomBoth() {
    const rightRandom = activeRightFingers[Math.floor(Math.random() * activeRightFingers.length)];
    const leftRandom = activeLeftFingers[Math.floor(Math.random() * activeLeftFingers.length)];
    
    currentBoth = {
        right: rightRandom,
        left: leftRandom
    };
    
    if (sounds.note) {
        const rightNote = getNoteFromFinger(rightRandom, 'right');
        if (rightNote) play(rightNote.f);
    }
}

function getNoteFromFinger(finger, hand) {
    if (hand === 'right') {
        const noteName = rightHandMapping[finger];
        return data.find(n => n.n === noteName);
    } else {
        const noteName = leftHandMapping[finger];
        return data.find(n => n.n === noteName);
    }
}

function getExpectedForNote(noteName, hand) {
    if (hand === 'right') {
        const note = data.find(n => n.n === noteName);
        return note ? note.d : null;
    } else {
        for (let [finger, note] of Object.entries(leftHandMapping)) {
            if (note === noteName) return finger;
        }
        return null;
    }
}

function getDisplayText() {
    if (currentMode === 'right') {
        const expected = getExpectedForNote(current.n, 'right');
        return expected;
    } else if (currentMode === 'left') {
        const expected = getExpectedForNote(current.n, 'left');
        return expected;
    }
    return '';
}

function renderPiano() {
    const kb = document.getElementById("keyboard");
    kb.innerHTML = "";
    const posBlack = [0.7, 1.7, 3.7, 4.7, 5.7];
    
    data.forEach((item, i) => {
        const key = document.createElement("div");
        key.className = "white";
        key.id = `key-${item.n}`;
        key.style.left = (i * 60) + "px";
        
        key.onclick = () => { 
            initAudio(); 
            if (currentMode === 'both') {
                const rightExpected = getExpectedForNote(item.n, 'right');
                const leftExpected = getExpectedForNote(item.n, 'left');
                
                if (rightExpected && rightExpected.toString() === currentBoth.right) {
                    if (sounds.piano) play(item.f);
                    generateRandomBoth();
                    updateView();
                    key.classList.add("correct");
                    setTimeout(() => key.classList.remove("correct"), 200);
                } else if (leftExpected && leftExpected.toString() === currentBoth.left) {
                    if (sounds.piano) play(item.f);
                    generateRandomBoth();
                    updateView();
                    key.classList.add("correct");
                    setTimeout(() => key.classList.remove("correct"), 200);
                } else {
                    if (sounds.error) playErrorSound();
                    key.classList.add("wrong");
                    setTimeout(() => key.classList.remove("wrong"), 200);
                }
            } else {
                checkNote(item, key);
            }
        };
        kb.appendChild(key);
    });

    posBlack.forEach(p => {
        const b = document.createElement("div");
        b.className = "black";
        b.style.left = (p * 60) + "px";
        kb.appendChild(b);
    });
    updateKeysVisual();
}

function toggleKeysColor() {
    keysColorida = !keysColorida;
    const btn = document.getElementById("btnKeysColor");
    btn.innerText = `🎹 Teclado Colorido: ${keysColorida ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', keysColorida);
    updateKeysVisual();
}

function updateKeysVisual() {
    data.forEach(item => {
        const el = document.getElementById(`key-${item.n}`);
        if(el) {
            if (keysColorida && pool.some(p => p.n === item.n)) {
                el.style.backgroundColor = item.color;
            } else {
                el.style.backgroundColor = "white";
            }
        }
    });
}

function play(freq) {
    initAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.8);
}

function playErrorSound() {
    initAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(110, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.2);
}

function toggleSound(t) {
    sounds[t] = !sounds[t];
    const btnMap = { note: 'btnNoteSound', piano: 'btnPianoSound', error: 'btnErrorSound' };
    document.getElementById(btnMap[t]).classList.toggle('active');
}

function draw(note) {
    if (!note) return;
    const cv = document.getElementById("staffCanvas");
    const ctx = cv.getContext("2d");
    const isColor = document.getElementById("colorMode").value === "chroma";
    
    ctx.clearRect(0,0,600,220);
    ctx.strokeStyle = "#999";
    for(let i=0; i<5; i++) {
        let y = 160 - (i*20);
        ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(550, y); ctx.stroke();
    }
    ctx.font = "70px Arial"; ctx.fillStyle = "#222"; ctx.fillText("𝄞", 60, 165);
    
    ctx.beginPath(); 
    ctx.fillStyle = isColor ? note.color : "#000";
    ctx.ellipse(300, note.y, 11, 8, -0.3, 0, Math.PI*2); ctx.fill();
    if(note.n === "C") { ctx.beginPath(); ctx.moveTo(280, 180); ctx.lineTo(320, 180); ctx.stroke(); }
}

function updateView() {
    const m = document.getElementById("mode").value;
    const cMode = document.getElementById("colorMode").value;
    const cv = document.getElementById("staffCanvas");
    const tx = document.getElementById("displayText");
    const fingeringDiv = document.getElementById("fingeringDisplay");
    const bothDisplay = document.getElementById("bothDisplay");
    
    if (currentMode === 'both') {
        cv.style.display = "none";
        tx.style.display = "none";
        fingeringDiv.style.display = "none";
        bothDisplay.style.display = "block";
        bothDisplay.innerHTML = `
            <div class="both-display">
                <div class="fraction">
                    <div class="numerator">${currentBoth.right}</div>
                    <div class="fraction-line">—</div>
                    <div class="denominator">${currentBoth.left}</div>
                </div>
            </div>
        `;
    } else {
        bothDisplay.style.display = "none";
        if (!current) return;
        
        // Controle do pentagrama vs texto
        if(m === "staff") { 
            cv.style.display = "block";
            tx.style.display = "none";
            draw(current);
        } else {
            cv.style.display = "none";
            tx.style.display = "block";
            let displayContent = "";
            if (m === "degree") {
                displayContent = current.d;
            } else {
                displayContent = current.n;
            }
            tx.innerText = displayContent;
            tx.style.color = (cMode === "chroma") ? current.color : "#333";
        }
        
        // Controlar exibição dos dedos
        if (showFingers) {
            const displayText = getDisplayText();
            fingeringDiv.innerHTML = displayText;
            fingeringDiv.style.display = "block";
        } else {
            fingeringDiv.style.display = "none";
        }
    }
}

function newNote() {
    if (currentMode === 'both') {
        generateRandomBoth();
        updateView();
    } else {
        let next;
        do { next = pool[Math.floor(Math.random()*pool.length)]; } while(next === current && pool.length > 1);
        current = next;
        updateView();
        if(sounds.note) play(current.f);
    }
}

function checkNote(item, el) {
    el.classList.remove("wrong");
    void el.offsetWidth;
    
    const expectedFinger = getExpectedForNote(item.n, currentMode);
    const currentValue = currentMode === 'right' ? current.d : getExpectedForNote(current.n, 'left');
    const isCorrect = (expectedFinger && expectedFinger.toString() === currentValue?.toString());
    
    if(isCorrect) {
        if(sounds.piano) play(item.f);
        el.classList.add("correct");
        setTimeout(() => el.classList.remove("correct"), 200);
        
        const originalColor = el.style.backgroundColor;
        el.style.backgroundColor = "#4ade80";
        setTimeout(() => { 
            el.style.backgroundColor = originalColor; 
            if(!autoTimer) newNote(); 
        }, 200);
    } else {
        if(sounds.error) playErrorSound();
        el.classList.add("wrong");
        setTimeout(() => el.classList.remove("wrong"), 200);
    }
}

function toggleAuto() {
    initAudio();
    const btn = document.getElementById("startBtn");
    if(autoTimer) {
        clearInterval(autoTimer); autoTimer = null;
        btn.innerText = "▶ INICIAR AUTOMÁTICO"; btn.style.background = "var(--primary)";
    } else {
        newNote();
        autoTimer = setInterval(newNote, document.getElementById("speed").value);
        btn.innerText = "⏹ PARAR"; btn.style.background = "var(--danger)";
    }
}

function changeSpeed() {
    const v = document.getElementById("speed").value;
    document.getElementById("speedTxt").innerText = (v/1000).toFixed(1);
    if(autoTimer) { toggleAuto(); toggleAuto(); }
}

function renderPicker() {
    const div = document.getElementById("picker");
    div.innerHTML = "";
    data.forEach((item) => {
        const lb = document.createElement("label");
        lb.style.color = item.color;
        lb.style.borderColor = item.color;
        lb.innerHTML = `<input type="checkbox" checked value="${item.n}" onchange="updatePool()"> ${item.n}`;
        div.appendChild(lb);
    });
}

function updatePool() {
    const checks = document.querySelectorAll("#picker input");
    pool = data.filter((_, i) => checks[i].checked);
    if(pool.length === 0) { checks[0].checked = true; updatePool(); }
    updateKeysVisual();
    if (currentMode !== 'both') newNote();
}

window.onload = () => {
    renderPicker();
    renderPiano();
    initBothSelectors();
    newNote();
};
</script>
</body>
</html>
