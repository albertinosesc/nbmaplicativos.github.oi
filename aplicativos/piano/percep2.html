<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treino Musical Harmônico - ABC Notation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js" type="text/javascript"></script>
<style>
    :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --accent: #06b6d4; }
    body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
    
    .container { max-width: 1000px; width: 100%; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
    h2 { margin-top: 0; color: #1e293b; }

    .layout-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
    @media (min-width: 768px) { .layout-grid { grid-template-columns: 1fr 2fr; } }

    .panel { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e5e7eb; text-align: left; }
    .panel h3 { margin-top: 0; font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

    textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: monospace; font-size: 14px; box-sizing: border-box; resize: vertical; }
    
    .controls { display: flex; flex-direction: column; gap: 12px; }
    .row { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
    .inline-label { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: #334155; cursor: pointer; }
    
    select, input[type="range"] { padding: 6px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px; }
    
    button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .main-btn { background: var(--primary); color: white; width: 100%; font-size: 16px; margin-top: 5px; }
    .main-btn.active { background: var(--danger); }

    /* Área do Pentagrama Forçada para Tamanho Grande */
    #paper { background: white; border: 1px solid #e2e8f0; border-radius: 12px; min-height: 20px; margin: 20px 0; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-x: auto; }
    
    /* TRUQUE VISUAL: Força o SVG gerado pelo ABCJS a ampliar de tamanho real na tela */
    #paper svg { width: 100% !important; height: auto !important; max-width: 990px !important; min-height: 360px; }

    /* Teclado Otimizado de 4 oitavas (C1 a C5) */
    .piano-container { width: 100%; overflow-x: auto; padding: 10px 0; margin-top: 15px; }
    #keyboard { position: relative; width: 812px; height: 170px; background: #cbd5e1; border-radius: 4px; padding: 4px 0 4px 4px; box-sizing: content-box; margin: 0 auto; }
    .white { position: absolute; width: 26px; height: 165px; background: white; border: 1px solid #94a3b8; border-radius: 0 0 4px 4px; z-index: 1; cursor: pointer; transition: background 0.1s; }
    .black { position: absolute; width: 16px; height: 100px; background: #1e293b; border-radius: 0 0 3px 3px; z-index: 2; cursor: pointer; transition: background 0.1s; }
    
    /* Estados das teclas virtuais */
    .white.active-key { background: var(--accent) !important; }
    .black.active-key { background: #22d3ee !important; }
    .white.pressed-correct { background: var(--success) !important; }
    .black.pressed-correct { background: #4ade80 !important; }
    .white.pressed-wrong { background: var(--danger) !important; }
    .black.pressed-wrong { background: #f87171 !important; }

    .badge { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
    <h2>🎹 Treino Harmônico Automático e ABC</h2>

    <div class="layout-grid">
        <div class="panel">
            <h3>📝 Editor de Notas / Acordes</h3>
            <textarea id="abcInput" oninput="parseABCInput()">"C"[(C1E1G1)C3E3G3] | "Am"[(A1E2A2)C3E3A3] | "D"[D3^F3A3] | "G"[(G1D2G2)B3D4G4] | "C"C4 | "F"^F4 | "Bb"_B3 | "C7"[(C2E2G2)C3E3G3_B3]</textarea>
            <div style="margin-top: 5px; font-size: 11px; color: #64748b;">
                Use aspas para adicionar cifras em cima do acorde! Ex: <code class="badge">"C"[(C2G2)C3E3G3]</code>.
            </div>
        </div>

        <div class="panel">
            <h3>⚙️ Configurações e Modos</h3>
            <div class="controls">
                <div class="row">
                    <span class="inline-label">Modo de Jogo:</span>
                    <select id="playMode" onchange="handleModeChange()">
                        <option value="auto">🔄 Automático (Flashcards)</option>
                        <option value="interactive">🎯 Interativo (Esperar Tocar)</option>
                    </select>
                </div>
                
                <div class="row">
                    <label class="inline-label">
                        <input type="checkbox" id="chkLightKeys" checked onchange="updateDisplay()"> 💡 Acender teclas no Teclado
                    </label>
                    <label class="inline-label">
                        <input type="checkbox" id="chkPlaySound" checked> 🔊 Emitir Som
                    </label>
                </div>

                <div class="row">
                    <span class="inline-label">Velocidade (Modo Auto): <span id="speedTxt" style="color:var(--primary)">2.0</span>s</span>
                    <input type="range" id="speed" min="800" max="5000" value="2000" oninput="changeSpeed()">
                </div>

                <button class="main-btn" id="startBtn" onclick="toggleExecution()">▶ INICIAR AUTOMÁTICO</button>
            </div>
        </div>
    </div>

    <div id="paper"></div>

    <div class="piano-container">
        <div id="keyboard"></div>
    </div>
</div>

<script>
// Dicionário calibrado para C1 a C5 (4 oitavas)
const noteDictionary = {
    // Oitava 1
    "C1": {f: 32.70, type: "W", idx: 0, abc: "C,,"},  "^C1": {f: 34.65, type: "B", abc: "^C,,"}, "_C1": {f: 30.87, type: "B", abc: "_C,,"},
    "D1": {f: 36.71, type: "W", idx: 1, abc: "D,,"},  "^D1": {f: 38.89, type: "B", abc: "^D,,"}, "_D1": {f: 34.65, type: "B", abc: "_D,,"},
    "E1": {f: 41.20, type: "W", idx: 2, abc: "E,,"},  "^E1": {f: 43.65, type: "W", abc: "^E,,"}, "_E1": {f: 38.89, type: "B", abc: "_E,,"},
    "F1": {f: 43.65, type: "W", idx: 3, abc: "F,,"},  "^F1": {f: 46.25, type: "B", abc: "^F,,"}, "_F1": {f: 41.20, type: "W", abc: "_F,,"},
    "G1": {f: 49.00, type: "W", idx: 4, abc: "G,,"},  "^G1": {f: 51.91, type: "B", abc: "^G,,"}, "_G1": {f: 46.25, type: "B", abc: "_G,,"},
    "A1": {f: 55.00, type: "W", idx: 5, abc: "A,,"},  "^A1": {f: 58.27, type: "B", abc: "^A,,"}, "_A1": {f: 51.91, type: "B", abc: "_A,,"},
    "B1": {f: 61.74, type: "W", idx: 6, abc: "B,,"},  "^B1": {f: 65.41, type: "W", abc: "^B,,"}, "_B1": {f: 58.27, type: "B", abc: "_B,,"},
    // Oitava 2
    "C2": {f: 65.41, type: "W", idx: 7, abc: "C,"},   "^C2": {f: 69.30, type: "B", abc: "^C,"},  "_C2": {f: 61.74, type: "W", abc: "_C,"},
    "D2": {f: 73.42, type: "W", idx: 8, abc: "D,"},   "^D2": {f: 77.78, type: "B", abc: "^D,"},  "_D2": {f: 69.30, type: "B", abc: "_D,"},
    "E2": {f: 82.41, type: "W", idx: 9, abc: "E,"},   "^E2": {f: 87.31, type: "W", abc: "^E,"},  "_E2": {f: 77.78, type: "B", abc: "_E,"},
    "F2": {f: 87.31, type: "W", idx: 10, abc: "F,"},  "^F2": {f: 92.50, type: "B", abc: "^F,"},  "_F2": {f: 82.41, type: "W", abc: "_F,"},
    "G2": {f: 98.00, type: "W", idx: 11, abc: "G,"},  "^G2": {f: 103.83, type: "B", abc: "^G,"}, "_G2": {f: 92.50, type: "B", abc: "_G,"},
    "A2": {f: 110.00, type: "W", idx: 12, abc: "A,"}, "^A2": {f: 116.54, type: "B", abc: "^A,"}, "_A2": {f: 103.83, type: "B", abc: "_A,"},
    "B2": {f: 123.47, type: "W", idx: 13, abc: "B,"}, "^B2": {f: 130.81, type: "W", abc: "^B,"}, "_B2": {f: 116.54, type: "B", abc: "_B,"},
    // Oitava 3
    "C3": {f: 130.81, type: "W", idx: 14, abc: "C"},   "^C3": {f: 138.59, type: "B", abc: "^C"},  "_C3": {f: 123.47, type: "W", abc: "_C"},
    "D3": {f: 146.83, type: "W", idx: 15, abc: "D"},   "^D3": {f: 155.56, type: "B", abc: "^D"},  "_D3": {f: 138.59, type: "B", abc: "_D"},
    "E3": {f: 164.81, type: "W", idx: 16, abc: "E"},   "^E3": {f: 174.61, type: "W", abc: "^E"},  "_E3": {f: 155.56, type: "B", abc: "_E"},
    "F3": {f: 174.61, type: "W", idx: 17, abc: "F"},   "^F3": {f: 185.00, type: "B", abc: "^F"},  "_F3": {f: 164.81, type: "W", abc: "_F"},
    "G3": {f: 196.00, type: "W", idx: 18, abc: "G"},   "^G3": {f: 207.65, type: "B", abc: "^G"},  "_G3": {f: 185.00, type: "B", abc: "_G"},
    "A3": {f: 220.00, type: "W", idx: 19, abc: "A"},   "^A3": {f: 233.08, type: "B", abc: "^A"},  "_A3": {f: 207.65, type: "B", abc: "_A"},
    "B3": {f: 246.94, type: "W", idx: 20, abc: "B"},   "^B3": {f: 261.63, type: "W", abc: "^B"},  "_B3": {f: 233.08, type: "B", abc: "_B"},
    // Oitava 4
    "C4": {f: 261.63, type: "W", idx: 21, abc: "c"},   "^C4": {f: 277.18, type: "B", abc: "^c"},  "_C4": {f: 246.94, type: "W", abc: "_c"},
    "D4": {f: 293.66, type: "W", idx: 22, abc: "d"},   "^D4": {f: 311.13, type: "B", abc: "^d"},  "_D4": {f: 277.18, type: "B", abc: "_d"},
    "E4": {f: 329.63, type: "W", idx: 23, abc: "e"},   "^E4": {f: 349.23, type: "W", abc: "^e"},  "_E4": {f: 311.13, type: "B", abc: "_e"},
    "F4": {f: 349.23, type: "W", idx: 24, abc: "f"},   "^F4": {f: 369.99, type: "B", abc: "^f"},  "_F4": {f: 329.63, type: "W", abc: "_f"},
    "G4": {f: 392.00, type: "W", idx: 25, abc: "g"},   "^G4": {f: 415.30, type: "B", abc: "^g"},  "_G4": {f: 369.99, type: "B", abc: "_g"},
    "A4": {f: 440.00, type: "W", idx: 26, abc: "a"},   "^A4": {f: 466.16, type: "B", abc: "^a"},  "_A4": {f: 415.30, type: "B", abc: "_a"},
    "B4": {f: 493.88, type: "W", idx: 27, abc: "b"},   "^B4": {f: 523.25, type: "W", abc: "^b"},  "_B4": {f: 466.16, type: "B", abc: "_b"},
    // Limite superior (Oitava 5)
    "C5": {f: 523.25, type: "W", idx: 28, abc: "c'"}
};

let poolABC = [];
let currentItem = "";
let currentNotesArray = [];
let userSelectedNotes = [];
let timer = null;
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function buildKeyboard() {
    const kb = document.getElementById("keyboard");
    kb.innerHTML = "";
    const whiteWidth = 28; 
    let currentWhiteIndex = 0;

    const notesOrder = ["C", "D", "E", "F", "G", "A", "B"];

    for (let oct = 1; oct <= 4; oct++) {
        for (let k = 0; k < 7; k++) {
            const noteName = `${notesOrder[k]}${oct}`;
            
            const key = document.createElement("div");
            key.className = "white";
            key.id = `k-${noteName}`;
            key.style.left = (currentWhiteIndex * whiteWidth) + "px";
            key.onclick = () => handleKeyClick(noteName);
            kb.appendChild(key);

            if (k !== 2 && k !== 6) {
                const sharpName = `^${notesOrder[k]}${oct}`;
                const bKeySharp = document.createElement("div");
                bKeySharp.className = "black";
                bKeySharp.id = `k-${sharpName}`;
                bKeySharp.style.left = ((currentWhiteIndex * whiteWidth) + (whiteWidth * 0.68)) + "px";
                bKeySharp.onclick = (e) => { e.stopPropagation(); handleKeyClick(sharpName); };
                kb.appendChild(bKeySharp);

                const nextNote = notesOrder[k+1] || "C";
                const nextOct = k === 6 ? oct + 1 : oct;
                const flatName = `_${nextNote}${nextOct}`;
                bKeySharp.setAttribute("data-flat", flatName);
            }
            currentWhiteIndex++;
        }
    }
    const finalKey = document.createElement("div");
    finalKey.className = "white";
    finalKey.id = "k-C5";
    finalKey.style.left = (currentWhiteIndex * whiteWidth) + "px";
    finalKey.onclick = () => handleKeyClick("C5");
    kb.appendChild(finalKey);
}

function parseABCInput() {
    const text = document.getElementById("abcInput").value;
    poolABC = text.split('|').map(s => s.trim()).filter(s => s.length > 0);
}

// Limpa as cifras antes de extrair as notas para o teclado/áudio não darem conflito
function extractAllNotes(str) {
    let cleanStr = str.replace(/"[^"]*"/g, ""); 
    let matches = cleanStr.match(/([_^]?[A-G][1-5])/g);
    return matches ? matches : [];
}

function nextItem() {
    if (poolABC.length === 0) parseABCInput();
    if (poolABC.length === 0) return;

    userSelectedNotes = [];
    clearKeyboardHighlights();

    let next;
    do {
        next = poolABC[Math.floor(Math.random() * poolABC.length)];
    } while (next === currentItem && poolABC.length > 1);

    currentItem = next;
    currentNotesArray = extractAllNotes(currentItem);

    // Captura a cifra se ela existir no token atual
    let chordSymbol = "";
    let chordMatch = currentItem.match(/"([^"]+)"/);
    if (chordMatch) {
        chordSymbol = `"${chordMatch[1]}"`;
    }

    // Limpa a string original para separar as claves sem a interferência da cifra
    let itemWithoutChord = currentItem.replace(/"[^"]*"/g, "");

    let bassRaw = "";
    let trebleRaw = "";

    let bassMatch = itemWithoutChord.match(/\(([^)]+)\)/);
    if (bassMatch) {
        bassRaw = bassMatch[1];
        trebleRaw = itemWithoutChord.replace(bassMatch[0], "").replace('[', '').replace(']', '');
    } else {
        trebleRaw = itemWithoutChord.replace('[', '').replace(']', '');
    }

    let bassNotes = extractAllNotes(bassRaw).map(n => noteDictionary[n]?.abc).filter(Boolean);
    let trebleNotes = extractAllNotes(trebleRaw).map(n => noteDictionary[n]?.abc).filter(Boolean);

    const formatABCGroup = (arr) => arr.length > 1 ? `[${arr.join('')}]` : (arr.length === 1 ? arr[0] : 'z');
    
    let abcString = `X:1\nM:none\nL:1/4\nK:C\n%%staffwidth 200\nV:1 clef=treble\nV:2 clef=bass\n`;
    // Aplica a cifra exclusivamente na pauta superior (Clave de Sol) colada ao acorde
    abcString += `[V:1] ${chordSymbol}${formatABCGroup(trebleNotes)}x|]\n[V:2] ${formatABCGroup(bassNotes)}x|]`;

    ABCJS.renderAbc("paper", abcString, { 
        scale: 2.2, 
        responsive: "resize",
        add_classes: true
    });

    updateDisplay();

    if (document.getElementById("chkPlaySound").checked) {
        initAudio();
        currentNotesArray.forEach(n => {
            let noteData = noteDictionary[n];
            if (noteData) playOscillator(noteData.f);
        });
    }
}

function updateDisplay() {
    clearKeyboardHighlights();
    if (!document.getElementById("chkLightKeys").checked) return;
    
    currentNotesArray.forEach(n => {
        let el = document.getElementById(`k-${n}`);
        if (!el) {
            el = document.querySelector(`[data-flat="${n}"]`);
        }
        if (el) el.classList.add("active-key");
    });
}

function handleKeyClick(noteName) {
    if (document.getElementById("playMode").value !== "interactive") return;
    initAudio();

    let noteData = noteDictionary[noteName];
    if (!noteData) return;

    playOscillator(noteData.f);

    let keyEl = document.getElementById(`k-${noteName}`);
    if (!keyEl && noteName.startsWith('_')) {
        keyEl = document.querySelector(`[data-flat="${noteName}"]`);
    }

    let isCorrect = currentNotesArray.includes(noteName);
    
    if (!isCorrect && keyEl) {
        const altFlat = keyEl.getAttribute("data-flat");
        const altSharp = keyEl.id.replace("k-", "");
        if (currentNotesArray.includes(altFlat) || currentNotesArray.includes(altSharp)) {
            isCorrect = true;
        }
    }

    if (isCorrect) {
        if (!userSelectedNotes.includes(noteName)) {
            userSelectedNotes.push(noteName);
            if (keyEl) keyEl.classList.add("pressed-correct");
        }
        if (userSelectedNotes.length >= currentNotesArray.length) {
            setTimeout(() => nextItem(), 400);
        }
    } else {
        if (keyEl) {
            keyEl.classList.add("pressed-wrong");
            setTimeout(() => keyEl.classList.remove("pressed-wrong"), 300);
        }
    }
}

function clearKeyboardHighlights() {
    const keys = document.querySelectorAll("#keyboard .white, #keyboard .black");
    keys.forEach(k => {
        k.classList.remove("active-key", "pressed-correct", "pressed-wrong");
    });
}

function playOscillator(freq) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 1.2);
}

function handleModeChange() {
    const mode = document.getElementById("playMode").value;
    const btn = document.getElementById("startBtn");
    if (timer) { clearInterval(timer); timer = null; }
    
    if (mode === "interactive") {
        btn.innerText = "▶ SORTEAR PRÓXIMO ACORDE";
        btn.classList.remove("active");
    } else {
        btn.innerText = "▶ INICIAR AUTOMÁTICO";
        btn.classList.remove("active");
    }
    nextItem();
}

function toggleExecution() {
    initAudio();
    const mode = document.getElementById("playMode").value;
    const btn = document.getElementById("startBtn");

    if (mode === "interactive") {
        nextItem();
    } else {
        if (timer) {
            clearInterval(timer); timer = null;
            btn.innerText = "▶ INICIAR AUTOMÁTICO";
            btn.classList.remove("active");
        } else {
            nextItem();
            timer = setInterval(nextItem, document.getElementById("speed").value);
            btn.innerText = "⏹ PARAR AUTOMÁTICO";
            btn.classList.add("active");
        }
    }
}

function changeSpeed() {
    const v = document.getElementById("speed").value;
    document.getElementById("speedTxt").innerText = (v / 1000).toFixed(1);
    if (timer) {
        clearInterval(timer);
        timer = setInterval(nextItem, v);
    }
}

window.onload = () => {
    buildKeyboard();
    parseABCInput();
    nextItem();
};
</script>
</body>
</html>
