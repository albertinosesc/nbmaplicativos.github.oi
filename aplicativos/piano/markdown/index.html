<style>

    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    height: 100vh;
    background: #f5f5f5;
  }

    width: 320px;
    background: #1a1a2e;
    color: #fff;
    padding: 15px 10px;
    overflow: auto;
    transition: width 0.3s;
  }

  #sidebar.collapsed {
    width: 45px;
    overflow: hidden;
  }

  #sidebar.collapsed .sidebar-content {
    display: none;
  }

.toggle-sidebar {
    position: fixed;
    left: 10px;
    top: 9px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    z-index: 1000;
    font-size: 16px;
    transition: left 0.3s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

#sidebar.collapsed + .toggle-sidebar {
    left: 55px;
}

/* Garantir que o botão fique sobre o conteúdo */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
    margin-left: 0;
}

  #sidebar h2 {
    text-align: center;
    margin-top: 0;
    margin-bottom: 15px;
    font-size: 1.3em;
  }

  #sidebar button {
    width: 100%;
    margin: 3px 0;
    padding: 8px;
    background: #0f3460;
    color: #fff;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.2s;
    font-size: 12px;
  }

  #sidebar button:hover {
    background: #e94560;
    transform: translateX(3px);
  }

  .btn-excluir {
    background: #e94560 !important;
  }

  .menu-categoria {
    margin-top: 10px;
    border-top: 1px solid #444;
    padding-top: 8px;
  }

  .menu-categoria h4 {
    margin: 0 0 5px 0;
    font-size: 11px;
    color: #e94560;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
  }

  .menu-categoria .categoria-content {
    display: block;
  }

  .menu-categoria.collapsed .categoria-content {
    display: none;
  }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    background: white;
    padding: 8px;
    border-bottom: 1px solid #ddd;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    max-height: 100px;
    overflow-y: auto;
  }

  .toolbar button {
    padding: 5px 10px;

    font-size: 11px;

    background: #e94560;
  }

    overflow: hidden;

    width: 45%;
    padding: 20px;

  #preview {

    min-width: 21cm;

    padding: 1cm;
    margin: 0 auto;
    overflow-x: auto;
    overflow-y: auto;
    background: white;

    box-sizing: border-box;

/* Forçar todos os elementos filhos a respeitar */

<script>
// ============================================
// DICIONÁRIO DE ACORDES (Carregado dos arquivos externos)
// ============================================

// Mesclar todos os acordes
const ACORDES_COMPLETO = {};

function mesclarAcordes() {
    for (let key in ACORDES_COMPLETO) {
        delete ACORDES_COMPLETO[key];
    }
    
    if (typeof ACORDES_MAIOR_C !== 'undefined') {
        Object.assign(ACORDES_COMPLETO, ACORDES_MAIOR_C);
    }
    if (typeof ACORDES_MENOR_C !== 'undefined') {
        Object.assign(ACORDES_COMPLETO, ACORDES_MENOR_C);
    }
    if (typeof ACORDES_DOMINANTE_C !== 'undefined') {
        Object.assign(ACORDES_COMPLETO, ACORDES_DOMINANTE_C);
    }
    if (typeof ACORDES_DIMINUTO_C !== 'undefined') {
        Object.assign(ACORDES_COMPLETO, ACORDES_DIMINUTO_C);
    }
    
    const salvos = localStorage.getItem('acordes_personalizados_usuario');
    if (salvos) {
        Object.assign(ACORDES_COMPLETO, JSON.parse(salvos));
    }
}

let ACORDES = {};

function carregarAcordes() {
    mesclarAcordes();
    ACORDES = ACORDES_COMPLETO;
}

function salvarAcordesPersonalizadosUsuario() {
    const personalizados = {};
    for (const [sigla, acorde] of Object.entries(ACORDES)) {
        const existeNoMaior = typeof ACORDES_MAIOR_C !== 'undefined' && ACORDES_MAIOR_C[sigla];
        const existeNoMenor = typeof ACORDES_MENOR_C !== 'undefined' && ACORDES_MENOR_C[sigla];
        const existeNoDominante = typeof ACORDES_DOMINANTE_C !== 'undefined' && ACORDES_DOMINANTE_C[sigla];
        const existeNoDiminuto = typeof ACORDES_DIMINUTO_C !== 'undefined' && ACORDES_DIMINUTO_C[sigla];
        
        if (!existeNoMaior && !existeNoMenor && !existeNoDominante && !existeNoDiminuto) {
            personalizados[sigla] = acorde;
        }
    }
    localStorage.setItem('acordes_personalizados_usuario', JSON.stringify(personalizados));
}

function resetarAcordes() {
    if(confirm('Resetar acordes para o padrão?')) {
        localStorage.removeItem('acordes_personalizados_usuario');
        carregarAcordes();
        renderizar();
        alert('Acordes resetados!');
    }
}

// ============================================
// FUNÇÕES DE FORMATAÇÃO
// ============================================
function addFormatacao(before, after) {
    const editor = document.getElementById('editor');
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    const text = editor.value;
    const selectedText = text.substring(start, end);
    
    let newText;
    if (selectedText) {
        newText = text.substring(0, start) + before + selectedText + after + text.substring(end);
        editor.value = newText;
        editor.setSelectionRange(start + before.length, end + before.length);
    } else {
        newText = text.substring(0, start) + before + after + text.substring(end);
        editor.value = newText;
        editor.setSelectionRange(start + before.length, start + before.length);
    }
    
    renderizar();
    salvarAulaAtual();
    editor.focus();
}

function inserirLink() {
    const url = prompt('Digite a URL:', 'https://');
    const texto = prompt('Digite o texto do link:', 'Clique aqui');
    if (url && texto) {
        const start = editor.selectionStart;
        editor.value = editor.value.substring(0, start) + `[${texto}](${url})` + editor.value.substring(start);
        renderizar();
        salvarAulaAtual();
    }
}

function inserirImagem() {
    const url = prompt('Digite a URL da imagem:', 'https://via.placeholder.com/300x200');
    const alt = prompt('Digite o texto alternativo:', 'Imagem');
    if (url && alt) {
        const start = editor.selectionStart;
        editor.value = editor.value.substring(0, start) + `![${alt}](${url})` + editor.value.substring(start);
        renderizar();
        salvarAulaAtual();
    }
}

// ============================================
// DESENHAR ACORDE
// ============================================
function desenharAcorde(container, sigla) {
    const acorde = ACORDES[sigla];
    if (!acorde) {
        container.innerHTML = `<div style="color:red">Acorde "${sigla}" não encontrado</div>`;
        return;
    }
    
    container.innerHTML = '';
    const wrapper = document.createElement('div');
    wrapper.style.position = 'relative';
    wrapper.style.display = 'inline-block';
    wrapper.style.textAlign = 'center';
    
    const cifraDiv = document.createElement('div');
    cifraDiv.textContent = sigla;
    cifraDiv.style.position = 'absolute';
    cifraDiv.style.top = '-2px';
    cifraDiv.style.left = '48%';
    cifraDiv.style.transform = 'translateX(-50%)';
    cifraDiv.style.fontSize = '1.4em';
    cifraDiv.style.fontWeight = 'bold';
    cifraDiv.style.color = '#e94560';
    wrapper.appendChild(cifraDiv);
    
    const canvas = document.createElement('canvas');
    canvas.width = 130;
    canvas.height = 180;
    const ctx = canvas.getContext('2d');
    
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const startX = 25, startY = 42, stringSpacing = 18, fretSpacing = 26;
    const numFrets = 5;
    
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(startX + i * stringSpacing, startY);
        ctx.lineTo(startX + i * stringSpacing, startY + numFrets * fretSpacing);
        ctx.stroke();
    }
    for (let i = 0; i <= numFrets; i++) {
        ctx.beginPath();
        ctx.moveTo(startX, startY + i * fretSpacing);
        ctx.lineTo(startX + 5 * stringSpacing, startY + i * fretSpacing);
        ctx.stroke();
    }
    
    if (acorde.casaInicial > 1) {
        ctx.font = 'bold 12px Arial';
        ctx.fillStyle = '#333';
        ctx.fillText(acorde.casaInicial + 'ª', startX - 18, startY + fretSpacing/2 + 2);
    }
    
    if (acorde.pestana && Array.isArray(acorde.pestana)) {
        let inicio = acorde.pestana[0], fim = inicio;
        for (let i = 1; i <= acorde.pestana.length; i++) {
            if (i < acorde.pestana.length && acorde.pestana[i] === acorde.pestana[i-1] + 1) {
                fim = acorde.pestana[i];
            } else {
                const xInicio = startX + inicio * stringSpacing;
                const xFim = startX + fim * stringSpacing;
                ctx.beginPath();
                ctx.moveTo(xInicio - 3, startY + 12);
                ctx.lineTo(xFim + 3, startY + 12);
                ctx.lineWidth = 8;
                ctx.strokeStyle = '#000000';
                ctx.stroke();
                if (i < acorde.pestana.length) { inicio = acorde.pestana[i]; fim = inicio; }
            }
        }
    }
    
    acorde.cordas.forEach((casa, i) => {
        const temPestana = acorde.pestana && Array.isArray(acorde.pestana) && acorde.pestana.includes(i);
        const casaRelativa = casa - acorde.casaInicial + 1;
        if (temPestana && casa === acorde.casaInicial) return;
        if (casa > 0 && casaRelativa > 0 && casaRelativa <= numFrets) {
            const x = startX + i * stringSpacing;
            const y = startY + (casaRelativa - 1) * fretSpacing + fretSpacing/2;
            ctx.beginPath();
            ctx.arc(x, y, 7, 0, 2 * Math.PI);
            ctx.fillStyle = '#000000';
            ctx.fill();
            const dedo = acorde.dedos && acorde.dedos[i] ? acorde.dedos[i] : '';
            if (dedo) {
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(dedo, x, y);
            }
        }
    });
    
    acorde.cordas.forEach((casa, i) => {
        if (casa === 0) {
            const x = startX + i * stringSpacing;
            const y = startY - 12;
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, 2 * Math.PI);
            ctx.strokeStyle = '#333';
            ctx.stroke();
        }
    });
    
    acorde.cordas.forEach((casa, stringIndex) => {
        if (casa === -1) {
            const x = startX + stringIndex * stringSpacing;
            const y = startY - 12;
            ctx.beginPath();
            ctx.moveTo(x - 5, y - 5);
            ctx.lineTo(x + 5, y + 5);
            ctx.moveTo(x + 5, y - 5);
            ctx.lineTo(x - 5, y + 5);
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = '#333';
            ctx.stroke();
        }
    });
    
    wrapper.appendChild(canvas);
    container.appendChild(wrapper);
}

// ============================================
// FUNÇÕES DE CORES (INFANTIL)
// ============================================
let coresAtivas = true;

function getCorPorNota(nota) {
    const cores = { 'C': '#FF0000', 'D': '#FF6600', 'E': '#FFDD00', 'F': '#00CC00', 'G': '#0066FF', 'A': '#4B0082', 'B': '#8B00FF' };
    return cores[nota.charAt(0).toUpperCase()] || '#000000';
}

function getCorPorTag(texto) {
    if (texto.includes("[r]")) return "#FF0000";
    if (texto.includes("[o]")) return "#FF6600";
    if (texto.includes("[y]")) return "#FFDD00";
    if (texto.includes("[g]")) return "#00CC00";
    if (texto.includes("[b]")) return "#0066FF";
    if (texto.includes("[i]")) return "#4B0082";
    if (texto.includes("[v]")) return "#8B00FF";
    return "#000000";
}

function aplicarCoresNasNotas() {
    if (!coresAtivas) return;
    
    // Aguardar o SVG ser completamente renderizado
    setTimeout(() => {
        let intensidade = parseFloat(document.getElementById("intensidadeRange")?.value || 0.8);
        
        const coresPorTag = {
            'r': '#FF0000',  // Vermelho
            'o': '#FF6600',  // Laranja
            'y': '#FFDD00',  // Amarelo
            't': '#00CC00',  // Verde
            'l': '#0066FF',  // Azul
            'i': '#4B0082',  // Índigo
            'v': '#8B00FF'   // Violeta
        };
        
        // Para cada nota musical
        document.querySelectorAll("#preview .abcjs-note").forEach(nota => {
            // Encontrar a cabeça da nota (ellipse ou circle)
            let cabecaNota = nota.querySelector('ellipse, circle');
            if (!cabecaNota) {
                cabecaNota = nota.querySelector('path');
            }
            
            if (cabecaNota) {
                let textoOriginal = nota.textContent || '';
                let corAplicada = null;
                let tagEncontrada = null;
                
                // Procurar por tags de cor no texto da nota
                for (let [tag, cor] of Object.entries(coresPorTag)) {
                    if (textoOriginal.includes(`[${tag}]`)) {
                        corAplicada = cor;
                        tagEncontrada = tag;
                        break;
                    }
                }
                
                // Se encontrou uma tag, aplica a cor
                if (corAplicada) {
                    let r = parseInt(corAplicada.slice(1,3), 16) * intensidade;
                    let g = parseInt(corAplicada.slice(3,5), 16) * intensidade;
                    let b = parseInt(corAplicada.slice(5,7), 16) * intensidade;
                    cabecaNota.style.fill = `rgb(${r}, ${g}, ${b})`;
                    
                    // Remover a tag do texto visível
                    nota.textContent = textoOriginal.replace(`[${tagEncontrada}]`, "").trim();
                } else {
                    // Se não tem tag, colorir baseado na nota musical (C, D, E...)
                    let textoNota = textoOriginal.replace(/\[(.*?)\]/g, "");
                    let match = textoNota.match(/[CDEFGAB]/i);
                    if (match) {
                        let notaNome = match[0];
                        let corBase = getCorPorNota(notaNome);
                        let r = parseInt(corBase.slice(1,3),16) * intensidade;
                        let g = parseInt(corBase.slice(3,5),16) * intensidade;
                        let b = parseInt(corBase.slice(5,7),16) * intensidade;
                        cabecaNota.style.fill = `rgb(${r}, ${g}, ${b})`;
                    }
                }
            }
        });
    }, 150); // Aguarda 150ms para o SVG ser renderizado
}

function aplicarCoresAcordesLetras() {
    var tags = {
        '[r]': '#FF0000', '[o]': '#FF6600', '[y]': '#FFDD00',
        '[g]': '#00CC00', '[b]': '#0066FF', '[i]': '#4B0082', '[v]': '#8B00FF'
    };
    
    document.querySelectorAll("#preview .abcjs-chord, #preview .abcjs-lyric").forEach(el => {
        let texto = el.textContent;
        if (texto) {
            for (let tag in tags) {
                if (texto.includes(tag)) {
                    el.style.fill = tags[tag];
                    el.textContent = texto.replace(/\[(.*?)\]/g, "");
                    break;
                }
            }
        }
    });
}

${aulasHtml}
<script>
    const ACORDES = ${acordesStr};
    const coresAtivas = ${coresStatus};
    
    function desenharAcorde(container, sigla) {
        const acorde = ACORDES[sigla];
        if (!acorde) {
            container.innerHTML = '<div style="color:red">Acorde não encontrado</div>';
            return;
        }
        container.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.style.position = 'relative';
        wrapper.style.display = 'inline-block';
        wrapper.style.textAlign = 'center';
        const cifraDiv = document.createElement('div');
        cifraDiv.textContent = sigla;
        cifraDiv.style.position = 'absolute';
        cifraDiv.style.top = '-22px';
        cifraDiv.style.left = '50%';
        cifraDiv.style.transform = 'translateX(-50%)';
        cifraDiv.style.fontSize = '1.4em';
        cifraDiv.style.fontWeight = 'bold';
        cifraDiv.style.color = '#e94560';
        cifraDiv.style.whiteSpace = 'nowrap';
        wrapper.appendChild(cifraDiv);
        const canvas = document.createElement('canvas');
        canvas.width = 130;
        canvas.height = 160;
        canvas.style.width = '130px';
        canvas.style.height = '160px';
        canvas.style.display = 'block';
        canvas.style.margin = '0 auto';
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const startX = 22, startY = 30, stringSpacing = 16, fretSpacing = 24;
        const numStrings = 6, numFrets = 5;
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1.2;
        for (let i = 0; i < numStrings; i++) {
            ctx.beginPath();
            ctx.moveTo(startX + i * stringSpacing, startY);
            ctx.lineTo(startX + i * stringSpacing, startY + numFrets * fretSpacing);
            ctx.stroke();
        }
        for (let i = 0; i <= numFrets; i++) {
            ctx.beginPath();
            ctx.moveTo(startX, startY + i * fretSpacing);
            ctx.lineTo(startX + (numStrings - 1) * stringSpacing, startY + i * fretSpacing);
            ctx.stroke();
        }
        if (acorde.casaInicial > 1) {
            ctx.font = 'bold 10px Arial';
            ctx.fillStyle = '#333';
            ctx.fillText(acorde.casaInicial + 'ª', startX - 16, startY + fretSpacing/2 + 2);
        }
        if (acorde.pestana && Array.isArray(acorde.pestana)) {
            let inicio = acorde.pestana[0], fim = inicio;
            for (let i = 1; i <= acorde.pestana.length; i++) {
                if (i < acorde.pestana.length && acorde.pestana[i] === acorde.pestana[i-1] + 1) {
                    fim = acorde.pestana[i];
                } else {
                    const xInicio = startX + inicio * stringSpacing;
                    const xFim = startX + fim * stringSpacing;
                    ctx.beginPath();
                    ctx.moveTo(xInicio - 2, startY + 8);
                    ctx.lineTo(xFim + 2, startY + 8);
                    ctx.lineWidth = 5;
                    ctx.strokeStyle = '#000000';
                    ctx.stroke();
                    if (i < acorde.pestana.length) { inicio = acorde.pestana[i]; fim = inicio; }
                }
            }
            ctx.lineWidth = 1.2;
        }
        acorde.cordas.forEach((casa, stringIndex) => {
            const temPestana = acorde.pestana && Array.isArray(acorde.pestana) && acorde.pestana.includes(stringIndex);
            const casaRelativa = casa - acorde.casaInicial + 1;
            if (temPestana && casa === acorde.casaInicial) return;
            if (casa > 0 && casaRelativa > 0 && casaRelativa <= numFrets) {
                const x = startX + stringIndex * stringSpacing;
                const y = startY + (casaRelativa - 1) * fretSpacing + fretSpacing/2;
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#000000';
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 9px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(casaRelativa.toString(), x, y);
            }
        });
        acorde.cordas.forEach((casa, stringIndex) => {
            if (casa === 0) {
                const x = startX + stringIndex * stringSpacing;
                const y = startY - 10;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, 2 * Math.PI);
                ctx.stroke();
            }
        });
        acorde.cordas.forEach((casa, stringIndex) => {
            if (casa === -1) {
                const x = startX + stringIndex * stringSpacing;
                const y = startY - 10;
                ctx.beginPath();
                ctx.moveTo(x - 4, y - 4);
                ctx.lineTo(x + 4, y + 4);
                ctx.moveTo(x + 4, y - 4);
                ctx.lineTo(x - 4, y + 4);
                ctx.stroke();
            }
        });
        wrapper.appendChild(canvas);
        container.appendChild(wrapper);
    }
    
    function getCorPorNota(nota) {
        const cores = { 'C': '#FF0000', 'D': '#FF6600', 'E': '#FFDD00', 'F': '#00CC00', 'G': '#0066FF', 'A': '#4B0082', 'B': '#8B00FF' };
        return cores[nota.charAt(0).toUpperCase()] || '#000000';
    }
    
    function ajustarIntensidade(cor, intensidade) {
        if (cor === '#000000') return cor;
        let r = parseInt(cor.slice(1,3), 16);
        let g = parseInt(cor.slice(3,5), 16);
        let b = parseInt(cor.slice(5,7), 16);
        return 'rgb(' + Math.floor(r * intensidade) + ', ' + Math.floor(g * intensidade) + ', ' + Math.floor(b * intensidade) + ')';
    }
    
    function aplicarCoresNasNotas() {
        if (!coresAtivas) return;
        var intensidade = 0.8;
        document.querySelectorAll('.abcjs-note').forEach(function(nota) {
            var cabecaNota = nota.querySelector('ellipse, circle');
            if (cabecaNota) {
                var textoNota = nota.textContent || '';
                var match = textoNota.match(/[CDEFGAB]/i);
                if (match) {
                    var corFinal = ajustarIntensidade(getCorPorNota(match[0]), intensidade);
                    cabecaNota.style.fill = corFinal;
                }
            }
        });
    }
    
    function aplicarCoresAcordesLetras() {
        var tags = { '[r]': '#FF0000', '[o]': '#FF6600', '[y]': '#FFDD00', '[g]': '#00CC00', '[b]': '#0066FF', '[i]': '#4B0082', '[v]': '#8B00FF' };
        document.querySelectorAll('.abcjs-chord, .abcjs-lyric').forEach(function(el) {
            var texto = el.textContent;
            if (texto) {
                for (var tag in tags) {
                    if (texto.includes(tag)) {
                        el.style.fill = tags[tag];
                        el.textContent = texto.replace(/\\[.*?\\]/g, "");
                        break;
                    }
                }
            }
        });
    }
    
    function renderizarAula(container, conteudoOriginal) {
        var processado = conteudoOriginal;
        processado = processado.replace(/\\[Acorde:([^\\]]+)\\]([\\s\\S]*?)\\[\\/Acorde\\]/g, function(match, sigla) {
            var id = 'chord-' + Date.now() + '-' + Math.random();
            setTimeout(function() { var el = document.getElementById(id); if (el) desenharAcorde(el, sigla); }, 10);
            return '<div id="' + id + '" class="chord-diagram"></div>';
        });
        processado = processado.replace(/\\[ABC-INFANTIL\\]([\\s\\S]*?)\\[\\/ABC-INFANTIL\\]/g, function(match, code) {
            var id = 'abc-inf-' + Date.now() + '-' + Math.random();
            setTimeout(function() {
                var el = document.getElementById(id);
                if (el && typeof ABCJS !== 'undefined') {
                    try {
                        ABCJS.renderAbc(id, code.trim(), { add_classes: true, scale: 1.0, staffwidth: 500 });
                        setTimeout(function() { aplicarCoresNasNotas(); aplicarCoresAcordesLetras(); }, 100);
                    } catch(e) { el.innerHTML = '<p style="color:red">Erro</p>'; }
                }
            }, 50);
            return '<div id="' + id + '" class="abc-container"></div>';
        });
        processado = processado.replace(/\\[ABC\\]([\\s\\S]*?)\\[\\/ABC\\]/g, function(match, code) {
            var id = 'abc-' + Date.now() + '-' + Math.random();
            setTimeout(function() {
                var el = document.getElementById(id);
                if (el && typeof ABCJS !== 'undefined') {
                    try { ABCJS.renderAbc(id, code.trim(), { scale: 1.0, staffwidth: 500 }); }
                    catch(e) { el.innerHTML = '<p style="color:red">Erro</p>'; }
                }
            }, 50);
            return '<div id="' + id + '" class="abc-container"></div>';
        });
        container.innerHTML = marked.parse(processado);
    }
    
    window.onload = function() {
        document.querySelectorAll('.aula-conteudo').forEach(function(el) {
            var conteudo = decodeURIComponent(el.getAttribute('data-conteudo'));
            renderizarAula(el, conteudo);
        });
    };
<\/script>
</body>

}
