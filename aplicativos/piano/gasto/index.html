<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Controle de Gastos</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
    min-height: 100vh;
  }
  
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  }
  
  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
    font-size: 24px;
  }
  
  .form-group {
    margin-bottom: 15px;
  }
  
  label {
    display: block;
    margin-bottom: 5px;
    color: #555;
    font-weight: 600;
    font-size: 14px;
  }
  
  select, input {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    transition: all 0.3s;
  }
  
  select:focus, input:focus {
    outline: none;
    border-color: #667eea;
  }
  
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: transform 0.2s;
  }
  
  button:active {
    transform: scale(0.98);
  }
  
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  
  .total-box {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    margin: 20px 0;
  }
  
  .total-box h3 {
    font-size: 16px;
    margin-bottom: 5px;
    opacity: 0.9;
  }
  
  .total-box .valor {
    font-size: 32px;
    font-weight: bold;
  }
  
  .resumo {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 12px;
    margin: 15px 0;
  }
  
  .resumo h4 {
    margin-bottom: 10px;
    color: #333;
  }
  
  .resumo-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #dee2e6;
  }
  
  .resumo-item:last-child {
    border-bottom: none;
    font-weight: bold;
    font-size: 18px;
    margin-top: 5px;
    padding-top: 10px;
  }
  
  .registros {
    margin-top: 20px;
  }
  
  .registros h3 {
    margin-bottom: 10px;
    font-size: 18px;
  }
  
  .lista-registros {
    max-height: 400px;
    overflow-y: auto;
  }
  
  .registro {
    background: #f8f9fa;
    border-left: 4px solid #667eea;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    transition: all 0.3s;
  }
  
  .registro:active {
    transform: scale(0.99);
  }
  
  .registro-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    font-weight: bold;
  }
  
  .registro-data {
    font-size: 11px;
    color: #666;
  }
  
  .registro-detalhes {
    font-size: 13px;
    color: #555;
    margin: 5px 0;
  }
  
  .registro-total {
    text-align: right;
    font-weight: bold;
    margin-top: 5px;
    font-size: 16px;
  }
  
  .positivo {
    color: #28a745;
  }
  
  .negativo {
    color: #dc3545;
  }
  
  .loading {
    display: none;
    text-align: center;
    padding: 15px;
    background: #f0f0f0;
    border-radius: 10px;
    margin: 10px 0;
  }
  
  .loading.active {
    display: block;
  }
  
  .btn-atualizar {
    background: #28a745;
    margin-bottom: 15px;
  }
  
  .btn-atualizar:active {
    transform: scale(0.98);
  }
  
  .empty {
    text-align: center;
    color: #999;
    padding: 20px;
  }
  
  .config-panel {
    background: #fff3cd;
    border: 1px solid #ffc107;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
  }
  
  .config-panel label {
    font-size: 12px;
    margin-bottom: 3px;
  }
  
  .config-panel input {
    font-size: 12px;
    padding: 8px;
  }
  
  .small-btn {
    background: #6c757d;
    font-size: 12px;
    padding: 8px;
    margin-top: 5px;
  }
  
  .status-msg {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 1000;
    display: none;
  }
  
  .status-msg.show {
    display: block;
    animation: fadeInOut 2s ease;
  }
  
  @keyframes fadeInOut {
    0% { opacity: 0; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { opacity: 0; }
  }
  
  @media (max-width: 480px) {
    body {
      padding: 10px;
    }
    
    .container {
      padding: 15px;
    }
    
    .total-box .valor {
      font-size: 24px;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h2>💰 Controle de Gastos</h2>
  
  <!-- Configuração da URL do Web App -->
  <div class="config-panel" id="configPanel">
    <label>🔗 URL do Web App (Google Apps Script)</label>
    <input type="url" id="webAppUrl" value="https://script.google.com/macros/s/AKfycbwsRtTehpn6wyarbkdld5XyJCEklMEw3Q9Zd0R7cDdXTtmZZOKDGYDzNxoEaa-_ZF90/exec">
    <button class="small-btn" onclick="salvarUrl()">💾 Salvar URL</button>
    <div style="font-size: 11px; color: #666; margin-top: 5px;">
      ⚠️ URL já pré-configurada. Clique em Salvar URL para ativar.
    </div>
  </div>
  
  <div class="form-group">
    <label>💳 Cartão</label>
    <select id="cartao">
      <option value="">Selecione</option>
      <option>Inter</option>
      <option>Hiper</option>
      <option>Itaú</option>
      <option>BB</option>
      <option>Nubank</option>
      <option>M-Pago</option>
    </select>
  </div>
  
  <div class="form-group">
    <label>📝 Tipo</label>
    <select id="tipo">
      <option value="gasto">Gasto</option>
      <option value="pagamento">Pagamento</option>
    </select>
  </div>
  
  <div id="camposGasto">
    <div class="form-group">
      <label>🛒 Mercado</label>
      <input type="number" id="mercado" placeholder="0,00" step="0.01">
    </div>
    <div class="form-group">
      <label>💊 Farmácia</label>
      <input type="number" id="farmacia" placeholder="0,00" step="0.01">
    </div>
    <div class="form-group">
      <label>🎯 Outros</label>
      <input type="number" id="outros" placeholder="0,00" step="0.01">
    </div>
  </div>
  
  <div id="campoPagamento" style="display:none">
    <div class="form-group">
      <label>💵 Pagamento</label>
      <input type="number" id="pagamento" placeholder="0,00" step="0.01">
    </div>
  </div>
  
  <button onclick="salvar()">💾 Salvar</button>
  
  <div class="loading" id="loading">
    <div>⏳ Processando...</div>
  </div>
  
  <div class="resumo" id="resumo">
    <h4>📊 Resumo do Lançamento:</h4>
    <div class="resumo-item">
      <span>Mercado:</span>
      <span id="resMercado">R$ 0,00</span>
    </div>
    <div class="resumo-item">
      <span>Farmácia:</span>
      <span id="resFarmacia">R$ 0,00</span>
    </div>
    <div class="resumo-item">
      <span>Outros:</span>
      <span id="resOutros">R$ 0,00</span>
    </div>
    <div class="resumo-item">
      <span>💰 Total:</span>
      <span id="resTotal">R$ 0,00</span>
    </div>
  </div>
  
  <div class="total-box">
    <h3>💰 Total Geral</h3>
    <div class="valor" id="totalGeral">R$ 0,00</div>
  </div>
  
  <div class="registros">
    <h3>📋 Últimos Registros</h3>
    <button class="btn-atualizar" onclick="carregarLista()">🔄 Atualizar</button>
    <div id="listaRegistros" class="lista-registros">
      <div class="empty">Clique em "Salvar URL" para começar</div>
    </div>
  </div>
</div>

<div id="statusMsg" class="status-msg"></div>

<script>
  let isLoading = false;
  let webAppUrl = '';
  
  // Carregar URL salva ou usar a padrão
  function init() {
    const savedUrl = localStorage.getItem('webAppUrl');
    if (savedUrl) {
      webAppUrl = savedUrl;
      document.getElementById('webAppUrl').value = webAppUrl;
      mostrarStatus('✅ URL carregada! Testando conexão...');
      testarConexao();
    } else {
      // URL padrão já está no input
      const defaultUrl = document.getElementById('webAppUrl').value;
      if (defaultUrl) {
        webAppUrl = defaultUrl;
        mostrarStatus('⚠️ Clique em "Salvar URL" para ativar');
      }
    }
  }
  
  function mostrarStatus(msg, isErro = false) {
    const statusDiv = document.getElementById('statusMsg');
    statusDiv.textContent = msg;
    statusDiv.style.background = isErro ? '#dc3545' : '#28a745';
    statusDiv.classList.add('show');
    setTimeout(() => {
      statusDiv.classList.remove('show');
    }, 3000);
  }
  
  function salvarUrl() {
    const url = document.getElementById('webAppUrl').value;
    if (url && url.includes('script.google.com')) {
      webAppUrl = url;
      localStorage.setItem('webAppUrl', url);
      mostrarStatus('✅ URL salva com sucesso!');
      testarConexao();
      carregarLista();
      carregarTotais();
    } else {
      mostrarStatus('❌ Digite uma URL válida do Google Apps Script', true);
    }
  }
  
  async function testarConexao() {
    if (!webAppUrl) return;
    
    try {
      const response = await fetch(`${webAppUrl}?acao=teste`, {
        method: 'GET',
        mode: 'cors'
      });
      
      if (response.ok) {
        mostrarStatus('✅ Conexão estabelecida com sucesso!');
      } else {
        mostrarStatus('⚠️ Conexão OK, mas resposta inesperada', true);
      }
    } catch (error) {
      console.error('Erro no teste:', error);
      mostrarStatus('⚠️ Servidor conectado, aguarde o carregamento', true);
    }
  }
  
  // Alternar campos
  document.getElementById('tipo').addEventListener('change', function() {
    const tipo = this.value;
    if (tipo === 'pagamento') {
      document.getElementById('camposGasto').style.display = 'none';
      document.getElementById('campoPagamento').style.display = 'block';
      document.getElementById('resumo').style.display = 'none';
    } else {
      document.getElementById('camposGasto').style.display = 'block';
      document.getElementById('campoPagamento').style.display = 'none';
      document.getElementById('resumo').style.display = 'block';
    }
    atualizarResumo();
  });
  
  function atualizarResumo() {
    const tipo = document.getElementById('tipo').value;
    
    if (tipo === 'pagamento') {
      const pagamento = Number(document.getElementById('pagamento').value) || 0;
      document.getElementById('resTotal').innerHTML = formatarMoeda(pagamento);
    } else {
      const mercado = Number(document.getElementById('mercado').value) || 0;
      const farmacia = Number(document.getElementById('farmacia').value) || 0;
      const outros = Number(document.getElementById('outros').value) || 0;
      const total = mercado + farmacia + outros;
      
      document.getElementById('resMercado').innerHTML = formatarMoeda(mercado);
      document.getElementById('resFarmacia').innerHTML = formatarMoeda(farmacia);
      document.getElementById('resOutros').innerHTML = formatarMoeda(outros);
      document.getElementById('resTotal').innerHTML = formatarMoeda(total);
    }
  }
  
  function formatarMoeda(valor) {
    return 'R$ ' + Math.abs(valor).toFixed(2).replace('.', ',');
  }
  
  function formatarData(data) {
    if (!data) return '';
    const d = new Date(data);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
  }
  
  async function carregarLista() {
    if (isLoading || !webAppUrl) {
      if (!webAppUrl) mostrarStatus('⚠️ Salve a URL primeiro', true);
      return;
    }
    isLoading = true;
    
    const listaDiv = document.getElementById('listaRegistros');
    listaDiv.innerHTML = '<div class="empty">Carregando registros...</div>';
    
    try {
      const response = await fetch(`${webAppUrl}?acao=listar`, {
        method: 'GET',
        mode: 'cors'
      });
      
      if (!response.ok) throw new Error('Erro na requisição');
      
      const registros = await response.json();
      
      if (!registros || registros.length === 0) {
        listaDiv.innerHTML = '<div class="empty">Nenhum registro encontrado</div>';
      } else {
        let html = '';
        for (let i = 0; i < registros.length; i++) {
          const r = registros[i];
          const totalClass = r.total < 0 ? 'negativo' : 'positivo';
          const tipoIcon = r.tipo === 'pagamento' ? '💳' : '💸';
          
          let detalhes = '';
          if (r.tipo === 'pagamento') {
            detalhes = `Pagamento: ${formatarMoeda(r.pagamento)}`;
          } else {
            const itens = [];
            if (r.mercado > 0) itens.push(`Mercado: ${formatarMoeda(r.mercado)}`);
            if (r.farmacia > 0) itens.push(`Farmácia: ${formatarMoeda(r.farmacia)}`);
            if (r.outros > 0) itens.push(`Outros: ${formatarMoeda(r.outros)}`);
            detalhes = itens.join(' | ');
          }
          
          html += `
            <div class="registro">
              <div class="registro-header">
                <span>${tipoIcon} ${r.cartao}</span>
                <span class="registro-data">${formatarData(r.data)}</span>
              </div>
              <div class="registro-detalhes">${detalhes}</div>
              <div class="registro-total ${totalClass}">${formatarMoeda(r.total)}</div>
            </div>
          `;
        }
        listaDiv.innerHTML = html;
      }
    } catch (error) {
      console.error('Erro:', error);
      listaDiv.innerHTML = '<div class="empty">Erro ao carregar registros. Verifique a URL.</div>';
      mostrarStatus('❌ Erro ao carregar lista: ' + error.message, true);
    }
    isLoading = false;
  }
  
  async function carregarTotais() {
    if (!webAppUrl) return;
    
    try {
      const response = await fetch(`${webAppUrl}?acao=totais`, {
        method: 'GET',
        mode: 'cors'
      });
      
      if (!response.ok) throw new Error('Erro na requisição');
      
      const totais = await response.json();
      if (totais && totais.totalGeral !== undefined) {
        document.getElementById('totalGeral').innerHTML = formatarMoeda(totais.totalGeral);
      }
    } catch (error) {
      console.error('Erro ao carregar totais:', error);
    }
  }
  
  async function salvar() {
    if (!webAppUrl) {
      mostrarStatus('⚠️ Salve a URL do Web App primeiro', true);
      return;
    }
    
    const cartao = document.getElementById('cartao').value;
    if (!cartao) {
      mostrarStatus('⚠️ Selecione um cartão', true);
      return;
    }
    
    const tipo = document.getElementById('tipo').value;
    let mercado = 0, farmacia = 0, outros = 0, pagamento = 0, total = 0;
    
    if (tipo === 'pagamento') {
      pagamento = Number(document.getElementById('pagamento').value) || 0;
      if (pagamento === 0) {
        mostrarStatus('⚠️ Informe o valor do pagamento', true);
        return;
      }
      total = -pagamento;
    } else {
      mercado = Number(document.getElementById('mercado').value) || 0;
      farmacia = Number(document.getElementById('farmacia').value) || 0;
      outros = Number(document.getElementById('outros').value) || 0;
      
      if (mercado === 0 && farmacia === 0 && outros === 0) {
        mostrarStatus('⚠️ Informe pelo menos um valor', true);
        return;
      }
      total = mercado + farmacia + outros;
    }
    
    const loading = document.getElementById('loading');
    const button = document.querySelector('button');
    
    loading.classList.add('active');
    button.disabled = true;
    
    try {
      const response = await fetch(webAppUrl, {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          cartao: cartao,
          tipo: tipo,
          mercado: mercado,
          farmacia: farmacia,
          outros: outros,
          pagamento: pagamento,
          total: total
        })
      });
      
      if (!response.ok) throw new Error('Erro na requisição: ' + response.status);
      
      const result = await response.json();
      
      if (result.status === 'success') {
        mostrarStatus('✅ Salvo com sucesso!');
        
        // Limpar formulário
        document.getElementById('cartao').value = '';
        document.getElementById('mercado').value = '';
        document.getElementById('farmacia').value = '';
        document.getElementById('outros').value = '';
        document.getElementById('pagamento').value = '';
        
        // Recarregar dados
        await carregarLista();
        await carregarTotais();
        atualizarResumo();
      } else {
        mostrarStatus('❌ Erro: ' + (result.message || 'Falha ao salvar'), true);
      }
    } catch (error) {
      console.error('Erro detalhado:', error);
      mostrarStatus('❌ Erro ao salvar: ' + error.message, true);
    }
    
    loading.classList.remove('active');
    button.disabled = false;
  }
  
  // Event listeners
  document.getElementById('mercado').addEventListener('input', atualizarResumo);
  document.getElementById('farmacia').addEventListener('input', atualizarResumo);
  document.getElementById('outros').addEventListener('input', atualizarResumo);
  document.getElementById('pagamento').addEventListener('input', atualizarResumo);
  
  // Inicializar
  init();
  atualizarResumo();
</script>
</body>
</html>
