<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Controle de Gastos</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
    min-height: 100vh;
  }
  
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  }
  
  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
  }
  
  .form-group {
    margin-bottom: 15px;
  }
  
  label {
    display: block;
    margin-bottom: 5px;
    color: #555;
    font-weight: 600;
    font-size: 14px;
  }
  
  select, input {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
  }
  
  select:focus, input:focus {
    outline: none;
    border-color: #667eea;
  }
  
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
  }
  
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  
  .total-box {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    margin: 20px 0;
  }
  
  .total-box .valor {
    font-size: 32px;
    font-weight: bold;
  }
  
  .resumo {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 12px;
    margin: 15px 0;
  }
  
  .resumo-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #dee2e6;
  }
  
  .resumo-item:last-child {
    border-bottom: none;
    font-weight: bold;
    font-size: 18px;
    padding-top: 10px;
    margin-top: 5px;
  }
  
  .registros {
    margin-top: 20px;
  }
  
  .lista-registros {
    max-height: 400px;
    overflow-y: auto;
  }
  
  .registro {
    background: #f8f9fa;
    border-left: 4px solid #667eea;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
  }
  
  .registro-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    font-weight: bold;
  }
  
  .registro-data {
    font-size: 11px;
    color: #666;
  }
  
  .registro-detalhes {
    font-size: 12px;
    color: #555;
    margin: 5px 0;
  }
  
  .registro-total {
    text-align: right;
    font-weight: bold;
  }
  
  .positivo { color: #28a745; }
  .negativo { color: #dc3545; }
  
  .loading {
    display: none;
    text-align: center;
    padding: 15px;
    background: #f0f0f0;
    border-radius: 10px;
    margin: 10px 0;
  }
  
  .loading.active { display: block; }
  
  .btn-atualizar {
    background: #28a745;
    margin-bottom: 15px;
  }
  
  .empty {
    text-align: center;
    color: #999;
    padding: 20px;
  }
  
  .status-msg {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 1000;
    display: none;
  }
  
  .status-msg.show {
    display: block;
    animation: fadeOut 2s ease;
  }
  
  @keyframes fadeOut {
    0% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="container">
  <h2>💰 Controle de Gastos1</h2>
  
  <div class="form-group">
    <label>💳 Cartão</label>
    <select id="cartao">
      <option value="">Selecione</option>
      <option>Inter</option>
      <option>Hiper</option>
      <option>Itaú</option>
      <option>BB</option>
      <option>Nubank</option>
      <option>M-Pago</option>
    </select>
  </div>
  
  <div class="form-group">
    <label>📝 Tipo</label>
    <select id="tipo">
      <option value="gasto">Gasto</option>
      <option value="pagamento">Pagamento</option>
    </select>
  </div>
  
  <div id="camposGasto">
    <div class="form-group">
      <label>🛒 Mercado</label>
      <input type="number" id="mercado" placeholder="0,00" step="0.01">
    </div>
    <div class="form-group">
      <label>💊 Farmácia</label>
      <input type="number" id="farmacia" placeholder="0,00" step="0.01">
    </div>
    <div class="form-group">
      <label>🎯 Outros</label>
      <input type="number" id="outros" placeholder="0,00" step="0.01">
    </div>
  </div>
  
  <div id="campoPagamento" style="display:none">
    <div class="form-group">
      <label>💵 Pagamento</label>
      <input type="number" id="pagamento" placeholder="0,00" step="0.01">
    </div>
  </div>
  
  <button onclick="salvar()">💾 Salvar</button>
  
  <div class="loading" id="loading">
    <div>⏳ Salvando...</div>
  </div>
  
  <div class="resumo" id="resumo">
    <h4>📊 Resumo:</h4>
    <div class="resumo-item">
      <span>Mercado:</span>
      <span id="resMercado">R$ 0,00</span>
    </div>
    <div class="resumo-item">
      <span>Farmácia:</span>
      <span id="resFarmacia">R$ 0,00</span>
    </div>
    <div class="resumo-item">
      <span>Outros:</span>
      <span id="resOutros">R$ 0,00</span>
    </div>
    <div class="resumo-item">
      <span>💰 Total:</span>
      <span id="resTotal">R$ 0,00</span>
    </div>
  </div>
  
  <div class="total-box">
    <h3>💰 Total Geral</h3>
    <div class="valor" id="totalGeral">R$ 0,00</div>
  </div>
  
  <div class="registros">
    <h3>📋 Últimos Registros</h3>
    <button class="btn-atualizar" onclick="carregarLista()">🔄 Atualizar</button>
    <div id="listaRegistros" class="lista-registros">
      <div class="empty">Carregando...</div>
    </div>
  </div>
</div>

<div id="statusMsg" class="status-msg"></div>

<script>
  // COLOQUE SUA URL AQUI
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwsRtTehpn6wyarbkdld5XyJCEklMEw3Q9Zd0R7cDdXTtmZZOKDGYDzNxoEaa-_ZF90/exec';
  
  function mostrarStatus(msg, erro = false) {
    const div = document.getElementById('statusMsg');
    div.textContent = msg;
    div.style.background = erro ? '#dc3545' : '#28a745';
    div.classList.add('show');
    setTimeout(() => div.classList.remove('show'), 2000);
  }
  
  document.getElementById('tipo').onchange = function() {
    const isPagamento = this.value === 'pagamento';
    document.getElementById('camposGasto').style.display = isPagamento ? 'none' : 'block';
    document.getElementById('campoPagamento').style.display = isPagamento ? 'block' : 'none';
    document.getElementById('resumo').style.display = isPagamento ? 'none' : 'block';
    atualizarResumo();
  };
  
  function atualizarResumo() {
    if (document.getElementById('tipo').value === 'pagamento') {
      const p = Number(document.getElementById('pagamento').value) || 0;
      document.getElementById('resTotal').innerHTML = `R$ ${p.toFixed(2).replace('.', ',')}`;
      return;
    }
    
    const m = Number(document.getElementById('mercado').value) || 0;
    const f = Number(document.getElementById('farmacia').value) || 0;
    const o = Number(document.getElementById('outros').value) || 0;
    const total = m + f + o;
    
    document.getElementById('resMercado').innerHTML = `R$ ${m.toFixed(2).replace('.', ',')}`;
    document.getElementById('resFarmacia').innerHTML = `R$ ${f.toFixed(2).replace('.', ',')}`;
    document.getElementById('resOutros').innerHTML = `R$ ${o.toFixed(2).replace('.', ',')}`;
    document.getElementById('resTotal').innerHTML = `R$ ${total.toFixed(2).replace('.', ',')}`;
  }
  
  function formatarMoeda(v) {
    return `R$ ${Math.abs(v).toFixed(2).replace('.', ',')}`;
  }
  
  function formatarData(d) {
    if (!d) return '';
    const data = new Date(d);
    return data.toLocaleDateString('pt-BR') + ' ' + data.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  }
  
  async function carregarLista() {
    const div = document.getElementById('listaRegistros');
    div.innerHTML = '<div class="empty">Carregando...</div>';
    
    try {
      const resposta = await fetch(`${WEB_APP_URL}?acao=listar`);
      const dados = await resposta.json();
      
      if (!dados || dados.length === 0) {
        div.innerHTML = '<div class="empty">Nenhum registro</div>';
        return;
      }
      
      div.innerHTML = dados.map(r => {
        const classe = r.total < 0 ? 'negativo' : 'positivo';
        const icone = r.tipo === 'pagamento' ? '💳' : '💸';
        
        let detalhes = '';
        if (r.tipo === 'pagamento') {
          detalhes = `Pagamento: ${formatarMoeda(r.pagamento)}`;
        } else {
          const itens = [];
          if (r.mercado > 0) itens.push(`Mercado: ${formatarMoeda(r.mercado)}`);
          if (r.farmacia > 0) itens.push(`Farmácia: ${formatarMoeda(r.farmacia)}`);
          if (r.outros > 0) itens.push(`Outros: ${formatarMoeda(r.outros)}`);
          detalhes = itens.join(' | ');
        }
        
        return `
          <div class="registro">
            <div class="registro-header">
              <span>${icone} ${r.cartao}</span>
              <span class="registro-data">${formatarData(r.data)}</span>
            </div>
            <div class="registro-detalhes">${detalhes}</div>
            <div class="registro-total ${classe}">${formatarMoeda(r.total)}</div>
          </div>
        `;
      }).join('');
      
    } catch (erro) {
      console.error(erro);
      div.innerHTML = '<div class="empty">Erro ao carregar</div>';
      mostrarStatus('❌ Erro ao carregar lista', true);
    }
  }
  
  async function carregarTotais() {
    try {
      const resposta = await fetch(`${WEB_APP_URL}?acao=totais`);
      const totais = await resposta.json();
      document.getElementById('totalGeral').innerHTML = formatarMoeda(totais.totalGeral || 0);
    } catch (erro) {
      console.error(erro);
    }
  }
  
  async function salvar() {
    const cartao = document.getElementById('cartao').value;
    if (!cartao) {
      mostrarStatus('⚠️ Selecione um cartão', true);
      return;
    }
    
    const tipo = document.getElementById('tipo').value;
    let mercado = 0, farmacia = 0, outros = 0, pagamento = 0, total = 0;
    
    if (tipo === 'pagamento') {
      pagamento = Number(document.getElementById('pagamento').value) || 0;
      if (pagamento === 0) {
        mostrarStatus('⚠️ Informe o valor', true);
        return;
      }
      total = -pagamento;
    } else {
      mercado = Number(document.getElementById('mercado').value) || 0;
      farmacia = Number(document.getElementById('farmacia').value) || 0;
      outros = Number(document.getElementById('outros').value) || 0;
      if (mercado === 0 && farmacia === 0 && outros === 0) {
        mostrarStatus('⚠️ Informe pelo menos um valor', true);
        return;
      }
      total = mercado + farmacia + outros;
    }
    
    const loading = document.getElementById('loading');
    const btn = document.querySelector('button');
    
    loading.classList.add('active');
    btn.disabled = true;
    
    try {
      const resposta = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cartao, tipo, mercado, farmacia, outros, pagamento, total })
      });
      
      const resultado = await resposta.json();
      
      if (resultado.status === 'success') {
        mostrarStatus('✅ Salvo com sucesso!');
        document.getElementById('cartao').value = '';
        document.getElementById('mercado').value = '';
        document.getElementById('farmacia').value = '';
        document.getElementById('outros').value = '';
        document.getElementById('pagamento').value = '';
        await carregarLista();
        await carregarTotais();
        atualizarResumo();
      } else {
        mostrarStatus('❌ ' + resultado.message, true);
      }
    } catch (erro) {
      mostrarStatus('❌ Erro ao salvar', true);
      console.error(erro);
    }
    
    loading.classList.remove('active');
    btn.disabled = false;
  }
  
  document.getElementById('mercado').oninput = atualizarResumo;
  document.getElementById('farmacia').oninput = atualizarResumo;
  document.getElementById('outros').oninput = atualizarResumo;
  document.getElementById('pagamento').oninput = atualizarResumo;
  
  // Iniciar
  carregarLista();
  carregarTotais();
  atualizarResumo();
</script>
</body>
</html>
