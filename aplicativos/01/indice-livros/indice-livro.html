<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Livros de Música</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #16a085;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #2f3640;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .search-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
        }

        .search-box label {
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .search-box input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        /* Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 400px;
        }

        .panel h2 {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-top: 0;
            color: var(--primary-color);
        }

        /* Lista (Esquerda) */
        .book-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 600px;
            overflow-y: auto; /* Adiciona barra de rolagem se houver muitos resultados */
        }

        .book-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s, padding-left 0.2s;
            border-radius: 4px;
        }

        .book-item:hover {
            background-color: #f0f2f5;
            padding-left: 18px;
            color: var(--accent-color);
        }

        .book-item.active {
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
        }

        .book-code {
            display: inline-block;
            background-color: #e1b12c;
            color: #fff;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 4px;
        }

        .book-item.active .book-code {
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* Índice (Direita) */
        .index-content {
            white-space: pre-line;
            line-height: 1.6;
            font-size: 16px;
        }

        .placeholder-text {
            color: #7f8c8d;
            font-style: italic;
            text-align: center;
            margin-top: 50px;
        }

        .loading-message {
            text-align: center;
            grid-column: span 2;
            font-size: 18px;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <header>
        <h1>Índice de Livros de Música</h1>
        <p>Biblioteca Digital Compartilhada</p>
    </header>

    <div class="search-container">
        <div class="search-box">
            <label for="searchTitle">Título do Livro</label>
            <input type="text" id="searchTitle" placeholder="Digite para buscar..." disabled>
        </div>
        <div class="search-box">
            <label for="searchAuthor">Autor</label>
            <input type="text" id="searchAuthor" placeholder="Digite para buscar..." disabled>
        </div>
        <div class="search-box">
            <label for="searchCode">Código</label>
            <input type="text" id="searchCode" placeholder="Ex: 7019..." disabled>
        </div>
    </div>

    <main class="main-content">
        <div id="loading" class="loading-message">Carregando catálogo...</div>

        <section class="panel" id="leftPanel" style="display: none;">
            <h2>Resultados da Busca</h2>
            <ul id="bookList" class="book-list">
                <li class="placeholder-text">Digite pelo menos 3 caracteres em algum dos filtros acima para buscar.</li>
            </ul>
        </section>

        <section class="panel" id="rightPanel" style="display: none;">
            <h2>Conteúdo do Índice</h2>
            <div id="indexContent" class="index-content">
                <p class="placeholder-text">Selecione um livro na barra lateral esquerda para visualizar o índice.</p>
            </div>
        </section>
    </main>

    <script>
        let catalog = [];

        const searchTitle = document.getElementById('searchTitle');
        const searchAuthor = document.getElementById('searchAuthor');
        const searchCode = document.getElementById('searchCode');
        const bookListEl = document.getElementById('bookList');
        const indexContentEl = document.getElementById('indexContent');
        const loadingEl = document.getElementById('loading');
        const leftPanel = document.getElementById('leftPanel');
        const rightPanel = document.getElementById('rightPanel');

        // Carrega o catálogo JSON inicialmente
        window.addEventListener('DOMContentLoaded', () => {
            fetch('livros.json')
                .then(response => {
                    if (!response.ok) throw new Error('Falha ao carregar livros.json');
                    return response.json();
                })
                .then(data => {
                    catalog = data;
                    loadingEl.style.display = 'none';
                    leftPanel.style.display = 'block';
                    rightPanel.style.display = 'block';
                    
                    searchTitle.disabled = false;
                    searchAuthor.disabled = false;
                    searchCode.disabled = false;
                })
                .catch(error => {
                    loadingEl.innerHTML = `<span style="color: #e74c3c;">Erro ao carregar catálogo: ${error.message}</span>`;
                });
        });

        function renderBookList(books, isSearching) {
            bookListEl.innerHTML = '';
            
            if (!isSearching) {
                bookListEl.innerHTML = '<li class="placeholder-text">Digite pelo menos 3 caracteres em algum dos filtros acima para buscar.</li>';
                indexContentEl.innerHTML = '<p class="placeholder-text">Nenhum livro selecionado.</p>';
                return;
            }

            if (books.length === 0) {
                bookListEl.innerHTML = '<li class="placeholder-text">Nenhum livro encontrado com esses termos de busca.</li>';
                indexContentEl.innerHTML = '<p class="placeholder-text">Nenhum livro selecionado.</p>';
                return;
            }

            books.forEach(book => {
                const li = document.createElement('li');
                li.className = 'book-item';
                li.innerHTML = `
                    <span class="book-code">${book.codigo}</span><br>
                    <strong>${book.titulo}</strong><br>
                    <small>Autor: ${book.autor}</small>
                `;
                
                li.addEventListener('click', () => {
                    document.querySelectorAll('.book-item').forEach(item => item.classList.remove('active'));
                    li.classList.add('active');
                    loadBookIndex(book);
                });

                bookListEl.appendChild(li);
            });
        }

        // Busca o arquivo TXT específico sob demanda
        function loadBookIndex(book) {
            indexContentEl.innerHTML = '<p class="placeholder-text">Carregando índice...</p>';

            fetch(book.arquivo)
                .then(response => {
                    if (!response.ok) throw new Error('Não foi possível encontrar o arquivo de índice deste livro.');
                    return response.text();
                })
                .then(text => {
                    indexContentEl.innerHTML = `
                        <div style="margin-bottom: 15px;">
                            <span class="book-code" style="font-size: 14px; padding: 4px 8px;">Código: ${book.codigo}</span>
                        </div>
                        <h3 style="margin-top:0; color: var(--accent-color);">${book.titulo}</h3>
                        <p><strong>Autor:</strong> ${book.autor}</p>
                        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                        <div style="font-family: inherit; font-size: 15px;">${text.trim() || 'Índice vazio.'}</div>
                    `;
                })
                .catch(error => {
                    indexContentEl.innerHTML = `<p style="color: #e74c3c; font-weight: bold;">Erro: ${error.message}</p>`;
                });
        }

        function filterBooks() {
            const titleQuery = searchTitle.value.toLowerCase();
            const authorQuery = searchAuthor.value.toLowerCase();
            const codeQuery = searchCode.value.toLowerCase();

            // Só realiza a busca se o usuário tiver digitado 3 ou mais letras em pelo menos um dos campos
            const hasEnoughCharacters = titleQuery.length >= 3 || authorQuery.length >= 3 || codeQuery.length >= 3;

            if (!hasEnoughCharacters) {
                renderBookList([], false);
                return;
            }

            const filtered = catalog.filter(book => {
                const matchesTitle = titleQuery.length >= 3 ? book.titulo.toLowerCase().includes(titleQuery) : true;
                const matchesAuthor = authorQuery.length >= 3 ? book.autor.toLowerCase().includes(authorQuery) : true;
                const matchesCode = codeQuery.length >= 3 ? book.codigo.toLowerCase().includes(codeQuery) : true;

                return matchesTitle && matchesAuthor && matchesCode;
            });

            renderBookList(filtered, true);
        }

        searchTitle.addEventListener('input', filterBooks);
        searchAuthor.addEventListener('input', filterBooks);
        searchCode.addEventListener('input', filterBooks);
    </script>
</body>
</html>
