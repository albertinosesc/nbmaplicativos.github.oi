<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro de Teoria Musical</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 12px; }
    .item-conceito { display: flex; align-items: center; justify-content: space-between; }
    label { font-size: 1.1em; cursor: pointer; }
    input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }
    select, button { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 6px; }
    button { background-color: #28a745; color: white; border: none; font-size: 1em; cursor: pointer; }
  </style>
</head>
<body>

  <h2>Registro de Conceitos Teóricos</h2>

  <!-- Seleção do Aluno -->
  <label for="alunoSelect"><strong>Selecione o Aluno:</strong></label>
  <select id="alunoSelect">
    <option value="">Carregando alunos...</option>
  </select>

  <!-- Lista Dinâmica de Conceitos -->
  <div id="listaConceitos"></div>

  <button id="btnSalvar">Salvar Progresso Teórico</button>

  <script>
    let configAdmin = {};

    // Carrega o JSON unificado do admin
    async function carregarConfig() {
      try {
        const res = await fetch('./admin/admin_config.json');
        configAdmin = await res.json();
        
        preencherAlunos(configAdmin.alunos);
        renderizarConceitos(configAdmin.conteudos.conceitos);
      } catch (err) {
        console.error("Erro ao carregar JSON:", err);
      }
    }

    function preencherAlunos(alunos) {
      const select = document.getElementById('alunoSelect');
      select.innerHTML = '<option value="">-- Escolha um aluno --</option>';
      alunos.forEach(a => {
        select.innerHTML += `<option value="${a.id}">${a.nome}</option>`;
      });
    }

    function renderizarConceitos(conceitos) {
      const container = document.getElementById('listaConceitos');
      container.innerHTML = '';

      conceitos.forEach(c => {
        container.innerHTML += `
          <div class="card item-conceito">
            <label for="chk_${c.id}">${c.titulo}</label>
            <input type="checkbox" id="chk_${c.id}" data-id="${c.id}" data-titulo="${c.titulo}">
          </div>
        `;
      });
    }

    // Salva o progresso do aluno selecionado
    document.getElementById('btnSalvar').addEventListener('click', () => {
      const alunoId = document.getElementById('alunoSelect').value;
      if (!alunoId) {
        alert('Por favor, selecione um aluno!');
        return;
      }

      const checados = [];
      document.querySelectorAll('#listaConceitos input[type="checkbox"]').forEach(chk => {
        if (chk.checked) {
          checados.push({
            id: chk.dataset.id,
            titulo: chk.dataset.titulo,
            concluido: true
          });
        }
      });

      console.log(`Salvando para aluno ${alunoId}:`, checados);
      alert('Progresso salvo com sucesso!');
    });

    carregarConfig();
  </script>
</body>
</html>
