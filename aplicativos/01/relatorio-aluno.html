<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatório do Aluno</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    select { width: 100%; padding: 10px; margin-bottom: 25px; border-radius: 6px; }
    .secao { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #007bff; }
    .secao h3 { margin-top: 0; color: #007bff; }
    .grid-relatorio { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    ul { list-style: none; padding: 0; }
    li { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    .status-ok { color: #28a745; font-weight: bold; }
    .status-pending { color: #dc3545; }
  </style>
</head>
<body>

  <h2>Relatório Geral de Desempenho</h2>

  <label for="alunoSelect"><strong>Selecione o Aluno para visualizar o relatório:</strong></label>
  <select id="alunoSelect" onchange="carregarRelatorioAluno(this.value)">
    <option value="">Carregando...</option>
  </select>

  <div class="grid-relatorio">
    <!-- Seção 1: Teoria / Conceitos -->
    <div class="secao">
      <h3>Conceitos Teóricos</h3>
      <ul id="relatorioTeoria">
        <li style="color: #666;">Selecione um aluno acima.</li>
      </ul>
    </div>

    <!-- Seção 2: Prática / Tonalidades -->
    <div class="secao" style="border-left-color: #28a745;">
      <h3 style="color: #28a745;">Tonalidades / Exercícios</h3>
      <ul id="relatorioTonalidades">
        <li style="color: #666;">Selecione um aluno acima.</li>
      </ul>
    </div>
  </div>

  <script>
    let configAdmin = {};

    async function init() {
      const res = await fetch('./admin/admin_config.json');
      configAdmin = await res.json();
      
      const select = document.getElementById('alunoSelect');
      select.innerHTML = '<option value="">-- Selecione o Aluno --</option>';
      configAdmin.alunos.forEach(a => {
        select.innerHTML += `<option value="${a.id}">${a.nome}</option>`;
      });
    }

    function carregarRelatorioAluno(alunoId) {
      if (!alunoId) return;

      // Aqui você buscaria os dados salvos do aluno (seja do localStorage, Firebase, GitHub JSON, etc.)
      // Abaixo está uma simulação visual de dados carregados:
      
      // Exemplo de exibição da Teoria
      const containerTeoria = document.getElementById('relatorioTeoria');
      containerTeoria.innerHTML = '';
      configAdmin.conteudos.conceitos.forEach(c => {
        // Exemplo: simulando status vindo do banco/localStorage
        const concluido = true; // Exemplo dinâmico
        
        containerTeoria.innerHTML += `
          <li>
            <span>${c.titulo}</span>
            <span class="${concluido ? 'status-ok' : 'status-pending'}">
              ${concluido ? '✓ Concluído' : '✗ Pendente'}
            </span>
          </li>
        `;
      });

      // Exemplo de exibição das Tonalidades
      const containerTonalidades = document.getElementById('relatorioTonalidades');
      containerTonalidades.innerHTML = '';
      configAdmin.conteudos.tonalidades.forEach(t => {
        containerTonalidades.innerHTML += `
          <li>
            <span><strong>${t.titulo}</strong></span>
            <span class="status-ok">C, G, D (3/4)</span>
          </li>
        `;
      });
    }

    init();
  </script>
</body>
</html>
