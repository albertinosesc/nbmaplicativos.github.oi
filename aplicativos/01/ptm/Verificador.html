<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prática por Tonalidades</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 20px; max-width: 1200px; margin: 0 auto; color: #1f2937; }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn { background: #e5e7eb; color: #374151; padding: 8px 14px; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 0.9rem; }
    .nav-btn:hover, .nav-btn.active { background: #10b981; color: white; }

    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; color: #1a1a2e; }
    
    input, select, button { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    .btn { border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; border-radius: 8px; background: #10b981; color: white; }

    .aluno-selector { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .aluno-selector select { flex: 1; min-width: 220px; }

    .musica-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; margin-bottom: 12px; }
    .musica-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    
    .tonalidades-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 8px; }
    .ton-btn { padding: 8px; border: 1px solid #d1d5db; background: white; border-radius: 6px; text-align: center; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
    .ton-btn.active { background: #10b981; color: white; border-color: #059669; }

    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
    .toast { background: #333; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1><i class="fa-solid fa-sliders" style="color:#10b981;"></i> Tonalidades por Música</h1>
    <div class="nav-links">
      <a href="tonalidades.html" class="nav-btn active"><i class="fa-solid fa-sliders"></i> Tonalidades</a>
      <a href="musicas.html" class="nav-btn"><i class="fa-solid fa-music"></i> Músicas</a>
      <a href="conceitos.html" class="nav-btn"><i class="fa-solid fa-book-open"></i> Conceitos</a>
      <a href="relatorio.html" class="nav-btn"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
    </div>
  </div>

  <div class="card">
    <div class="aluno-selector">
      <label for="selectAluno"><b>👤 Aluno:</b></label>
      <select id="selectAluno" onchange="carregarDadosAluno()">
        <option value="">Selecione o Aluno...</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div id="listaTonalidadesMusicas">
      <p style="text-align: center; color: #666;">Selecione um aluno acima.</p>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    const GH_CONFIG = { user: "albertinosesc", repo: "minhas-musicas", branch: "main" };
    const TONS = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    let musicasAluno = [];
    let alunoAtualSlug = '';
    let shaAtual = '';

    window.onload = function() { carregarListaAlunos(); };

    function obterToken() { return localStorage.getItem("gh_pat_token") || ''; }
    function showToast(msg) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast show'; toast.innerText = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    function codificarUTF8Base64(str) { return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1))); }
    function decodificarBase64UTF8(str) { return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }

    async function carregarListaAlunos() {
      const token = obterToken();
      if (!token) return alert("Por favor, informe e autentique seu Token na página de Músicas primeiro.");

      const res = await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos?ref=${GH_CONFIG.branch}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      const arquivos = await res.json();
      const select = document.getElementById('selectAluno');
      select.innerHTML = '<option value="">Selecione o Aluno...</option>';
      const alunosSet = new Set();
      arquivos.forEach(a => {
        if (a.name.endsWith('.json')) alunosSet.add(a.name.replace('aluno_', '').replace('teoria_', '').replace('.json', ''));
      });
      alunosSet.forEach(slug => {
        let nome = slug.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        select.innerHTML += `<option value="${slug}">${nome}</option>`;
      });
    }

    async function carregarDadosAluno() {
      alunoAtualSlug = document.getElementById('selectAluno').value;
      if (!alunoAtualSlug) return;

      const res = await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos/aluno_${alunoAtualSlug}.json?ref=${GH_CONFIG.branch}`, {
        headers: { 'Authorization': `token ${obterToken()}` }
      });

      if (res.ok) {
        const data = await res.json();
        shaAtual = data.sha;
        const json = JSON.parse(decodificarBase64UTF8(data.content));
        musicasAluno = json.musicas || [];
      } else { musicasAluno = []; }

      exibirTonalidades();
    }

    function exibirTonalidades() {
      const container = document.getElementById('listaTonalidadesMusicas');
      if (musicasAluno.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#999;">Nenhuma música cadastrada para este aluno.</p>';
        return;
      }

      container.innerHTML = musicasAluno.map((m, mIdx) => {
        const concluidas = Array.isArray(m.tonalidadesConcluidas) ? m.tonalidadesConcluidas : [];
        return `
          <div class="musica-card">
            <div class="musica-header">
              <strong>🎵 ${m.nome}</strong>
              <span style="font-size:0.85rem; color:#666;">${concluidas.length}/12 Tonalidades</span>
            </div>
            <div class="tonalidades-grid">
              ${TONS.map(t => `
                <div class="ton-btn ${concluidas.includes(t) ? 'active' : ''}" onclick="toggleTom(${mIdx}, '${t}')">
                  ${t}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    async function toggleTom(mIdx, tom) {
      if (!Array.isArray(musicasAluno[mIdx].tonalidadesConcluidas)) {
        musicasAluno[mIdx].tonalidadesConcluidas = [];
      }
      
      let list = musicasAluno[mIdx].tonalidadesConcluidas;
      let pos = list.indexOf(tom);
      if (pos > -1) list.splice(pos, 1);
      else list.push(tom);

      exibirTonalidades();
      await salvarNoGitHub();
    }

    async function salvarNoGitHub() {
      const token = obterToken();
      const conteudoJSON = JSON.stringify({ musicas: musicasAluno }, null, 2);
      
      const res = await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos/aluno_${alunoAtualSlug}.json`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: `Atualizando tonalidades de ${alunoAtualSlug}`,
          content: codificarUTF8Base64(conteudoJSON),
          sha: shaAtual,
          branch: GH_CONFIG.branch
        })
      });

      if (res.ok) {
        const data = await res.json();
        shaAtual = data.content.sha;
        showToast("Tonalidade salva!");
      }
    }
  </script>
</body>
</html>
