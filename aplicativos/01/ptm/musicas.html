<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Músicas do Aluno</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 20px; max-width: 1200px; margin: 0 auto; color: #1f2937; }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn { background: #e5e7eb; color: #374151; padding: 8px 14px; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
    .nav-btn:hover, .nav-btn.active { background: #6c63ff; color: white; }

    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; color: #1a1a2e; }
    
    .github-panel { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input, select, button { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    input[type="password"], input[type="text"] { flex: 1; min-width: 200px; }
    
    .btn { border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; border-radius: 8px; }
    .btn-primary { background: #6c63ff; color: white; }
    .btn-success { background: #10b981; color: white; }
    .btn-danger { background: #ef4444; color: white; padding: 6px 12px; font-size: 12px; }
    .btn-secondary { background: #e5e7eb; color: #374151; }

    .aluno-selector { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .aluno-selector select { flex: 1; min-width: 220px; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 16px; }
    .stat-item { background: #f9fafb; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #e5e7eb; cursor: pointer; }
    .stat-item .number { font-size: 22px; font-weight: bold; }
    .stat-item .label { font-size: 12px; color: #6b7280; }

    .acoes { display: flex; gap: 12px; margin-bottom: 16px; }
    .abas-container { display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 16px; gap: 8px; }
    .aba-btn { padding: 10px 16px; border: none; background: none; font-size: 14px; font-weight: 600; color: #6b7280; cursor: pointer; border-bottom: 3px solid transparent; }
    .aba-btn.active { color: #6c63ff; border-bottom-color: #6c63ff; }

    .lista { display: flex; flex-direction: column; gap: 10px; }
    .item { background: white; padding: 12px 16px; border-radius: 8px; border: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .item.concluida-style { background: #f0fdf4; border-color: #bbf7d0; }
    .item.observacao-style { background: #eff6ff; border-color: #bfdbfe; }

    .checkbox-group { display: flex; gap: 12px; align-items: center; }
    .checkbox-item { display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer; }
    .checkbox-item input { width: 18px; height: 18px; cursor: pointer; }

    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: #333; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transform: translateY(20px); transition: 0.3s; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #10b981; } .toast.error { background: #ef4444; }

    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    .modal-content { background: white; margin: 5% auto; padding: 24px; border-radius: 12px; width: 90%; max-width: 500px; }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1><i class="fa-solid fa-music" style="color:#6c63ff;"></i> Músicas do Aluno</h1>
    <div class="nav-links">
      <a href="tonalidades.html" class="nav-btn"><i class="fa-solid fa-sliders"></i> Tonalidades</a>
      <a href="musicas.html" class="nav-btn active"><i class="fa-solid fa-music"></i> Músicas</a>
      <a href="conceitos.html" class="nav-btn"><i class="fa-solid fa-book-open"></i> Conceitos</a>
      <a href="relatorio.html" class="nav-btn"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
    </div>
  </div>

  <div class="card github-panel">
    <i class="fa-brands fa-github" style="font-size: 1.3rem;"></i>
    <input type="password" id="gh-token" placeholder="Token GitHub (ghp_...)">
    <button class="btn btn-success" onclick="salvarToken()"><i class="fa-solid fa-key"></i> Autenticar</button>
  </div>

  <div class="card">
    <div class="aluno-selector">
      <label for="selectAluno"><b>👤 Aluno:</b></label>
      <select id="selectAluno" onchange="carregarMusicasAluno()">
        <option value="">Selecione o Aluno...</option>
      </select>
      <button class="btn btn-secondary" onclick="carregarListaAlunos()"><i class="fa-solid fa-rotate"></i></button>
    </div>

    <div class="stats" id="statsArea" style="display:none;">
      <div class="stat-item" onclick="alterarAba('todas')"><div class="number" id="totalMusicas">0</div><div class="label">📊 Total</div></div>
      <div class="stat-item" onclick="alterarAba('concluidas')"><div class="number" id="totalConcluidas" style="color:#10b981;">0</div><div class="label">✅ Concluídas</div></div>
      <div class="stat-item" onclick="alterarAba('pendentes')"><div class="number" id="totalPendentes" style="color:#f59e0b;">0</div><div class="label">⏳ Pendentes</div></div>
      <div class="stat-item" onclick="alterarAba('observacao')"><div class="number" id="totalObservacao" style="color:#3b82f6;">0</div><div class="label">📝 Observação</div></div>
    </div>
  </div>

  <div class="card">
    <div class="acoes">
      <input type="text" id="busca" placeholder="🔍 Filtrar músicas..." oninput="exibirMusicas()">
      <button class="btn btn-primary" onclick="abrirModalAdicionar()"><i class="fa-solid fa-plus"></i> Adicionar</button>
    </div>

    <div class="abas-container" id="abasVisualizacao" style="display:none;">
      <button id="aba-todas" class="aba-btn active" onclick="alterarAba('todas')">Todas</button>
      <button id="aba-pendentes" class="aba-btn" onclick="alterarAba('pendentes')">Pendentes</button>
      <button id="aba-concluidas" class="aba-btn" onclick="alterarAba('concluidas')">Concluídas</button>
      <button id="aba-observacao" class="aba-btn" onclick="alterarAba('observacao')">Observação</button>
    </div>

    <div id="listaMusicas" class="lista">
      <p style="text-align: center; color: #666; padding: 20px;">Selecione um aluno para carregar.</p>
    </div>
  </div>

  <!-- MODAL ADICIONAR -->
  <div id="modalAdicionar" class="modal">
    <div class="modal-content">
      <h2>➕ Adicionar Nova Música</h2>
      <input type="text" id="novaMusicaNome" placeholder="Nome da música..." style="width: 100%; margin: 15px 0;">
      <div style="display: flex; justify-content: flex-end; gap: 8px;">
        <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-success" onclick="adicionarMusica()">Salvar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    const GH_CONFIG = { user: "albertinosesc", repo: "minhas-musicas", branch: "main" };
    let musicasAluno = [];
    let alunoAtualSlug = '';
    let shaAtual = '';
    let abaAtiva = 'todas';

    window.onload = function() {
      const savedToken = localStorage.getItem("gh_pat_token");
      if (savedToken) {
        document.getElementById("gh-token").value = savedToken;
        carregarListaAlunos();
      }
    };

    function obterToken() { return document.getElementById("gh-token").value.trim(); }
    function salvarToken() {
      localStorage.setItem("gh_pat_token", obterToken());
      showToast("Token salvo!", "success");
      carregarListaAlunos();
    }

    function showToast(msg, tipo = "info") {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${tipo}`;
      toast.innerText = msg;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    function codificarUTF8Base64(str) {
      return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
    }
    function decodificarBase64UTF8(str) {
      return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    }

    async function carregarListaAlunos() {
      const token = obterToken();
      if (!token) return;
      const select = document.getElementById('selectAluno');
      select.innerHTML = '<option value="">Carregando...</option>';

      try {
        const res = await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos?ref=${GH_CONFIG.branch}`, {
          headers: { 'Authorization': `token ${token}` }
        });
        const arquivos = await res.json();
        select.innerHTML = '<option value="">Selecione o Aluno...</option>';
        const alunosSet = new Set();
        arquivos.forEach(a => {
          if (a.name.endsWith('.json')) {
            let slug = a.name.replace('aluno_', '').replace('teoria_', '').replace('.json', '');
            alunosSet.add(slug);
          }
        });
        alunosSet.forEach(slug => {
          let nome = slug.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
          select.innerHTML += `<option value="${slug}">${nome}</option>`;
        });
      } catch (err) { showToast("Erro ao carregar alunos", "error"); }
    }

    async function carregarMusicasAluno() {
      alunoAtualSlug = document.getElementById('selectAluno').value;
      if (!alunoAtualSlug) {
        document.getElementById('statsArea').style.display = 'none';
        document.getElementById('abasVisualizacao').style.display = 'none';
        document.getElementById('listaMusicas').innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">Selecione um aluno.</p>';
        return;
      }

      document.getElementById('statsArea').style.display = 'grid';
      document.getElementById('abasVisualizacao').style.display = 'flex';

      try {
        const res = await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos/aluno_${alunoAtualSlug}.json?ref=${GH_CONFIG.branch}`, {
          headers: { 'Authorization': `token ${obterToken()}` }
        });

        if (res.ok) {
          const data = await res.json();
          shaAtual = data.sha;
          const json = JSON.parse(decodificarBase64UTF8(data.content));
          musicasAluno = json.musicas || [];
        } else {
          shaAtual = '';
          musicasAluno = [];
        }
        atualizarStats();
        exibirMusicas();
      } catch (err) { showToast("Erro ao carregar dados do aluno", "error"); }
    }

    function atualizarStats() {
      const total = musicasAluno.length;
      const concluidas = musicasAluno.filter(m => m.concluido).length;
      const obs = musicasAluno.filter(m => m.observacao).length;
      const pendentes = musicasAluno.filter(m => !m.concluido && !m.observacao).length;

      document.getElementById('totalMusicas').innerText = total;
      document.getElementById('totalConcluidas').innerText = concluidas;
      document.getElementById('totalPendentes').innerText = pendentes;
      document.getElementById('totalObservacao').innerText = obs;
    }

    function exibirMusicas() {
      const container = document.getElementById('listaMusicas');
      const busca = document.getElementById('busca').value.toLowerCase();
      
      let filtradas = musicasAluno.filter(m => {
        let matchBusca = m.nome.toLowerCase().includes(busca);
        if (abaAtiva === 'concluidas') return matchBusca && m.concluido;
        if (abaAtiva === 'observacao') return matchBusca && m.observacao;
        if (abaAtiva === 'pendentes') return matchBusca && (!m.concluido && !m.observacao);
        return matchBusca;
      });

      if (filtradas.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">Nenhuma música encontrada.</p>';
        return;
      }

      container.innerHTML = filtradas.map((m, idx) => `
        <div class="item ${m.concluido ? 'concluida-style' : (m.observacao ? 'observacao-style' : '')}">
          <span><b>${m.nome}</b></span>
          <div style="display: flex; gap: 15px; align-items: center;">
            <div class="checkbox-group">
              <label class="checkbox-item"><input type="checkbox" ${(!m.concluido && !m.observacao)?'checked':''} onchange="mudarStatus(${idx}, 'pendente')"> ⏳ Pendente</label>
              <label class="checkbox-item"><input type="checkbox" ${m.observacao?'checked':''} onchange="mudarStatus(${idx}, 'observacao')"> 📝 Obs</label>
              <label class="checkbox-item"><input type="checkbox" ${m.concluido?'checked':''} onchange="mudarStatus(${idx}, 'concluido')"> ✅ Concluída</label>
            </div>
            <button class="btn btn-danger" onclick="removerMusica(${idx})"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    function alterarAba(aba) {
      abaAtiva = aba;
      document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`aba-${aba}`).classList.add('active');
      exibirMusicas();
    }

    async function mudarStatus(idx, tipo) {
      if (tipo === 'concluido') { musicasAluno[idx].concluido = true; musicasAluno[idx].observacao = false; }
      else if (tipo === 'observacao') { musicasAluno[idx].concluido = false; musicasAluno[idx].observacao = true; }
      else { musicasAluno[idx].concluido = false; musicasAluno[idx].observacao = false; }
      
      atualizarStats();
      exibirMusicas();
      await salvarNoGitHub();
    }

    function abrirModalAdicionar() { document.getElementById('modalAdicionar').style.display = 'block'; }
    function fecharModal() { document.getElementById('modalAdicionar').style.display = 'none'; }

    async function adicionarMusica() {
      const nome = document.getElementById('novaMusicaNome').value.trim();
      if (!nome) return;
      
      musicasAluno.push({ id: Date.now().toString(), nome: nome, concluido: false, observacao: false, tonalidadesConcluidas: [] });
      fecharModal();
      document.getElementById('novaMusicaNome').value = '';
      atualizarStats();
      exibirMusicas();
      await salvarNoGitHub();
    }

    async function removerMusica(idx) {
      if (!confirm("Deseja remover esta música?")) return;
      musicasAluno.splice(idx, 1);
      atualizarStats();
      exibirMusicas();
      await salvarNoGitHub();
    }

    async function salvarNoGitHub() {
      const token = obterToken();
      if (!token || !alunoAtualSlug) return;

      const conteudoJSON = JSON.stringify({ musicas: musicasAluno }, null, 2);
      const bodyData = {
        message: `Atualizando músicas de ${alunoAtualSlug}`,
        content: codificarUTF8Base64(conteudoJSON),
        branch: GH_CONFIG.branch
      };
      if (shaAtual) bodyData.sha = shaAtual;

      try {
        const res = await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos/aluno_${alunoAtualSlug}.json`, {
          method: 'PUT',
          headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyData)
        });
        if (res.ok) {
          const data = await res.json();
          shaAtual = data.content.sha;
          showToast("Salvo no GitHub!", "success");
        } else { showToast("Erro ao salvar no GitHub", "error"); }
      } catch (e) { showToast("Erro de conexão", "error"); }
    }
  </script>
</body>
</html>
