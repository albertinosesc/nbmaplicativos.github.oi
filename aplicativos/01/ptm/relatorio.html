<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Relatório do Aluno</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 20px; max-width: 1200px; margin: 0 auto; color: #1f2937; }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn { background: #e5e7eb; color: #374151; padding: 8px 14px; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 0.9rem; }
    .nav-btn:hover, .nav-btn.active { background: #2563eb; color: white; }

    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; color: #1a1a2e; }
    
    select { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; width: 100%; }

    .grid-relatorio { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
    .secao { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid #2563eb; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .secao h3 { margin-bottom: 15px; color: #2563eb; display: flex; align-items: center; gap: 8px; }
    
    ul { list-style: none; padding: 0; }
    li { padding: 10px 0; border-bottom: 1px solid #f3f4f6; display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; }
    
    .status-ok { color: #10b981; font-weight: bold; }
    .status-pending { color: #ef4444; font-weight: bold; }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1><i class="fa-solid fa-chart-line" style="color:#2563eb;"></i> Relatório Geral de Desempenho</h1>
    <div class="nav-links">
      <a href="tonalidades.html" class="nav-btn"><i class="fa-solid fa-sliders"></i> Tonalidades</a>
      <a href="musicas.html" class="nav-btn"><i class="fa-solid fa-music"></i> Músicas</a>
      <a href="conceitos.html" class="nav-btn"><i class="fa-solid fa-book-open"></i> Conceitos</a>
      <a href="relatorio.html" class="nav-btn active"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
    </div>
  </div>

  <div class="card">
    <label for="selectAluno" style="display:block; margin-bottom: 8px;"><b>👤 Selecione o Aluno:</b></label>
    <select id="selectAluno" onchange="carregarRelatorioAluno(this.value)">
      <option value="">Selecione...</option>
    </select>
  </div>

  <div class="grid-relatorio">
    <div class="secao">
      <h3><i class="fa-solid fa-graduation-cap"></i> Conceitos Teóricos</h3>
      <ul id="relatorioTeoria"><li>Selecione um aluno.</li></ul>
    </div>

    <div class="secao" style="border-left-color: #10b981;">
      <h3 style="color: #10b981;"><i class="fa-solid fa-sliders"></i> Tonalidades / Prática</h3>
      <ul id="relatorioTonalidades"><li>Selecione um aluno.</li></ul>
    </div>
  </div>

  <script>
    const GH_CONFIG = { user: "albertinosesc", repo: "minhas-musicas", branch: "main" };

    window.onload = function() { carregarListaAlunos(); };

    function obterToken() { return localStorage.getItem("gh_pat_token") || ''; }
    function decodificarBase64UTF8(str) { return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }

    async function carregarListaAlunos() {
      const token = obterToken();
      if (!token) return alert("Autentique seu Token na página de Músicas primeiro.");

      const res = await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos?ref=${GH_CONFIG.branch}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      const arquivos = await res.json();
      const select = document.getElementById('selectAluno');
      select.innerHTML = '<option value="">Selecione o Aluno...</option>';
      const alunosSet = new Set();
      arquivos.forEach(a => {
        if (a.name.endsWith('.json')) alunosSet.add(a.name.replace('aluno_', '').replace('teoria_', '').replace('.json', ''));
      });
      alunosSet.forEach(slug => {
        let nome = slug.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        select.innerHTML += `<option value="${slug}">${nome}</option>`;
      });
    }

    async function carregarRelatorioAluno(alunoSlug) {
      if (!alunoSlug) return;
      const token = obterToken();

      const containerTeoria = document.getElementById('relatorioTeoria');
      const containerTonalidades = document.getElementById('relatorioTonalidades');

      // 1. Teoria
      try {
        const resT = await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos/teoria_${alunoSlug}.json?ref=${GH_CONFIG.branch}`, {
          headers: { 'Authorization': `token ${token}` }
        });
        if (resT.ok) {
          const jsonT = JSON.parse(decodificarBase64UTF8((await resT.json()).content));
          containerTeoria.innerHTML = jsonT.conceitos.map(c => `
            <li>
              <span>${c.titulo}</span>
              <span class="${c.concluido ? 'status-ok' : 'status-pending'}">${c.concluido ? '✓ Concluído' : '✗ Pendente'}</span>
            </li>
          `).join('') || '<li>Nenhum conceito cadastrado.</li>';
        } else { containerTeoria.innerHTML = '<li>Sem registro de teoria.</li>'; }
      } catch (e) { containerTeoria.innerHTML = '<li>Erro ao carregar dados.</li>'; }

      // 2. Tonalidades
      try {
        const resM = await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos/aluno_${alunoSlug}.json?ref=${GH_CONFIG.branch}`, {
          headers: { 'Authorization': `token ${token}` }
        });
        if (resM.ok) {
          const jsonM = JSON.parse(decodificarBase64UTF8((await resM.json()).content));
          containerTonalidades.innerHTML = jsonM.musicas.map(m => {
            const tons = Array.isArray(m.tonalidadesConcluidas) ? m.tonalidadesConcluidas : [];
            return `
              <li>
                <span><b>${m.nome}</b></span>
                <span class="${tons.length > 0 ? 'status-ok' : 'status-pending'}">
                  ${tons.length > 0 ? `${tons.join(', ')} (${tons.length}/12)` : '0/12'}
                </span>
              </li>
            `;
          }).join('') || '<li>Nenhuma música cadastrada.</li>';
        } else { containerTonalidades.innerHTML = '<li>Sem registros.</li>'; }
      } catch (e) { containerTonalidades.innerHTML = '<li>Erro ao carregar dados.</li>'; }
    }
  </script>
</body>
</html>
