<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel Administrativo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 20px; max-width: 1200px; margin: 0 auto; color: #1f2937; }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav-btn { background: #e5e7eb; color: #374151; padding: 8px 14px; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
    .nav-btn:hover, .nav-btn.active { background: #dc2626; color: white; }

    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; color: #1a1a2e; }
    
    .github-panel { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input, select, button { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    input[type="password"], input[type="text"] { flex: 1; min-width: 200px; }
    
    .btn { border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; border-radius: 8px; }
    .btn-primary { background: #dc2626; color: white; }
    .btn-success { background: #10b981; color: white; }
    .btn-danger { background: #ef4444; color: white; padding: 6px 12px; font-size: 12px; }
    .btn-secondary { background: #e5e7eb; color: #374151; }

    .form-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }

    .lista { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    .item { background: white; padding: 12px 16px; border-radius: 8px; border: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }

    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: #333; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transform: translateY(20px); transition: 0.3s; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #10b981; } .toast.error { background: #ef4444; }
  </style>
</head>
<body>

  <div class="header-bar">
    <h1><i class="fa-solid fa-user-gear" style="color:#dc2626;"></i> Administração de Alunos</h1>
    <div class="nav-links">
      <a href="admin.html" class="nav-btn active"><i class="fa-solid fa-user-gear"></i> Admin</a>
      <a href="tonalidades.html" class="nav-btn"><i class="fa-solid fa-sliders"></i> Tonalidades</a>
      <a href="musicas.html" class="nav-btn"><i class="fa-solid fa-music"></i> Músicas</a>
      <a href="conceitos.html" class="nav-btn"><i class="fa-solid fa-book-open"></i> Conceitos</a>
      <a href="relatorio.html" class="nav-btn"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
    </div>
  </div>

  <!-- Configuração do GitHub -->
  <div class="card github-panel">
    <i class="fa-brands fa-github" style="font-size: 1.3rem;"></i>
    <input type="password" id="gh-token" placeholder="Token GitHub (ghp_...)">
    <button class="btn btn-success" onclick="salvarToken()"><i class="fa-solid fa-key"></i> Autenticar</button>
  </div>

  <!-- Cadastrar Aluno -->
  <div class="card">
    <h3><i class="fa-solid fa-user-plus"></i> Cadastrar Novo Aluno</h3>
    <div class="form-group">
      <input type="text" id="nomeAluno" placeholder="Nome completo do aluno (ex: João Silva)">
      <button class="btn btn-primary" onclick="cadastrarAluno()"><i class="fa-solid fa-check"></i> Criar Aluno</button>
    </div>
  </div>

  <!-- Gerenciar Alunos Existentes -->
  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h3><i class="fa-solid fa-users"></i> Alunos Cadastrados</h3>
      <button class="btn btn-secondary" onclick="carregarAlunos()"><i class="fa-solid fa-rotate"></i> Atualizar Lista</button>
    </div>
    
    <div id="listaAlunos" class="lista">
      <p style="text-align: center; color: #666;">Carregando alunos...</p>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    const GH_CONFIG = { user: "albertinosesc", repo: "minhas-musicas", branch: "main" };
    let listaAlunosGrid = [];

    window.onload = function() {
      const savedToken = localStorage.getItem("gh_pat_token");
      if (savedToken) {
        document.getElementById("gh-token").value = savedToken;
        carregarAlunos();
      }
    };

    function obterToken() { return document.getElementById("gh-token").value.trim(); }
    
    function salvarToken() {
      localStorage.setItem("gh_pat_token", obterToken());
      showToast("Token salvo com sucesso!", "success");
      carregarAlunos();
    }

    function showToast(msg, tipo = "info") {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${tipo}`;
      toast.innerText = msg;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    function codificarUTF8Base64(str) {
      return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
    }

    function gerarSlug(nome) {
      return nome.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // Remove acentos
        .replace(/[^a-z0-9]/g, '_')
        .replace(/_+/g, '_')
        .replace(/^_+|_+$/g, '');
    }

    async function carregarAlunos() {
      const token = obterToken();
      if (!token) return;

      const container = document.getElementById('listaAlunos');
      container.innerHTML = '<p style="text-align: center; color: #666;">Buscando dados no GitHub...</p>';

      try {
        const res = await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos?ref=${GH_CONFIG.branch}`, {
          headers: { 'Authorization': `token ${token}` }
        });

        if (!res.ok) throw new Error("Erro ao buscar diretório");

        const arquivos = await res.json();
        const alunosMap = new Map();

        arquivos.forEach(a => {
          if (a.name.endsWith('.json')) {
            let slug = a.name.replace('aluno_', '').replace('teoria_', '').replace('.json', '');
            if (!alunosMap.has(slug)) {
              alunosMap.set(slug, { slug: slug, shaMusicas: null, shaTeoria: null });
            }
            if (a.name.startsWith('aluno_')) alunosMap.get(slug).shaMusicas = a.sha;
            if (a.name.startsWith('teoria_')) alunosMap.get(slug).shaTeoria = a.sha;
          }
        });

        listaAlunosGrid = Array.from(alunosMap.values());

        if (listaAlunosGrid.length === 0) {
          container.innerHTML = '<p style="text-align: center; color: #999;">Nenhum aluno cadastrado ainda.</p>';
          return;
        }

        container.innerHTML = listaAlunosGrid.map(aluno => {
          let nomeFormatado = aluno.slug.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
          return `
            <div class="item">
              <div>
                <strong>👤 ${nomeFormatado}</strong> 
                <small style="color:#6b7280; margin-left: 8px;">(id: ${aluno.slug})</small>
              </div>
              <button class="btn btn-danger" onclick="excluirAluno('${aluno.slug}', '${aluno.shaMusicas}', '${aluno.shaTeoria}')">
                <i class="fa-solid fa-trash"></i> Excluir Aluno
              </button>
            </div>
          `;
        }).join('');

      } catch (err) {
        container.innerHTML = '<p style="text-align: center; color: #ef4444;">Erro ao carregar lista de alunos.</p>';
        showToast("Erro de conexão com o GitHub", "error");
      }
    }

    async function cadastrarAluno() {
      const token = obterToken();
      const nomeInput = document.getElementById('nomeAluno');
      const nome = nomeInput.value.trim();

      if (!token) return showToast("Informe o Token do GitHub", "error");
      if (!nome) return showToast("Informe o nome do aluno", "error");

      const slug = gerarSlug(nome);

      // JSONs iniciais padronizados
      const modeloMusica = JSON.stringify({ musicas: [] }, null, 2);
      const modeloTeoria = JSON.stringify({ conceitos: [] }, null, 2);

      try {
        // Criar arquivo de Músicas
        await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos/aluno_${slug}.json`, {
          method: 'PUT',
          headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: `Criando aluno: ${nome}`,
            content: codificarUTF8Base64(modeloMusica),
            branch: GH_CONFIG.branch
          })
        });

        // Criar arquivo de Teoria
        await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos/teoria_${slug}.json`, {
          method: 'PUT',
          headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: `Criando teoria para aluno: ${nome}`,
            content: codificarUTF8Base64(modeloTeoria),
            branch: GH_CONFIG.branch
          })
        });

        showToast(`Aluno "${nome}" criado com sucesso!`, "success");
        nomeInput.value = '';
        carregarAlunos();

      } catch (err) {
        showToast("Falha ao criar registros do aluno", "error");
      }
    }

    async function excluirAluno(slug, shaMusicas, shaTeoria) {
      if (!confirm(`Tem certeza que deseja excluir permanentemente o aluno "${slug}" e todos os seus dados?`)) return;

      const token = obterToken();

      try {
        // Deleta aluno_[slug].json se existir
        if (shaMusicas && shaMusicas !== 'null') {
          await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos/aluno_${slug}.json`, {
            method: 'DELETE',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: `Removendo aluno ${slug}`, sha: shaMusicas, branch: GH_CONFIG.branch })
          });
        }

        // Deleta teoria_[slug].json se existir
        if (shaTeoria && shaTeoria !== 'null') {
          await fetch(`https://api.github.com/repos/${GH_CONFIG.user}/${GH_CONFIG.repo}/contents/alunos/teoria_${slug}.json`, {
            method: 'DELETE',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: `Removendo teoria do aluno ${slug}`, sha: shaTeoria, branch: GH_CONFIG.branch })
          });
        }

        showToast("Aluno removido!", "success");
        carregarAlunos();
      } catch (err) {
        showToast("Erro ao remover aluno", "error");
      }
    }
  </script>
</body>
</html>
