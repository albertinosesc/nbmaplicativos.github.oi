<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Desenvolvimento Musical do Aluno</title>
  <style>
    :root {
      --primary: #2c3e50;
      --accent: #27ae60;
      --bg: #f8f9fa;
      --card: #ffffff;
      --border: #dee2e6;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1, h2, h3 {
      color: var(--primary);
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }

    input[type="text"], input[type="password"], select {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-sizing: border-box;
    }

    .btn {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-success {
      background-color: var(--accent);
    }

    /* Tabela de Tonalidades */
    .table-container {
      overflow-x: auto;
      margin-top: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background-color: var(--primary);
      color: white;
    }

    th.musica-col {
      text-align: left;
      min-width: 180px;
    }

    td.musica-input {
      text-align: left;
    }

    .checkbox-tonalidade {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .badge-progresso {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      background-color: #e9ecef;
    }

    .badge-concluido {
      background-color: #d4edda;
      color: #155724;
    }

    .status-msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Acompanhamento de Transposição nas 12 Tonalidades</h1>

  <!-- CONFIGURAÇÃO DO GITHUB -->
  <div class="card">
    <h3>Configuração de Conexão (GitHub)</h3>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
      <div class="form-group">
        <label>Usuário GitHub:</label>
        <input type="text" id="ghUser" placeholder="ex: seu-usuario">
      </div>
      <div class="form-group">
        <label>Repositório:</label>
        <input type="text" id="ghRepo" placeholder="ex: minhas-musicas">
      </div>
      <div class="form-group">
        <label>Branch:</label>
        <input type="text" id="ghBranch" value="main">
      </div>
      <div class="form-group">
        <label>Token do GitHub:</label>
        <input type="password" id="ghToken" placeholder="ghp_...">
      </div>
    </div>
    <button class="btn" onclick="salvarConfiguracoes()">Salvar Configurações</button>
    <a href="index.html" class="btn">Voltar para Músicas</a>
  </div>

  <!-- SELEÇÃO / CRIAÇÃO DE ALUNO -->
  <div class="card">
    <h3>Aluno</h3>
    <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;">
      <div style="flex: 1; min-width: 200px;">
        <label>Nome do Aluno:</label>
        <input type="text" id="nomeAluno" placeholder="Ex: João Silva">
      </div>
      <button class="btn" onclick="carregarDadosAluno()">Buscar / Carregar Aluno</button>
      <button class="btn btn-success" onclick="salvarDadosAluno()">💾 Salvar Progresso no GitHub</button>
    </div>
    <div id="statusMsg" class="status-msg"></div>
  </div>

  <!-- MATRIZ DE TONALIDADES (TABELA) -->
  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
      <h3>Planilha de Tonalidades (Escala Cromática)</h3>
      <button class="btn" onclick="adicionarLinhaMusica()">+ Adicionar Música</button>
    </div>

    <div class="table-container">
      <table id="tabelaRegistro">
        <thead>
          <tr>
            <th class="musica-col">Música</th>
            <th>C</th>
            <th>C#</th>
            <th>D</th>
            <th>D#</th>
            <th>E</th>
            <th>F</th>
            <th>F#</th>
            <th>G</th>
            <th>G#</th>
            <th>A</th>
            <th>A#</th>
            <th>B</th>
            <th>Progresso</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabela">
          <!-- As linhas de música serão inseridas via JavaScript -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // As 12 Tonalidades da Escala Cromática
  const TONALIDADES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
  let shaArquivoAtual = null; // Guarda a revisão do arquivo no GitHub para atualização

  // Carregar credenciais salvas no navegador
  window.onload = function() {
    document.getElementById('ghUser').value = localStorage.getItem('ghUser') || '';
    document.getElementById('ghRepo').value = localStorage.getItem('ghRepo') || '';
    document.getElementById('ghBranch').value = localStorage.getItem('ghBranch') || 'main';
    document.getElementById('ghToken').value = localStorage.getItem('ghToken') || '';
  };

  function salvarConfiguracoes() {
    localStorage.setItem('ghUser', document.getElementById('ghUser').value.trim());
    localStorage.setItem('ghRepo', document.getElementById('ghRepo').value.trim());
    localStorage.setItem('ghBranch', document.getElementById('ghBranch').value.trim());
    localStorage.setItem('ghToken', document.getElementById('ghToken').value.trim());
    exibirStatus("Configurações salvas no navegador!", "green");
  }

  function exibirStatus(mensagem, cor = "black") {
    const el = document.getElementById('statusMsg');
    el.style.color = cor;
    el.innerText = mensagem;
  }

  // Gera o nome do arquivo JSON padronizado para cada aluno
  function obterCaminhoArquivoAluno(nome) {
    const nomeFormatado = nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "_");
    return `aluno_${nomeFormatado}.json`;
  }

  function adicionarLinhaMusica(nomeMusica = "", tonsTocados = []) {
    const tbody = document.getElementById('corpoTabela');
    const tr = document.createElement('tr');

    // Coluna do Nome da Música
    let htmlTdMusica = `
      <td class="musica-input">
        <input type="text" value="${nomeMusica}" placeholder="Ex: Música 34" onchange="atualizarProgressoLinha(this.parentElement.parentElement)">
      </td>
    `;

    // 12 Colunas de Checkbox para as Tonalidades
    let htmlCheckboxes = "";
    TONALIDADES.forEach(tom => {
      const marcado = tonsTocados.includes(tom) ? "checked" : "";
      htmlCheckboxes += `
        <td>
          <input type="checkbox" class="checkbox-tonalidade" data-tom="${tom}" ${marcado} onchange="atualizarProgressoLinha(this.parentElement.parentElement)">
        </td>
      `;
    });

    // Coluna do Progresso (X/12)
    let htmlProgresso = `
      <td>
        <span class="badge-progresso">0 / 12</span>
      </td>
    `;

    // Botão de Excluir Linha
    let htmlAcoes = `
      <td>
        <button style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;" onclick="removerLinha(this)">✕</button>
      </td>
    `;

    tr.innerHTML = htmlTdMusica + htmlCheckboxes + htmlProgresso + htmlAcoes;
    tbody.appendChild(tr);

    atualizarProgressoLinha(tr);
  }

  function removerLinha(btn) {
    const tr = btn.parentElement.parentElement;
    tr.remove();
  }

  function atualizarProgressoLinha(tr) {
    const checkboxes = tr.querySelectorAll('.checkbox-tonalidade:checked');
    const badge = tr.querySelector('.badge-progresso');
    const total = checkboxes.length;

    badge.innerText = `${total} / 12`;
    if (total === 12) {
      badge.className = "badge-progresso badge-concluido";
    } else {
      badge.className = "badge-progresso";
    }
  }

  // LER DADOS DO ALUNO NO GITHUB
  async function carregarDadosAluno() {
    const nomeAluno = document.getElementById('nomeAluno').value.trim();
    const user = document.getElementById('ghUser').value.trim();
    const repo = document.getElementById('ghRepo').value.trim();
    const branch = document.getElementById('ghBranch').value.trim();
    const token = document.getElementById('ghToken').value.trim();

    if (!nomeAluno) {
      alert("Por favor, digite o nome do aluno.");
      return;
    }

    exibirStatus("Buscando registro do aluno no GitHub...", "blue");
    const caminho = obterCaminhoArquivoAluno(nomeAluno);
    const url = `https://api.github.com/repos/${user}/${repo}/contents/${caminho}?ref=${branch}`;

    try {
      const response = await fetch(url, {
        headers: { 'Authorization': `token ${token}` }
      });

      // Limpa a tabela atual
      document.getElementById('corpoTabela').innerHTML = "";

      if (response.status === 404) {
        exibirStatus("Aluno novo! Nenhum registro prévio encontrado no GitHub. Preencha a tabela e clique em Salvar.", "orange");
        shaArquivoAtual = null;
        adicionarLinhaMusica(); // Adiciona uma linha em branco para começar
        return;
      }

      if (!response.ok) throw new Error("Erro ao acessar o GitHub.");

      const data = await response.json();
      shaArquivoAtual = data.sha; // Guarda o SHA necessário para atualizar o arquivo depois

      // Decodifica o conteúdo Base64 retornado pelo GitHub
      const conteudoJson = JSON.parse(decodeURIComponent(escape(atob(data.content))));

      if (conteudoJson.musicas && conteudoJson.musicas.length > 0) {
        conteudoJson.musicas.forEach(m => {
          adicionarLinhaMusica(m.nome, m.tonalidadesConcluidas);
        });
        exibirStatus("Registro do aluno carregado com sucesso!", "green");
      } else {
        adicionarLinhaMusica();
      }

    } catch (err) {
      console.error(err);
      exibirStatus("Falha ao buscar dados do aluno. Verifique suas credenciais do GitHub.", "red");
    }
  }

  // SALVAR / GRAVAR DADOS DO ALUNO NO GITHUB
  async function salvarDadosAluno() {
    const nomeAluno = document.getElementById('nomeAluno').value.trim();
    const user = document.getElementById('ghUser').value.trim();
    const repo = document.getElementById('ghRepo').value.trim();
    const branch = document.getElementById('ghBranch').value.trim();
    const token = document.getElementById('ghToken').value.trim();

    if (!nomeAluno) {
      alert("Informe o nome do aluno antes de salvar.");
      return;
    }

    // Coleta as informações da Tabela
    const linhas = document.querySelectorAll('#corpoTabela tr');
    const musicas = [];

    linhas.forEach(tr => {
      const nomeInput = tr.querySelector('input[type="text"]').value.trim();
      if (nomeInput) {
        const checkboxesMarcados = tr.querySelectorAll('.checkbox-tonalidade:checked');
        const tonsTocados = Array.from(checkboxesMarcados).map(cb => cb.getAttribute('data-tom'));

        musicas.push({
          nome: nomeInput,
          tonalidadesConcluidas: tonsTocados
        });
      }
    });

    const dadosParaSalvar = {
      aluno: nomeAluno,
      atualizadoEm: new Date().toISOString(),
      musicas: musicas
    };

    const caminho = obterCaminhoArquivoAluno(nomeAluno);
    const url = `https://api.github.com/repos/${user}/${repo}/contents/${caminho}`;

    // Converte o objeto para JSON e depois para Base64 (padrão da API do GitHub)
    const jsonString = JSON.stringify(dadosParaSalvar, null, 2);
    const conteudoBase64 = btoa(unescape(encodeURIComponent(jsonString)));

    const body = {
      message: `Atualizando registro do aluno: ${nomeAluno}`,
      content: conteudoBase64,
      branch: branch
    };

    if (shaArquivoAtual) {
      body.sha = shaArquivoAtual; // Se o arquivo já existe, precisa enviar o SHA
    }

    exibirStatus("Enviando dados para o GitHub...", "blue");

    try {
      const response = await fetch(url, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (response.ok) {
        const resData = await response.json();
        shaArquivoAtual = resData.content.sha;
        exibirStatus("Progresso salvo com sucesso no GitHub!", "green");
      } else {
        throw new Error("Não foi possível salvar os dados.");
      }
    } catch (err) {
      console.error(err);
      exibirStatus("Erro ao salvar progresso no GitHub. Verifique o Token e permissões.", "red");
    }
  }
</script>

</body>
</html>
