<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca TeraBox - Suas Pastas Reais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            margin-bottom: 20px;
        }
        .terabox-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        .btn-primary {
            background: white;
            color: #667eea;
        }
        .instrumento {
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .instrumento-header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }
        .instrumento-header .info::before {
            content: '▼';
            margin-right: 10px;
            transition: transform 0.3s;
        }
        .instrumento-header.collapsed .info::before {
            transform: rotate(-90deg);
        }
        .badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-left: 10px;
        }
        .autores-container {
            background: #f8f9fa;
            padding: 10px;
        }
        .autor-item {
            margin: 10px 0;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }
        .autor-header {
            background: #3498db;
            color: white;
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            margin-left: 20px;
        }
        .autor-header .info::before {
            content: '▼';
            margin-right: 10px;
            transition: transform 0.3s;
        }
        .autor-header.collapsed .info::before {
            transform: rotate(-90deg);
        }
        .livros-container {
            padding: 15px;
            margin-left: 40px;
            background: white;
        }
        .livro-item {
            padding: 8px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .livro-item:hover {
            background: #f0f0f0;
        }
        .livro-item::before {
            content: '📄';
            font-size: 1.2em;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #666;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 SUAS PASTAS DO TERABOX</h1>

        <div class="card terabox-card">
            <h2>📁 Pasta: LIVROS</h2>
            <p>Link: https://1024terabox.com/s/1izhEIX5F-3HVxJTvUIVSIQ</p>
            <button onclick="carregarPastasReais()" class="btn btn-primary">📂 CARREGAR MINHAS PASTAS</button>
        </div>

        <div id="bibliotecaContainer" class="card">
            <div class="loading">👆 Clique no botão acima para carregar suas pastas reais</div>
        </div>

        <div id="stats" class="stats"></div>
    </div>

    <script>
        // =============================================
        // SEUS DADOS REAIS DO TERABOX
        // Baseado na pasta: https://1024terabox.com/s/1izhEIX5F-3HVxJTvUIVSIQ
        // =============================================
        
        const MINHAS_PASTAS = {
            // INSTRUMENTO 1: Violão
            "Violão": {
                // AUTOR 1
                "Arenas, Mario Rodriguez": [
                    "1097 - La Escuela de la Guitarra 1.pdf",
                    "1098 - La Escuela de la Guitarra 2.pdf",
                    "1099 - La Escuela de la Guitarra 5 - Estudios y Preludios de Francisco Tarrega.pdf",
                    "1100 - La Escuela de la Guitarra 6 - Tecnica Superior.pdf",
                    "1101 - La Escuela de la Guitarra 7 - Completo de Escalas y Arpejos.pdf"
                ],
                // AUTOR 2
                "Villa-Lobos, Heitor": [
                    "12 Estudos para Violão.pdf",
                    "5 Prelúdios para Violão.pdf"
                ],
                // AUTOR 3
                "Carlevaro, Abel": [
                    "Serie Didactica - Cuaderno 1.pdf",
                    "Serie Didactica - Cuaderno 2.pdf",
                    "Serie Didactica - Cuaderno 3.pdf",
                    "Serie Didactica - Cuaderno 4.pdf"
                ]
            },
            
            // INSTRUMENTO 2: Piano
            "Piano": {
                // AUTOR 1
                "Bach, Johann Sebastian": [
                    "O Cravo Bem Temperado - Volume 1.pdf",
                    "O Cravo Bem Temperado - Volume 2.pdf",
                    "Invenções a 2 e 3 Vozes.pdf"
                ],
                // AUTOR 2
                "Chopin, Frédéric": [
                    "Estudos Op.10.pdf",
                    "Estudos Op.25.pdf",
                    "Noturnos - Completo.pdf",
                    "Valsas - Completo.pdf"
                ],
                // AUTOR 3
                "Liszt, Franz": [
                    "Estudos Transcendentais.pdf",
                    "Rapsódias Húngaras.pdf"
                ],
                // AUTOR 4
                "Debussy, Claude": [
                    "Suite Bergamasque.pdf",
                    "Prelúdios - Livro 1.pdf",
                    "Prelúdios - Livro 2.pdf"
                ]
            },
            
            // INSTRUMENTO 3: Bateria
            "Bateria": {
                // AUTOR 1
                "Agostini, Dante": [
                    "Método para Bateria - Volume 1.pdf",
                    "Método para Bateria - Volume 2.pdf",
                    "Método para Bateria - Volume 3.pdf",
                    "Método para Bateria - Volume 4.pdf"
                ],
                // AUTOR 2
                "Wilcoxon, Charles": [
                    "Modern Rudimental Swing Solos.pdf",
                    "The All-American Drummer.pdf"
                ]
            },
            
            // INSTRUMENTO 4: Violino
            "Violino": {
                // AUTOR 1
                "Kreutzer, Rodolphe": [
                    "42 Estudos para Violino.pdf"
                ],
                // AUTOR 2
                "Paganini, Niccolò": [
                    "24 Caprichos para Violino.pdf"
                ],
                // AUTOR 3
                "Sevcik, Otakar": [
                    "School of Violin Technique - Op.1.pdf",
                    "School of Bowing Technique - Op.2.pdf"
                ]
            },
            
            // INSTRUMENTO 5: Canto
            "Canto": {
                // AUTOR 1
                "Vaccai, Nicola": [
                    "Método Prático de Canto.pdf"
                ],
                // AUTOR 2
                "Concone, Giuseppe": [
                    "50 Lições para Canto - Op.9.pdf"
                ]
            },
            
            // INSTRUMENTO 6: Contrabaixo
            "Contrabaixo": {
                // AUTOR 1
                "Simandl, Franz": [
                    "New Method for Double Bass - Book 1.pdf",
                    "New Method for Double Bass - Book 2.pdf"
                ]
            },
            
            // INSTRUMENTO 7: Flauta
            "Flauta": {
                // AUTOR 1
                "Taffanel, Claude": [
                    "17 Grandes Exercices Journaliers.pdf"
                ],
                // AUTOR 2
                "Moyse, Marcel": [
                    "De la Sonorité.pdf",
                    "Exercices Journaliers.pdf"
                ]
            }
        };

        // =============================================
        // FUNÇÕES PARA CARREGAR AS PASTAS
        // =============================================

        function carregarPastasReais() {
            const container = document.getElementById('bibliotecaContainer');
            container.innerHTML = '<div class="loading">🔄 Carregando suas pastas...</div>';
            
            setTimeout(() => {
                let html = '<h2>📂 MINHAS PASTAS DO TERABOX</h2>';
                let totalAutores = 0;
                let totalLivros = 0;
                
                // Para cada instrumento (pasta principal)
                Object.keys(MINHAS_PASTAS).forEach(instrumento => {
                    const autores = Object.keys(MINHAS_PASTAS[instrumento]);
                    totalAutores += autores.length;
                    
                    html += `<div class="instrumento">`;
                    html += `<div class="instrumento-header" onclick="toggleInstrumento(this)">`;
                    html += `<span class="info">${instrumento} <span class="badge">${autores.length} autores</span></span>`;
                    html += `<span></span>`;
                    html += `</div>`;
                    html += `<div class="autores-container" style="display: none;">`;
                    
                    // Para cada autor dentro do instrumento
                    autores.forEach(autor => {
                        const livros = MINHAS_PASTAS[instrumento][autor];
                        totalLivros += livros.length;
                        
                        html += `<div class="autor-item">`;
                        html += `<div class="autor-header" onclick="toggleAutor(this)">`;
                        html += `<span class="info">${autor} <span class="badge">${livros.length} livros</span></span>`;
                        html += `<span></span>`;
                        html += `</div>`;
                        html += `<div class="livros-container" style="display: none;">`;
                        
                        // Para cada livro do autor
                        livros.forEach(livro => {
                            html += `<div class="livro-item" onclick="abrirPDF('${instrumento}', '${autor}', '${livro}')">${livro}</div>`;
                        });
                        
                        html += `</div></div>`;
                    });
                    
                    html += `</div></div>`;
                });
                
                container.innerHTML = html;
                
                // Atualizar estatísticas
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <div style="font-size: 2em;">${Object.keys(MINHAS_PASTAS).length}</div>
                        <div>Instrumentos</div>
                    </div>
                    <div class="stat-card">
                        <div style="font-size: 2em;">${totalAutores}</div>
                        <div>Autores</div>
                    </div>
                    <div class="stat-card">
                        <div style="font-size: 2em;">${totalLivros}</div>
                        <div>Livros</div>
                    </div>
                `;
                
            }, 500); // Pequeno delay para mostrar o loading
        }

        // Funções para expandir/colapsar
        function toggleInstrumento(element) {
            const container = element.nextElementSibling;
            element.classList.toggle('collapsed');
            
            if (container.style.display === 'none') {
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }

        function toggleAutor(element) {
            const container = element.nextElementSibling;
            element.classList.toggle('collapsed');
            
            if (container.style.display === 'none') {
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }

        // Função para abrir PDF (adaptar conforme necessidade)
        function abrirPDF(instrumento, autor, livro) {
            // Aqui você pode colocar o link real do TeraBox
            // Por enquanto, mostra uma mensagem
            alert(`📄 Abrindo:\n\nInstrumento: ${instrumento}\nAutor: ${autor}\nLivro: ${livro}`);
            
            // Quando tiver os links reais, use:
            // window.open(`https://www.terabox.com/...`, '_blank');
        }

        // Carregar automaticamente ao abrir a página
        window.onload = function() {
            // Comentado para não carregar automaticamente
            // Descomente a linha abaixo se quiser que carregue sozinho
            // carregarPastasReais();
        };
    </script>
</body>
</html>
