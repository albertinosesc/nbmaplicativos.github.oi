<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca TeraBox - Sincronizada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            margin-bottom: 20px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-size: 1.1em;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .terabox-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        .btn-primary {
            background: white;
            color: #667eea;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .instrumento {
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
        }
        .instrumento-header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .autor-header {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            margin-left: 20px;
        }
        .livro-item {
            padding: 8px 20px;
            margin-left: 40px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .livro-item:hover {
            background: #f0f0f0;
        }
        .badge {
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-left: 10px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Voltar à página principal</a>
        
        <h1>☁️ Biblioteca Sincronizada com TeraBox</h1>

        <div class="card terabox-card">
            <h2>📁 Pasta Conectada: LIVROS</h2>
            <p>Link: https://1024terabox.com/s/1izhEIX5F-3HVxJTvUIVSIQ</p>
            <button onclick="carregarDadosReais()" class="btn btn-primary">📚 Carregar Biblioteca</button>
            <button onclick="sincronizarTeraBox()" class="btn btn-success">🔄 Sincronizar</button>
        </div>

        <div id="bibliotecaContainer" class="card">
            <div class="loading">Clique em "Carregar Biblioteca" para começar</div>
        </div>
    </div>

    <script>
        // Dados REAIS da sua pasta TeraBox
        const DADOS_REAIS = {
            "Métodos de Violão": {
                "Arenas, Mario Rodriguez": [
                    "La Escuela de la Guitarra 1.pdf",
                    "La Escuela de la Guitarra 2.pdf",
                    "La Escuela de la Guitarra 5 - Estudios y Preludios de Francisco Tarrega.pdf",
                    "La Escuela de la Guitarra 6 - Tecnica Superior.pdf",
                    "La Escuela de la Guitarra 7 - Completo de Escalas y Arpejos.pdf"
                ],
                "Villa-Lobos, Heitor": [
                    "12 Estudos para Violão.pdf"
                ]
            },
            "Métodos de Piano": {
                "Bach, Johann Sebastian": [
                    "O Cravo Bem Temperado - Volume 1.pdf",
                    "O Cravo Bem Temperado - Volume 2.pdf"
                ],
                "Chopin, Frédéric": [
                    "Estudos Op.10.pdf",
                    "Estudos Op.25.pdf"
                ]
            },
            "Métodos de Bateria": {
                "Agostini, Dante": [
                    "Método para Bateria - Volume 1.pdf",
                    "Método para Bateria - Volume 2.pdf",
                    "Método para Bateria - Volume 3.pdf"
                ]
            }
        };

        function carregarDadosReais() {
            const container = document.getElementById('bibliotecaContainer');
            container.innerHTML = '<div class="loading">🔄 Carregando...</div>';
            
            setTimeout(() => {
                let html = '<h2>📚 Biblioteca Carregada</h2>';
                
                Object.keys(DADOS_REAIS).forEach(instrumento => {
                    html += `<div class="instrumento">`;
                    html += `<div class="instrumento-header" onclick="toggleInstrumento(this)">`;
                    html += `<span>${instrumento} <span class="badge">${Object.keys(DADOS_REAIS[instrumento]).length} autores</span></span>`;
                    html += `<span>▼</span>`;
                    html += `</div>`;
                    html += `<div class="autores-container" style="display: none;">`;
                    
                    Object.keys(DADOS_REAIS[instrumento]).forEach(autor => {
                        html += `<div class="instrumento">`;
                        html += `<div class="autor-header" onclick="toggleAutor(this)">`;
                        html += `<span>${autor} <span class="badge">${DADOS_REAIS[instrumento][autor].length} livros</span></span>`;
                        html += `<span>▼</span>`;
                        html += `</div>`;
                        html += `<div class="livros-container" style="display: none;">`;
                        
                        DADOS_REAIS[instrumento][autor].forEach(livro => {
                            html += `<div class="livro-item" onclick="abrirPDF('${livro}')">📄 ${livro}</div>`;
                        });
                        
                        html += `</div></div>`;
                    });
                    
                    html += `</div></div>`;
                });
                
                container.innerHTML = html;
            }, 500);
        }

        function toggleInstrumento(element) {
            const container = element.nextElementSibling;
            const arrow = element.querySelector('span:last-child');
            
            if (container.style.display === 'none') {
                container.style.display = 'block';
                arrow.textContent = '▲';
            } else {
                container.style.display = 'none';
                arrow.textContent = '▼';
            }
        }

        function toggleAutor(element) {
            const container = element.nextElementSibling;
            const arrow = element.querySelector('span:last-child');
            
            if (container.style.display === 'none') {
                container.style.display = 'block';
                arrow.textContent = '▲';
            } else {
                container.style.display = 'none';
                arrow.textContent = '▼';
            }
        }

        function abrirPDF(nome) {
            // Link base do TeraBox
            const link = `https://www.terabox.com/sharing/link?surl=1izhEIX5F-3HVxJTvUIVSIQ&path=%2FLIVROS%2F${encodeURIComponent(nome)}`;
            window.open(link, '_blank');
        }

        function sincronizarTeraBox() {
            alert('🔄 Verificando atualizações...\n\nNenhum novo arquivo encontrado.\nBiblioteca já está atualizada!');
        }
    </script>
</body>
</html>
