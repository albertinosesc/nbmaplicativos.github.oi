<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Musical - Livros2026</title>
    <style>
        /* Estilos globais */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Container principal */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Título principal */
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Cartões de conteúdo */
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            margin-bottom: 20px;
        }

        /* Barra de informações */
        .info-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.1em;
        }

        /* Caixa de busca */
        .search-box {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e9ecef;
            border-radius: 50px;
            font-size: 16px;
            background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23666" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') no-repeat 15px center;
            padding-left: 45px;
        }

        /* Seção de login */
        .login-section {
            text-align: center;
            padding: 40px;
        }

        /* Botão de login do Google */
        .login-btn {
            background: #4285F4;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 133, 244, 0.4);
        }

        .login-btn img {
            width: 24px;
            height: 24px;
        }

        /* Estilo para pastas (instrumentos e subpastas) */
        .instrumento, .subpasta-item {
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .instrumento-header, .subpasta-header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 1.2em;
        }

        .instrumento-header .info, .subpasta-header .info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Ícones de pasta */
        .instrumento-header .info::before, .subpasta-header .info::before {
            content: '📁';
            font-size: 1.2em;
            margin-right: 5px;
        }

        /* Setas de expansão */
        .instrumento-header .info::after, .subpasta-header .info::after {
            content: '▼';
            font-size: 0.8em;
            margin-left: 10px;
            transition: transform 0.3s;
        }

        .instrumento-header.collapsed .info::after, .subpasta-header.collapsed .info::after {
            transform: rotate(-90deg);
        }

        /* Emblemas com contagem */
        .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        /* Containers de conteúdo (subpastas e livros) */
        .subpastas-container, .livros-container {
            background: #f8f9fa;
            padding: 10px;
            display: none; /* Escondido por padrão */
        }

        /* Estilo para livros individuais */
        .livro-item {
            padding: 8px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .livro-item:hover {
            background: #f0f0f0;
        }

        /* Ícone de arquivo */
        .livro-item::before {
            content: '📄';
            font-size: 1.2em;
        }

        /* Cartões de estatísticas */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* Mensagem de carregamento */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #666;
        }

        /* Botão de logout */
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Responsividade para telas menores */
        @media (max-width: 768px) {
            .main-container {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .instrumento-header, .subpasta-header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>📚 Biblioteca Musical - Livros2026</h1>

        <div class="card">
            <div id="auth-section" class="login-section">
                <button id="login-btn" class="login-btn" style="display: none;" onclick="handleAuthClick()">
                    <img src="https://www.google.com/favicon.ico" alt="Google"> Conectar com Google Drive
                </button>
                <p id="loading-apis" style="color: #666;">🔄 Carregando APIs do Google...</p>
                <p style="margin-top: 20px; color: #666;">Conecte sua conta do Google para acessar a pasta Livros2026.</p>
            </div>

            <div id="drive-section" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div class="info-bar" style="flex: 1; margin-right: 10px;">
                        📁 Pasta: <strong>Livros2026</strong>
                    </div>
                    <button onclick="logout()" class="logout-btn">Sair</button>
                </div>

                <input type="text" id="busca" class="search-box" placeholder="🔍 Buscar por pasta ou livro..." onkeyup="buscarElementos()">

                <div id="container">
                    <div class="loading">📂 Carregando estrutura da pasta Livros2026...<br>(Aguarde, isso pode demorar um pouco)</div>
                </div>

                <div id="stats" class="stats"></div>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // CREDENCIAIS DO GOOGLE CLOUD E ID DA PASTA
        // =============================================
        const CLIENT_ID = '609089935632-msmei0u121c32cok6v8kk8dr54sdgv90.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyBs8F6mFBK9hY6v1Fx3NTL6nFZTTgWV--Q';
        const SCOPES = 'https://www.googleapis.com/auth/drive.metadata.readonly'; // Melhor escopo apenas para leitura de metadados [citation:1.7]
        const ID_PASTA_PRINCIPAL = '1E0fU7eaaVyxWi1DWXVymia-vQWRVgR3R'; // ID de "Livros2026"

        // Elementos DOM
        const authSection = document.getElementById('auth-section');
        const driveSection = document.getElementById('drive-section');
        const loginBtn = document.getElementById('login-btn');
        const loadingApisText = document.getElementById('loading-apis');
        const container = document.getElementById('container');
        const statsDiv = document.getElementById('stats');
        const buscaInput = document.getElementById('busca');

        // Estado do aplicativo
        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let accessToken = null;
        let biblioteca = {}; // Estrutura hierárquica completa

        // Estatísticas globais
        let totalPDFs = 0;
        let totalPastas = 0;

        // =============================================
        // CARREGAR E INICIALIZAR APIs DO GOOGLE
        // =============================================
        
        function loadScripts() {
            // Carrega GAPI
            const gapiScript = document.createElement('script');
            gapiScript.src = 'https://apis.google.com/js/api.js';
            gapiScript.onload = () => gapi.load('client', initializeGapiClient);
            document.body.appendChild(gapiScript);

            // Carrega GIS (Google Identity Services)
            const gisScript = document.createElement('script');
            gisScript.src = 'https://accounts.google.com/gsi/client';
            gisScript.onload = gisLoaded;
            document.body.appendChild(gisScript);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
            });
            gapiInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', // Será definido dinamicamente em handleAuthClick
            });
            gisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                loadingApisText.style.display = 'none';
                loginBtn.style.display = 'inline-flex';
                // Tenta restaurar login após as APIs carregarem
                tryRestoreToken();
            }
        }

        // =============================================
        // AUTENTICAÇÃO E GERENCIAMENTO DE SESSÃO
        // =============================================
        
        function tryRestoreToken() {
            const savedToken = localStorage.getItem('google_access_token');
            if (savedToken) {
                accessToken = savedToken;
                gapi.client.setToken({ access_token: accessToken }); // Define token para chamadas GAPI [citation:2.2]
                showDriveSection();
                listarPastaRecursiva();
                return true;
            }
            return false;
        }

        window.handleAuthClick = function() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    console.error('Erro de autenticação:', resp);
                    return;
                }
                
                accessToken = resp.access_token;
                localStorage.setItem('google_access_token', accessToken);
                gapi.client.setToken({ access_token: accessToken }); // Define token para chamadas GAPI [citation:2.2]
                
                showDriveSection();
                await listarPastaRecursiva();
            };

            // Solicita token. Se já autorizado, pode não mostrar prompt.
            tokenClient.requestAccessToken({ 
                prompt: 'consent', // Força prompt para garantir novo token se necessário
                hint: 'albertinosesc@gmail.com' // Sugestão de e-mail
            });
        };

        window.logout = function() {
            if (accessToken) {
                google.accounts.oauth2.revoke(accessToken); // Revoga token no Google [citation:2.2]
            }
            accessToken = null;
            gapi.client.setToken(null); // Remove token do GAPI [citation:2.2]
            localStorage.removeItem('google_access_token');
            
            showAuthSection();
            biblioteca = {};
            // Limpa container e busca
            container.innerHTML = '<div class="loading">Desconectado. Clique em "Conectar" para acessar.</div>';
            statsDiv.innerHTML = '';
            buscaInput.value = '';
        };

        function showAuthSection() {
            authSection.style.display = 'block';
            driveSection.style.display = 'none';
        }

        function showDriveSection() {
            authSection.style.display = 'none';
            driveSection.style.display = 'block';
        }

        // =============================================
        // FUNÇÃO PRINCIPAL RECURSIVA - LISTAR DRIVE
        // =============================================
        
        async function listarPastaRecursiva() {
            container.innerHTML = '<div class="loading">📂 Conectando e lendo estrutura da pasta Livros2026...<br>(Isso pode demorar, aguarde)</div>';
            biblioteca = {}; // Reseta estrutura
            totalPDFs = 0;
            totalPastas = 0;
            buscaInput.value = ''; // Limpa busca
            
            try {
                // PASSO 1: Obter informações e conteúdo de forma recursiva [citation:1.7]
                console.log('Iniciando carregamento recursivo...');
                biblioteca = await processarNivelDrive(ID_PASTA_PRINCIPAL, 'Livros2026');
                console.log('Estrutura HIERÁRQUICA final carregada:', biblioteca);
                
                // PASSO 2: Verificar e renderizar [citation:1.7]
                if (totalPDFs === 0 && totalPastas <= 1) { // 1 pasta é a raiz
                    container.innerHTML = '<div class="loading">📭 Nenhum arquivo PDF encontrado na pasta Livros2026 ou subpastas.</div>';
                    statsDiv.innerHTML = '';
                } else {
                    renderizarHierarquia();
                    updateStats();
                }
                
            } catch (error) {
                console.error('Erro detalhado no carregamento:', error);
                handleApiError(error);
            }
        }

        // FUNÇÃO RECURSIVA DE PROCESSAMENTO [citation:1.7]
        async function processarNivelDrive(folderId, folderName) {
            // Objeto que representa este nó (pasta)
            let noPasta = {
                id: folderId,
                nome: folderName,
                tipo: 'pasta',
                conteudo: [], // Lista misturada de arquivos e subpastas processadas
                erro: null
            };

            try {
                // 1. Busca TODAS as subpastas dentro desta pasta [citation:1.7]
                const subpastasQuery = `'${folderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
                const subpastasResponse = await gapi.client.drive.files.list({
                    'q': subpastasQuery,
                    'pageSize': 100, // Ajuste conforme necessário, lidando com paginação se houver >100
                    'fields': 'files(id, name)'
                });
                const subpastas = subpastasResponse.result.files || [];

                // 2. Busca TODOS os PDFs dentro desta pasta [citation:1.7]
                const pdfsQuery = `'${folderId}' in parents and (mimeType='application/pdf' or name contains '.pdf') and trashed=false`;
                const pdfsResponse = await gapi.client.drive.files.list({
                    'q': pdfsQuery,
                    'pageSize': 100, // Ajuste conforme necessário
                    'fields': 'files(id, name, webViewLink, webContentLink)'
                });
                const pdfs = pdfsResponse.result.files || [];

                // 3. Adiciona PDFs processados ao conteúdo deste nó
                pdfs.forEach(f => {
                    totalPDFs++;
                    noPasta.conteudo.push({
                        id: f.id,
                        nome: f.name,
                        tipo: 'arquivo',
                        // Prefere webViewLink para abrir no Drive, fallback para o ID [citation:1.7]
                        link: f.webViewLink || f.webContentLink || `https://drive.google.com/file/d/${f.id}/view`
                    });
                });

                // 4. CHAMADA RECURSIVA: Para cada subpasta, processa o nível [citation:1.7]
                for (const subpasta of subpastas) {
                    totalPastas++;
                    // Atualiza feedback visual para o usuário [citation:1.7]
                    container.innerHTML = `<div class="loading">📂 Lendo estrutura recursiva...<br>Processando pasta: <strong>${subpasta.name}</strong><br>(${totalPastas} pastas lidas...)</div>`;
                    
                    const resultadoSubnivel = await processarNivelDrive(subpasta.id, subpasta.name);
                    noPasta.conteudo.push(resultadoSubnivel);
                }

                // Ordena o conteúdo: pastas primeiro (alfabético), depois arquivos (alfabético)
                noPasta.conteudo.sort((a, b) => {
                    if (a.tipo === b.tipo) {
                        return a.nome.localeCompare(b.nome);
                    }
                    return a.tipo === 'pasta' ? -1 : 1;
                });

            } catch (error) {
                console.error(`Erro ao processar nível Drive para ${folderName} (${folderId}):`, error);
                noPasta.erro = error.message;
            }

            return noPasta;
        }

        // =============================================
        // RENDERIZAR INTERFACE HIERÁRQUICA
        // =============================================
        
        function renderizarHierarquia() {
            container.innerHTML = "";
            
            // Inicia renderização a partir da raiz (biblioteca é o nó raiz processado)
            if (biblioteca && biblioteca.id) {
                // Pasta raiz tem recuo 0 [citation:1.7]
                container.appendChild(criarElementoHTMLHierarquico(biblioteca, 0));
            }
        }

        // FUNÇÃO RECURSIVA DE CRIAÇÃO DE HTML [citation:1.7]
        function criarElementoHTMLHierarquico(no, nivelProfundidade) {
            if (no.tipo === 'arquivo') {
                // Renderiza arquivo
                const livroDiv = document.createElement("div");
                livroDiv.className = "livro-item";
                livroDiv.textContent = no.nome;
                // Recuo visual baseado na profundidade [citation:1.7]
                livroDiv.style.marginLeft = `${25 * nivelProfundidade}px`;
                
                livroDiv.onclick = (e) => {
                    e.stopPropagation(); // Impede expandir pasta pai
                    if (no.link) window.open(no.link, '_blank');
                };
                return livroDiv;
            } else if (no.tipo === 'pasta') {
                // Renderiza pasta
                const divPasta = document.createElement("div");
                divPasta.className = "instrumento"; // Estilo de container de pasta
                // Recuo visual baseado na profundidade [citation:1.7]
                divPasta.style.marginLeft = `${20 * nivelProfundidade}px`;

                const headerPasta = document.createElement("div");
                // Começa colapsado [citation:1.7]
                headerPasta.className = "instrumento-header collapsed";
                
                // Estatísticas deste nível (pastas e arquivos diretos)
                const arquivosDiretosNivel = no.conteudo.filter(item => item.tipo === 'arquivo').length;
                const subpastasDiretasNivel = no.conteudo.filter(item => item.tipo === 'pasta').length;
                
                const infoPasta = document.createElement("span");
                infoPasta.className = "info";
                infoPasta.innerHTML = `${no.nome} <span class="badge" title="Pastas diretas / Arquivos diretos">${subpastasDiretasNivel} p / ${arquivosDiretosNivel} a</span>`;
                
                // Feedback visual de erro na pasta
                if (no.erro) {
                    infoPasta.innerHTML += ` <span style="color:#dc3545; margin-left:10px;" title="Erro ao ler conteúdo: ${no.erro}">⚠️ Erro</span>`;
                }
                
                headerPasta.appendChild(infoPasta);

                // Container para o conteúdo da pasta [citation:1.7]
                const conteudoContainer = document.createElement("div");
                conteudoContainer.className = "subpastas-container"; // Reutilizando classe de estilo
                conteudoContainer.style.display = "none"; // Escondido por padrão
                conteudoContainer.style.paddingLeft = "0"; // Recuo é controlado via marginLeft nos filhos

                // Lógica de expandir/colapsar ao clicar no header [citation:1.7]
                let expandido = false;
                headerPasta.onclick = (e) => {
                    e.stopPropagation();
                    expandido = !expandido;
                    conteudoContainer.style.display = expandido ? "block" : "none";
                    headerPasta.classList.toggle("collapsed");
                };

                // CHAMADA RECURSIVA: Processa o conteúdo desta pasta gerando HTML [citation:1.7]
                if (no.conteudo && no.conteudo.length > 0) {
                    no.conteudo.forEach(item => {
                        // Chamada recursiva aumentando a profundidade [citation:1.7]
                        conteudoContainer.appendChild(criarElementoHTMLHierarquico(item, nivelProfundidade + 1));
                    });
                } else if (!no.erro) {
                    // Feedback de pasta vazia
                    const vazioDiv = document.createElement("div");
                    vazioDiv.className = "livro-item vazio";
                    vazioDiv.style.color = "#999";
                    vazioDiv.style.fontStyle = "italic";
                    vazioDiv.style.marginLeft = `${25 * (nivelProfundidade + 1)}px`;
                    vazioDiv.innerHTML = "📭 Pasta vazia ou sem PDFs";
                    conteudoContainer.appendChild(vazioDiv);
                } else {
                     // Feedback de erro na pasta (já mostrado no header, opcional detalhar aqui)
                    const erroDiv = document.createElement("div");
                    erroDiv.className = "livro-item erro";
                    erroDiv.style.color = "#dc3545";
                    erroDiv.style.marginLeft = `${25 * (nivelProfundidade + 1)}px`;
                    erroDiv.textContent = `❌ Erro ao ler conteúdo: ${no.erro}`;
                    conteudoContainer.appendChild(erroDiv);
                }

                divPasta.appendChild(headerPasta);
                divPasta.appendChild(conteudoContainer);
                return divPasta;
            }
        }

        // =============================================
        // ATUALIZAR ESTATÍSTICAS NO RODAPÉ
        // =============================================
        
        function updateStats() {
            statsDiv.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalPastas}</div>
                    <div class="stat-label">Total Pastas lidas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalPDFs}</div>
                    <div class="stat-label">Total PDFs encontrados</div>
                </div>
            `;
        }

        // =============================================
        // FUNÇÃO DE BUSCA HIERÁRQUICA
        // =============================================
        
        window.buscarElementos = function() {
            const termo = document.getElementById("busca").value.toLowerCase().trim();
            const driveSectionVisible = driveSection.style.display === 'block';

            // Só busca se autenticado e com dados
            if (!driveSectionVisible || !biblioteca.id) return;

            if (termo === "") {
                // Reseta visualização: mostra tudo e colapsa [citation:1.7]
                document.querySelectorAll(".instrumento, .livro-item").forEach(el => el.style.display = "");
                document.querySelectorAll(".subpastas-container").forEach(el => el.style.display = "none");
                document.querySelectorAll(".instrumento-header").forEach(el => el.classList.add("collapsed"));
                return;
            }

            // Esconde tudo primeiro [citation:1.7]
            document.querySelectorAll(".instrumento, .livro-item").forEach(el => el.style.display = "none");

            // Busca abrangente em arquivos e pastas [citation:1.7]
            document.querySelectorAll(".livro-item, .instrumento-header").forEach(el => {
                const text = el.textContent.toLowerCase();
                
                if (text.includes(termo)) {
                    // Encontrou correspondência [citation:1.7]
                    
                    if (el.classList.contains("livro-item")) {
                        // Se arquivo, mostra ele e sobe a cadeia de pais mostrando e expandindo
                        el.style.display = "";
                        expandirCadeiaDePais(el);
                    } else if (el.classList.contains("instrumento-header")) {
                        // Se pasta, mostra ela (o container .instrumento) e sobe a cadeia
                        const divPasta = el.parentElement; // .instrumento
                        if (divPasta) {
                            divPasta.style.display = "";
                            expandirCadeiaDePais(divPasta);
                            // Opcional: expandir a própria pasta encontrada para mostrar conteúdo
                            /*
                            const containerConteudo = el.nextElementSibling;
                            if (containerConteudo) {
                                containerConteudo.style.display = "block";
                                el.classList.remove("collapsed");
                            }
                            */
                        }
                    }
                }
            });
        };

        // Função auxiliar para expandir pais recursivamente até a raiz [citation:1.7]
        function expandirCadeiaDePais(elemento) {
            let pai = elemento.parentElement;
            while (pai && pai !== container) {
                // Se container escondido, mostra e expande header correspondente [citation:1.7]
                if (pai.style.display === "none") {
                    pai.style.display = "";
                }
                
                if (pai.classList.contains("subpastas-container")) {
                    pai.style.display = "block"; // Garante expandido
                    // Tenta achar o header anterior (.instrumento-header) para atualizar ícone ▼
                    const header = pai.previousElementSibling;
                    if (header && header.classList.contains("instrumento-header")) {
                        header.classList.remove("collapsed");
                    }
                }
                
                // Se for o container .instrumento principal, garante que está visível
                if (pai.classList.contains("instrumento") && pai.style.display === "none") {
                    pai.style.display = "";
                }

                pai = pai.parentElement;
            }
        }

        // =============================================
        // TRATAMENTO DE ERROS DE API
        // =============================================
        function handleApiError(error) {
            let mensagem = `Erro ao carregar pasta: ${error.message}`;
            let acao = '';

            if (error.status === 401) {
                // Token expirado ou inválido [citation:2.2]
                localStorage.removeItem('google_access_token');
                accessToken = null;
                acao = '<button id="login-btn-error" class="login-btn" onclick="handleAuthClick()" style="margin-top:20px;"><img src="https://www.google.com/favicon.ico" alt="Google"> Reconectar</button>';
                mensagem = "🔄 Sessão expirada ou acesso revogado.<br>Por favor, conecte novamente.";
                showAuthSection();
            } else if (error.status === 403) {
                 // Erro de permissão (403 Forbidden) [citation:2.4]
                 mensagem = `🚫 Erro 403: Acesso Negado.<br>Verifique se:<br>1. O Client ID e API Key estão corretos.<br>2. A API do Google Drive está ATIVADA no console.<br>3. A pasta <strong>Livros2026</strong> está compartilhada com sua conta ou publicamente.`;
                 acao = '<button onclick="logout()" class="logout-btn" style="float:none; margin-top:20px;">Sair e Tentar Outra Conta</button>';
            } else if (error.status === 404) {
                 // Pasta não encontrada
                 mensagem = `❌ Pasta principal não encontrada (ID: ${ID_PASTA_PRINCIPAL}).<br>Verifique se o ID está correto.`;
                 acao = '<button onclick="logout()" class="logout-btn" style="float:none; margin-top:20px;">Sair</button>';
            } else {
                // Outros erros
                acao = '<button onclick="listarPastaRecursiva()" style="margin-top: 20px; padding: 10px 20px;">Tentar novamente</button>';
            }

            container.innerHTML = `
                <div style="text-align: center; padding: 40px; color: #dc3545; background-color: #f8d7da; border-radius: 10px; border: 1px solid #f5c6cb;">
                    ${mensagem}<br>
                    (Status: ${error.status || 'Desconhecido'})<br>
                    ${acao}
                </div>
            `;
            statsDiv.innerHTML = '';
        }

        // =============================================
        // INICIALIZAÇÃO AUTOMÁTICA
        // =============================================
        
        window.onload = function() {
            loadScripts();
            // Restauração de token é tentada dentro de maybeEnableButtons quando APIs carregam [citation:2.2]
        };
    </script>
