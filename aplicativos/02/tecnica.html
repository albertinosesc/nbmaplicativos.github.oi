<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Treino Musical - Por Instrumento</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
    }

    .container {
      max-width: 950px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h2 {
      color: #667eea;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .config-area {
      background: #f7f9fc;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .config-row {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .grupo-config {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin: 10px 0;
      border: 2px solid #e0e7ff;
    }

    .grupo-titulo {
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
      font-size: 14px;
    }

    input, select, button {
      padding: 12px 20px;
      font-size: 16px;
      margin: 5px;
      border: 2px solid #ddd;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102,126,234,0.3);
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-danger {
      background: #e53e3e;
    }

    .btn-danger:hover {
      background: #c53030;
    }

    .btn-success {
      background: #48bb78;
    }

    .btn-success:hover {
      background: #38a169;
    }

    .modo-buttons {
      margin: 15px 0;
    }

    .modo-buttons button {
      background: #f0f0f0;
      color: #333;
    }

    .modo-buttons button.active {
      background: #667eea;
      color: white;
    }

    #modoAtual {
      font-weight: bold;
      margin: 10px 0;
      padding: 8px;
      background: #f0f0f0;
      border-radius: 10px;
      display: inline-block;
    }

    .resultado-area {
      margin: 30px 0;
    }

    #resultado {
      font-size: 42px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      letter-spacing: 8px;
      transition: transform 0.2s ease;
      word-break: break-word;
    }

    .checkbox-label {
      display: inline-flex;
      align-items: center;
      margin: 15px 0;
      cursor: pointer;
    }

    .checkbox-label input {
      width: auto;
      margin-right: 10px;
      transform: scale(1.2);
      cursor: pointer;
    }

    #lista {
      max-height: 400px;
      overflow-y: auto;
      border: 2px solid #ddd;
      border-radius: 10px;
      margin-top: 15px;
      padding: 15px;
      text-align: left;
      background: #fafafa;
    }

    #lista div {
      padding: 8px;
      border-bottom: 1px solid #eee;
      font-family: monospace;
      font-size: 14px;
    }

    #lista div:hover {
      background: #f0f0f0;
    }

    #lista div.estudado {
      background: #c6f6d5;
      color: #22543d;
    }

    .info {
      background: #e0e7ff;
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      font-size: 14px;
    }

    .stats {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin: 15px 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .stat-item {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .stat-item:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .stat-item.active {
      background: rgba(255,255,255,0.4);
      border: 2px solid white;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.9;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
    }

    .shortcut-hint {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      z-index: 1000;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .metronome-active {
      animation: pulse 0.5s infinite;
    }

    @keyframes success {
      0% { transform: scale(1); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
      50% { transform: scale(1.05); background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); }
      100% { transform: scale(1); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    }

    .success-animation {
      animation: success 0.5s ease;
    }

    .auto-message {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #48bb78;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      animation: slideIn 0.3s ease;
      z-index: 1000;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      margin-left: 8px;
    }

    .badge-tecnica {
      background: #fed7d7;
      color: #742a2a;
    }

    .badge-escala {
      background: #c6f6d5;
      color: #22543d;
    }

    .info-panel {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>🎵 Sistema de Treino Musical</h2>
  <div class="subtitle" id="subtitle">Selecione ou crie um usuário</div>

  <div class="config-area">
    <!-- Usuário -->
    <div class="config-row">
      <select id="usuario" onchange="carregarUsuario()" style="min-width: 180px;"></select>
      <input type="text" id="novoUsuario" placeholder="Nome do usuário">
      <button onclick="criarUsuario()" class="btn-success">➕ Criar Usuário</button>
      <button onclick="deletarUsuario()" class="btn-danger">🗑️ Deletar</button>
    </div>

    <!-- Instrumento (aparece depois de criar usuário) -->
    <div id="instrumentoPanel" style="display: none;">
      <div class="grupo-config">
        <div class="grupo-titulo">🎸 Escolha o Instrumento</div>
        <div class="config-row">
          <select id="instrumento" onchange="mudarInstrumento()" style="min-width: 200px;">
            <option value="">Selecione um instrumento</option>
            <option value="violao">Violão</option>
            <option value="guitarra">Guitarra</option>
            <option value="teclado">Teclado</option>
            <option value="bateria">Bateria</option>
            <option value="baixo">Baixo</option>
            <option value="flauta">Flauta</option>
            <option value="saxofone">Saxofone</option>
            <option value="violino">Violino</option>
          </select>
          <input type="text" id="novoInstrumento" placeholder="Ou digite um novo instrumento">
          <button onclick="adicionarInstrumento()">➕ Adicionar</button>
        </div>
      </div>

      <!-- Tipo de Treino (Técnica ou Escala) -->
      <div id="tipoTreinoPanel" style="display: none;">
        <div class="grupo-config">
          <div class="grupo-titulo">🎯 Tipo de Treino</div>
          <div class="config-row">
            <button onclick="selecionarCategoria('tecnica')" id="btnTecnica" class="active">🎸 Técnica (320 combinações)</button>
            <button onclick="selecionarCategoria('escala')" id="BtnEscala">🎹 Escalas</button>
          </div>
        </div>
      </div>

      <!-- Configuração específica da Escala -->
      <div id="escalaConfig" style="display: none;">
        <div class="grupo-config">
          <div class="grupo-titulo">📏 Configuração da Escala</div>
          <div class="config-row">
            <select id="tipoEscala" onchange="mudarTipoEscala()">
              <option value="4digits">4 Dígitos (1-2-3-4) - 32 combinações</option>
              <option value="5digits">5 Dígitos (1-2-3-4-5) - 180 combinações</option>
              <option value="8digits">8 Dígitos (1-2-3-4-5-6-7-8) - 40.320 combinações</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Informação do treino atual -->
      <div id="infoTreino" class="info-panel"></div>
    </div>
  </div>

  <!-- Modo -->
  <div class="modo-buttons">
    <button onclick="setModo('manual')" id="btnManual">📖 Modo Manual</button>
    <button onclick="setModo('auto')" id="btnAuto">🤖 Modo Automático</button>
  </div>
  <div id="modoAtual">Modo: Manual</div>

  <!-- Controles principais -->
  <div>
    <input type="number" id="inputId" placeholder="ID" min="1">
    <button onclick="buscar()">🔍 Buscar</button>
    <button onclick="proximoAuto()">⏩ Próximo</button>
    <button onclick="anterior()">⏪ Anterior</button>
    <button onclick="sortear()">🎲 Sortear</button>
  </div>

  <!-- Buscar por sequência -->
  <div>
    <input type="text" id="inputSeq" placeholder="Ex: 1 2 3 4 5 ou 1-2-3-4-5">
    <button onclick="buscarId()">🔎 Descobrir ID</button>
  </div>
  <div id="idEncontrado" class="info"></div>

  <!-- Lista de combinações -->
  <button onclick="toggleLista()">📋 Mostrar/Esconder Lista</button>
  <div id="lista"></div>

  <!-- Metrônomo -->
  <div>
    <input type="number" id="bpm" value="60" min="30" max="200">
    <button onclick="toggleMetronomo()" id="btnMetronomo">🎵 Metrônomo</button>
  </div>

  <!-- Checkbox de estudo -->
  <label class="checkbox-label">
    <input type="checkbox" id="checkEstudado" onchange="marcarEstudado()">
    ✅ Já estudei esta combinação
  </label>

  <!-- Estatísticas -->
  <div class="stats" id="estatisticas">
    <div>📊 Meus Treinos</div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <!-- Resultado -->
  <div class="resultado-area">
    <div id="resultado" class="box">---</div>
  </div>
</div>

<div class="shortcut-hint">
  💡 Dica: Espaço = próximo | Enter = buscar | ← → = navegação
</div>

<script>
  // ==================== FUNÇÕES DE GERAÇÃO DE COMBINAÇÕES ====================
  
  // Técnica (320 combinações - igual ao original)
  const numerosTecnica = [1, 2, 3, 4, 5];
  
  function gerarPermutacoes(arr) {
    if (arr.length === 1) return [arr];
    let res = [];
    for (let i = 0; i < arr.length; i++) {
      let resto = arr.slice(0, i).concat(arr.slice(i + 1));
      gerarPermutacoes(resto).forEach(p => res.push([arr[i], ...p]));
    }
    return res;
  }

  function gerarBases(maxNumero, tamanho) {
    let bases = [];
    function combinar(start, combo) {
      if (combo.length === tamanho) {
        if (Math.max(...combo) === maxNumero) bases.push(combo);
        return;
      }
      for (let i = start; i < maxNumero; i++) {
        combinar(i + 1, [...combo, numerosTecnica[i]]);
      }
    }
    combinar(0, []);
    return bases;
  }

  function gerarBloco(maxNumero) {
    let combinacoes = [];
    for (let t = 2; t <= maxNumero; t++) {
      gerarBases(maxNumero, t).forEach(base => {
        gerarPermutacoes(base).forEach(p => combinacoes.push(p.join(' ')));
      });
    }
    return combinacoes;
  }

  const combinacoesTecnica = [
    ...gerarBloco(2),
    ...gerarBloco(3),
    ...gerarBloco(4),
    ...gerarBloco(5)
  ];

  // Funções para Escalas
  function gerarCombinacoesEscala(numeros, minDigitos, maxDigitos) {
    const todas = [];
    
    function gerarPermutacoesEscala(arr) {
      if (arr.length === 1) return [arr];
      let res = [];
      for (let i = 0; i < arr.length; i++) {
        let resto = arr.slice(0, i).concat(arr.slice(i + 1));
        gerarPermutacoesEscala(resto).forEach(p => res.push([arr[i], ...p]));
      }
      return res;
    }
    
    function gerarBasesEscala(start, combo, tamanho, maxNumero) {
      if (combo.length === tamanho) {
        if (Math.max(...combo) === maxNumero) return [combo];
        return [];
      }
      let bases = [];
      for (let i = start; i < numeros.length; i++) {
        bases.push(...gerarBasesEscala(i + 1, [...combo, numeros[i]], tamanho, maxNumero));
      }
      return bases;
    }
    
    const maxNumero = Math.max(...numeros);
    for (let t = minDigitos; t <= maxDigitos; t++) {
      const bases = gerarBasesEscala(0, [], t, maxNumero);
      bases.forEach(base => {
        gerarPermutacoesEscala(base).forEach(p => {
          todas.push(p.join(' '));
        });
      });
    }
    return todas;
  }

  const configEscalas = {
    '4digits': {
      nome: 'Escala 4 Dígitos',
      numeros: [1, 2, 3, 4],
      minDigitos: 2,
      maxDigitos: 4,
      total: 32
    },
    '5digits': {
      nome: 'Escala 5 Dígitos',
      numeros: [1, 2, 3, 4, 5],
      minDigitos: 2,
      maxDigitos: 5,
      total: 180
    },
    '8digits': {
      nome: 'Escala 8 Dígitos',
      numeros: [1, 2, 3, 4, 5, 6, 7, 8],
      minDigitos: 2,
      maxDigitos: 8,
      total: 40320
    }
  };

  // ==================== ESTADO DO SISTEMA ====================
  
  let combinacoes = [];
  let modo = 'manual';
  let avancandoAuto = false;
  let usuarioAtual = null;
  let configAtual = {
    instrumento: '',
    categoria: 'tecnica', // 'tecnica' ou 'escala'
    tipoEscala: '5digits'
  };

  // Dados dos usuários
  let usuarios = JSON.parse(localStorage.getItem('usuarios_v3') || '{}');

  // ==================== FUNÇÕES DE USUÁRIO ====================
  
  function atualizarSelectUsuarios() {
    const sel = document.getElementById('usuario');
    sel.innerHTML = '<option value="">Selecione um usuário</option>';
    
    Object.keys(usuarios).sort().forEach(u => {
      let opt = document.createElement('option');
      opt.value = u;
      
      // Calcular total de estudos
      let totalEstudos = 0;
      const userData = usuarios[u];
      for (const [key, value] of Object.entries(userData.treinos || {})) {
        totalEstudos += value.feitos?.length || 0;
      }
      
      opt.textContent = `${u} (${totalEstudos} estudos)`;
      sel.appendChild(opt);
    });
  }

  function criarUsuario() {
    const nome = document.getElementById('novoUsuario').value.trim();
    if (!nome) {
      alert('Digite um nome para o usuário');
      return;
    }
    if (usuarios[nome]) {
      alert('Usuário já existe!');
      return;
    }
    
    usuarios[nome] = {
      treinos: {}, // Será preenchido dinamicamente
      instrumentos: []
    };
    
    localStorage.setItem('usuarios_v3', JSON.stringify(usuarios));
    atualizarSelectUsuarios();
    document.getElementById('novoUsuario').value = '';
    
    // Selecionar o novo usuário
    document.getElementById('usuario').value = nome;
    carregarUsuario();
    
    alert(`✅ Usuário ${nome} criado com sucesso!`);
  }

  function deletarUsuario() {
    const user = document.getElementById('usuario').value;
    if (!user || !usuarios[user]) {
      alert('Selecione um usuário primeiro');
      return;
    }
    
    if (confirm(`Tem certeza que deseja deletar o usuário ${user}?\nTodo o progresso será perdido!`)) {
      delete usuarios[user];
      localStorage.setItem('usuarios_v3', JSON.stringify(usuarios));
      atualizarSelectUsuarios();
      
      // Resetar interface
      document.getElementById('instrumentoPanel').style.display = 'none';
      document.getElementById('resultado').textContent = '---';
      usuarioAtual = null;
      
      alert(`Usuário ${user} deletado`);
    }
  }

  function carregarUsuario() {
    const nome = document.getElementById('usuario').value;
    if (!nome || !usuarios[nome]) {
      document.getElementById('instrumentoPanel').style.display = 'none';
      usuarioAtual = null;
      return;
    }
    
    usuarioAtual = nome;
    document.getElementById('instrumentoPanel').style.display = 'block';
    
    // Carregar último instrumento usado
    const ultimoInstrumento = usuarios[nome].ultimoInstrumento || '';
    if (ultimoInstrumento) {
      document.getElementById('instrumento').value = ultimoInstrumento;
      configAtual.instrumento = ultimoInstrumento;
    }
    
    // Carregar última configuração de treino
    const ultimoTreino = usuarios[nome].ultimoTreino;
    if (ultimoTreino) {
      configAtual.categoria = ultimoTreino.categoria || 'tecnica';
      configAtual.tipoEscala = ultimoTreino.tipoEscala || '5digits';
      
      if (configAtual.categoria === 'tecnica') {
        selecionarCategoria('tecnica');
      } else {
        selecionarCategoria('escala');
        document.getElementById('tipoEscala').value = configAtual.tipoEscala;
        mudarTipoEscala();
      }
    }
    
    atualizarEstatisticas();
    atualizarInfoTreino();
  }

  // ==================== FUNÇÕES DE INSTRUMENTO ====================
  
  function adicionarInstrumento() {
    const novoInst = document.getElementById('novoInstrumento').value.trim();
    if (!novoInst) {
      alert('Digite o nome do instrumento');
      return;
    }
    
    // Adicionar ao select
    const select = document.getElementById('instrumento');
    const option = document.createElement('option');
    option.value = novoInst.toLowerCase();
    option.textContent = novoInst;
    select.appendChild(option);
    select.value = novoInst.toLowerCase();
    
    document.getElementById('novoInstrumento').value = '';
    mudarInstrumento();
  }

  function mudarInstrumento() {
    const instrumento = document.getElementById('instrumento').value;
    if (!instrumento) {
      document.getElementById('tipoTreinoPanel').style.display = 'none';
      return;
    }
    
    configAtual.instrumento = instrumento;
    document.getElementById('tipoTreinoPanel').style.display = 'block';
    
    // Salvar no usuário
    if (usuarioAtual) {
      usuarios[usuarioAtual].ultimoInstrumento = instrumento;
      localStorage.setItem('usuarios_v3', JSON.stringify(usuarios));
    }
    
    atualizarInfoTreino();
  }

  // ==================== FUNÇÕES DE TREINO ====================
  
  function selecionarCategoria(categoria) {
    configAtual.categoria = categoria;
    
    // Atualizar estilo dos botões
    document.getElementById('btnTecnica').classList.remove('active');
    document.getElementById('BtnEscala').classList.remove('active');
    if (categoria === 'tecnica') {
      document.getElementById('btnTecnica').classList.add('active');
      document.getElementById('escalaConfig').style.display = 'none';
      carregarTreinoTecnica();
    } else {
      document.getElementById('BtnEscala').classList.add('active');
      document.getElementById('escalaConfig').style.display = 'block';
      carregarTreinoEscala();
    }
    
    // Salvar no usuário
    if (usuarioAtual) {
      if (!usuarios[usuarioAtual].ultimoTreino) {
        usuarios[usuarioAtual].ultimoTreino = {};
      }
      usuarios[usuarioAtual].ultimoTreino.categoria = categoria;
      localStorage.setItem('usuarios_v3', JSON.stringify(usuarios));
    }
    
    atualizarInfoTreino();
  }
  
  function carregarTreinoTecnica() {
    combinacoes = [...combinacoesTecnica];
    document.getElementById('subtitle').innerHTML = `🎸 ${configAtual.instrumento} - Técnica (320 combinações)`;
    
    // Carregar progresso
    const treinoKey = `${configAtual.instrumento}_tecnica`;
    if (usuarioAtual && usuarios[usuarioAtual].treinos[treinoKey]) {
      const progresso = usuarios[usuarioAtual].treinos[treinoKey];
      const idAtual = progresso.atual || 1;
      if (modo === 'auto') {
        let proximoId = encontrarProximoNaoEstudado(treinoKey, idAtual);
        mostrar(proximoId);
      }
    } else if (modo === 'auto') {
      mostrar(1);
    }
    
    atualizarEstatisticas();
  }
  
  function carregarTreinoEscala() {
    const escala = configEscalas[configAtual.tipoEscala];
    if (escala) {
      combinacoes = gerarCombinacoesEscala(escala.numeros, escala.minDigitos, escala.maxDigitos);
      document.getElementById('subtitle').innerHTML = `🎹 ${configAtual.instrumento} - ${escala.nome} (${combinacoes.length} combinações)`;
      
      // Carregar progresso
      const treinoKey = `${configAtual.instrumento}_escala_${configAtual.tipoEscala}`;
      if (usuarioAtual && usuarios[usuarioAtual].treinos[treinoKey]) {
        const progresso = usuarios[usuarioAtual].treinos[treinoKey];
        const idAtual = progresso.atual || 1;
        if (modo === 'auto') {
          let proximoId = encontrarProximoNaoEstudado(treinoKey, idAtual);
          mostrar(proximoId);
        }
      } else if (modo === 'auto') {
        mostrar(1);
      }
    }
    
    atualizarEstatisticas();
  }
  
  function mudarTipoEscala() {
    configAtual.tipoEscala = document.getElementById('tipoEscala').value;
    carregarTreinoEscala();
    
    // Salvar no usuário
    if (usuarioAtual) {
      if (!usuarios[usuarioAtual].ultimoTreino) {
        usuarios[usuarioAtual].ultimoTreino = {};
      }
      usuarios[usuarioAtual].ultimoTreino.tipoEscala = configAtual.tipoEscala;
      localStorage.setItem('usuarios_v3', JSON.stringify(usuarios));
    }
  }
  
  function getTreinoKey() {
    if (configAtual.categoria === 'tecnica') {
      return `${configAtual.instrumento}_tecnica`;
    } else {
      return `${configAtual.instrumento}_escala_${configAtual.tipoEscala}`;
    }
  }
  
  function encontrarProximoNaoEstudado(treinoKey, startId) {
    if (!usuarioAtual || !usuarios[usuarioAtual].treinos[treinoKey]) return startId;
    
    const feitos = usuarios[usuarioAtual].treinos[treinoKey].feitos || [];
    let id = startId;
    
    while (id <= combinacoes.length && feitos.includes(id)) {
      id++;
    }
    if (id > combinacoes.length) {
      id = 1;
      while (id <= combinacoes.length && feitos.includes(id)) {
        id++;
      }
    }
    return id;
  }
  
  function atualizarInfoTreino() {
    const infoDiv = document.getElementById('infoTreino');
    if (configAtual.instrumento && usuarioAtual) {
      const categoriaNome = configAtual.categoria === 'tecnica' ? 'Técnica' : 'Escalas';
      const detalhe = configAtual.categoria === 'tecnica' ? '320 combinações' : configEscalas[configAtual.tipoEscala].nome;
      infoDiv.innerHTML = `🎯 Treino atual: ${usuarioAtual} - ${configAtual.instrumento} - ${categoriaNome} (${detalhe})`;
    } else {
      infoDiv.innerHTML = 'Configure seu treino acima';
    }
  }

  // ==================== FUNÇÕES PRINCIPAIS ====================
  
  function setModo(m) {
    modo = m;
    document.getElementById('modoAtual').textContent = `Modo: ${m === 'auto' ? 'Automático' : 'Manual'}`;
    
    document.getElementById('btnManual').classList.remove('active');
    document.getElementById('btnAuto').classList.remove('active');
    document.getElementById(m === 'manual' ? 'btnManual' : 'btnAuto').classList.add('active');
  }

  function mostrar(id) {
    if (id >= 1 && id <= combinacoes.length) {
      document.getElementById('resultado').textContent = combinacoes[id - 1];
      document.getElementById('inputId').value = id;
      verificarCheck(id);
      
      const resultadoDiv = document.getElementById('resultado');
      resultadoDiv.style.transform = 'scale(1.02)';
      setTimeout(() => {
        resultadoDiv.style.transform = 'scale(1)';
      }, 200);
    } else {
      document.getElementById('resultado').textContent = '❌ ID inválido';
    }
  }

  function buscar() {
    const id = parseInt(document.getElementById('inputId').value);
    if (isNaN(id)) {
      alert('Digite um ID válido');
      return;
    }
    mostrar(id);
  }

  function buscarId() {
    let seq = document.getElementById('inputSeq').value.trim();
    if (!seq) {
      alert('Digite uma sequência');
      return;
    }
    seq = seq.replace(/-/g, ' ');
    const id = combinacoes.indexOf(seq) + 1;
    const msg = id > 0 ? `✅ ID encontrado: ${id}` : '❌ Sequência não encontrada';
    document.getElementById('idEncontrado').textContent = msg;
    
    if (id > 0) {
      document.getElementById('idEncontrado').style.background = '#c6f6d5';
      setTimeout(() => {
        document.getElementById('idEncontrado').style.background = '#e0e7ff';
      }, 2000);
    }
  }

  function toggleLista() {
    const div = document.getElementById('lista');
    if (div.style.display === 'none' || !div.style.display) {
      div.style.display = 'block';
      const treinoKey = getTreinoKey();
      const feitos = usuarios[usuarioAtual]?.treinos[treinoKey]?.feitos || [];
      
      div.innerHTML = combinacoes.map((c, i) => {
        const isStudied = feitos.includes(i + 1);
        return `<div class="${isStudied ? 'estudado' : ''}">${String(i + 1).padStart(4, '0')} - ${c} ${isStudied ? '✓' : ''}</div>`;
      }).join('');
    } else {
      div.style.display = 'none';
    }
  }

  function mostrarMensagemAuto(mensagem) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'auto-message';
    msgDiv.textContent = mensagem;
    document.body.appendChild(msgDiv);
    setTimeout(() => {
      msgDiv.remove();
    }, 2000);
  }

  function marcarEstudado() {
    if (avancandoAuto) return;
    
    if (!usuarioAtual) {
      alert('Selecione um usuário primeiro');
      document.getElementById('checkEstudado').checked = false;
      return;
    }
    
    if (!configAtual.instrumento) {
      alert('Selecione um instrumento primeiro');
      document.getElementById('checkEstudado').checked = false;
      return;
    }
    
    const id = parseInt(document.getElementById('inputId').value);
    if (!id || id < 1 || id > combinacoes.length) return;
    
    const isChecked = document.getElementById('checkEstudado').checked;
    const treinoKey = getTreinoKey();
    
    if (!usuarios[usuarioAtual].treinos[treinoKey]) {
      usuarios[usuarioAtual].treinos[treinoKey] = { feitos: [], atual: 1 };
    }
    
    const resultadoDiv = document.getElementById('resultado');
    resultadoDiv.classList.add('success-animation');
    setTimeout(() => {
      resultadoDiv.classList.remove('success-animation');
    }, 500);
    
    if (isChecked) {
      if (!usuarios[usuarioAtual].treinos[treinoKey].feitos.includes(id)) {
        usuarios[usuarioAtual].treinos[treinoKey].feitos.push(id);
        usuarios[usuarioAtual].treinos[treinoKey].feitos.sort((a, b) => a - b);
        
        localStorage.setItem('usuarios_v3', JSON.stringify(usuarios));
        atualizarEstatisticas();
        atualizarSelectUsuarios();
        
        if (modo === 'auto') {
          avancandoAuto = true;
          
          let proximoId = id + 1;
          while (proximoId <= combinacoes.length && usuarios[usuarioAtual].treinos[treinoKey].feitos.includes(proximoId)) {
            proximoId++;
          }
          
          if (proximoId > combinacoes.length) {
            proximoId = 1;
            while (proximoId <= combinacoes.length && usuarios[usuarioAtual].treinos[treinoKey].feitos.includes(proximoId)) {
              proximoId++;
            }
          }
          
          usuarios[usuarioAtual].treinos[treinoKey].atual = proximoId;
          localStorage.setItem('usuarios_v3', JSON.stringify(usuarios));
          
          if (proximoId <= combinacoes.length) {
            mostrar(proximoId);
            mostrarMensagemAuto(`✅ Estudado! Próximo: ${combinacoes[proximoId - 1]}`);
          } else {
            mostrarMensagemAuto(`🏆 Parabéns! Você estudou todas as ${combinacoes.length} combinações! 🏆`);
          }
          
          setTimeout(() => {
            avancandoAuto = false;
          }, 100);
        } else {
          mostrarMensagemAuto(`✅ Marcado como estudado! (Modo Manual)`);
        }
      }
    } else {
      const index = usuarios[usuarioAtual].treinos[treinoKey].feitos.indexOf(id);
      if (index > -1) {
        usuarios[usuarioAtual].treinos[treinoKey].feitos.splice(index, 1);
        localStorage.setItem('usuarios_v3', JSON.stringify(usuarios));
        atualizarEstatisticas();
        atualizarSelectUsuarios();
        mostrarMensagemAuto(`↩️ Desmarcado: ${combinacoes[id - 1]}`);
      }
    }
  }

  function verificarCheck(id) {
    if (!usuarioAtual || !configAtual.instrumento) {
      document.getElementById('checkEstudado').checked = false;
      return;
    }
    
    const treinoKey = getTreinoKey();
    const feitos = usuarios[usuarioAtual].treinos?.[treinoKey]?.feitos || [];
    document.getElementById('checkEstudado').checked = feitos.includes(id);
  }

  function proximoAuto() {
    if (!usuarioAtual || !configAtual.instrumento) {
      alert('Configure um usuário, instrumento e tipo de treino primeiro');
      return;
    }
    
    const treinoKey = getTreinoKey();
    
    if (modo === 'auto') {
      const idAtual = parseInt(document.getElementById('inputId').value);
      let proximoId = idAtual + 1;
      
      while (proximoId <= combinacoes.length && usuarios[usuarioAtual].treinos[treinoKey]?.feitos.includes(proximoId)) {
        proximoId++;
      }
      
      if (proximoId > combinacoes.length) {
        proximoId = 1;
        while (proximoId <= combinacoes.length && usuarios[usuarioAtual].treinos[treinoKey]?.feitos.includes(proximoId)) {
          proximoId++;
        }
      }
      
      if (proximoId <= combinacoes.length) {
        mostrar(proximoId);
        if (!usuarios[usuarioAtual].treinos[treinoKey]) {
          usuarios[usuarioAtual].treinos[treinoKey] = { feitos: [], atual: 1 };
        }
        usuarios[usuarioAtual].treinos[treinoKey].atual = proximoId;
        localStorage.setItem('usuarios_v3', JSON.stringify(usuarios));
      } else {
        mostrarMensagemAuto('🎉 Parabéns! Você já estudou todas as combinações! 🎉');
      }
    } else {
      const idAtual = parseInt(document.getElementById('inputId').value) || 1;
      const proximoId = idAtual + 1;
      if (proximoId <= combinacoes.length) {
        mostrar(proximoId);
      } else {
        alert('Você chegou ao final da lista!');
      }
    }
  }

  function anterior() {
    const idAtual = parseInt(document.getElementById('inputId').value) || 1;
    const anteriorId = idAtual - 1;
    if (anteriorId >= 1) {
      mostrar(anteriorId);
    } else {
      alert('Você está no início da lista!');
    }
  }

  function sortear() {
    const idSorteado = Math.floor(Math.random() * combinacoes.length) + 1;
    mostrar(idSorteado);
  }

  function atualizarEstatisticas() {
    const statsGrid = document.getElementById('statsGrid');
    
    if (!usuarioAtual || !usuarios[usuarioAtual]) {
      statsGrid.innerHTML = '<div class="stat-item">Selecione um usuário</div>';
      return;
    }
    
    const treinosDoUsuario = usuarios[usuarioAtual].treinos;
    const statsHTML = [];
    
    // Mostrar todos os treinos do usuário
    for (const [key, value] of Object.entries(treinosDoUsuario)) {
      let nomeTreino = key;
      let total = 0;
      let badge = '';
      
      if (key.includes('tecnica')) {
        const instrumento = key.split('_')[0];
        nomeTreino = `${instrumento} - Técnica`;
        total = 320;
        badge = '<span class="badge badge-tecnica">Técnica</span>';
      } else if (key.includes('escala')) {
        const parts = key.split('_');
        const instrumento = parts[0];
        const tipo = parts[2];
        const escalaNome = configEscalas[tipo]?.nome || tipo;
        nomeTreino = `${instrumento} - ${escalaNome}`;
        total = configEscalas[tipo]?.total || 0;
        badge = '<span class="badge badge-escala">Escala</span>';
      }
      
      const feitos = value.feitos?.length || 0;
      const percentual = total > 0 ? ((feitos / total) * 100).toFixed(1) : 0;
      
      statsHTML.push(`
        <div class="stat-item" onclick="carregarTreinoExistente('${key}')">
          <div class="stat-label">${nomeTreino}</div>
          <div class="stat-value">${feitos}/${total}</div>
          <div class="stat-label">${percentual}%</div>
          ${badge}
        </div>
      `);
    }
    
    if (statsHTML.length === 0) {
      statsGrid.innerHTML = '<div class="stat-item">Nenhum treino iniciado ainda. Comece configurando acima!</div>';
    } else {
      statsGrid.innerHTML = statsHTML.join('');
    }
  }
  
  function carregarTreinoExistente(treinoKey) {
    // Parse do treinoKey para carregar configuração
    if (treinoKey.includes('tecnica')) {
      const instrumento = treinoKey.split('_')[0];
      document.getElementById('instrumento').value = instrumento;
      configAtual.instrumento = instrumento;
      selecionarCategoria('tecnica');
    } else if (treinoKey.includes('escala')) {
      const parts = treinoKey.split('_');
      const instrumento = parts[0];
      const tipoEscala = parts[2];
      document.getElementById('instrumento').value = instrumento;
      configAtual.instrumento = instrumento;
      document.getElementById('tipoEscala').value = tipoEscala;
      selecionarCategoria('escala');
      mudarTipoEscala();
    }
    
    atualizarInfoTreino();
  }

  // ==================== METRÔNOMO ====================
  
  let intervalo = null;
  let audioContext = null;
  
  function initAudio() {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioContext.state === 'suspended') {
      audioContext.resume();
    }
  }
  
  function clickSom() {
    initAudio();
    const o = audioContext.createOscillator();
    const g = audioContext.createGain();
    o.connect(g);
    g.connect(audioContext.destination);
    o.frequency.value = 880;
    o.type = 'sine';
    g.gain.value = 0.3;
    o.start();
    g.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.2);
    o.stop(audioContext.currentTime + 0.2);
  }
  
  function toggleMetronomo() {
    const bpm = parseInt(document.getElementById('bpm').value) || 60;
    const ms = 60000 / bpm;
    const btn = document.getElementById('btnMetronomo');
    
    if (intervalo) {
      clearInterval(intervalo);
      intervalo = null;
      btn.textContent = '🎵 Metrônomo';
      btn.style.background = '#667eea';
      document.getElementById('resultado').classList.remove('metronome-active');
    } else {
      if (ms < 50) {
        alert('BPM muito alto! Máximo 200');
        return;
      }
      intervalo = setInterval(clickSom, ms);
      btn.textContent = '⏹️ Parar Metrônomo';
      btn.style.background = '#e53e3e';
      document.getElementById('resultado').classList.add('metronome-active');
    }
  }

  // ==================== TECLAS DE ATALHO ====================
  
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      proximoAuto();
    } else if (e.code === 'Enter') {
      e.preventDefault();
      buscar();
    } else if (e.code === 'ArrowLeft') {
      e.preventDefault();
      anterior();
    } else if (e.code === 'ArrowRight') {
      e.preventDefault();
      proximoAuto();
    }
  });

  // ==================== INICIALIZAÇÃO ====================
  
  atualizarSelectUsuarios();
  setModo('manual');
  
  console.log(`✅ Sistema carregado! Técnica: ${combinacoesTecnica.length} combinações`);
</script>
