<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Sistema de Estudo Musical</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .config-bar {
            background: #f39c12; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .config-bar input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; min-width: 250px; }
        .config-bar button { background: #2c3e50; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .status-bar { background: #27ae60; color: white; padding: 8px 20px; display: flex; justify-content: space-between; }
        .tabs-wrapper {
            background: #34495e;
            display: flex;
            padding: 0 10px;
            gap: 5px;
            align-items: center;
        }
        .tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            flex: 1;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.1); }
        .tab-btn.active {
            background: white;
            color: #2c3e50;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
        }
        .tab-rename-btn {
            background: #e67e22;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 5px;
        }
        .content { padding: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; }
        .button-group { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .btn-enviar { background: #27ae60; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-buscar { background: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-limpar { background: #95a5a6; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #34495e; color: white; position: sticky; top: 0; }
        td:first-child { background: #f8f9fa; font-weight: bold; text-align: left; }
        .checkbox-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .checkbox-item input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 2000;
            color: white;
            animation: slideIn 0.3s ease;
        }
        .success { background: #27ae60; }
        .error { background: #e74c3c; }
        .info { background: #3498db; }
        .loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
        }
        .loading.active { display: flex; }
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 4000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }
        .col-header {
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: center;
        }
        .rename-col-btn {
            background: #f39c12;
            border: none;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎵 Sistema de Estudo Musical</h1>
        <p>Registre músicas e marque as tonalidades executadas</p>
    </div>
    
    <div class="config-bar">
        <span>🔗 URL do Google Sheets:</span>
        <input type="text" id="webAppUrl" placeholder="https://script.google.com/macros/s/.../exec">
        <button onclick="testarConexao()">🔌 Testar</button>
        <button onclick="salvarUrl()">💾 Salvar</button>
    </div>
    
    <div class="status-bar">
        <span><span class="status-dot"></span> Status: <span id="statusModo">Local</span></span>
        <span id="lastUpdate">📁 Pronto</span>
    </div>
    
    <div class="tabs-wrapper">
        <div class="tabs" id="tabsContainer"></div>
        <button onclick="abrirModalNovaAba()" style="background:#e67e22; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">➕ Nova Aba</button>
    </div>
    
    <div class="content" id="mainContent"></div>
</div>

<div id="loading" class="loading"><div class="spinner"></div><p>Sincronizando...</p></div>
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
    // Configuração inicial
    let customTabs = [];
    let sheetData = {};
    let currentTabId = null;
    let webAppUrl = localStorage.getItem('webAppUrl') || '';

    // Abas padrão com nomes CORRETOS
    function initDefaultTabs() {
        return [
            { 
                id: "piano", 
                nome: "🎹 Piano", 
                checklists: ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"]
            },
            { 
                id: "flauta", 
                nome: "🎼 Flauta Doce", 
                checklists: ["C4", "C#4", "D4", "D#4", "E4", "F4", "F#4", "G4", "G#4", "A4", "A#4", "B4", "C5", "C#5", "D5", "D#5", "E5", "F5", "F#5", "G5", "G#5", "A5", "A#5", "B5"]
            }
        ];
    }

    function loadFromLocalStorage() {
        const stored = localStorage.getItem("musical_customTabs");
        if (stored) {
            try {
                customTabs = JSON.parse(stored);
                if (!customTabs.length) throw new Error();
            } catch(e) { customTabs = initDefaultTabs(); }
        } else {
            customTabs = initDefaultTabs();
        }
        
        const storedData = localStorage.getItem("musical_sheetData");
        if (storedData) sheetData = JSON.parse(storedData);
        else sheetData = {};
        
        customTabs.forEach(tab => {
            if (!sheetData[tab.id]) {
                const headers = ["🎵 Música", ...tab.checklists];
                sheetData[tab.id] = [headers];
            }
        });
        saveAllToLocal();
    }

    function saveAllToLocal() {
        localStorage.setItem("musical_customTabs", JSON.stringify(customTabs));
        localStorage.setItem("musical_sheetData", JSON.stringify(sheetData));
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        if (!container) return;
        container.innerHTML = customTabs.map(tab => `
            <div style="display:flex; align-items:center;">
                <button class="tab-btn ${currentTabId === tab.id ? 'active' : ''}" onclick="mudarAba('${tab.id}')">
                    ${tab.nome}
                </button>
                <button class="tab-rename-btn" onclick="renomearAba('${tab.id}')" title="Renomear">✏️</button>
            </div>
        `).join('');
        if (customTabs.length > 0 && !currentTabId) currentTabId = customTabs[0].id;
    }

    function mudarAba(tabId) {
        currentTabId = tabId;
        renderTabs();
        renderizarInterface();
    }

    function renomearAba(tabId) {
        const tab = customTabs.find(t => t.id === tabId);
        const novoNome = prompt("✏️ Renomear aba:", tab.nome);
        if (novoNome && novoNome.trim()) {
            tab.nome = novoNome.trim();
            saveAllToLocal();
            renderTabs();
            renderizarInterface();
            mostrarMensagem(`Aba renomeada para "${tab.nome}"`, "success");
        }
    }

    function renderizarInterface() {
        const tab = customTabs.find(t => t.id === currentTabId);
        if (!tab) return;
        const headers = sheetData[tab.id] ? sheetData[tab.id][0] : ["🎵 Música", ...tab.checklists];
        const rows = sheetData[tab.id] ? sheetData[tab.id].slice(1) : [];
        
        let html = `
            <div style="background:#f8f9fa; padding:20px; border-radius:10px; margin-bottom:20px;">
                <h3>➕ Adicionar Música</h3>
                <div class="form-group">
                    <label>Nome da Música:</label>
                    <input type="text" id="novaMusicaNome" placeholder="Ex: Asa Branca, Imagine...">
                </div>
                <button class="btn-enviar" onclick="adicionarMusica()">✅ Salvar Música</button>
                <button class="btn-buscar" onclick="sincronizarDoGoogle()">📥 Sincronizar</button>
                <button class="btn-buscar" onclick="enviarParaGoogle()">☁️ Enviar para Nuvem</button>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0;">
                <h3>📋 ${tab.nome} - Repertório</h3>
                <div>
                    <button onclick="renomearColuna()" style="background:#e67e22; color:white; border:none; padding:8px 15px; border-radius:5px; margin-right:10px;">✏️ Renomear Tonalidade</button>
                    <button onclick="adicionarTonalidade()" style="background:#27ae60; color:white; border:none; padding:8px 15px; border-radius:5px;">➕ Adicionar Tonalidade</button>
                </div>
            </div>
            
            <div style="overflow-x: auto; max-height: 500px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>${headers.map((h, idx) => `
                            <th>
                                ${idx === 0 ? h : `
                                    <div class="col-header">
                                        ${h}
                                        <button class="rename-col-btn" onclick="renomearTonalidadeEspecifica(${idx-1})" title="Renomear">✏️</button>
                                    </div>
                                `}
                            </th>
                        `).join('')}<th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.length === 0 ? `
                            <tr><td colspan="${headers.length + 1}" style="text-align:center; padding:40px;">
                                🎵 Nenhuma música cadastrada. Adicione sua primeira música acima!
                            </td></tr>
                        ` : rows.map((row, rowIdx) => `
                            <tr>
                                <td style="text-align:left; font-weight:bold;">${row[0] || '?'}</td>
                                ${tab.checklists.map((ch, colIdx) => {
                                    const isChecked = row[colIdx+1] === '✓';
                                    return `<td>
                                        <div class="checkbox-item">
                                            <input type="checkbox" class="check-musical" data-row="${rowIdx}" data-col="${colIdx}" ${isChecked ? 'checked' : ''}>
                                            <span style="font-size:11px;">${ch}</span>
                                        </div>
                                    </td>`;
                                }).join('')}
                                <td>
                                    <button onclick="editarMusica(${rowIdx})" style="background:#3498db; color:white; border:none; padding:5px 10px; border-radius:5px; margin-right:5px;">✏️</button>
                                    <button onclick="excluirMusica(${rowIdx})" style="background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:5px;">🗑️</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        attachCheckboxEvents();
    }

    function attachCheckboxEvents() {
        document.querySelectorAll('.check-musical').forEach(cb => {
            cb.onchange = function() {
                const rowIdx = parseInt(this.dataset.row);
                const colIdx = parseInt(this.dataset.col);
                const newValue = this.checked ? "✓" : "";
                if (sheetData[currentTabId] && sheetData[currentTabId][rowIdx + 1]) {
                    sheetData[currentTabId][rowIdx + 1][colIdx + 1] = newValue;
                    saveAllToLocal();
                    mostrarMensagem(`Tonalidade marcada/desmarcada`, "info");
                }
            };
        });
    }

    window.adicionarMusica = async function() {
        const nome = document.getElementById('novaMusicaNome')?.value.trim();
        if (!nome) { mostrarMensagem("Digite o nome da música", "error"); return; }
        
        const tab = customTabs.find(t => t.id === currentTabId);
        const novaRow = [nome];
        for (let i = 0; i < tab.checklists.length; i++) novaRow.push("");
        
        sheetData[currentTabId].push(novaRow);
        saveAllToLocal();
        renderizarInterface();
        document.getElementById('novaMusicaNome').value = "";
        mostrarMensagem(`"${nome}" adicionado!`, "success");
        
        if (webAppUrl) await enviarMusicaParaGoogle(novaRow);
    };

    window.editarMusica = function(rowIdx) {
        const nomeAtual = sheetData[currentTabId][rowIdx + 1][0];
        const novoNome = prompt("✏️ Editar nome da música:", nomeAtual);
        if (novoNome && novoNome.trim()) {
            sheetData[currentTabId][rowIdx + 1][0] = novoNome.trim();
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem("Nome atualizado!", "success");
        }
    };

    window.excluirMusica = function(rowIdx) {
        if (confirm("Remover esta música do repertório?")) {
            sheetData[currentTabId].splice(rowIdx + 1, 1);
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem("Música removida", "info");
        }
    };

    window.renomearTonalidadeEspecifica = function(colIdx) {
        const tab = customTabs.find(t => t.id === currentTabId);
        const nomeAtual = tab.checklists[colIdx];
        const novoNome = prompt(`✏️ Renomear "${nomeAtual}" para:`, nomeAtual);
        if (novoNome && novoNome.trim() && novoNome !== nomeAtual) {
            // Renomear na lista de checklists
            tab.checklists[colIdx] = novoNome.trim();
            
            // Atualizar cabeçalho na tabela
            if (sheetData[currentTabId] && sheetData[currentTabId][0]) {
                sheetData[currentTabId][0][colIdx + 1] = novoNome.trim();
            }
            
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem(`Tonalidade renomeada para "${novoNome}"`, "success");
        }
    };

    window.renomearColuna = function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        const listaAtual = tab.checklists.join(", ");
        const novaLista = prompt("✏️ Edite a lista de tonalidades (separadas por vírgula):\nEx: C, C#, D, D#, E, F, F#, G, G#, A, A#, B", listaAtual);
        
        if (novaLista && novaLista.trim()) {
            const novasTonalidades = novaLista.split(",").map(s => s.trim()).filter(s => s);
            if (novasTonalidades.length > 0) {
                tab.checklists = novasTonalidades;
                
                // Recriar estrutura da tabela
                const newHeaders = ["🎵 Música", ...novasTonalidades];
                const oldRows = sheetData[currentTabId].slice(1);
                const newRows = oldRows.map(row => {
                    const newRow = [row[0]];
                    for (let i = 0; i < novasTonalidades.length; i++) newRow.push("");
                    return newRow;
                });
                sheetData[currentTabId] = [newHeaders, ...newRows];
                saveAllToLocal();
                renderizarInterface();
                mostrarMensagem(`Lista de tonalidades atualizada! ${novasTonalidades.length} tonalidades`, "success");
            }
        }
    };

    window.adicionarTonalidade = function() {
        const tab = customTabs.find(t => t.id === currentTabId);
        const novaTonalidade = prompt("➕ Nova tonalidade/nota:", "Ex: F# ou C6");
        if (novaTonalidade && novaTonalidade.trim()) {
            tab.checklists.push(novaTonalidade.trim());
            
            // Atualizar estrutura da tabela
            const newHeaders = ["🎵 Música", ...tab.checklists];
            const oldRows = sheetData[currentTabId].slice(1);
            const newRows = oldRows.map(row => {
                const newRow = [row[0]];
                for (let i = 0; i < tab.checklists.length; i++) newRow.push("");
                return newRow;
            });
            sheetData[currentTabId] = [newHeaders, ...newRows];
            saveAllToLocal();
            renderizarInterface();
            mostrarMensagem(`Nova tonalidade "${novaTonalidade}" adicionada!`, "success");
        }
    };

    window.abrirModalNovaAba = function() {
        const modalDiv = document.getElementById('modalContent');
        modalDiv.innerHTML = `
            <h2>🎸 Criar Nova Aba</h2>
            <div class="form-group">
                <label>Nome da Aba (ex: 🎸 Violão, 🎻 Violino):</label>
                <input type="text" id="novaAbaNome" placeholder="Ex: 🎸 Violão">
            </div>
            <div class="form-group">
                <label>Tonalidades/Notas (separadas por vírgula):</label>
                <textarea id="novaAbaChecklists" rows="4" placeholder="Ex: C, C#, D, D#, E, F, F#, G, G#, A, A#, B"></textarea>
            </div>
            <div class="button-group">
                <button class="btn-enviar" onclick="criarNovaAba()">✅ Criar</button>
                <button onclick="fecharModal()" class="btn-limpar">Cancelar</button>
            </div>
        `;
        document.getElementById('modal').classList.add('active');
    };

    window.criarNovaAba = function() {
        const nome = document.getElementById('novaAbaNome')?.value.trim();
        let checkStr = document.getElementById('novaAbaChecklists')?.value.trim();
        
        if (!nome) { mostrarMensagem("Nome da aba é obrigatório", "error"); return; }
        
        let checklists = checkStr ? checkStr.split(',').map(s => s.trim()).filter(s => s) : ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        
        const newId = "tab_" + Date.now();
        customTabs.push({ id: newId, nome: nome, checklists: checklists });
        sheetData[newId] = [["🎵 Música", ...checklists]];
        saveAllToLocal();
        currentTabId = newId;
        renderTabs();
        renderizarInterface();
        fecharModal();
        mostrarMensagem(`Aba "${nome}" criada com ${checklists.length} tonalidades!`, "success");
    };

    // Funções do Google Sheets
    async function enviarMusicaParaGoogle(linhaDados) {
        if (!webAppUrl) return false;
        const tab = customTabs.find(t => t.id === currentTabId);
        const nomeAba = tab.nome;
        
        try {
            const url = `${webAppUrl}?acao=salvar&aba=${encodeURIComponent(nomeAba)}&dados=${encodeURIComponent(JSON.stringify(linhaDados))}`;
            const response = await fetch(url);
            const result = await response.json();
            return result?.success;
        } catch(e) {
            return false;
        }
    }

    async function enviarParaGoogle() {
        if (!webAppUrl) { mostrarMensagem("Configure a URL primeiro", "error"); return; }
        mostrarLoading(true);
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const nomeAba = tab.nome;
            const allRows = sheetData[currentTabId].slice(1);
            let sucessos = 0;
            
            for (const row of allRows) {
                const url = `${webAppUrl}?acao=salvar&aba=${encodeURIComponent(nomeAba)}&dados=${encodeURIComponent(JSON.stringify(row))}`;
                const response = await fetch(url);
                const result = await response.json();
                if (result.success) sucessos++;
                await new Promise(r => setTimeout(r, 200));
            }
            mostrarMensagem(`✅ Enviados ${sucessos}/${allRows.length} itens para "${nomeAba}"`, "success");
            document.getElementById('lastUpdate').innerHTML = "☁️ Enviado: " + new Date().toLocaleTimeString();
        } finally {
            mostrarLoading(false);
        }
    }

    async function sincronizarDoGoogle() {
        if (!webAppUrl) { mostrarMensagem("Configure a URL primeiro", "error"); return; }
        mostrarLoading(true);
        try {
            const tab = customTabs.find(t => t.id === currentTabId);
            const nomeAba = tab.nome;
            const url = `${webAppUrl}?acao=buscar&aba=${encodeURIComponent(nomeAba)}&t=${Date.now()}`;
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.success && result.dados) {
                sheetData[currentTabId] = result.dados;
                saveAllToLocal();
                renderizarInterface();
                mostrarMensagem(`📥 Sincronizado! ${result.dados.length - 1} músicas carregadas`, "success");
                document.getElementById('lastUpdate').innerHTML = "🔄 Sincronizado: " + new Date().toLocaleTimeString();
            } else {
                mostrarMensagem("Erro ao buscar dados", "error");
            }
        } catch(e) {
            mostrarMensagem("Erro: " + e.message, "error");
        } finally {
            mostrarLoading(false);
        }
    }

    async function testarConexao() {
        if (!webAppUrl) { mostrarMensagem("Configure a URL primeiro", "error"); return; }
        mostrarLoading(true);
        try {
            const response = await fetch(`${webAppUrl}?acao=teste&t=${Date.now()}`);
            const result = await response.json();
            if (result.success) {
                mostrarMensagem("✅ Conexão com Google Sheets OK!", "success");
                document.getElementById('statusModo').textContent = 'Online ✓';
            } else {
                mostrarMensagem("Erro na conexão", "error");
            }
        } catch(e) {
            mostrarMensagem("❌ Falha na conexão", "error");
            document.getElementById('statusModo').textContent = 'Offline';
        } finally {
            mostrarLoading(false);
        }
    }

    window.salvarUrl = function() {
        const inputUrl = document.getElementById('webAppUrl');
        if (inputUrl) webAppUrl = inputUrl.value.trim();
        localStorage.setItem('webAppUrl', webAppUrl);
        mostrarMensagem("URL salva!", "success");
        if (webAppUrl) testarConexao();
    };

    function mostrarLoading(show) {
        const el = document.getElementById('loading');
        if (el) el.classList.toggle('active', show);
    }

    function mostrarMensagem(msg, tipo) {
        const div = document.createElement('div');
        div.className = `message ${tipo}`;
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    window.fecharModal = function() {
        document.getElementById('modal').classList.remove('active');
    };

    // Inicialização
    loadFromLocalStorage();
    if (customTabs.length) currentTabId = customTabs[0].id;
    renderTabs();
    renderizarInterface();
    if (webAppUrl) document.getElementById('webAppUrl').value = webAppUrl;
</script>
</body>
</html>
